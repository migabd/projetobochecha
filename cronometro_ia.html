<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTime AI - Cronômetro de Estudos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #09090b 0%, #18181b 100%);
            --glass-bg: rgba(39, 39, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.4);
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 60%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 480px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        h1 span {
            color: var(--accent);
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.25rem;
            transition: color 0.2s, transform 0.2s;
            padding: 8px;
            border-radius: 50%;
        }

        .icon-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            transform: rotate(15deg);
        }

        /* Timer Display */
        .timer-container {
            text-align: center;
            padding: 24px 0;
        }

        .main-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            margin-bottom: 8px;
        }

        .ms {
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 8px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button.action-btn {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button.action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-success {
            background: var(--success);
            color: white;
            box-shadow: 0 0 15px var(--success-glow);
        }

        .btn-success:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--success-glow);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger) !important;
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 15px var(--danger-glow);
        }

        .btn-danger-solid {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 15px var(--danger-glow);
        }

        .btn-danger-solid:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--danger-glow);
        }

        .secondary-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-main);
            width: 100%;
        }

        .btn-outline:hover:not(:disabled) {
            background: rgba(255,255,255,0.05);
            border-color: var(--text-muted) !important;
        }

        .btn-ai {
            background: linear-gradient(45deg, #8b5cf6, #d946ef);
            border: none !important;
            color: white;
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .btn-ai::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(rgba(255,255,255,0), rgba(255,255,255,0.3), rgba(255,255,255,0));
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Laps */
        .laps-container {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            max-height: 250px;
            overflow-y: auto;
            margin-top: 8px;
        }

        /* Scrollbar */
        .laps-container::-webkit-scrollbar {
            width: 6px;
        }
        .laps-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .laps-container::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .lap-item {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 70px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--glass-border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            align-items: center;
        }

        .lap-item:last-child {
            border-bottom: none;
        }

        .lap-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .lap-action-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lap-action-btn.active-right {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border-color: var(--success);
        }

        .lap-action-btn.active-wrong {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .lap-action-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .lap-num {
            color: var(--text-muted);
        }

        .lap-dur {
            color: var(--success);
            font-weight: 600;
        }

        .lap-tot {
            text-align: right;
            color: var(--text-main);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--bg-gradient);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--accent);
        }

        select.form-control {
            appearance: none;
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .modal-actions button {
            width: auto;
            padding: 10px 24px;
        }
        
        .ai-result-content {
            line-height: 1.6;
            color: #d1d5db;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
        
        .ai-result-content strong {
            color: var(--text-main);
            font-weight: 600;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: opacity 0.3s, transform 0.3s;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            font-weight: 600;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="container">
        <header>
            <h1>⏱️ FocusTime <span>AI</span></h1>
            <button class="icon-btn" id="btnSettings" title="Configurações">⚙️</button>
        </header>

        <div class="timer-container">
            <div class="main-time" id="displayMain">00:00:00<span class="ms">.00</span></div>
            <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;">
                Questão atual: <span id="currentQuestionTime" style="font-family: 'JetBrains Mono'; color: var(--text-main);">00:00.00</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Questões</div>
                <div class="stat-value" id="statCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Tempo Médio</div>
                <div class="stat-value" id="statAvg">00:00.00</div>
            </div>
        </div>
        <div class="stats-grid" style="margin-top: -8px;">
            <div class="stat-box" style="background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3);">
                <div class="stat-label" style="color: var(--success);">Acertos</div>
                <div class="stat-value" id="statRight" style="color: var(--success);">0</div>
            </div>
            <div class="stat-box" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);">
                <div class="stat-label" style="color: var(--danger);">Erros</div>
                <div class="stat-value" id="statWrong" style="color: var(--danger);">0</div>
            </div>
        </div>

        <div class="controls">
            <button id="btnStartPause" class="action-btn btn-primary">
                ▶ Iniciar
            </button>
            <button id="btnLapRight" class="action-btn btn-success" disabled>
                ✅ Acertei
            </button>
            <button id="btnLapWrong" class="action-btn btn-danger-solid" disabled>
                ❌ Errei
            </button>
        </div>

        <div class="secondary-controls">
            <button id="btnSave" class="action-btn btn-outline" title="Baixar relatório de tempos desta sessão">
                💾 Salvar Lista
            </button>
            <button id="btnAutoLap" class="action-btn btn-outline" title="A IA vai ler sua tela e marcar a volta sozinha quando você mudar de questão">
                👁️ Auto-Volta IA
            </button>
            <button id="btnPip" class="action-btn btn-outline" title="Abre um mini-player que fica sempre acima de outras janelas">
                📌 Manter Sempre Visível (Mini Player)
            </button>
            <button id="btnAi" class="action-btn btn-ai" disabled>
                ✨ Analisar Desempenho com IA
            </button>
            <button id="btnReset" class="action-btn btn-danger">
                ↺ Zerar Tudo
            </button>
        </div>

        <div class="laps-container" id="lapsContainer" style="display: none;">
            <div id="lapsList"></div>
        </div>
    </div>

    <!-- Hidden Video element for Picture-in-Picture (Always on top) -->
    <video id="pipVideo" muted playsinline style="display:none;"></video>
    
    <div id="toast" class="toast"></div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>Configurações da IA</h2>
            <div class="form-group">
                <label for="apiKey">Gemini API Key</label>
                <input type="password" id="apiKey" class="form-control" placeholder="Cole sua chave de API do Google Gemini aqui">
            </div>
            <div class="form-group">
                <label for="aiPersona">Personalidade do Mentor IA</label>
                <select id="aiPersona" class="form-control">
                    <option value="mentor">Mentor Compreensivo e Motivador</option>
                    <option value="direto">Especialista Direto e Analítico</option>
                    <option value="arrogante">Professor Rigoroso e Crítico (Modo Arrogante)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="action-btn btn-outline" id="btnCancelSettings">Cancelar</button>
                <button class="action-btn btn-primary" id="btnSaveSettings">Salvar</button>
            </div>
        </div>
    </div>

    <!-- AI Result Modal -->
    <div class="modal-overlay" id="aiModal">
        <div class="modal">
            <h2>✨ Feedback do Mentor IA</h2>
            <div class="ai-result-content" id="aiResultContent">
                Analisando seus dados...
            </div>
            <div class="modal-actions">
                <button class="action-btn btn-primary" id="btnCloseAi">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        
        let laps = [];
        let lastLapAbsoluteTime = 0;

        // Elements
        const displayMain = document.getElementById('displayMain');
        const currentQuestionTimeEl = document.getElementById('currentQuestionTime');
        const btnStartPause = document.getElementById('btnStartPause');
        const btnLapRight = document.getElementById('btnLapRight');
        const btnLapWrong = document.getElementById('btnLapWrong');
        const btnReset = document.getElementById('btnReset');
        const btnSave = document.getElementById('btnSave');
        const btnPip = document.getElementById('btnPip');
        const btnAi = document.getElementById('btnAi');
        const statCount = document.getElementById('statCount');
        const statAvg = document.getElementById('statAvg');
        const lapsContainer = document.getElementById('lapsContainer');
        const lapsList = document.getElementById('lapsList');
        
        // Modals
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('apiKey');
        const aiPersonaSelect = document.getElementById('aiPersona');
        const aiModal = document.getElementById('aiModal');
        const aiResultContent = document.getElementById('aiResultContent');

        // PiP Setup
        const canvas = document.createElement('canvas');
        canvas.width = 400;
        canvas.height = 200;
        const ctx = canvas.getContext('2d');
        const pipVideo = document.getElementById('pipVideo');
        
        try {
            // Capture canvas stream and attach to video for PiP
            const stream = canvas.captureStream(30);
            pipVideo.srcObject = stream;
            pipVideo.play().catch(e => console.log("PiP Auto-play prevented until user interaction"));
        } catch(e) {
            console.error("Canvas captureStream not supported", e);
            btnPip.style.display = 'none';
        }

        // Load Settings
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('focusTimeApiKey');
            const savedPersona = localStorage.getItem('focusTimeAiPersona');
            if(savedKey) apiKeyInput.value = savedKey;
            if(savedPersona) aiPersonaSelect.value = savedPersona;
        });

        // Format time helper: MM:SS.ms or HH:MM:SS.ms
        function formatTime(ms, includeMs = true) {
            let date = new Date(ms);
            let h = Math.floor(ms / 3600000);
            let m = date.getUTCMinutes();
            let s = date.getUTCSeconds();
            let millis = Math.floor(date.getUTCMilliseconds() / 10);

            h = h > 0 ? h.toString().padStart(2, '0') + ':' : '';
            m = m.toString().padStart(2, '0');
            s = s.toString().padStart(2, '0');
            millis = millis.toString().padStart(2, '0');

            if(includeMs) {
                return { main: `${h}${m}:${s}`, ms: `.${millis}` };
            }
            return `${h}${m}:${s}`;
        }

        // Draw to canvas for PiP loop
        function updateCanvas() {
            // Background
            ctx.fillStyle = '#18181b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Border/Accent
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);

            // Calculate values
            const now = isRunning ? Date.now() - startTime : elapsedTime;
            const currentQTime = now - lastLapAbsoluteTime;
            
            const timeObj = formatTime(now);
            
            // Draw Main Timer
            ctx.fillStyle = '#f4f4f5';
            ctx.font = 'bold 50px "JetBrains Mono", monospace, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`${timeObj.main}${timeObj.ms}`, canvas.width / 2, 70);

            // Draw current question time & info
            ctx.fillStyle = '#a1a1aa';
            ctx.font = '20px "Outfit", sans-serif';
            ctx.fillText(`Questão ${laps.length + 1} | Atual: ${formatTime(currentQTime, false)}`, canvas.width / 2, 130);
            
            if (laps.length > 0) {
                const avg = now / (laps.length + 1); // rough avg including current
                ctx.fillStyle = '#10b981';
                ctx.font = '16px "Outfit", sans-serif';
                ctx.fillText(`Média: ${formatTime(avg, false)}`, canvas.width / 2, 165);
            }

            requestAnimationFrame(updateCanvas);
        }
        updateCanvas();

        function updateDisplay() {
            const now = isRunning ? Date.now() - startTime : elapsedTime;
            const t = formatTime(now);
            displayMain.innerHTML = `${t.main}<span class="ms">${t.ms}</span>`;

            // Update current question time
            const currentQTime = now - lastLapAbsoluteTime;
            const cq = formatTime(currentQTime);
            currentQuestionTimeEl.innerText = `${cq.main}${cq.ms}`;
        }

        function toggleTimer(eventOrFromVideo) {
            const fromVideo = eventOrFromVideo === true;
            if (isRunning) {
                // Pause
                clearInterval(timerInterval);
                elapsedTime = Date.now() - startTime;
                isRunning = false;
                btnStartPause.innerHTML = '▶ Continuar';
                btnStartPause.className = 'action-btn btn-primary';
                btnStartPause.style.background = 'var(--accent)';
                if (!fromVideo) pipVideo.pause();
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
            } else {
                // Start
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateDisplay, 10);
                isRunning = true;
                btnStartPause.innerHTML = '⏸ Pausar';
                btnStartPause.className = 'action-btn';
                btnStartPause.style.background = 'var(--warning)';
                btnStartPause.style.color = '#fff';
                btnLapRight.disabled = false;
                btnLapWrong.disabled = false;
                
                // Play video if PiP is active or to enable PiP later
                if (!fromVideo) pipVideo.play().catch(()=>{});
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
            }
        }

        // Add Media Keys and PiP controls support
        pipVideo.addEventListener('play', () => { if (!isRunning) toggleTimer(true); });
        pipVideo.addEventListener('pause', () => { if (isRunning) toggleTimer(true); });

        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => { if (!isRunning) toggleTimer(); });
            navigator.mediaSession.setActionHandler('pause', () => { if (isRunning) toggleTimer(); });
            navigator.mediaSession.setActionHandler('nexttrack', () => { if (isRunning) markLap(); });
        }

        function markLap(status = null) {
            if (!isRunning) return;
            const now = Date.now() - startTime;
            const lapDuration = now - lastLapAbsoluteTime;
            
            laps.push({
                number: laps.length + 1,
                duration: lapDuration,
                total: now,
                status: status
            });
            
            lastLapAbsoluteTime = now;
            updateLapsUI();
            btnAi.disabled = false;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            lastLapAbsoluteTime = 0;
            laps = [];
            currentQuestionId = null;
            questionProcessed = false;
            
            btnStartPause.innerHTML = '▶ Iniciar';
            btnStartPause.className = 'action-btn btn-primary';
            btnStartPause.style.background = '';
            btnLapRight.disabled = true;
            btnLapWrong.disabled = true;
            btnAi.disabled = true;
            document.getElementById('statRight').innerText = '0';
            document.getElementById('statWrong').innerText = '0';
            
            updateDisplay();
            updateLapsUI();
            lapsContainer.style.display = 'none';
        }

        window.setLapStatus = function(index, status) {
            laps[index].status = status;
            updateLapsUI();
        };

        function updateLapsUI() {
            if (laps.length === 0) {
                statCount.innerText = '0';
                statAvg.innerText = '00:00.00';
                document.getElementById('statRight').innerText = '0';
                document.getElementById('statWrong').innerText = '0';
                lapsList.innerHTML = '';
                return;
            }

            lapsContainer.style.display = 'block';
            statCount.innerText = laps.length;
            
            // Calculate Average
            const totalDuration = laps.reduce((acc, lap) => acc + lap.duration, 0);
            const avg = totalDuration / laps.length;
            const avgTime = formatTime(avg);
            statAvg.innerText = `${avgTime.main}${avgTime.ms}`;

            // Calculate Right/Wrong
            const rightCount = laps.filter(l => l.status === 'right').length;
            const wrongCount = laps.filter(l => l.status === 'wrong').length;
            document.getElementById('statRight').innerText = rightCount;
            document.getElementById('statWrong').innerText = wrongCount;

            // Render List (reversed, newest top)
            lapsList.innerHTML = [...laps].reverse().map((lap, revIndex) => {
                const originalIndex = laps.length - 1 - revIndex;
                const dur = formatTime(lap.duration);
                const tot = formatTime(lap.total);
                const rightClass = lap.status === 'right' ? 'active-right' : '';
                const wrongClass = lap.status === 'wrong' ? 'active-wrong' : '';

                return `
                    <div class="lap-item">
                        <div class="lap-num">Q${lap.number}</div>
                        <div class="lap-dur">${dur.main}${dur.ms}</div>
                        <div class="lap-tot">${tot.main}${tot.ms}</div>
                        <div class="lap-actions">
                            <button class="lap-action-btn ${rightClass}" onclick="setLapStatus(${originalIndex}, 'right')" title="Acertei">✅</button>
                            <button class="lap-action-btn ${wrongClass}" onclick="setLapStatus(${originalIndex}, 'wrong')" title="Errei">❌</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // PiP Logic (Modern Document PiP or Video PiP fallback)
        let pipWindow = null;
        
        btnPip.addEventListener('click', async () => {
            try {
                // Check if modern Document PiP is supported (Chrome/Edge 111+)
                if ('documentPictureInPicture' in window) {
                    if (pipWindow) {
                        pipWindow.close();
                        pipWindow = null;
                        return;
                    }
                    
                    pipWindow = await window.documentPictureInPicture.requestWindow({
                        width: 350,
                        height: 150
                    });
                    
                    // Copy styles
                    const style = pipWindow.document.createElement('style');
                    style.textContent = `
                        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=JetBrains+Mono:wght@700&display=swap');
                        body { margin: 0; background: #18181b; color: #f4f4f5; font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; user-select: none; transition: background 0.1s; }
                        .time-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; cursor: pointer; }
                        .time-container:hover { background: rgba(255,255,255,0.05); }
                        .time-container:active { background: #059669; }
                        .time { font-size: 48px; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
                        .ms { font-size: 24px; opacity: 0.5; }
                        .info { font-family: 'Outfit', sans-serif; font-size: 16px; color: #10b981; margin-top: 5px; font-weight: 600; }
                        .controls { height: 40px; width: 100%; display: flex; border-top: 1px solid rgba(255,255,255,0.1); }
                        .btn { flex: 1; background: transparent; border: none; color: #f4f4f5; font-family: 'Outfit', sans-serif; font-size: 14px; cursor: pointer; transition: background 0.2s; }
                        .btn:hover { background: rgba(255,255,255,0.1); }
                    `;
                    pipWindow.document.head.appendChild(style);
                    
                    const timeContainer = pipWindow.document.createElement('div');
                    timeContainer.className = 'time-container';
                    timeContainer.title = "Clique para marcar volta";
                    
                    const timeDiv = pipWindow.document.createElement('div');
                    timeDiv.className = 'time';
                    
                    const infoDiv = pipWindow.document.createElement('div');
                    infoDiv.className = 'info';
                    
                    timeContainer.appendChild(timeDiv);
                    timeContainer.appendChild(infoDiv);
                    
                    const controlsDiv = pipWindow.document.createElement('div');
                    controlsDiv.className = 'controls';
                    
                    const pauseBtn = pipWindow.document.createElement('button');
                    pauseBtn.className = 'btn';
                    
                    controlsDiv.appendChild(pauseBtn);
                    
                    pipWindow.document.body.appendChild(timeContainer);
                    pipWindow.document.body.appendChild(controlsDiv);
                    
                    // Click to mark lap!
                    timeContainer.addEventListener('click', () => {
                        if (isRunning) {
                            markLap();
                            timeContainer.style.background = '#10b981';
                            setTimeout(() => { timeContainer.style.background = ''; }, 150);
                        } else {
                            toggleTimer();
                        }
                    });
                    
                    pauseBtn.addEventListener('click', () => {
                        toggleTimer();
                    });
                    
                    pipWindow.addEventListener('pagehide', () => { pipWindow = null; });
                    
                    // Update loop just for this window
                    const updatePipWindow = () => {
                        if (!pipWindow) return;
                        const now = isRunning ? Date.now() - startTime : elapsedTime;
                        const currentQTime = now - lastLapAbsoluteTime;
                        const t = formatTime(now);
                        const qt = formatTime(currentQTime, false);
                        timeDiv.innerHTML = `${t.main}<span class="ms">${t.ms}</span>`;
                        infoDiv.textContent = `Questão ${laps.length + 1} | Atual: ${qt}`;
                        pauseBtn.textContent = isRunning ? '⏸ Pausar' : '▶ Continuar';
                        requestAnimationFrame(updatePipWindow);
                    };
                    updatePipWindow();
                    
                } else {
                    // Fallback to Video PiP
                    if (document.pictureInPictureElement) {
                        await document.exitPictureInPicture();
                    } else {
                        await pipVideo.requestPictureInPicture();
                    }
                }
            } catch (error) {
                console.error('Failed to enter/exit PiP:', error);
                alert("Ocorreu um erro ao tentar abrir o Mini Player. Seu navegador pode não suportar esta função.");
            }
        });

        // Event Listeners
        btnStartPause.addEventListener('click', toggleTimer);
        btnLapRight.addEventListener('click', () => { markLap('right'); });
        btnLapWrong.addEventListener('click', () => { markLap('wrong'); });
        btnReset.addEventListener('click', resetTimer);

        btnSave.addEventListener('click', () => {
            if (laps.length === 0) {
                alert("Não há tempos para salvar!");
                return;
            }
            const nome = prompt("Dê um nome para esta Playlist / Sessão:", "Sessão de Estudos");
            if (!nome) return;
            
            let report = `FocusTime AI - Relatório de Desempenho\n`;
            report += `Playlist: ${nome}\n`;
            report += `Data: ${new Date().toLocaleString('pt-BR')}\n`;
            report += `----------------------------------------\n`;
            report += `Total de Questões: ${laps.length}\n`;
            
            const rightCount = laps.filter(l => l.status === 'right').length;
            const wrongCount = laps.filter(l => l.status === 'wrong').length;
            report += `Acertos: ${rightCount} | Erros: ${wrongCount}\n`;
            
            const totalDuration = laps.reduce((acc, lap) => acc + lap.duration, 0);
            const avg = totalDuration / laps.length;
            report += `Tempo Total: ${formatTime(totalDuration, false)}\n`;
            report += `Tempo Médio: ${formatTime(avg, false)}\n`;
            report += `----------------------------------------\n\n`;
            
            laps.forEach(l => {
                const statusStr = l.status === 'right' ? 'ACERTO' : l.status === 'wrong' ? 'ERRO  ' : 'S/ RESP';
                const dur = formatTime(l.duration, false);
                const tot = formatTime(l.total, false);
                report += `Questão ${String(l.number).padStart(2, '0')} | ${statusStr} | Duração: ${dur} | Tempo Acumulado: ${tot}\n`;
            });
            
            const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `FocusTime_${nome.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Relatório baixado com sucesso!");
        });

        // Giant background click target
        document.body.addEventListener('click', (e) => {
            if (e.target === document.body || e.target.classList.contains('ambient-glow') || e.target.classList.contains('container')) {
                if (isRunning) {
                    markLap();
                    showToast("Volta marcada pelo clique no fundo!");
                }
            }
        });

        // Settings
        document.getElementById('btnSettings').addEventListener('click', () => {
            settingsModal.classList.add('active');
        });
        
        document.getElementById('btnCancelSettings').addEventListener('click', () => {
            settingsModal.classList.remove('active');
        });

        document.getElementById('btnSaveSettings').addEventListener('click', () => {
            localStorage.setItem('focusTimeApiKey', apiKeyInput.value.trim());
            localStorage.setItem('focusTimeAiPersona', aiPersonaSelect.value);
            settingsModal.classList.remove('active');
        });

        document.getElementById('btnCloseAi').addEventListener('click', () => {
            aiModal.classList.remove('active');
        });

        // Auto-Lap Logic via Screen Capture & Gemini Vision
        const btnAutoLap = document.getElementById('btnAutoLap');
        const captureCanvas2 = document.createElement('canvas');
        const captureVideo2 = document.createElement('video');
        captureVideo2.muted = true;
        captureVideo2.playsInline = true;

        let autoLapInterval = null;
        let autoLapStream = null;
        let currentQuestionId = null;
        let questionProcessed = false;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        btnAutoLap.addEventListener('click', async () => {
            const apiKey = localStorage.getItem('focusTimeApiKey');
            if (!apiKey) {
                alert("Configure sua API Key nas engrenagens antes de ativar a Visão IA.");
                settingsModal.classList.add('active');
                return;
            }

            if (autoLapInterval) {
                clearInterval(autoLapInterval);
                autoLapInterval = null;
                if (autoLapStream) {
                    autoLapStream.getTracks().forEach(t => t.stop());
                    autoLapStream = null;
                }
                btnAutoLap.innerHTML = '👁️ Auto-Volta IA';
                btnAutoLap.classList.remove('btn-success');
                btnAutoLap.classList.add('btn-outline');
                showToast("Auto-Volta IA Desativado.");
                return;
            }

            try {
                autoLapStream = await navigator.mediaDevices.getDisplayMedia({ video: { displaySurface: "window" } });
                captureVideo2.srcObject = autoLapStream;
                await captureVideo2.play();
                
                btnAutoLap.innerHTML = '👁️ Auto-Volta (Ativo)';
                btnAutoLap.classList.remove('btn-outline');
                btnAutoLap.classList.add('btn-success');
                showToast("Auto-Volta IA Ativado! Verificando tela a cada 5s...");

                autoLapInterval = setInterval(async () => {
                    if (!isRunning) return; 

                    captureCanvas2.width = captureVideo2.videoWidth;
                    captureCanvas2.height = captureVideo2.videoHeight;
                    const captureCtx = captureCanvas2.getContext('2d');
                    captureCtx.drawImage(captureVideo2, 0, 0, captureCanvas2.width, captureCanvas2.height);
                    
                    const dataUrl = captureCanvas2.toDataURL('image/jpeg', 0.5);
                    const base64Data = dataUrl.split(',')[1];

                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: "Você está analisando a tela de um banco de questões. Retorne um objeto JSON estrito com dois campos: 'texto' (contendo EXATAMENTE as 6 primeiras palavras do texto principal do enunciado da questão) e 'status' ('right' se houver um selo verde escrito CERTA, 'wrong' se houver um selo vermelho escrito ERRADA, ou null se não houver nenhum selo indicando acerto/erro)." },
                                        { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                                    ]
                                }],
                                generationConfig: { temperature: 0.1, responseMimeType: "application/json" }
                            })
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            const textObj = data.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (textObj) {
                                try {
                                    const result = JSON.parse(textObj);
                                    // Use 'texto' instead of 'id' to be robust
                                    if (result && result.texto && result.texto !== "null") {
                                        // Normalize text to ignore punctuation and case differences
                                        const detectedId = String(result.texto).trim().toUpperCase().replace(/[^A-Z0-9À-ÖØ-öø-ÿ]/g, '');
                                        
                                        if (detectedId.length > 10) {
                                            if (detectedId !== currentQuestionId) {
                                                if (currentQuestionId !== null && !questionProcessed) {
                                                    markLap(null);
                                                    showToast("Mudança detectada. Volta anterior marcada sem resposta.");
                                                }
                                                currentQuestionId = detectedId;
                                                questionProcessed = false;
                                            }
                                            
                                            if (result.status && !questionProcessed) {
                                                if (result.status === 'right' || result.status === 'wrong') {
                                                    markLap(result.status);
                                                    questionProcessed = true;
                                                    showToast(result.status === 'right' ? "✅ IA detectou Acerto!" : "❌ IA detectou Erro!");
                                                }
                                            }
                                        }
                                    }
                                } catch(e) {
                                    console.error("Erro JSON IA:", e, textObj);
                                }
                            }
                        } else {
                            const errorData = await response.text();
                            console.error("Gemini API erro na resposta:", response.status, errorData);
                        }
                    } catch(e) {
                        console.error("Auto-lap error:", e);
                    }
                }, 5000); 

                autoLapStream.getVideoTracks()[0].onended = () => {
                    if (autoLapInterval) {
                        clearInterval(autoLapInterval);
                        autoLapInterval = null;
                        btnAutoLap.innerHTML = '👁️ Auto-Volta IA';
                        btnAutoLap.classList.remove('btn-success');
                        btnAutoLap.classList.add('btn-outline');
                        showToast("Compartilhamento interrompido. Auto-Volta IA Desativado.");
                    }
                };

            } catch (err) {
                console.error("Screen capture failed:", err);
                alert("Não foi possível acessar a tela para usar a IA. Erro: " + err.message);
            }
        });

        // AI Analysis Logic
        btnAi.addEventListener('click', async () => {
            const apiKey = localStorage.getItem('focusTimeApiKey');
            if (!apiKey) {
                alert("Por favor, configure sua API Key do Gemini nas configurações (ícone de engrenagem) antes de usar a análise de IA.");
                settingsModal.classList.add('active');
                return;
            }

            if (laps.length === 0) {
                alert("Faça algumas questões e marque as voltas antes de pedir análise.");
                return;
            }

            aiModal.classList.add('active');
            aiResultContent.innerHTML = '<div style="text-align: center;"><span class="loader"></span><br><br>O Mentor está analisando seu ritmo...</div>';

            const personaType = localStorage.getItem('focusTimeAiPersona') || 'mentor';
            let personaPrompt = "";
            
            if (personaType === 'mentor') {
                personaPrompt = "Você é um mentor de estudos compreensivo e super motivador. Celebre os acertos, seja gentil com a lentidão e dê dicas práticas e encorajadoras.";
            } else if (personaType === 'direto') {
                personaPrompt = "Você é um especialista analítico e direto ao ponto. Fale sobre os dados sem enrolação, identifique desvios padrão e dê uma instrução clara e pragmática.";
            } else if (personaType === 'arrogante') {
                personaPrompt = "Você é um professor extremamente rigoroso, exigente, irônico e levemente arrogante (como o Dr. House ou o Chef Gordon Ramsay). Você não tolera lentidão. Critica fortemente as questões que demoraram, mas no fundo quer que o aluno melhore. Use humor sarcástico e termos acadêmicos.";
            }

            const totalDuration = laps.reduce((acc, lap) => acc + lap.duration, 0);
            const avg = totalDuration / laps.length;
            
            const rightCount = laps.filter(l => l.status === 'right').length;
            const wrongCount = laps.filter(l => l.status === 'wrong').length;

            let lapsText = laps.map(l => {
                const statusStr = l.status === 'right' ? '(ACERTO)' : l.status === 'wrong' ? '(ERRO)' : '(NÃO RESPONDIDO)';
                return `Questão ${l.number} ${statusStr}: ${formatTime(l.duration, false)}`;
            }).join('\n');

            const prompt = `
${personaPrompt}

O aluno acabou de fazer uma lista de ${laps.length} questões.
Acertos: ${rightCount}
Erros: ${wrongCount}
Tempo Total: ${formatTime(totalDuration, false)}
Tempo Médio por questão: ${formatTime(avg, false)}

Tempos individuais e resultados:
${lapsText}

Faça uma análise rápida do desempenho dele, focando no gerenciamento de tempo e na relação entre tempo gasto e acertos/erros (ex: ele erra as que faz muito rápido? ou as que demora mais?). Identifique padrões. Escreva em formato Markdown limpo, usando negrito para destacar partes importantes. Não seja excessivamente longo. Responda em português brasileiro.
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 500,
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`Erro na API: ${response.status}`);
                }

                const data = await response.json();
                let text = data.candidates[0].content.parts[0].text;
                
                // Simple markdown parse
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
                text = text.replace(/## (.*?)\n/g, '<h3 style="color:var(--accent); margin-top: 15px; margin-bottom: 5px;">$1</h3>');
                text = text.replace(/# (.*?)\n/g, '<h2 style="color:var(--accent); margin-top: 15px; margin-bottom: 5px;">$1</h2>');
                
                aiResultContent.innerHTML = text;

            } catch (error) {
                console.error("Erro ao chamar IA:", error);
                aiResultContent.innerHTML = `<div style="color: var(--danger);"><strong>Erro na comunicação com a IA.</strong><br><br>Verifique se sua API Key está correta nas configurações ou se você tem conexão com a internet.<br><br>Detalhe do erro: ${error.message}</div>`;
            }
        });

    </script>
</body>
</html>
