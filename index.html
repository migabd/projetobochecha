                                    <div className="absolute top-4 left-4 text-amber-500"><i className="fa-solid fa-bolt text-lg"></i></div>
                                    <textarea value={newPerc} onChange={e => setNewPerc(e.target.value)} placeholder="Novo insight clínico..." className="w-full h-28 sm:h-32 p-4 pl-12 rounded-2xl sm:rounded-3xl bg-zinc-50 dark:bg-zinc-950 outline-none focus:ring-2 focus:ring-amber-400 border border-zinc-200 dark:border-zinc-800 resize-none font-bold text-base sm:text-lg" />
                                </div>
                                <button onClick={() => { if (newPerc.trim()) { setDb(p => ({ ...p, perceptions: [{ id: Date.now(), text: newPerc, date: new Date().toLocaleDateString('pt-PT') }, ...p.perceptions] })); setNewPerc(''); } }} className="bg-amber-500 hover:bg-amber-600 px-8 py-3.5 sm:py-4 rounded-2xl sm:rounded-3xl font-black text-zinc-900 shadow-xl shadow-amber-500/20 transition-all active:scale-95 text-base sm:text-lg whitespace-nowrap">Gravar Insight</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {db.perceptions.map(p => (
                                    <div key={p.id} className="bg-white dark:bg-zinc-900 p-8 rounded-[32px] border-t-8 border-amber-400 shadow-lg relative group animate-in slide-in-from-bottom-2 border-x border-b border-zinc-200 dark:border-zinc-800">
                                        <p className="text-base font-bold leading-relaxed mb-6 text-justify dark:text-zinc-100">"{p.text}"</p>
                                        <div className="flex justify-between items-center text-xs text-zinc-400 font-black uppercase tracking-widest border-t border-zinc-100 dark:border-zinc-800 pt-5">
                                            <span><i className="fa-regular fa-calendar mr-1"></i> {p.date}</span>
                                            <button onClick={() => { if (window.confirm('Excluir?')) setDb(p => ({ ...p, perceptions: p.perceptions.filter(x => x.id !== p.id) })); }} className="w-8 h-8 rounded-full bg-zinc-100 dark:bg-zinc-800 text-red-500 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-red-500 hover:text-white"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                    case 'flashcards': {
                        const grouped = (db.flashcards || []).reduce((acc, card) => {
                            const deck = card.deckName || 'Cartões Avulsos (Antigos)';
                            if (!acc[deck]) acc[deck] = [];
                            acc[deck].push(card);
                            return acc;
                        }, {});

                        if (!activeDeck) {
                            return (
                                <div className="p-3 sm:p-6 space-y-6 sm:space-y-8 animate-in fade-in">
                                    <div className="bg-white dark:bg-zinc-900 p-6 sm:p-8 rounded-[32px] sm:rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-8">
                                        <div className="flex-1">
                                            <h2 className="text-xl sm:text-2xl font-black text-indigo-600 dark:text-indigo-500 mb-1"><i className="fa-solid fa-clone mr-2"></i> Flashcards IA</h2>
                                            <p className="text-xs sm:text-sm font-bold text-zinc-400">Gere flashcards a partir de documentos (PDF/Imagem).</p>
                                        </div>
                                        <div className="flex flex-wrap gap-4 w-full lg:w-auto items-end">
                                            <div className="flex flex-col gap-1">
                                                <label className="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Qtd</label>
                                                <input type="number" min="1" max="50" value={flashcardGenSettings.qty} onChange={e => setFlashcardGenSettings(p => ({ ...p, qty: e.target.value }))} className="w-16 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500 text-center" />
                                            </div>
                                            <div className="flex-1 lg:w-64">
                                                <label className="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Foco (Opcional)</label>
                                                <input type="text" placeholder="Ex: Focar em tratamento..." value={flashcardGenSettings.focus} onChange={e => setFlashcardGenSettings(p => ({ ...p, focus: e.target.value }))} className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500" />
                                            </div>
                                            <div className="relative group w-full sm:w-auto">
                                                <input type="file" accept=".pdf,image/*" onChange={async (e) => {
                                                    const file = e.target.files[0];
                                                    if (!file) return;
                                                    const reader = new FileReader();
                                                    reader.onload = async (ev) => {
                                                        let b64 = ev.target.result;
                                                        let mime = file.type || 'application/octet-stream';
                                                        if (mime.startsWith('image/')) b64 = await compressImage(b64);
                                                        generateFlashcardsFromMaterial(b64, mime);
                                                    };
                                                    reader.readAsDataURL(file);
                                                    e.target.value = '';
                                                }} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                                <button className="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 px-6 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-3">
                                                    <i className="fa-solid fa-file-import"></i> Gerar
                                                </button>
                                            </div>
                                            {db.flashcards?.length > 0 && (
                                                <button onClick={async () => {
                                                    const res = await syncFlashcardsToAnki(db.flashcards);
                                                    if (res.success) showAlert('✅ Todos os flashcards foram sincronizados com o Anki!');
                                                    else showAlert(`❌ Erro ao sincronizar: ${res.error}`);
                                                }} className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 px-6 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
                                                    <i className="fa-solid fa-cloud-arrow-up"></i> Sincronizar Tudo
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    {Object.keys(grouped).length === 0 ? (
                                        <div className="py-20 text-center text-zinc-400 font-black italic">
                                            <i className="fa-solid fa-clone text-6xl mb-4 block opacity-30"></i>
                                            Nenhum flashcard gerado ainda. <br />Faça um simulado, erre algumas questões e peça à IA para gerar!
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {Object.entries(grouped).map(([deckName, cards]) => (
                                                <div key={deckName} onClick={() => setActiveDeck(deckName)} className="bg-white dark:bg-zinc-900 p-8 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-lg cursor-pointer hover:border-indigo-500 dark:hover:border-indigo-500 group transition-all flex flex-col items-center text-center">
                                                    <div className="w-16 h-16 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-500 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                                        <i className="fa-solid fa-layer-group text-2xl"></i>
                                                    </div>
                                                    <h3 className="font-black text-lg text-zinc-800 dark:text-zinc-100 mb-2 leading-tight">{deckName}</h3>
                                                    <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">{cards.length} Cartões</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        } else {
                            return (
                                <div className="p-6 space-y-8 animate-in fade-in">
                                    <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-6 mb-8">
                                        <div className="flex items-center gap-4">
                                            <button onClick={() => setActiveDeck(null)} className="w-12 h-12 rounded-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 flex items-center justify-center hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all shadow-sm shrink-0"><i className="fa-solid fa-arrow-left text-zinc-500"></i></button>
                                            <div>
                                                <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500 leading-tight">{activeDeck}</h2>
                                                <p className="text-sm font-bold text-zinc-400">Pratique os seus erros desta categoria.</p>
                                            </div>
                                        </div>
                                        <button onClick={async () => {
                                            const res = await syncFlashcardsToAnki(grouped[activeDeck]);
                                            if (res.success) showAlert(`✅ Flashcards de "${activeDeck}" sincronizados com sucesso!`);
                                            else showAlert(`❌ Erro ao sincronizar: ${res.error}`);
                                        }} className="w-full md:w-auto bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-600 hover:text-white font-black py-3 px-6 rounded-2xl shadow-sm transition-all active:scale-95 flex items-center justify-center gap-3 shrink-0 border border-indigo-200 dark:border-indigo-800">
                                            <i className="fa-solid fa-cloud-arrow-up"></i> Sincronizar Baralho
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {(grouped[activeDeck] || []).map(c => (
                                            <FlashcardItem key={c.id} card={c} onDelete={(id) => {
                                                if (window.confirm('Excluir este flashcard?')) {
                                                    setDb(p => {
                                                        const newFlashcards = p.flashcards.filter(x => x.id !== id);
                                                        if (newFlashcards.filter(x => (x.deckName || 'Cartões Avulsos (Antigos)') === activeDeck).length === 0) {
                                                            setActiveDeck(null);
                                                        }
                                                        return { ...p, flashcards: newFlashcards };
                                                    });
                                                }
                                            }} />
                                        ))}
                                    </div>
                                </div>
                            );
                        }
                    }
                    case 'chat': return (
                        <div className="p-4 md:p-8 h-[calc(100vh-130px)] flex flex-col animate-in fade-in duration-500">
                            <div className="flex-1 flex flex-col glass-panel rounded-5xl shadow-2xl border-none overflow-hidden bg-white/40 dark:bg-slate-900/40">
                                <div className="p-8 border-b border-indigo-100 dark:border-indigo-900/30 font-bold flex items-center justify-between bg-white/60 dark:bg-slate-900/60 shrink-0 backdrop-blur-xl">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center text-white shadow-lg"><i className="fa-solid fa-robot text-xl"></i></div>
                                        <div>
                                            <span className="font-black text-emerald-600 dark:text-emerald-500 block text-lg tracking-tight">Mentor IA PRO</span>
                                            <span className="text-[10px] font-black uppercase text-emerald-500 tracking-[0.3em] flex items-center gap-2 mt-1">
                                                <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                                Online • {aiConfig.model}
                                            </span>
                                        </div>
                                    </div>
                                    <button onClick={() => { if (window.confirm('Apagar histórico de chat?')) setChatMessages([]); }} className="w-12 h-12 flex items-center justify-center bg-white dark:bg-slate-800 text-slate-400 hover:text-rose-500 rounded-2xl transition-all shadow-sm"><i className="fa-solid fa-trash-can"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 md:p-10 space-y-8 chat-scroll bg-transparent">
                                    {chatMessages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-4`}>
                                            <div className={`max-w-[85%] px-8 py-5 rounded-4xl shadow-xl ${m.role === 'user' ? 'premium-btn text-white ml-auto' : 'glass-panel text-slate-800 dark:text-slate-100 border-none bg-white/80 dark:bg-slate-800/80'}`}>
                                                <div className="flex items-center gap-3 mb-3 border-b border-black/5 dark:border-white/5 pb-3">
                                                    <div className={`w-8 h-8 rounded-xl flex items-center justify-center text-[10px] shadow-md ${m.role === 'user' ? 'bg-emerald-600 text-white' : 'bg-zinc-200 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300'}`}>
                                                        <i className={`fa-solid ${m.role === 'user' ? 'fa-user' : 'fa-robot'}`}></i>
                                                    </div>
                                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] opacity-60">{m.role === 'user' ? 'Você' : 'Mentor IA'}</span>
                                                </div>
                                                <div className="text-[15px] leading-relaxed whitespace-pre-wrap font-medium" dangerouslySetInnerHTML={{ __html: (m.text || '').replace(/\*\*(.*?)\*\*/g, '<b class="font-black text-emerald-600 dark:text-emerald-400">$1</b>').replace(/\n/g, '<br/>') }}></div>
                                                {m.image && <img src={m.image} className="mt-6 max-h-80 rounded-3xl border border-black/5 dark:border-white/5 shadow-2xl cursor-pointer hover:scale-[1.01] transition-transform" onClick={() => setLightbox(m.image)} />}
                                            </div>
                                        </div>
                                    ))}
                                    {isAiLoading && (
                                        <div className="flex justify-start animate-pulse">
                                            <div className="glass-panel px-8 py-4 rounded-3xl text-indigo-600 dark:text-indigo-400 font-black text-xs flex items-center gap-3 shadow-lg bg-white/60 dark:bg-slate-800/60 border-none">
                                                <div className="flex gap-1"><span className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce"></span><span className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce [animation-delay:0.2s]"></span><span className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce [animation-delay:0.4s]"></span></div>
                                                Processando Conhecimento...
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>
                                <div className="p-6 md:p-8 bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl border-t border-indigo-100 dark:border-indigo-900/30 flex gap-4 shrink-0">
                                    <textarea value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChatSend(); } }} placeholder="Consulte o Mentor Elite sobre diagnósticos, condutas ou mnemónicas..." className="flex-1 p-5 bg-white dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-3xl outline-none text-sm resize-none font-bold shadow-inner text-slate-800 dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 transition-all" rows="2" />
                                    <button onClick={handleChatSend} disabled={!chatInput.trim() || isAiLoading} className="premium-btn text-white px-8 rounded-3xl shadow-2xl flex items-center justify-center transition-all active:scale-95 disabled:opacity-50 disabled:grayscale"><i className="fa-solid fa-paper-plane text-xl"></i></button>
                                </div>
                            </div>
                        </div>
                    );
                    case 'resumos_html': return renderResumosHtmlTab();
                    case 'analise_reversa': return renderReverseAnalysisTab();
                    case 'fluxogramas': return <FluxogramasTab fluxogramas={db.fluxogramas} setDb={setDb} onPlay={setFluxogramaPlay} />;
                    default: return renderErrorList();
                }
            };

            if (!isLoggedIn) return renderLogin();

            return (
                <div className={`flex-1 flex overflow-hidden font-sans ${db.darkMode ? 'dark' : ''}`}>
                    {/* Overlay para mobile */}
                    {sidebarOpen && (
                        <div 
                            onClick={() => setSidebarOpen(false)} 
                            className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] lg:hidden animate-in fade-in duration-300"
                        />
                    )}

                    <aside className={`fixed lg:relative inset-y-0 left-0 ${sidebarOpen ? 'translate-x-0 w-72 sm:w-80' : '-translate-x-full lg:translate-x-0 lg:w-0 overflow-hidden'} bg-white dark:bg-zinc-950 border-r border-zinc-200/50 dark:border-zinc-800/50 transition-all duration-500 flex flex-col h-screen shrink-0 z-[110] shadow-2xl lg:shadow-none`}>
                        <div className="p-6 sm:p-8 border-b border-zinc-200/50 dark:border-zinc-800/50 flex flex-col items-center justify-center gap-4 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 blur-3xl rounded-full pointer-events-none"></div>
                            <div className="w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-br from-emerald-400 to-teal-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-emerald-500/20 rotate-3 shrink-0">
                                <i className="fa-solid fa-brain text-2xl sm:text-3xl drop-shadow-md"></i>
                            </div>
                            <div className="text-center">
                                <h1 className="font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-600 dark:from-emerald-400 dark:to-teal-400 text-xl sm:text-2xl tracking-tighter">CADERNO IA</h1>
                                <p className="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-zinc-400 mt-1">Estudo de Elite</p>
                            </div>
                        </div>
                        <nav className="flex-1 p-4 sm:p-5 space-y-1.5 sm:space-y-2 overflow-y-auto planner-scroll">
                            <p className="px-4 text-[9px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-[0.3em] mb-4 mt-2">Navegação Principal</p>
                            {[
                                { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
                                { id: 'caderno', icon: 'fa-layer-group', label: 'Banco de Erros' },
                                { id: 'provas', icon: 'fa-file-signature', label: 'Provas & Concursos' },
                                { id: 'faculdade', icon: 'fa-graduation-cap', label: 'Módulos Faculdade' },
                                { id: 'planner', icon: 'fa-calendar-days', label: 'Meu Planner' },
                                { id: 'checklists', icon: 'fa-list-check', label: 'Checklists' },
                                { id: 'resumos', icon: 'fa-images', label: 'Galeria Visual' },
                                { id: 'resumos_html', icon: 'fa-file-code', label: 'Resumos em HTML' },
                                { id: 'simulados', icon: 'fa-shuffle', label: 'Gerador Simulado' },
                                { id: 'flashcards', icon: 'fa-clone', label: 'Flashcards' },
                                { id: 'jogos', icon: 'fa-gamepad', label: 'Jogos Médicos' },
                                { id: 'percepcoes', icon: 'fa-bolt', label: 'Insights Clínicos' },
                                { id: 'elaborador', icon: 'fa-wand-magic-sparkles', label: 'Elaborador de Questões' },
                                { id: 'analise_reversa', icon: 'fa-magnifying-glass-chart', label: 'Análise Reversa' },
                                { id: 'fluxogramas', icon: 'fa-diagram-project', label: 'Fluxogramas' },
                                { id: 'chat', icon: 'fa-robot', label: 'Mentor IA' }
                            ].map(t => (
                                <button key={t.id} onClick={() => { setActiveTab(t.id); clearDeck(); setShowForm(false); setActiveDeck(null); setSearchTerm(''); setSummarySearch(''); setGameState({ view: 'list', data: null, play: null }); setActiveWeekId(null); setIsCreatingWeek(false); setChecklistState({ view: 'list', data: null }); setHtmlSummaryState(p => ({ ...p, view: 'list', search: '' })); window.scrollTo(0, 0); if (window.innerWidth < 1024) setSidebarOpen(false); }}
                                    className={`w-full text-left px-4 sm:px-5 py-3 sm:py-4 rounded-2xl font-black flex items-center gap-4 transition-all duration-300 border ${activeTab === t.id ? 'bg-gradient-to-r from-emerald-500 to-teal-600 border-emerald-400/50 text-white shadow-lg shadow-emerald-500/20' : 'border-transparent text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800/80 hover:text-emerald-600 dark:hover:text-emerald-400'}`}>
                                    <i className={`fa-solid ${t.icon} text-lg w-6 text-center ${activeTab === t.id ? 'drop-shadow-md text-emerald-100' : 'opacity-70'}`}></i> <span className="tracking-tight text-sm">{t.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 sm:p-5 border-t border-zinc-200/50 dark:border-zinc-800/50 space-y-2 bg-zinc-50/50 dark:bg-zinc-950/30">
                            <button onClick={() => setDb(p => ({ ...p, darkMode: !p.darkMode }))} className="w-full flex items-center gap-4 px-5 py-3 sm:py-4 rounded-2xl font-black text-zinc-500 dark:text-zinc-400 hover:bg-white dark:hover:bg-zinc-800 transition-all border border-transparent shadow-sm"><i className={`fa-solid ${db.darkMode ? 'fa-sun text-amber-500' : 'fa-moon text-indigo-500'} text-lg w-5 text-center`}></i> Tema {db.darkMode ? 'Claro' : 'Escuro'}</button>
                            <button onClick={() => setShowSettings(true)} className="w-full flex items-center gap-4 px-5 py-3 sm:py-4 rounded-2xl font-black text-zinc-500 dark:text-zinc-400 hover:bg-white dark:hover:bg-zinc-800 transition-all border border-transparent shadow-sm"><i className="fa-solid fa-gear text-lg w-5 text-center opacity-70"></i> Configurações</button>
                        </div>
                    </aside>

                    <div className="flex-1 flex flex-col h-screen overflow-hidden bg-zinc-50 dark:bg-zinc-950 relative">
                        {/* Barra de Sincronização Global */}
                        <div className={`sync-progress-bar ${syncStatus === 'syncing' || syncStatus === 'connecting' ? 'sync-active opacity-100' : syncStatus === 'error' ? 'sync-error opacity-100' : 'opacity-0'}`}></div>
                        
                        <header className="px-3 sm:px-4 md:px-6 py-2 sm:py-4 flex justify-between items-center shrink-0 w-full z-40 bg-zinc-50/80 dark:bg-zinc-950/80 backdrop-blur-md sticky top-0 border-b border-zinc-200 dark:border-zinc-800">
                            <div className="flex items-center gap-2 sm:gap-4 flex-1 min-w-0">
                                <button onClick={() => setSidebarOpen(!sidebarOpen)} className="w-9 h-9 sm:w-11 sm:h-11 flex items-center justify-center rounded-xl bg-white dark:bg-zinc-900 shadow-sm border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all shrink-0">
                                    <i className={`fa-solid ${sidebarOpen ? "fa-xmark" : "fa-bars"} text-zinc-500`}></i>
                                </button>
                                <h1 className="text-xs sm:text-base md:text-lg font-black tracking-tight text-zinc-800 dark:text-white capitalize truncate pr-1">
                                    {activeTab === 'caderno' ? 'Banco' : activeTab === 'analise_reversa' ? 'Análise' : activeTab}
                                </h1>

                                {/* Status de Sincronização Cloud */}
                                <div className={`flex items-center gap-1 sm:gap-2 px-1.5 sm:px-3 py-1 sm:py-1.5 rounded-lg sm:rounded-xl border text-[8px] sm:text-[9px] font-black uppercase tracking-widest transition-all duration-500 shadow-sm shrink-0 ${syncStatus === 'synced' ? 'bg-emerald-50 text-emerald-600 border-emerald-100 dark:bg-emerald-900/20 dark:text-emerald-400 dark:border-emerald-800/50' : syncStatus === 'syncing' || syncStatus === 'connecting' ? 'bg-zinc-50 text-emerald-600 border-zinc-100 dark:bg-zinc-900/20 animate-pulse' : syncStatus === 'error' ? 'bg-rose-50 text-rose-600 border-rose-100' : 'bg-zinc-50 text-zinc-400 border-zinc-100'}`}>
                                    <i className={`fa-solid ${syncStatus === 'synced' ? 'fa-cloud-check' : syncStatus === 'syncing' || syncStatus === 'connecting' ? 'fa-cloud-arrow-up' : syncStatus === 'error' ? 'fa-triangle-exclamation' : 'fa-cloud'} text-[10px] sm:text-sm`}></i>
                                    <span className="hidden sm:inline">
                                        {syncStatus === 'synced' ? 'Sync' : syncStatus === 'syncing' ? '...' : syncStatus === 'connecting' ? '...' : syncStatus === 'error' ? 'Erro' : 'Off'}
                                    </span>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-1.5 sm:gap-3 shrink-0">
                                {'showSaveFilePicker' in window ? (
                                    <button onClick={fileHandle ? null : handleEnableAutoSave} className={`w-10 h-10 sm:w-auto sm:px-4 sm:py-2.5 rounded-xl font-black shadow-md flex items-center justify-center gap-2 transition-all text-xs ${fileHandle ? 'bg-emerald-100 text-emerald-700 border border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800' : (isDirty.current ? 'bg-amber-500 text-white animate-pulse' : 'bg-zinc-800 text-white dark:bg-white dark:text-zinc-900')}`} title={fileHandle ? "Sincronização ativa" : "Ativar auto-save"}>
                                        <i className="fa-solid fa-floppy-disk"></i>
                                        <span className="hidden sm:inline">{fileHandle ? 'Salvo' : 'Auto-Save'}</span>
                                    </button>
                                ) : (
                                    <button onClick={saveToFileFallback} className="w-10 h-10 sm:w-auto sm:px-4 sm:py-2.5 rounded-xl bg-zinc-800 text-white font-black shadow-md flex items-center justify-center gap-2 transition-all text-xs">
                                        <i className="fa-solid fa-download"></i>
                                        <span className="hidden sm:inline">Salvar</span>
                                    </button>
                                )}
                                
                                {(!simulado.isActive && !showForm && ['caderno', 'provas', 'faculdade'].includes(activeTab)) && (
                                    <button onClick={() => { setFormData({ ...emptyForm, subject: db.subjects[0]?.id }); setEditingId(null); setShowForm(true); window.scrollTo(0, 0); }} className="w-10 h-10 sm:w-auto sm:px-4 sm:py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-black shadow-lg shadow-emerald-600/20 active:scale-95 flex items-center justify-center gap-2 transition-all"><i className="fa-solid fa-plus text-base sm:text-lg"></i> <span className="hidden sm:inline">Questão</span></button>
                                )}
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto pb-24 px-2 sm:px-4 md:px-6">
                            <div className="max-w-[1400px] mx-auto w-full h-full relative">{renderTabContent()}</div>
                        </div>
                    </div>

                    {/* MODAIS CONFIGURAÇÕES E ALERTAS */}
                    {imageToEdit && <ImageEditor initialImage={imageToEdit} onSave={(b64) => {
                        if (imageEditTarget === 'error') setFormData(p => ({ ...p, image: b64 }));
                        if (imageEditTarget === 'summary') setDb(p => ({ ...p, summaries: [{ id: Date.now(), image: b64, date: new Date().toLocaleDateString('pt-PT') }, ...(p.summaries || [])] }));
                        setImageToEdit(null); setImageEditTarget(null);
                    }} onCancel={() => { setImageToEdit(null); setImageEditTarget(null); }} />}

                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center items-center p-4 animate-in zoom-in-95 duration-200">
                            <div className="bg-white dark:bg-slate-900 rounded-[40px] p-10 w-full max-w-lg shadow-2xl border border-slate-200 dark:border-slate-700 max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-10"><h2 className="text-3xl font-black tracking-tighter text-slate-800 dark:text-white">Definições</h2><button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-red-500 transition-colors"><i className="fa-solid fa-circle-xmark text-2xl"></i></button></div>
                                <div className="space-y-8">
                                    <section className="bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-inner">
                                        <h3 className="text-xs font-black uppercase text-indigo-500 mb-4 tracking-widest"><i className="fa-solid fa-wand-magic-sparkles mr-2"></i> IA Gemini Elite</h3>

                                        <div>
                                            <div className="flex justify-between items-end mb-2">
                                                <label className="block text-xs font-bold text-slate-500 dark:text-slate-400">Modelo de Inteligência Artificial</label>
                                                <button onClick={fetchModels} className="text-[10px] font-black text-emerald-500 hover:text-emerald-600 transition-colors uppercase tracking-widest flex items-center gap-1"><i className="fa-solid fa-rotate"></i> Atualizar Lista</button>
                                            </div>
                                            <select
                                                value={aiConfig.model}
                                                onChange={e => { setAiConfig(p => ({ ...p, model: e.target.value })); localStorage.setItem('gemini_model', e.target.value); }}
                                                className="w-full p-4 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none mb-4 text-sm font-bold shadow-inner text-slate-800 dark:text-white focus:border-emerald-500 transition-colors cursor-pointer"
                                            >
                                                {availableModels.map(m => (
                                                    <option key={m} value={m}>{m}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">Personalidade do Mentor</label>
                                            <select
                                                value={aiConfig.persona}
                                                onChange={e => { setAiConfig(p => ({ ...p, persona: e.target.value })); localStorage.setItem('gemini_persona', e.target.value); }}
                                                className="w-full p-4 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none mb-4 text-sm font-bold shadow-inner text-slate-800 dark:text-white focus:border-emerald-500 transition-colors cursor-pointer"
                                            >
                                                <option value="amigavel">Amigável (Encoraja e explica com paciência)</option>
                                                <option value="compreensiva">Compreensiva (Empática e acolhedora com os erros)</option>
                                                <option value="ironica">Irônica (Sarcástica e provocativa)</option>
                                                <option value="arrogante">Arrogante (Rude, grosseiro e impaciente)</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-zinc-500 dark:text-zinc-400 mb-2">Chave da API (Salva localmente)</label>
                                            <input type="password" autoComplete="new-password" value={aiConfig.key} onChange={e => { setAiConfig(p => ({ ...p, key: e.target.value })); }} placeholder="Cole sua Chave API Google" className="w-full p-4 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-700 rounded-2xl outline-none mb-4 text-sm font-bold shadow-inner text-zinc-800 dark:text-white focus:border-emerald-500 transition-colors" />
                                        </div>

                                        <button onClick={testIA} disabled={isAiLoading} className="w-full py-4 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 rounded-2xl font-black text-sm shadow-sm hover:bg-emerald-200 dark:hover:bg-emerald-900/50 active:scale-95 transition-all disabled:opacity-50"><i className="fa-solid fa-wifi mr-2"></i> Testar Conexão com IA</button>
                                    </section>

                                    <section className="bg-indigo-50 dark:bg-indigo-900/10 p-6 rounded-3xl border border-indigo-100 dark:border-indigo-900/30 shadow-inner">
                                        <h3 className="text-xs font-black uppercase text-indigo-500 mb-4 tracking-widest"><i className="fa-brands fa-github mr-2"></i> Sincronização Gist (GitHub)</h3>
                                        <div className="space-y-4">
                                            <div className="bg-white/50 dark:bg-black/20 p-3 rounded-xl border border-indigo-100/50 dark:border-indigo-900/30 text-[10px] font-bold text-indigo-600 dark:text-indigo-400 leading-relaxed italic">
                                                <i className="fa-solid fa-circle-info mr-1"></i> O Gist agora é o único método de sincronização na nuvem, garantindo maior limite de dados (10MB) e privacidade.
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-bold text-zinc-500 dark:text-zinc-400 uppercase mb-1">GitHub Access Token (Não será salvo)</label>
                                                <input type="password" autoComplete="new-password" value={gistConfig.token} onChange={e => setGistConfig(p => ({ ...p, token: e.target.value }))} placeholder="ghp_xxxxxxxxxxxx" className="w-full p-3 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl outline-none text-xs font-mono" />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-bold text-zinc-500 dark:text-zinc-400 uppercase mb-1">Gist ID (Opcional se criar novo)</label>
                                                <input type="text" value={gistConfig.id} onChange={e => setGistConfig(p => ({ ...p, id: e.target.value }))} placeholder="ID do Gist existente" className="w-full p-3 bg-white dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl outline-none text-xs font-mono" />
                                            </div>

                                            <div className="flex flex-col gap-2">
                                                {!gistConfig.id ? (
                                                    <button onClick={createGist} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-indigo-700 transition-all"><i className="fa-solid fa-plus mr-1"></i> Criar Novo Gist</button>
                                                ) : (
                                                    <>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => syncFromGist(true)} className="flex-1 py-3 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-emerald-200 transition-all"><i className="fa-solid fa-download mr-1"></i> Baixar Dados</button>
                                                            <button onClick={() => syncToGist(db)} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-indigo-700 transition-all"><i className="fa-solid fa-upload mr-1"></i> Subir Dados</button>
                                                        </div>
                                                        <button
                                                            onClick={() => {
                                                                if (confirm("⚠️ ATENÇÃO: Isso vai ignorar o erro na nuvem e substituir o arquivo do GitHub pelos seus dados locais atuais. Deseja continuar?")) {
                                                                    syncToGist(db);
                                                                }
                                                            }}
                                                            className="w-full py-2 bg-red-100 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-xl font-black text-[9px] uppercase tracking-widest border border-red-200 dark:border-red-800/50 hover:bg-red-200 transition-all mb-2"
                                                        >
                                                            <i className="fa-solid fa-triangle-exclamation mr-1"></i> Forçar Sobrescrita da Nuvem
                                                        </button>
                                                        <button
                                                            onClick={() => {
                                                                if (confirm("Deseja resetar as credenciais e limpar todos os campos?")) {
                                                                    const hard = { token: '', id: '', autoSync: true, version: 6 };
                                                                    setGistConfig(hard);
                                                                    localStorage.setItem('caderno_gist_config', JSON.stringify(hard));
                                                                    localStorage.setItem('gemini_api_key', "");
                                                                    location.reload();
                                                                }
                                                            }}
                                                            className="w-full py-2 bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 rounded-xl font-black text-[9px] uppercase tracking-widest border border-zinc-200 dark:border-zinc-700 hover:bg-zinc-200 transition-all"
                                                        >
                                                            <i className="fa-solid fa-arrows-rotate mr-1"></i> Resetar Credenciais (Cache)
                                                        </button>
                                                    </>
                                                )}
                                            </div>

                                            <div className="flex items-center gap-2 pt-2">
                                                <input type="checkbox" id="autoSyncGist" checked={gistConfig.autoSync} onChange={e => setGistConfig(p => ({ ...p, autoSync: e.target.checked }))} className="w-4 h-4 accent-indigo-500" />
                                                <label htmlFor="autoSyncGist" className="text-[10px] font-black text-indigo-500/60 uppercase tracking-widest">Sincronização Automática</label>
                                            </div>

                                            <div className="text-[10px] font-black text-indigo-400/80 uppercase text-center border-t border-indigo-100 dark:border-indigo-900/30 pt-4 mt-4 flex flex-col gap-1">
                                                <span><i className="fa-regular fa-clock"></i> Última Sincronização: {lastSyncTime ? lastSyncTime.toLocaleString() : 'Nenhuma'}</span>
                                                <span className="text-emerald-600 dark:text-emerald-500"><i className="fa-solid fa-database"></i> Espaço Ocupado: {(new Blob([JSON.stringify({ ...db, chatMessages })]).size / 1024).toFixed(2)} KB de 100.000 KB (100MB Limite)</span>
                                            </div>
                                        </div>
                                    </section>

                                    {/* SEÇÃO DE RESGATE HISTÓRICO */}
                                    <section className="bg-emerald-50 dark:bg-emerald-900/10 p-6 rounded-3xl border border-emerald-100 dark:border-emerald-900/30 shadow-inner">
                                        <h3 className="text-xs font-black uppercase text-emerald-600 dark:text-emerald-400 mb-4 tracking-widest"><i className="fa-solid fa-clock-rotate-left mr-2"></i> Resgate Histórico (Backup)</h3>
                                        <p className="text-[10px] font-bold text-emerald-700/60 dark:text-emerald-400/60 mb-4 leading-relaxed">Puxe questões de um arquivo JSON antigo hospedado no GitHub. Link RAW salvo.</p>
                                        <div className="space-y-3">
                                            <input
                                                id="legacy-url"
                                                type="text"
                                                value={legacyUrl}
                                                onChange={e => setLegacyUrl(e.target.value)}
                                                className="w-full p-4 bg-white dark:bg-zinc-950 border border-emerald-200 dark:border-emerald-800 rounded-2xl outline-none text-[11px] font-mono shadow-inner text-emerald-900 dark:text-emerald-200"
                                            />
                                            <button
                                                onClick={async () => {
                                                    const url = legacyUrl.trim();
                                                    if (!url) return showAlert("⚠️ Defina uma URL RAW do arquivo JSON.");
                                                    setSyncStatus('connecting');
                                                    try {
                                                        const res = await fetch(url);
                                                        if (!res.ok) throw new Error("Erro ao acessar link.");
                                                        const json = await res.json();
                                                        const data = json.data || json;
                                                        const rawErrors = Array.isArray(data) ? data : (data.errors || []);
                                                        const sanitized = sanitizeErrors(rawErrors);
                                                        setDb(prev => ({
                                                            ...prev,
                                                            errors: [...sanitized, ...prev.errors].filter((v, i, a) => v && v.id && a.findIndex(t => t.id === v.id) === i),
                                                            perceptions: [...(data.perceptions || []), ...(prev.perceptions || [])].filter((v, i, a) => v && v.id && a.findIndex(t => t.id === v.id) === i),
                                                            summaries: [...(data.summaries || []), ...(prev.summaries || [])].filter((v, i, a) => v && v.id && a.findIndex(t => t.id === v.id) === i),
                                                            flashcards: [...(data.flashcards || []), ...(prev.flashcards || [])].filter((v, i, a) => v && v.id && a.findIndex(t => t.id === v.id) === i)
                                                        }));
                                                        showAlert(`✅ ${sanitized.length} questões migradas!`);
                                                        setSyncStatus('synced');
                                                        setTimeout(() => syncToGist(db), 2000);
                                                    } catch (e) {
                                                        showAlert("❌ Falha: " + e.message);
                                                        setSyncStatus('error');
                                                    }
                                                }}
                                                className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:bg-emerald-700 transition-all active:scale-95 flex items-center justify-center gap-2"
                                            >
                                                <i className="fa-solid fa-file-import"></i> Mesclar Dados Históricos
                                            </button>
                                        </div>
                                    </section>

                                    <section className="bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700">
                                        <h3 className="text-xs font-black uppercase text-indigo-400 mb-5 tracking-widest">Backup Base de Dados</h3>
                                        <button onClick={exportData} className="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-5 rounded-2xl font-black flex justify-between items-center text-sm shadow-sm transition-all hover:bg-indigo-50 dark:hover:bg-slate-800"><span className="text-slate-600 dark:text-slate-300">Baixar Cópia Exata (.json)</span><i className="fa-solid fa-download text-indigo-500"></i></button>
                                        <label htmlFor="imp-master" className="w-full mt-4 premium-btn text-white p-5 rounded-2xl font-black flex justify-between items-center cursor-pointer text-sm shadow-xl transition-all"><span>Importar Dados (Merge Local)</span><i className="fa-solid fa-upload"></i></label>
                                        <input type="file" id="imp-master" accept=".json,.html" onChange={importData} className="hidden" />
                                    </section>

                                    <section className="pt-6 border-t border-slate-100 dark:border-slate-800">
                                        <h3 className="text-xs font-black uppercase text-red-500 mb-4 tracking-widest flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation"></i> Zona de Perigo</h3>
                                        <button
                                            onClick={handleFactoryReset}
                                            className="w-full bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 p-5 rounded-2xl font-black flex justify-between items-center text-sm shadow-sm transition-all hover:bg-red-600 hover:text-white group border border-red-100 dark:border-red-900/30"
                                        >
                                            <span>Restaurar Padrão de Fábrica</span>
                                            <i className="fa-solid fa-trash-can group-hover:animate-pulse"></i>
                                        </button>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}
                    {dialog.isOpen && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2000] flex justify-center items-center p-4"><div className="bg-white dark:bg-slate-800 p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl border dark:border-slate-700"><h3 className="font-black text-xl mb-4 text-slate-800 dark:text-white">{dialog.type === 'alert' ? 'Aviso' : 'Confirmação'}</h3><p className="mb-8 whitespace-pre-wrap text-slate-600 dark:text-slate-300 leading-relaxed text-sm font-medium">{dialog.message}</p><div className="flex gap-2 justify-end">{dialog.type === 'confirm' && <button onClick={closeDialog} className="px-4 py-2 bg-slate-100 dark:bg-slate-700 rounded-xl font-bold">Cancelar</button>}<button onClick={() => { if (dialog.onConfirm) dialog.onConfirm(); closeDialog(); }} className="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg">OK</button></div></div></div>}
                    {lightbox && <div className="fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center p-8 cursor-zoom-out" onClick={() => setLightbox(null)}><img src={lightbox} className="max-h-full object-contain rounded-xl shadow-[0_0_100px_rgba(0,0,0,0.8)]" /></div>}

                    {/* --- ASSISTENTE FLUTUANTE IA --- */}
                    <div className="fixed bottom-6 right-6 z-[6000] flex flex-col items-end gap-4">
                        {floatingAi.isOpen && (
                            <div className="bg-white dark:bg-zinc-900 border border-emerald-200 dark:border-emerald-800 rounded-3xl shadow-2xl p-6 w-[350px] max-w-[calc(100vw-3rem)] animate-in slide-in-from-bottom-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-black text-emerald-600 dark:text-emerald-400 flex items-center gap-2"><i className="fa-solid fa-robot ai-glow rounded-full"></i> IA Rápida</h3>
                                    <button onClick={() => setFloatingAi(p => ({ ...p, isOpen: false }))} className="text-zinc-400 hover:text-red-500 transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-zinc-100 dark:bg-zinc-800"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="space-y-4 text-zinc-900 dark:text-zinc-100">
                                    <p className="text-[10px] font-black uppercase tracking-widest text-zinc-500 dark:text-zinc-400">Selecione algo na tela ou digite:</p>
                                    <textarea
                                        value={floatingAi.query}
                                        onChange={e => setFloatingAi(p => ({ ...p, query: e.target.value }))}
                                        placeholder="O que deseja saber?"
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-4 text-sm font-bold resize-none outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                                        rows="3"
                                    />
                                    {floatingAi.result && (
                                        <div className="p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800/50 rounded-2xl text-xs leading-relaxed text-justify-custom font-medium max-h-[40vh] overflow-y-auto shadow-inner text-emerald-900 dark:text-emerald-200">
                                            <div dangerouslySetInnerHTML={{ __html: floatingAi.result.replace(/\*\*(.*?)\*\*/g, '<b class="font-black">$1</b>').replace(/\n/g, '<br/>') }}></div>
                                        </div>
                                    )}
                                    <button
                                        disabled={!floatingAi.query.trim() || floatingAi.isLoading}
                                        onClick={async () => {
                                            setFloatingAi(p => ({ ...p, isLoading: true, result: '' }));
                                            const context = `[INSTRUÇÃO DE MENTORIA: Você é o Mentor IA PRO, um tutor médico EXTREMAMENTE rude e irônico. O aluno é burro e você está aqui para lembrá-lo disso. Responda de forma curta e ácida.\nBASE DE DADOS DO ALUNO: ${buildPlatformContext()}]\n\n`;
                                            const res = await callIA([{ role: 'user', parts: [{ text: context + `O aluno perguntou sobre o seguinte elemento da tela ou fez o seguinte pedido: "${floatingAi.query}"` }] }]);
                                            setFloatingAi(p => ({ ...p, isLoading: false, result: res || 'Falha ao obter resposta. Verifique sua conexão e chave API.' }));
                                        }}
                                        className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 active:scale-95 disabled:opacity-50 disabled:active:scale-100 transition-all flex justify-center items-center gap-2"
                                    >
                                        {floatingAi.isLoading ? <i className="fa-solid fa-circle-notch fa-spin text-lg"></i> : <i className="fa-solid fa-wand-magic-sparkles text-lg"></i>}
                                        {floatingAi.isLoading ? 'Analisando...' : 'Perguntar à IA'}
                                    </button>
                                </div>
                            </div>
                        )}
                        <button
                            onClick={() => {
                                const sel = window.getSelection().toString().trim();
                                setFloatingAi(p => ({
                                    isOpen: !p.isOpen,
                                    query: sel ? sel : p.query,
                                    result: p.isOpen ? p.result : '',
                                    isLoading: false
                                }));
                            }}
                            className="w-16 h-16 bg-emerald-600 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 hover:bg-emerald-700 transition-all active:scale-95 border-4 border-white dark:border-zinc-950"
                            title="Assistente Rápido IA"
                        >
                            <i className="fa-solid fa-robot text-2xl ai-glow rounded-full"></i>
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    
    </script>
</body>
</html>
