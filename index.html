                                            <span className="flex-1 leading-relaxed text-justify-custom pt-1">{err.lessonLearned}</span>
                                        </div>
                                    </div>
                                </div>
                            )
                        })
                    )}
                    {currentPool.length > visibleCount && <div className="text-center mt-8"><button onClick={() => setVisibleCount(v => v + 20)} className="bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 px-8 py-3 rounded-2xl font-bold flex items-center gap-2 mx-auto transition-colors text-zinc-700 dark:text-zinc-300 shadow-sm"><i className="fa-solid fa-chevron-down"></i> Carregar Mais Questões</button></div>}
                </div>
            );

            const renderSimuladoActive = () => {
                const baseQ = simulado.deck[simulado.curIdx]; if (!baseQ) return null;
                const q = db.errors.find(e => e.id === baseQ.id) || baseQ;
                
                const res = simulado.results.find(r => String(r.id) === String(q.id));
                const showCol = simulado.isReviewing;

                const jumpToQuestion = (idx) => {
                    const dq = simulado.deck[idx];
                    const targetRes = simulado.results.find(r => String(r.id) === String(dq.id));
                    setSimulado(p => ({
                        ...p,
                        curIdx: idx,
                        showAns: p.isReviewing && !!targetRes,
                        selAlt: targetRes?.userAns || null,
                        aiExplanation: '',
                        isAiExplaining: false,
                        crossedAlts: [],
                        highlightedText: ''
                    }));
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                const handleHighlight = () => {
                    const selection = window.getSelection();
                    if (!selection || !selection.toString().trim()) return;
                    const text = selection.toString();

                    const escapeHtml = (unsafe) => (unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");

                    let currentContent = simulado.highlightedText || escapeHtml(q.question);
                    const escapedSelected = escapeHtml(text);
                    const safeRegex = new RegExp(escapedSelected.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                    const newContent = currentContent.replace(safeRegex, `<mark class="bg-yellow-300 dark:bg-yellow-600/50 dark:text-white rounded-sm px-1">$&</mark>`);

                    setSimulado(p => ({ ...p, highlightedText: newContent }));
                    selection.removeAllRanges();
                };

                return (
                    <div className="max-w-7xl mx-auto py-6 sm:py-10 w-full animate-in fade-in duration-500 pt-8 sm:pt-12 flex flex-col lg:flex-row gap-6 sm:gap-8 items-start px-3 sm:px-4">
                        <div className="flex-1 w-full min-w-0">
                            {simulado.killAnim && (
                                <div className="kill-overlay-container">
                                    <div className="kill-text">{simulado.killAnim}!</div>
                                </div>
                            )}
                            <div className="glass-panel rounded-[32px] md:rounded-[48px] p-5 sm:p-8 md:p-14 shadow-2xl border-none relative text-zinc-900 dark:text-zinc-100 bg-white/80 dark:bg-slate-900/80">
                                <div className="absolute top-5 right-5 sm:top-8 sm:right-8 flex gap-2 sm:gap-3 z-20">
                                    <button onClick={pauseSimulado} className="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center bg-zinc-100 dark:bg-slate-800 text-zinc-400 hover:text-amber-500 rounded-xl sm:rounded-2xl transition-all shadow-sm" title="Pausar Simulado"><i className="fa-solid fa-pause text-lg"></i></button>
                                    <button onClick={clearDeck} className="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center bg-zinc-100 dark:bg-slate-800 text-zinc-400 hover:text-rose-500 rounded-xl sm:rounded-2xl transition-all shadow-sm hover:rotate-90" title="Sair sem salvar"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>
                                <div className="flex justify-between items-center mb-6 sm:mb-10 border-b border-indigo-100 dark:border-indigo-900/30 pb-4 sm:pb-6 pr-24 sm:pr-0">
                                    <span className="font-black text-indigo-600 dark:text-indigo-400 uppercase text-[9px] sm:text-[10px] tracking-[0.2em] sm:tracking-[0.3em] flex items-center gap-2 sm:gap-3"><i className={`fa-solid ${simulado.isReviewing ? 'fa-magnifying-glass-chart' : 'fa-brain-circuit'}`}></i> <span className="truncate max-w-[120px] sm:max-w-none">{simulado.isReviewing ? 'Revisão' : 'Elite Training'}</span></span>
                                    <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                                        <div className={`flex items-center gap-1.5 sm:gap-2 px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl border font-mono text-[10px] sm:text-xs font-black ${simulado.timeElapsed > 120 ? 'bg-red-50 text-red-600 border-red-200 animate-pulse' : 'bg-zinc-50 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 border-zinc-200 dark:border-zinc-700'}`}>
                                            <i className="fa-regular fa-clock"></i> {formatTime(simulado.timeElapsed)}
                                        </div>
                                        <span className="font-black text-[10px] sm:text-xs bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-3 sm:px-5 py-1.5 sm:py-2 rounded-xl border border-indigo-100 dark:border-indigo-800/50">{simulado.curIdx + 1} <span className="opacity-40 mx-0.5">/</span> {simulado.deck.length}</span>
                                    </div>
                                </div>

                                <h2 className="text-lg sm:text-xl md:text-2xl lg:text-3xl font-black mb-5 sm:mb-8 leading-tight tracking-tight text-slate-900 dark:text-white text-justify-custom">{q.title}</h2>
                                <div className="mb-6 sm:mb-10 p-4 sm:p-8 bg-slate-50 dark:bg-slate-950/50 rounded-2xl sm:rounded-4xl border border-indigo-50 dark:border-indigo-950 relative group shadow-inner">
                                    {(!simulado.showAns && !simulado.isReviewing) && (
                                        <div className="absolute -top-4 right-4 sm:right-8 flex gap-2 opacity-0 group-hover:opacity-100 transition-all z-10 scale-90 group-hover:scale-100">
                                            <button onClick={handleHighlight} className="bg-white dark:bg-slate-800 border border-indigo-100 dark:border-indigo-900 text-indigo-600 dark:text-indigo-300 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-[9px] sm:text-[10px] font-black shadow-xl hover:bg-indigo-50 transition-all uppercase tracking-widest">
                                                <i className="fa-solid fa-highlighter mr-2"></i> Marcar
                                            </button>
                                            {simulado.highlightedText && (
                                                <button onClick={() => setSimulado(p => ({ ...p, highlightedText: '' }))} className="bg-white dark:bg-slate-800 border border-rose-100 dark:border-rose-900 text-rose-600 dark:text-rose-400 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-[9px] sm:text-[10px] font-black shadow-xl hover:bg-rose-50 transition-all uppercase tracking-widest">
                                                    <i className="fa-solid fa-eraser"></i>
                                                </button>
                                            )}
                                        </div>
                                    )}
                                    <p className="text-base sm:text-xl leading-relaxed text-justify-custom whitespace-pre-wrap font-medium text-slate-800 dark:text-slate-200" dangerouslySetInnerHTML={{ __html: simulado.highlightedText || ((q.question || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;")) }}></p>
                                    {q.image && <img src={q.image} className="mt-8 sm:mt-10 max-h-[300px] sm:max-h-[400px] w-auto mx-auto rounded-2xl sm:rounded-3xl cursor-pointer shadow-2xl border border-white/10 hover:scale-[1.02] transition-transform" onClick={() => setLightbox(q.image)} alt="Contexto Visual" />}
                                </div>

                                {q.type === 'discursiva' ? (
                                    <div className="space-y-4 sm:space-y-6 animate-in fade-in slide-in-from-bottom-2">
                                        <div className="flex flex-col gap-3 sm:gap-4">
                                            <label className="text-[9px] sm:text-[10px] font-black text-zinc-400 uppercase tracking-widest ml-2 flex items-center gap-2"><i className="fa-solid fa-pen-fancy text-emerald-500"></i> Resposta Discursiva</label>
                                            <textarea 
                                                disabled={simulado.isReviewing || !!res}
                                                value={simulado.selAlt || ''}
                                                onChange={(e) => setSimulado(p => ({ ...p, selAlt: e.target.value }))}
                                                placeholder="Escreva sua resposta técnica detalhada aqui..."
                                                className="w-full p-4 sm:p-6 rounded-2xl sm:rounded-3xl border-2 border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-950 font-medium outline-none focus:ring-2 focus:ring-emerald-500 min-h-[140px] sm:min-h-[220px] shadow-inner transition-all text-zinc-800 dark:text-zinc-200 text-sm sm:text-lg leading-relaxed"
                                            />
                                        </div>
                                        {!res && !simulado.isReviewing && (
                                            <button 
                                                onClick={() => handleExplainSimuladoQuestion('correction')}
                                                disabled={!simulado.selAlt?.trim() || simulado.isAiExplaining}
                                                className="w-full py-4 sm:py-5 bg-gradient-to-r from-emerald-600 to-teal-700 text-white rounded-2xl font-black shadow-xl shadow-emerald-600/20 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-3 text-base sm:text-lg border border-emerald-400/30"
                                            >
                                                {simulado.isAiExplaining ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>} 
                                                {simulado.isAiExplaining ? 'Mentor IA está a avaliar...' : 'Enviar para Correção Oficial'}
                                            </button>
                                        )}
                                        {(res || simulado.isReviewing) && (
                                            <div className="animate-in fade-in slide-in-from-top-2 space-y-4">
                                                <div className="flex items-center gap-3 ml-2">
                                                    <div className="w-8 h-8 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 flex items-center justify-center shadow-sm"><i className="fa-solid fa-scroll"></i></div>
                                                    <label className="text-[10px] font-black text-emerald-500 dark:text-emerald-400 uppercase tracking-widest">Espelho de Resposta (Gabarito)</label>
                                                </div>
                                                <div className="p-5 sm:p-8 rounded-[24px] sm:rounded-[32px] bg-emerald-50 dark:bg-emerald-900/10 border-2 border-dashed border-emerald-200 dark:border-emerald-800/50 text-emerald-900 dark:text-emerald-100 font-bold leading-relaxed shadow-inner text-base sm:text-lg text-justify-custom">
                                                    {q.alternatives[0]}
                                                </div>

                                                <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 pt-2">
                                                    <button 
                                                        onClick={() => { recordAnswer(q.id, true, simulado.selAlt); setSimulado(p => ({...p, showAns: true})); }} 
                                                        className={`flex-1 py-4 rounded-2xl font-black transition-all flex items-center justify-center gap-3 border-2 ${res?.isCorrect ? 'bg-emerald-600 border-emerald-500 text-white shadow-lg shadow-emerald-600/20' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 text-zinc-400 hover:border-emerald-500 hover:text-emerald-600'}`}
                                                    >
                                                        <i className="fa-solid fa-check-double"></i> Acertei
                                                    </button>
                                                    <button 
                                                        onClick={() => { recordAnswer(q.id, false, simulado.selAlt); setSimulado(p => ({...p, showAns: true})); }} 
                                                        className={`flex-1 py-4 rounded-2xl font-black transition-all flex items-center justify-center gap-3 border-2 ${res && !res.isCorrect ? 'bg-rose-600 border-rose-500 text-white shadow-lg shadow-rose-600/20' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 text-zinc-400 hover:border-rose-500 hover:text-rose-600'}`}
                                                    >
                                                        <i className="fa-solid fa-xmark"></i> Errei
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="space-y-3 sm:space-y-4">
                                        {q.alternatives.map((alt, i) => {
                                            if (!alt) return null; const L = String.fromCharCode(65 + i); const isCorr = L === q.correctAlternative;
                                            const isSel = simulado.isReviewing ? (simulado.results.find(r => r.id === q.id)?.userAns === L) : (simulado.selAlt === L || res?.userAns === L);
                                            const isCrossed = simulado.crossedAlts?.includes(L);

                                            let btnClass = "border-zinc-200 dark:border-zinc-700 hover:bg-zinc-50 dark:hover:bg-zinc-800 bg-white dark:bg-zinc-900 text-zinc-700 dark:text-zinc-200 cursor-pointer";
                                            if (showCol) {
                                                if (isCorr) btnClass = "bg-emerald-50 border-emerald-500 text-emerald-900 dark:bg-emerald-900/30 dark:border-emerald-500 dark:text-emerald-300 shadow-md scale-[1.01] cursor-default z-10";
                                                else if (isSel) btnClass = "bg-red-50 border-red-400 text-red-900 dark:bg-red-900/30 dark:border-red-500 dark:text-red-300 shadow-sm cursor-default";
                                                else btnClass = "opacity-40 border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-950 cursor-default";
                                            } else if (isSel) {
                                                btnClass = "border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-300 shadow-md";
                                            }

                                            return (
                                                <div key={i} className="flex flex-col gap-2 group relative">
                                                    <div className="flex gap-2 sm:gap-3">
                                                        {(!showCol) && (
                                                            <button
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    setSimulado(p => ({ ...p, crossedAlts: isCrossed ? (p.crossedAlts || []).filter(x => x !== L) : [...(p.crossedAlts || []), L] }));
                                                                }}
                                                                className={`w-10 sm:w-14 shrink-0 flex items-center justify-center rounded-xl sm:rounded-2xl border-2 transition-all ${isCrossed ? 'bg-zinc-200 dark:bg-zinc-800 border-zinc-300 dark:border-zinc-700 text-zinc-400' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 text-zinc-300 hover:text-rose-500 hover:border-rose-500/30'}`}
                                                                title={isCrossed ? "Restaurar" : "Riscar"}
                                                            >
                                                                <i className={`fa-solid ${isCrossed ? 'fa-rotate-left' : 'fa-strikethrough'} text-sm sm:text-base`}></i>
                                                            </button>
                                                        )}
                                                        <button
                                                            disabled={simulado.isReviewing || isCrossed}
                                                            onClick={() => { setSimulado(p => ({ ...p, selAlt: L })); recordAnswer(q.id, isCorr, L); }}
                                                            className={`flex-1 text-left p-4 sm:p-5 rounded-xl sm:rounded-2xl border-2 transition-all font-bold text-sm sm:text-[15px] flex gap-3 sm:gap-4 ${btnClass} ${isCrossed && !showCol ? 'opacity-30 line-through grayscale' : ''}`}
                                                        >
                                                            <span className="shrink-0 opacity-50">{L})</span><span className="text-justify-custom leading-relaxed flex-1">{alt}</span>
                                                        </button>
                                                    </div>
                                                    {(showCol && q.alternativeExplanations?.[i]) && (
                                                        <div className={`ml-12 sm:ml-16 p-3 sm:p-4 rounded-xl text-[11px] sm:text-xs font-medium animate-in slide-in-from-left-2 leading-relaxed text-justify-custom ${isCorr ? 'bg-emerald-50 border-l-4 border-emerald-400 text-emerald-900 dark:bg-emerald-900/20 dark:text-emerald-300 dark:border-emerald-600' : 'bg-zinc-50 border-l-4 border-zinc-300 text-zinc-600 dark:bg-zinc-800/50 dark:border-zinc-600 dark:text-zinc-400'}`}>
                                                            <i className="fa-solid fa-reply mr-2 opacity-50"></i> {q.alternativeExplanations[i]}
                                                        </div>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}

                                {(!res && !simulado.isReviewing && !simulado.selAlt) && (
                                    <button onClick={() => { setSimulado(p => ({ ...p, selAlt: 'Pulo' })); recordAnswer(q.id, false, 'Pulo'); }} className="w-full mt-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-2xl font-black text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors shadow-inner">Não sei a resposta (Pular)</button>
                                )}

                                {(showCol || !!res || simulado.selAlt) && (
                                    <div className="mt-10 pt-8 border-t border-zinc-200 dark:border-zinc-800 animate-in slide-in-from-top-4">
                                {showCol && (
                                    <div className="bg-emerald-50 dark:bg-emerald-900/20 p-6 rounded-3xl border border-emerald-100 dark:border-emerald-800 mb-8 font-bold text-emerald-900 dark:text-emerald-200 flex gap-4 shadow-inner">
                                        <div className="bg-white dark:bg-emerald-800 w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-sm"><i className="fa-solid fa-lightbulb text-amber-500 text-lg"></i></div>
                                        <span className="text-justify-custom leading-relaxed flex-1 pt-2">{q.lessonLearned}</span>
                                    </div>
                                )}

                                        {/* --- FERRAMENTAS DE FIXAÇÃO IA --- */}
                                        {showCol && !simulado.aiExplanation && !simulado.isAiExplaining && (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 mb-8">
                                                <button onClick={() => handleExplainSimuladoQuestion('explain')} className="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800/50 text-indigo-700 dark:text-indigo-400 font-black py-4 px-2 rounded-2xl hover:bg-indigo-100 dark:hover:bg-indigo-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                    <i className="fa-solid fa-chalkboard-user text-2xl ai-glow rounded-full"></i> <span className="text-xs uppercase tracking-widest">Professor IA</span>
                                                </button>
                                                <button onClick={() => handleExplainSimuladoQuestion('mnemonic')} className="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/50 text-amber-700 dark:text-amber-400 font-black py-4 px-2 rounded-2xl hover:bg-amber-100 dark:hover:bg-amber-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                    <i className="fa-solid fa-lightbulb text-2xl"></i> <span className="text-xs uppercase tracking-widest">Mnemónica</span>
                                                </button>
                                                <button onClick={() => handleExplainSimuladoQuestion('summary')} className="bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800/50 text-emerald-700 dark:text-emerald-400 font-black py-4 px-2 rounded-2xl hover:bg-emerald-100 dark:hover:bg-emerald-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                    <i className="fa-solid fa-bolt text-2xl"></i> <span className="text-xs uppercase tracking-widest">Resumo Flash</span>
                                                </button>
                                                <button onClick={() => handleExplainSimuladoQuestion('pitfalls')} className="bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-800/50 text-rose-700 dark:text-rose-400 font-black py-4 px-2 rounded-2xl hover:bg-rose-100 dark:hover:bg-rose-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                    <i className="fa-solid fa-triangle-exclamation text-2xl"></i> <span className="text-xs uppercase tracking-widest">Pegadinhas</span>
                                                </button>
                                                <button onClick={() => {
                                                    const userAns = simulado.isReviewing ? simulado.results.find(r => r.id === q.id)?.userAns : simulado.selAlt;
                                                    const correctText = q.alternatives[q.correctAlternative.charCodeAt(0) - 65] || '';
                                                    const userText = (userAns && userAns !== 'Pulo') ? q.alternatives[userAns.charCodeAt(0) - 65] : 'Não soube responder (Pulo)';
                                                    const promptContext = `${getPersonaInstruction(aiConfig.persona, 'batepapo')}\n\nTema: ${q.title}\nQuestão: ${q.question}\n\nAlternativa Correta (${q.correctAlternative}): ${correctText}\nMinha resposta: ${userAns} (${userText})`;
                                                    setSimulado(p => ({ ...p, isAiChatting: true, aiChatMessages: [{ role: 'user', text: promptContext }], isAiExplaining: true, aiExplanation: '' }));
                                                    callIA([{ role: 'user', parts: [{ text: promptContext }] }]).then(r => {
                                                        setSimulado(p => ({ ...p, isAiExplaining: false, aiChatMessages: [...p.aiChatMessages, { role: 'model', text: r || "Falha ao gerar resposta da IA. Tente novamente." }] }));
                                                    });
                                                }} className="bg-sky-50 dark:bg-sky-900/20 border border-sky-200 dark:border-sky-800/50 text-sky-700 dark:text-sky-400 font-black py-4 px-2 rounded-2xl hover:bg-sky-100 dark:hover:bg-sky-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                    <i className="fa-solid fa-comments text-2xl"></i> <span className="text-xs uppercase tracking-widest">Bate-Papo</span>
                                                </button>
                                            </div>
                                        )}

                                        {showCol && simulado.isAiExplaining && !simulado.isAiChatting && (
                                            <div className="mb-8 p-6 bg-slate-50 dark:bg-slate-900/40 rounded-3xl border border-slate-200 dark:border-slate-800 flex items-center justify-center gap-4 text-emerald-600 dark:text-emerald-400 font-bold shadow-inner">
                                                <i className="fa-solid fa-circle-notch fa-spin text-2xl"></i> A preparar a sua ferramenta de fixação...
                                            </div>
                                        )}

                                        {showCol && simulado.aiExplanation && (
                                            <div className="mb-8 p-6 md:p-8 bg-slate-50 dark:bg-slate-900/40 rounded-3xl border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-slate-100 shadow-inner animate-in slide-in-from-top-2 relative">
                                                <button onClick={() => setSimulado(p => ({ ...p, aiExplanation: '' }))} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-500 hover:text-slate-700 transition-colors" title="Fechar ferramenta"><i className="fa-solid fa-xmark"></i></button>
                                                <h4 className="font-black flex items-center gap-2 mb-6 text-emerald-600 dark:text-emerald-500 text-lg border-b border-slate-200 dark:border-slate-700 pb-4"><i className="fa-solid fa-robot"></i> Resposta do Mentor IA</h4>
                                                <div className="text-[15px] leading-relaxed text-justify-custom whitespace-pre-wrap font-medium" dangerouslySetInnerHTML={{ __html: simulado.aiExplanation.replace(/\*\*(.*?)\*\*/g, '<b class="font-black">$1</b>').replace(/\n/g, '<br/>') }}></div>
                                            </div>
                                        )}

                                        {showCol && simulado.isAiChatting && (
                                            <div className="mb-8 p-6 md:p-8 bg-slate-50 dark:bg-slate-900/40 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-inner animate-in slide-in-from-top-2 relative">
                                                <button onClick={() => setSimulado(p => ({ ...p, isAiChatting: false, aiChatMessages: [], isAiExplaining: false }))} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-500 hover:text-slate-700 transition-colors" title="Fechar Bate-Papo"><i className="fa-solid fa-xmark"></i></button>
                                                <h4 className="font-black flex items-center gap-2 mb-6 text-sky-600 dark:text-sky-500 text-lg border-b border-slate-200 dark:border-slate-700 pb-4"><i className="fa-solid fa-comments"></i> Bate-Papo com o Mentor IA</h4>

                                                <div className="space-y-4 mb-4 max-h-[400px] overflow-y-auto pr-2 chat-scroll flex flex-col">
                                                    {(simulado.aiChatMessages || []).map((msg, i) => {
                                                        if (i === 0 && msg.role === 'user') return null; // hide initial prompt
                                                        return (
                                                            <div key={i} className={`flex gap-3 ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                                {msg.role === 'model' && <div className="w-8 h-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center shrink-0"><i className="fa-solid fa-robot"></i></div>}
                                                                <div className={`p-4 rounded-2xl max-w-[85%] text-[15px] font-medium leading-relaxed whitespace-pre-wrap text-justify-custom ${msg.role === 'user' ? 'bg-sky-600 text-white rounded-tr-sm' : 'bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-tl-sm'}`} dangerouslySetInnerHTML={{ __html: msg.text.replace(/\*\*(.*?)\*\*/g, '<b class="font-black">$1</b>').replace(/\n/g, '<br/>') }}></div>
                                                            </div>
                                                        )
                                                    })}
                                                    {simulado.isAiExplaining && (
                                                        <div className="flex gap-3 justify-start">
                                                            <div className="w-8 h-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center shrink-0"><i className="fa-solid fa-robot"></i></div>
                                                            <div className="p-4 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-tl-sm flex items-center gap-2">
                                                                <i className="fa-solid fa-circle-notch fa-spin"></i> O Mentor está a digitar...
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="flex gap-2">
                                                    <input type="text" id="inlineChatInput" placeholder="Responda ao Mentor..." onKeyDown={(e) => {
                                                        if (e.key === 'Enter') {
                                                            const val = e.target.value;
                                                            if (!val.trim() || simulado.isAiExplaining) return;
                                                            e.target.value = '';
                                                            setSimulado(p => {
                                                                const newMsgs = [...(p.aiChatMessages || []), { role: 'user', text: val }];
                                                                const msgsToApi = newMsgs.map(m => ({ role: m.role, parts: [{ text: m.text }] }));
                                                                callIA(msgsToApi).then(r => {
                                                                    setSimulado(p2 => ({ ...p2, isAiExplaining: false, aiChatMessages: [...p2.aiChatMessages, { role: 'model', text: r || "Erro na comunicação." }] }));
                                                                });
                                                                return { ...p, isAiExplaining: true, aiChatMessages: newMsgs };
                                                            });
                                                        }
                                                    }} className="flex-1 bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-sky-500 text-sm font-bold text-zinc-800 dark:text-zinc-100" />
                                                    <button onClick={(e) => {
                                                        const input = e.currentTarget.previousElementSibling;
                                                        if (input && input.value.trim() && !simulado.isAiExplaining) {
                                                            const val = input.value;
                                                            input.value = '';
                                                            setSimulado(p => {
                                                                const newMsgs = [...(p.aiChatMessages || []), { role: 'user', text: val }];
                                                                const msgsToApi = newMsgs.map(m => ({ role: m.role, parts: [{ text: m.text }] }));
                                                                callIA(msgsToApi).then(r => {
                                                                    setSimulado(p2 => ({ ...p2, isAiExplaining: false, aiChatMessages: [...p2.aiChatMessages, { role: 'model', text: r || "Erro na comunicação." }] }));
                                                                });
                                                                return { ...p, isAiExplaining: true, aiChatMessages: newMsgs };
                                                            });
                                                        }
                                                    }} className="bg-sky-600 hover:bg-sky-700 text-white w-12 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-paper-plane"></i></button>
                                                </div>
                                            </div>
                                        )}
                                        {/* ----------------------------- */}

                                        <button onClick={() => {
                                            if (simulado.isReviewing) { setSimulado(p => ({ ...p, isReviewing: false, showResults: true, aiExplanation: '', isAiExplaining: false, crossedAlts: [], highlightedText: '' })); window.scrollTo(0, 0); }
                                            else if (simulado.curIdx < simulado.deck.length - 1) { setSimulado(p => ({ ...p, curIdx: p.curIdx + 1, showAns: false, selAlt: null, timeElapsed: 0, aiExplanation: '', isAiExplaining: false, crossedAlts: [], highlightedText: '' })); window.scrollTo(0, 0); }
                                            else finishSimulado();
                                        }} className="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-emerald-600/20 hover:bg-emerald-700 active:scale-95 transition-all text-lg flex justify-center items-center gap-3">
                                            {simulado.isReviewing ? 'Voltar aos Resultados' : (simulado.curIdx < simulado.deck.length - 1 ? 'Avançar para Próxima' : 'Ver Resultados Finais')} <i className="fa-solid fa-arrow-right"></i>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Painel de Navegação Lateral Elite */}
                        <div className="w-full lg:w-80 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-xl rounded-[40px] p-8 shadow-2xl border border-zinc-200 dark:border-zinc-800 lg:sticky lg:top-24 shrink-0 animate-in slide-in-from-right-4">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-black text-zinc-400 text-[10px] uppercase tracking-[0.4em] flex items-center gap-2"><i className="fa-solid fa-list-ol text-emerald-500"></i> Mapa de Questões</h3>
                                <span className="text-[10px] font-black text-zinc-500 bg-zinc-100 dark:bg-zinc-800 px-3 py-1 rounded-full">{simulado.results.length} / {simulado.deck.length}</span>
                            </div>
                            
                            <div className="grid grid-cols-5 gap-3 max-h-[400px] overflow-y-auto pr-2 custom-scroll">
                                {simulado.deck.map((dq, idx) => {
                                    const questionRes = simulado.results.find(r => String(r.id) === String(dq.id));
                                    const isCurrent = idx === simulado.curIdx;
                                    const isCorrect = questionRes?.isCorrect;
                                    const isSkipped = questionRes?.userAns === 'Pulo';
                                    
                                    let btnClass = "bg-zinc-100 dark:bg-zinc-800 text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-700";
                                    if (isCurrent) btnClass = "ring-2 ring-emerald-500 bg-white dark:bg-zinc-700 text-emerald-600 dark:text-emerald-400 shadow-lg scale-110 z-10";
                                    else if (questionRes) {
                                        if (simulado.isReviewing) {
                                            if (isSkipped) btnClass = "bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 border border-amber-200 dark:border-amber-800";
                                            else if (isCorrect) btnClass = "bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800";
                                            else btnClass = "bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 border border-rose-200 dark:border-rose-800";
                                        } else {
                                            btnClass = "bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800";
                                        }
                                    }

                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => jumpToQuestion(idx)}
                                            className={`w-full aspect-square rounded-2xl font-black text-xs transition-all flex items-center justify-center ${btnClass} active:scale-90`}
                                        >
                                            {idx + 1}
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="mt-8 pt-8 border-t border-zinc-100 dark:border-zinc-800 space-y-4">
                                {showCol && (
                                    <div className="grid grid-cols-1 gap-2 animate-in fade-in duration-500">
                                        <div className="flex items-center justify-between p-3 rounded-2xl bg-emerald-50 dark:bg-emerald-900/10 border border-emerald-100 dark:border-emerald-800/50">
                                            <span className="text-[9px] font-black uppercase text-emerald-600 dark:text-emerald-400 tracking-widest"><i className="fa-solid fa-circle-check mr-1"></i> Certas</span>
                                            <span className="font-black text-sm text-emerald-700 dark:text-emerald-400">{simulado.results.filter(r => r.isCorrect).length}</span>
                                        </div>
                                        <div className="flex items-center justify-between p-3 rounded-2xl bg-rose-50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-800/50">
                                            <span className="text-[9px] font-black uppercase text-rose-600 dark:text-rose-400 tracking-widest"><i className="fa-solid fa-circle-xmark mr-1"></i> Erradas</span>
                                            <span className="font-black text-sm text-rose-700 dark:text-rose-400">{simulado.results.filter(r => !r.isCorrect && r.userAns !== 'Pulo').length}</span>
                                        </div>
                                        <div className="flex items-center justify-between p-3 rounded-2xl bg-amber-50 dark:bg-amber-900/10 border border-amber-100 dark:border-amber-800/50">
                                            <span className="text-[9px] font-black uppercase text-amber-600 dark:text-amber-400 tracking-widest"><i className="fa-solid fa-forward-step mr-1"></i> Puladas</span>
                                            <span className="font-black text-sm text-amber-700 dark:text-amber-400">{simulado.results.filter(r => r.userAns === 'Pulo').length}</span>
                                        </div>
                                        {simulado.cebraspeMode && (
                                            <div className="flex items-center justify-between p-3 rounded-2xl bg-rose-50 dark:bg-rose-900/10 border-2 border-rose-500/50 animate-pulse">
                                                <span className="text-[9px] font-black uppercase text-rose-600 dark:text-rose-400 tracking-widest"><i className="fa-solid fa-calculator mr-1"></i> Score Líquido</span>
                                                <span className="font-black text-sm text-rose-700 dark:text-rose-400">{simulado.results.filter(r => r.isCorrect).length - simulado.results.filter(r => !r.isCorrect && r.userAns !== 'Pulo').length}</span>
                                            </div>
                                        )}
                                    </div>
                                )}

                                <button onClick={finishSimulado} className="w-full py-4 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 rounded-[20px] font-black text-[10px] uppercase tracking-[0.2em] shadow-xl hover:shadow-emerald-500/10 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
                                    <i className="fa-solid fa-flag-checkered"></i> Finalizar Simulado
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderSimuladoResultsUI = () => {
                const hits = simulado.results.filter(r => r.isCorrect).length;
                const tot = simulado.deck.length;
                const perc = Math.round((hits / tot) * 100);

                return (
                    <div className="max-w-4xl mx-auto py-6 md:py-10 w-full animate-in fade-in pt-8 md:pt-12 px-4">
                        <div className="bg-white dark:bg-zinc-900 rounded-3xl md:rounded-[40px] p-6 md:p-10 shadow-2xl border border-zinc-200 dark:border-zinc-800 text-center">
                            <h2 className="text-2xl md:text-4xl font-black mb-4 dark:text-white">Simulado Concluído!</h2>
                            <p className="text-zinc-500 font-bold mb-10 uppercase tracking-widest text-xs">Resumo do Desempenho</p>

                            <div className="flex flex-wrap justify-center gap-4 mb-12">
                                <div className="bg-zinc-50 dark:bg-zinc-950 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner flex-1 min-w-[140px]"><span className={`block text-5xl font-black mb-2 ${perc >= 70 ? 'text-emerald-500' : perc >= 50 ? 'text-amber-500' : 'text-red-500'}`}>{perc}%</span><span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Taxa de Acerto</span></div>
                                {simulado.cebraspeMode ? (
                                    <div className="bg-zinc-50 dark:bg-zinc-950 p-6 rounded-3xl border border-rose-200 dark:border-rose-900 shadow-inner flex-1 min-w-[140px] ring-2 ring-rose-500/20">
                                        <span className="block text-5xl font-black text-rose-500 mb-2">{hits - simulado.results.filter(r => !r.isCorrect && r.userAns !== 'Pulo').length}</span>
                                        <span className="text-[10px] font-black uppercase text-rose-400 tracking-widest">Pontuação Líquida</span>
                                    </div>
                                ) : (
                                    <div className="bg-zinc-50 dark:bg-zinc-950 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner flex-1 min-w-[140px]"><span className="block text-5xl font-black text-emerald-500 mb-2">{hits}</span><span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Certas</span></div>
                                )}
                                <div className="bg-zinc-50 dark:bg-zinc-950 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner flex-1 min-w-[140px]"><span className="block text-5xl font-black text-red-500 mb-2">{simulado.results.filter(r => !r.isCorrect && r.userAns !== 'Pulo').length}</span><span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Erradas</span></div>
                                <div className="bg-zinc-50 dark:bg-zinc-950 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner flex-1 min-w-[140px]"><span className="block text-5xl font-black text-amber-500 mb-2">{simulado.results.filter(r => r.userAns === 'Pulo').length}</span><span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Puladas</span></div>
                            </div>

                            <div className="text-left mb-12">
                                <h3 className="font-black text-lg mb-6 dark:text-white flex items-center gap-2"><i className="fa-solid fa-list-check text-emerald-500"></i> Gabarito da Sessão</h3>
                                <div className="space-y-3">
                                    {simulado.deck.map((q, i) => {
                                        const r = simulado.results.find(x => String(x.id) === String(q.id));
                                        return (
                                            <div key={q.id} onClick={() => { setSimulado(p => ({ ...p, curIdx: i, isReviewing: true, showResults: false, crossedAlts: [], highlightedText: '' })); window.scrollTo(0, 0); }} className="p-4 bg-zinc-50 dark:bg-zinc-950 rounded-2xl border border-zinc-200 dark:border-zinc-800 flex justify-between items-center cursor-pointer hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all group">
                                                <span className="font-bold text-sm truncate mr-4 text-zinc-700 dark:text-zinc-300 group-hover:text-emerald-700 dark:group-hover:text-emerald-400 transition-colors">Q{i + 1}. {q.title}</span>
                                                <div className="flex items-center gap-3 shrink-0">
                                                    <span className="text-[10px] font-mono text-zinc-400 bg-white dark:bg-zinc-900 px-2 py-1 rounded border dark:border-zinc-700"><i className="fa-regular fa-clock"></i> {formatTime(r?.timeSpent)}</span>
                                                    <span className={`w-24 text-center px-3 py-1.5 rounded-lg text-xs font-black uppercase ${r?.isCorrect ? 'bg-green-100 text-green-700 border border-green-200' : r?.userAns === 'Pulo' ? 'bg-amber-100 text-amber-700 border border-amber-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>
                                                        {r?.isCorrect ? (<span><i className="fa-solid fa-check"></i> Certo</span>) : r?.userAns === 'Pulo' ? (<span><i className="fa-solid fa-forward-step"></i> Pulo</span>) : (<span><i className="fa-solid fa-xmark"></i> Errado</span>)}
                                                    </span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                <button onClick={analyzePerformance} disabled={simulado.isAiExplaining} className="py-5 bg-indigo-900 text-white font-black rounded-2xl shadow-xl flex flex-col items-center justify-center gap-1 active:scale-95 hover:bg-black transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                    <div className="flex items-center gap-2">
                                        {simulado.isAiExplaining && simulado.aiChatMessages?.length === 1 ? <i className="fa-solid fa-circle-notch fa-spin text-xl"></i> : <i className="fa-solid fa-brain ai-glow rounded-full text-xl"></i>}
                                        <span className="text-lg">{simulado.isAiExplaining && simulado.aiChatMessages?.length === 1 ? 'A Analisar...' : 'Análise IA'}</span>
                                    </div>
                                    <span className="text-[9px] uppercase tracking-widest opacity-60">Questão a Questão</span>
                                </button>

                                <button onClick={() => triggerFeedbackChat(hits, tot, perc)} disabled={simulado.isAiExplaining} className="py-5 bg-emerald-600 text-white font-black rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 hover:bg-emerald-700 transition-all text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                                    {simulado.isAiExplaining && simulado.aiChatMessages?.length === 1 ? <i className="fa-solid fa-circle-notch fa-spin text-xl"></i> : <i className="fa-solid fa-robot text-xl"></i>}
                                    {simulado.isAiExplaining && simulado.aiChatMessages?.length === 1 ? 'A Gerar...' : 'Feedback'}
                                </button>

                                {tot - hits > 0 && (
                                    <button onClick={handleGenerateFlashcards} disabled={simulado.isGeneratingFlashcards} className="py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 hover:bg-indigo-700 transition-all text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                                        {simulado.isGeneratingFlashcards ? <i className="fa-solid fa-circle-notch fa-spin text-xl"></i> : <i className="fa-solid fa-clone text-xl"></i>}
                                        {simulado.isGeneratingFlashcards ? 'A processar...' : 'Flashcards'}
                                    </button>
                                )}

                                {(simulado.source === 'elaborador' && tot - hits > 0) && (
                                    <button onClick={() => {
                                        const wrongIds = simulado.results.filter(r => !r.isCorrect).map(r => r.id);
                                        const wrongQuestions = simulado.deck.filter(q => wrongIds.includes(q.id)).map(q => ({
                                            ...q, id: Date.now() + Math.floor(Math.random() * 1000)
                                        }));
                                        if (wrongQuestions.length > 0) {
                                            setDb(p => ({ ...p, errors: [...wrongQuestions, ...p.errors] }));
                                            showAlert(`✅ ${wrongQuestions.length} questões erradas salvas no seu Caderno de Erros!`);
                                        }
                                    }} className="py-5 bg-rose-600 text-white font-black rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 hover:bg-rose-700 transition-all text-lg">
                                        <i className="fa-solid fa-triangle-exclamation text-xl"></i> Salvar Erros
                                    </button>
                                )}

                                <button onClick={clearDeck} className="py-5 bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 dark:text-zinc-300 font-black rounded-2xl hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-all text-lg flex items-center justify-center gap-2">
                                    <i className="fa-solid fa-arrow-left"></i> Sair
                                </button>
                            </div>

                            {simulado.isAiChatting && (
                                <div id="ai-feedback-chat" className="mt-8 p-6 md:p-8 bg-slate-50 dark:bg-slate-900/40 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-inner animate-in slide-in-from-top-2 relative text-left">
                                    <button onClick={() => setSimulado(p => ({ ...p, isAiChatting: false, aiChatMessages: [], isAiExplaining: false }))} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-500 hover:text-slate-700 transition-colors" title="Fechar Bate-Papo"><i className="fa-solid fa-xmark"></i></button>
                                    <h4 className="font-black flex items-center gap-2 mb-6 text-indigo-600 dark:text-indigo-500 text-lg border-b border-slate-200 dark:border-slate-700 pb-4"><i className="fa-solid fa-robot"></i> Análise e Feedback IA</h4>

                                    <div className="space-y-4 mb-4 max-h-[400px] overflow-y-auto pr-2 chat-scroll flex flex-col">
                                        {(simulado.aiChatMessages || []).map((msg, i) => {
                                            if (i === 0 && msg.role === 'user') return null; // hide initial prompt
                                            return (
                                                <div key={i} className={`flex gap-3 ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                    {msg.role === 'model' && <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0"><i className="fa-solid fa-robot"></i></div>}
                                                    <div className={`p-4 rounded-2xl max-w-[85%] text-[15px] font-medium leading-relaxed whitespace-pre-wrap text-justify-custom ${msg.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-sm' : 'bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-tl-sm'}`} dangerouslySetInnerHTML={{ __html: msg.text.replace(/\*\*(.*?)\*\*/g, '<b class="font-black">$1</b>').replace(/\n/g, '<br/>') }}></div>
                                                </div>
                                            )
                                        })}
                                        {simulado.isAiExplaining && (
                                            <div className="flex gap-3 justify-start">
                                                <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0"><i className="fa-solid fa-robot"></i></div>
                                                <div className="p-4 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-tl-sm flex items-center gap-2">
                                                    <i className="fa-solid fa-circle-notch fa-spin"></i> O Mentor está a analisar...
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex gap-2">
                                        <input type="text" placeholder="Pergunte algo sobre o seu desempenho..." onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                const val = e.target.value;
                                                if (!val.trim() || simulado.isAiExplaining) return;
                                                e.target.value = '';
                                                setSimulado(p => {
                                                    const newMsgs = [...(p.aiChatMessages || []), { role: 'user', text: val }];
                                                    const msgsToApi = newMsgs.map(m => ({ role: m.role, parts: [{ text: m.text }] }));
                                                    callIA(msgsToApi).then(r => {
                                                        setSimulado(p2 => ({ ...p2, isAiExplaining: false, aiChatMessages: [...p2.aiChatMessages, { role: 'model', text: r || "Erro na comunicação." }] }));
                                                    });
                                                    return { ...p, isAiExplaining: true, aiChatMessages: newMsgs };
                                                });
                                            }
                                        }} className="flex-1 bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-bold text-zinc-800 dark:text-zinc-100" />
                                        <button onClick={(e) => {
                                            const input = e.currentTarget.previousElementSibling;
                                            if (input && input.value.trim() && !simulado.isAiExplaining) {
                                                const val = input.value;
                                                input.value = '';
                                                setSimulado(p => {
                                                    const newMsgs = [...(p.aiChatMessages || []), { role: 'user', text: val }];
                                                    const msgsToApi = newMsgs.map(m => ({ role: m.role, parts: [{ text: m.text }] }));
                                                    callIA(msgsToApi).then(r => {
                                                        setSimulado(p2 => ({ ...p2, isAiExplaining: false, aiChatMessages: [...p2.aiChatMessages, { role: 'model', text: r || "Erro na comunicação." }] }));
                                                    });
                                                    return { ...p, isAiExplaining: true, aiChatMessages: newMsgs };
                                                });
                                            }
                                        }} className="bg-indigo-600 hover:bg-indigo-700 text-white w-12 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-paper-plane"></i></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderSimuladosTab = () => (
                <div className="p-6 space-y-8 animate-in fade-in">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-white dark:bg-zinc-900 p-8 md:p-10 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800">
                            <h2 className="text-2xl font-black mb-8 flex items-center gap-3 text-emerald-600 dark:text-emerald-500"><i className="fa-solid fa-sliders"></i> Configurar Novo Treino</h2>

                            {db.simuladoPausado && db.simuladoPausado.deck && db.simuladoPausado.deck.length > 0 && (
                                <div className="mb-8 p-6 bg-amber-50 dark:bg-amber-900/20 rounded-3xl border border-amber-200 dark:border-amber-800">
                                    <h3 className="text-amber-800 dark:text-amber-400 font-black text-xl mb-2 flex items-center gap-2"><i className="fa-solid fa-pause"></i> Simulado Pausado</h3>
                                    <p className="text-amber-700 dark:text-amber-500 mb-4 font-bold text-sm">Você tem um simulado em andamento ({db.simuladoPausado.curIdx} de {db.simuladoPausado.deck.length} questões respondidas).</p>
                                    <div className="flex gap-4">
                                        <button onClick={() => {
                                            setSimulado(db.simuladoPausado);
                                            window.scrollTo(0, 0);
                                        }} className="bg-amber-500 text-white px-6 py-3 rounded-2xl font-black shadow-lg hover:bg-amber-600 transition-colors flex items-center gap-2">
                                            <i className="fa-solid fa-play"></i> Continuar Simulado
                                        </button>
                                        <button onClick={() => {
                                            if (window.confirm("Deseja descartar o simulado pausado?")) {
                                                setDb(p => ({ ...p, simuladoPausado: null }));
                                            }
                                        }} className="bg-transparent text-amber-600 dark:text-amber-400 border border-amber-300 dark:border-amber-700 px-6 py-3 rounded-2xl font-black hover:bg-amber-100 dark:hover:bg-amber-900/40 transition-colors">
                                            Descartar
                                        </button>
                                    </div>
                                </div>
                            )}

                            <div className="space-y-8 text-zinc-900 dark:text-zinc-100">
                                <div>
                                    <label className="text-xs font-black text-zinc-400 uppercase mb-3 block tracking-widest"><i className="fa-solid fa-tags mr-2"></i> 1. Selecionar Matérias</label>
                                    <div className="flex flex-wrap gap-2 max-h-48 overflow-y-auto p-4 bg-zinc-50 dark:bg-zinc-950 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner chat-scroll">
                                        <button onClick={() => setListFilters(p => ({ ...p, subj: [] }))} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${listFilters.subj.length === 0 ? 'bg-indigo-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 text-zinc-500 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>Todas as Matérias</button>
                                        {db.subjects.map(s => {
                                            const isSel = listFilters.subj.includes(s.id);
                                            return (
                                                <button key={s.id} onClick={() => setListFilters(p => ({ ...p, subj: isSel ? p.subj.filter(x => x !== s.id) : [...p.subj, s.id] }))} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${isSel ? 'bg-emerald-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 text-zinc-500 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>
                                                    {s.name}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs font-black text-zinc-400 uppercase mb-3 block tracking-widest"><i className="fa-solid fa-filter mr-2"></i> 2. Subfiltros de Origem e Status</label>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {/* Coluna 1: Status */}
                                        <div className="space-y-3">
                                            <span className="text-[9px] font-black uppercase text-zinc-400 tracking-widest">Estado das Questões</span>
                                            <div className="flex flex-wrap gap-1.5">
                                                {['ALL', 'ERROS', 'QUESTÕES NOVAS', 'IA'].map(t => (
                                                    <button key={t} onClick={() => setListFilters(p => ({ ...p, tag: t }))} className={`px-3 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ${listFilters.tag === t ? 'bg-amber-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 text-zinc-500 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>
                                                        {t === 'ALL' ? 'Todos' : t === 'QUESTÕES NOVAS' ? 'Novas' : t}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Coluna 2: Provas e Módulos */}
                                        <div className="space-y-3">
                                            <span className="text-[9px] font-black uppercase text-zinc-400 tracking-widest">Origem Específica</span>
                                            <div className="flex flex-col gap-2">
                                                <select
                                                    value={listFilters.exam}
                                                    onChange={e => setListFilters(p => ({ ...p, exam: e.target.value }))}
                                                    className="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl px-3 py-2 text-[9px] font-black uppercase tracking-widest text-zinc-500 outline-none focus:ring-2 focus:ring-indigo-500 w-full"
                                                >
                                                    <option value="ALL">Todas as Provas</option>
                                                    {db.exams.map(ex => <option key={ex.id} value={ex.id}>{ex.name}</option>)}
                                                </select>
                                                <select
                                                    value={listFilters.fac}
                                                    onChange={e => setListFilters(p => ({ ...p, fac: e.target.value }))}
                                                    className="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl px-3 py-2 text-[9px] font-black uppercase tracking-widest text-zinc-500 outline-none focus:ring-2 focus:ring-emerald-500 w-full"
                                                >
                                                    <option value="ALL">Todos os Módulos</option>
                                                    {db.fac.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs font-black text-zinc-400 uppercase mb-3 block tracking-widest"><i className="fa-solid fa-layer-group mr-2"></i> 3. Volume de Questões</label>
                                    <div className="flex gap-2 bg-zinc-50 dark:bg-zinc-950 p-2 rounded-2xl border border-zinc-200 dark:border-zinc-800 shadow-inner overflow-x-auto">
                                        {[5, 10, 20, 50, 100].map(n => (<button key={n} onClick={() => setSimQty(n)} className={`flex-1 py-3 px-4 rounded-xl font-black transition-all text-xs shrink-0 ${simQty === n ? 'bg-emerald-600 text-white shadow-md' : 'hover:bg-zinc-200 dark:hover:bg-zinc-800 text-zinc-500'}`}>{n} Qs</button>))}
                                        <button onClick={() => setSimQty(currentPool.length)} className={`flex-1 py-3 px-4 rounded-xl font-black transition-all text-xs shrink-0 ${simQty === currentPool.length ? 'bg-emerald-600 text-white shadow-md' : 'hover:bg-zinc-200 dark:hover:bg-zinc-800 text-zinc-500'}`}>Tudo</button>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <button onClick={() => setSimUseSpaced(!simUseSpaced)} className={`w-full p-6 rounded-3xl border-2 flex justify-between items-center group transition-all active:scale-[0.98] ${simUseSpaced ? 'bg-indigo-50 border-indigo-500 dark:bg-indigo-900/20 dark:border-indigo-600 shadow-lg shadow-indigo-500/10' : 'bg-zinc-50 border-zinc-200 dark:bg-zinc-950 dark:border-zinc-800'}`}>
                                        <div className="text-left">
                                            <span className={`font-black block text-lg mb-1 ${simUseSpaced ? 'text-indigo-800 dark:text-indigo-400' : 'text-zinc-600 dark:text-zinc-400'}`}>Revisão Espaçada IA</span>
                                            <span className="text-xs font-bold opacity-60">Prioriza erros e temas</span>
                                        </div>
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center shadow-sm transition-all ${simUseSpaced ? 'bg-indigo-600 text-white scale-110' : 'bg-zinc-300 dark:bg-zinc-700 text-transparent'}`}><i className="fa-solid fa-check"></i></div>
                                    </button>

                                    <button onClick={() => setSimCebraspeMode(!simCebraspeMode)} className={`w-full p-6 rounded-3xl border-2 flex justify-between items-center group transition-all active:scale-[0.98] ${simCebraspeMode ? 'bg-rose-50 border-rose-500 dark:bg-rose-900/20 dark:border-rose-600 shadow-lg shadow-rose-500/10' : 'bg-zinc-50 border-zinc-200 dark:bg-zinc-950 dark:border-zinc-800'}`}>
                                        <div className="text-left">
                                            <span className={`font-black block text-lg mb-1 ${simCebraspeMode ? 'text-rose-800 dark:text-rose-400' : 'text-zinc-600 dark:text-zinc-400'}`}>Modo CEBRASPE</span>
                                            <span className="text-xs font-bold opacity-60">Uma errada anula uma certa</span>
                                        </div>
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center shadow-sm transition-all ${simCebraspeMode ? 'bg-rose-600 text-white scale-110' : 'bg-zinc-300 dark:bg-zinc-700 text-transparent'}`}><i className="fa-solid fa-check"></i></div>
                                    </button>
                                </div>

                                <div className="flex gap-4">
                                    <button
                                        onClick={() => startSimulado()}
                                        disabled={currentPool.length === 0}
                                        className={`flex-1 font-black py-6 rounded-3xl shadow-xl transition-all text-xl flex flex-col items-center justify-center gap-1 active:scale-95 ${currentPool.length > 0 ? 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-emerald-600/20' : 'bg-zinc-200 dark:bg-zinc-800 text-zinc-400 cursor-not-allowed'}`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <i className="fa-solid fa-rocket"></i>
                                            <span>Iniciar Treino</span>
                                        </div>
                                        <span className="text-[10px] opacity-70 uppercase tracking-widest font-black">
                                            {currentPool.length} questões disponíveis no filtro
                                        </span>
                                    </button>

                                    <button
                                        onClick={() => printSimulado(false, false)}
                                        disabled={currentPool.length === 0}
                                        className={`w-24 font-black py-6 rounded-3xl shadow-xl transition-all flex flex-col items-center justify-center gap-2 active:scale-95 ${currentPool.length > 0 ? 'bg-zinc-800 hover:bg-zinc-900 text-white' : 'bg-zinc-200 dark:bg-zinc-800 text-zinc-400 cursor-not-allowed'}`}
                                        title="Imprimir simulado em PDF"
                                    >
                                        <i className="fa-solid fa-print text-2xl"></i>
                                        <span className="text-[10px] uppercase tracking-widest">PDF</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-zinc-900 p-8 md:p-10 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col">
                            <h2 className="text-2xl font-black mb-8 flex items-center gap-3 text-zinc-400"><i className="fa-solid fa-clock-rotate-left"></i> Sessões Anteriores</h2>
                            <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                                {db.simuladoHistory.map(h => (
                                    <div key={h.id} className="p-5 bg-zinc-50 dark:bg-zinc-950 rounded-3xl flex justify-between items-center border border-zinc-200 dark:border-zinc-800 animate-in slide-in-from-bottom-2 hover:border-emerald-500 transition-colors">
                                        <div>
                                            <span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest block mb-1"><i className="fa-regular fa-calendar mr-1"></i> {h.date}</span>
                                            <span className="font-bold dark:text-zinc-100 text-sm">{h.hits} de {h.total} Acertos <span className="opacity-50 font-normal ml-1">({h.context || 'Geral'})</span></span>
                                        </div>
                                        <span className={`px-4 py-2 rounded-xl text-sm font-black border ${h.hits / h.total >= 0.7 ? 'bg-emerald-100 text-emerald-700 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800' : 'bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-900/30 dark:border-amber-800'}`}>{Math.round(h.hits / h.total * 100)}%</span>
                                    </div>
                                ))}
                                {db.simuladoHistory.length === 0 && (
                                    <div className="h-full flex flex-col items-center justify-center opacity-40 text-center py-10">
                                        <i className="fa-solid fa-ghost text-6xl mb-4"></i>
                                        <p className="font-black italic">Nenhuma sessão registada.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderJogosTab = () => {
                if (gameState.view === 'edit') {
                    const g = gameState.data;
                    const updatePair = (pId, field, type, val) => {
                        setGameState(prev => ({ ...prev, data: { ...prev.data, pairs: prev.data.pairs.map(p => p.id === pId ? { ...p, [field]: { type, val } } : p) } }));
                    };
                    const addPair = () => setGameState(prev => ({ ...prev, data: { ...prev.data, pairs: [...prev.data.pairs, { id: Date.now() + Math.random(), a: { type: 'text', val: '' }, b: { type: 'text', val: '' } }] } }));
                    const removePair = (pId) => setGameState(prev => ({ ...prev, data: { ...prev.data, pairs: prev.data.pairs.filter(p => p.id !== pId) } }));

                    const handleImg = (e, pId, field) => {
                        const file = e.target.files[0]; if (!file) return;
                        const reader = new FileReader();
                        reader.onload = async (ev) => {
                            const b64 = await compressImage(ev.target.result);
                            updatePair(pId, field, 'image', b64);
                        };
                        reader.readAsDataURL(file); e.target.value = '';
                    };

                    const saveGame = () => {
                        if (!g.title.trim()) return showAlert('Dê um título ao jogo!');
