                                    }
                                }
                                if (!pasted) {
                                    updatedPairs.push({ id: Date.now() + Math.random(), a: { type: 'image', val: b64 }, b: { type: 'text', val: '' } });
                                }
                                return { ...prev, data: { ...g, pairs: updatedPairs } };
                            });
                        } else if (activeTab === 'jogos' && gameState.view === 'list') {
                            showConfirm("Deseja gerar um jogo da memória automaticamente a partir desta imagem usando IA?", () => processGameAI(b64));
                        } else if (activeTab === 'flashcards') {
                            generateFlashcardsFromMaterial(b64, 'image/jpeg');
                        } else if (activeTab === 'elaborador') {
                            setElaboradorState(p => ({ ...p, fileData: b64, mimeType: 'image/jpeg', fileName: 'Imagem_Colada_' + new Date().toLocaleTimeString() + '.jpg' }));
                            showAlert("📸 Imagem capturada para o Elaborador!");
                        } else {
                            if (!showForm || !editingId) processOCR(b64);
                            else setFormData(p => ({ ...p, image: b64 }));
                        }
                    };
                    reader.readAsDataURL(item.getAsFile());
                };
                document.addEventListener('paste', handlePaste);
                return () => document.removeEventListener('paste', handlePaste);
            }, [showForm, editingId, isAiLoading, activeTab, gameState]);

            // ==========================================
            // LÓGICA DE SIMULADOS E FILTROS
            // ==========================================
            const currentPool = useMemo(() => {
                // Combine errors and AI-generated lists
                let basePool = [...db.errors];
                const errorTitles = new Set(db.errors.map(e => e.title + e.question));

                if (db.processedQuestionLists) {
                    db.processedQuestionLists.forEach(list => {
                        (list.questions || []).forEach((q, i) => {
                            // Only add if not already in errors by title+question fingerprint
                            const fingerprint = q.title + q.question;
                            if (!errorTitles.has(fingerprint)) {
                                basePool.push({
                                    ...q,
                                    id: `ai_${q.id}`,
                                    tags: [...(q.tags || []), 'Gerada por IA', 'Lista: ' + list.name],
                                    isAI: true,
                                    listId: list.id
                                });
                            }
                        });
                    });
                }

                let p = basePool;

                // --- FILTROS DE PROVA/EXAME ---
                if (listFilters.exam !== 'ALL') {
                    const exam = db.exams.find(ex => ex.id === listFilters.exam);
                    const searchTerms = [listFilters.exam.toLowerCase()];
                    if (exam) searchTerms.push(exam.name.toLowerCase());
                    p = p.filter(e =>
                        (e.examId && searchTerms.some(term => e.examId.toLowerCase().includes(term))) ||
                        (e.tags && e.tags.some(t => searchTerms.some(term => t.toLowerCase().includes(term))))
                    );
                } else if (activeTab === 'provas') {
                    const examNames = db.exams.map(ex => ex.name.toLowerCase());
                    p = p.filter(e => e.examId || (e.tags && e.tags.some(t => {
                        const lowT = t.toLowerCase();
                        return lowT.includes('prova') || lowT.includes('concurso') || examNames.some(name => lowT.includes(name));
                    })));
                }

                // --- FILTROS DE FACULDADE/MÓDULO ---
                if (listFilters.fac !== 'ALL') {
                    const fac = db.fac.find(f => f.id === listFilters.fac);
                    const searchTerms = [listFilters.fac.toLowerCase()];
                    if (fac) searchTerms.push(fac.name.toLowerCase());
                    p = p.filter(e =>
                        (e.facId && searchTerms.some(term => e.facId.toLowerCase().includes(term))) ||
                        (e.tags && e.tags.some(t => searchTerms.some(term => t.toLowerCase().includes(term)))) ||
                        (e.subject && searchTerms.some(term => e.subject.toLowerCase().includes(term))) ||
                        (e.title && searchTerms.some(term => e.title.toLowerCase().includes(term)))
                    );
                } else if (activeTab === 'faculdade') {
                    p = p.filter(e => e.facId || (e.tags && e.tags.some(t => t.toLowerCase().includes('faculdade') || t.toLowerCase().includes('módulo'))));
                }
                if (listFilters.subj.length > 0) {
                    const selectedSubjects = db.subjects.filter(s => listFilters.subj.includes(s.id));
                    const allTerms = [];
                    selectedSubjects.forEach(s => {
                        allTerms.push(s.id.toLowerCase());
                        allTerms.push(s.name.toLowerCase());
                        if (s.searchTerms) s.searchTerms.forEach(t => allTerms.push(t.toLowerCase()));
                    });
                    const uniqueTerms = [...new Set(allTerms)];

                    p = p.filter(e => {
                        const subjMatch = e.subject && uniqueTerms.some(term => e.subject.toLowerCase().includes(term) || term.includes(e.subject.toLowerCase()));
                        const tagMatch = e.tags && e.tags.some(t => uniqueTerms.some(term => t.toLowerCase().includes(term) || term.includes(t.toLowerCase())));
                        const titleMatch = e.title && uniqueTerms.some(term => e.title.toLowerCase().includes(term));
                        return subjMatch || tagMatch || titleMatch;
                    });
                }

                if (listFilters.tag !== 'ALL') {
                    if (listFilters.tag === 'ERROS') {
                        p = p.filter(e => (e.history?.wrong || 0) > 0);
                    } else if (listFilters.tag === 'QUESTÕES NOVAS') {
                        p = p.filter(e => (e.history?.correct || 0) === 0 && (e.history?.wrong || 0) === 0);
                    } else if (listFilters.tag === 'IA') {
                        p = p.filter(e => e.isAI || (e.tags && e.tags.includes('Gerada por IA')));
                    } else {
                        p = p.filter(e => e.tags && e.tags.includes(listFilters.tag));
                    }
                }

                if (searchTerm.trim()) {
                    const lowerTerm = searchTerm.toLowerCase();
                    p = p.filter(e =>
                        (e.title && e.title.toLowerCase().includes(lowerTerm)) ||
                        (e.question && e.question.toLowerCase().includes(lowerTerm))
                    );
                }

                return p.sort((a, b) => {
                    const idA = String(a.id).startsWith('ai_') ? 0 : Number(a.id);
                    const idB = String(b.id).startsWith('ai_') ? 0 : Number(b.id);
                    return idB - idA;
                });
            }, [db.errors, db.processedQuestionLists, activeTab, listFilters, searchTerm]);

            const filteredSummaries = useMemo(() => {
                let s = db.summaries || [];
                if (summarySearch.trim()) {
                    const term = summarySearch.toLowerCase();
                    s = s.filter(x => (x.title && x.title.toLowerCase().includes(term)));
                }
                return s;
            }, [db.summaries, summarySearch]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (summaryLightbox) {
                        const idx = filteredSummaries.findIndex(x => x.id === summaryLightbox);
                        if (idx !== -1) {
                            if (e.key === 'ArrowLeft') setSummaryLightbox(filteredSummaries[(idx - 1 + filteredSummaries.length) % filteredSummaries.length].id);
                            if (e.key === 'ArrowRight') setSummaryLightbox(filteredSummaries[(idx + 1) % filteredSummaries.length].id);
                            if (e.key === 'Escape') setSummaryLightbox(null);
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [summaryLightbox, filteredSummaries]);

            const clearDeck = () => setSimulado({ isActive: false, deck: [], curIdx: 0, showAns: false, selAlt: null, showResults: false, isReviewing: false, timeElapsed: 0, results: [], aiExplanation: '', isAiExplaining: false, isGeneratingFlashcards: false, crossedAlts: [], highlightedText: '' });

            const generateDeck = (isQuick = false, forceSpaced = false) => {
                let pool = isQuick ? db.errors : currentPool;
                if (pool.length === 0) return [];

                if (simUseSpaced || forceSpaced) {
                    pool = [...pool].map(q => {
                        const h = q.history || { correct: 0, wrong: 0 };
                        const total = h.correct + h.wrong;
                        let timestamp = Date.now();
                        if (q.id && !isNaN(Number(q.id)) && Number(q.id) > 100000000000) timestamp = Number(q.id);
                        else if (q.date) {
                            if (q.date.includes('/')) {
                                const p = q.date.split('/');
                                timestamp = new Date(p[2], p[1] - 1, p[0]).getTime();
                            } else timestamp = new Date(q.date).getTime();
                        }
                        if (isNaN(timestamp)) timestamp = Date.now();
                        const ageInDays = Math.max(0, (Date.now() - timestamp) / (1000 * 60 * 60 * 24));
                        let score = 0;
                        if (total === 0) score = 15000 + (ageInDays * 50) + (Math.random() * 3000);
                        else {
                            const errRatio = h.wrong / total;
                            if (errRatio > 0) score = (errRatio * 10000) + (h.wrong * 100) + (ageInDays * 50) + (Math.random() * 2000);
                            else score = (ageInDays * 10) + (Math.random() * 500);
                        }
                        return { ...q, _score: score };
                    }).sort((a, b) => b._score - a._score);
                } else pool = [...pool].sort(() => 0.5 - Math.random());

                let deck = pool.slice(0, isQuick ? 5 : simQty);
                if (simUseSpaced || forceSpaced) {
                    for (let i = deck.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [deck[i], deck[j]] = [deck[j], deck[i]];
                    }
                }
                return deck;
            };

            const startSimulado = (isQuick = false, forceSpaced = false) => {
                const deck = generateDeck(isQuick, forceSpaced);
                if (deck.length === 0) return showAlert("Não existem questões suficientes para este filtro.");
                setSimulado({ isActive: true, deck, curIdx: 0, showAns: false, selAlt: null, showResults: false, isReviewing: false, timeElapsed: 0, results: [], aiExplanation: '', isAiExplaining: false, isGeneratingFlashcards: false, crossedAlts: [], highlightedText: '', cebraspeMode: simCebraspeMode });
                window.scrollTo(0, 0);
            };

            const printSimulado = (isQuick = false, forceSpaced = false) => {
                if (db.simuladoPausado) {
                    if (!window.confirm("Você já tem um simulado pausado. Gerar um novo PDF irá substituir o simulado pausado atual. Deseja continuar?")) return;
                }
                const deck = generateDeck(isQuick, forceSpaced);
                if (deck.length === 0) return showAlert("Não existem questões suficientes para este filtro.");

                // Save the simulado as paused so the user can input answers later
                setDb(p => ({
                    ...p,
                    simuladoPausado: { isActive: true, deck, curIdx: 0, showAns: false, selAlt: null, showResults: false, isReviewing: false, timeElapsed: 0, results: [], aiExplanation: '', isAiExplaining: false, isGeneratingFlashcards: false, crossedAlts: [], highlightedText: '', cebraspeMode: simCebraspeMode }
                }));

                const printWindow = window.open('', '_blank');
                if (!printWindow) return showAlert("O bloqueador de pop-ups impediu a impressão. Permita pop-ups para este site.");
                let html = `<html><head><title>Simulado - Caderno IA PRO</title>
                    <style>
                        body { font-family: 'Arial', sans-serif; padding: 20px; line-height: 1.5; color: #000; font-size: 12px; }
                        h1 { text-align: center; color: #000; border-bottom: 2px solid #000; padding-bottom: 10px; font-size: 18px; text-transform: uppercase; }
                        .header-info { text-align: center; margin-bottom: 20px; font-weight: bold; }
                        .columns { column-count: 2; column-gap: 40px; }
                        .question { margin-bottom: 25px; page-break-inside: avoid; break-inside: avoid; }
                        .title { font-weight: bold; font-size: 1.1em; margin-bottom: 8px; }
                        .text { margin-bottom: 10px; text-align: justify; }
                        .alternatives { list-style-type: none; padding-left: 0; margin-top: 5px; }
                        .alternatives li { margin-bottom: 6px; }
                        .gabarito-section { page-break-before: always; column-span: all; margin-top: 50px; }
                        .gabarito-title { text-align: center; font-size: 16px; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
                        .gabarito-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
                        .gabarito-item { width: 60px; padding: 5px; text-align: center; border: 1px solid #ccc; font-weight: bold; }
                        .footer { margin-top: 30px; text-align: center; font-size: 10px; color: #777; border-top: 1px solid #ddd; padding-top: 10px; column-span: all; }
                        @media print { 
                            body { padding: 0; }
                            @page { margin: 1.5cm; }
                        }
                    </style>
                </head><body>
                <h1>Simulado - Caderno de Erros Médicos IA PRO</h1>
                <div class="header-info">Total de questões: ${deck.length} | Data: ${new Date().toLocaleDateString('pt-PT')}</div>
                <div class="columns">
                `;
                deck.forEach((q, idx) => {
                    html += `<div class="question">
                        <div class="title">${idx + 1}. ${q.title || 'Sem título'}</div>
                        <div class="text">${(q.question || '').replace(/\\n/g, '<br>')}</div>
                        <ul class="alternatives">`;
                    (q.alternatives || []).forEach((alt, i) => {
                        if (alt) html += `<li><strong>${String.fromCharCode(65 + i)})</strong> ${alt}</li>`;
                    });
                    html += `</ul></div>`;
                });

                html += `</div>`; // fecha columns

                // Gabarito
                html += `<div class="gabarito-section">
                    <div class="gabarito-title">GABARITO OFICIAL</div>
                    <div class="gabarito-grid">`;
                deck.forEach((q, idx) => {
                    html += `<div class="gabarito-item">${idx + 1} - ${q.correctAlternative || '?'}</div>`;
                });
                html += `</div></div>`;

                html += `<div class="footer">Gerado por Caderno de Erros Médicos IA PRO</div></body></html>`;

                printWindow.document.write(html);
                printWindow.document.close();
                printWindow.focus();

                showAlert("Simulado em PDF salvo na aba de Pausados! Preencha as respostas lá quando terminar.");
                setTimeout(() => { printWindow.print(); }, 500);
            };

            const pauseSimulado = () => {
                setDb(p => ({ ...p, simuladoPausado: simulado }));
                clearDeck();
                showAlert("Simulado pausado com sucesso. Você pode continuá-lo mais tarde na aba de Simulados.");
            };

            const recordAnswer = (id, isCorrect, userAns) => {
                const prevRes = simulado.results.find(r => String(r.id) === String(id));
                
                setDb(p => {
                    const stats = { ...p.dailyStats };
                    const todayStr = new Date().toLocaleDateString('pt-PT');
                    if (!prevRes) {
                        stats[todayStr] = { ...stats[todayStr], answered: (stats[todayStr]?.answered || 0) + 1 };
                    }
                    const existingError = p.errors.find(e => String(e.id) === String(id));
                    let newErrors = [...p.errors];

                    if (existingError) {
                        newErrors = newErrors.map(e => {
                            if (String(e.id) !== String(id)) return e;
                            let h = { ...(e.history || { correct: 0, wrong: 0 }) };
                            if (prevRes) {
                                if (prevRes.isCorrect) h.correct = Math.max(0, h.correct - 1);
                                else h.wrong = Math.max(0, h.wrong - 1);
                            }
                            if (isCorrect) h.correct += 1;
                            else h.wrong += 1;
                            return { ...e, history: h };
                        });
                    } else {
                        // Promoting AI question to main bank
                        const aiQuestion = simulado.deck.find(q => String(q.id) === String(id));
                        if (aiQuestion) {
                            const promoted = {
                                ...aiQuestion,
                                id: Date.now() + Math.floor(Math.random() * 1000),
                                history: { correct: isCorrect ? 1 : 0, wrong: isCorrect ? 0 : 1 },
                                isAI: false // No longer just a list item, now a formal error entry
                            };
                            newErrors = [promoted, ...newErrors];
                        }
                    }

                    return {
                        ...p,
                        dailyStats: stats,
                        errors: newErrors
                    };
                });
                setSimulado(p => {
                    const newStreak = isCorrect ? (p.streak || 0) + 1 : 0;
                    let killAnim = null;
                    if (isCorrect && newStreak > 0) {
                        killAnim = KILL_STREAKS[Math.min(newStreak - 1, KILL_STREAKS.length - 1)];
                    }
                    
                    const existingResIdx = p.results.findIndex(r => String(r.id) === String(id));
                    let newResults = [...p.results];
                    if (existingResIdx !== -1) {
                        newResults[existingResIdx] = { ...newResults[existingResIdx], isCorrect, userAns };
                    } else {
                        newResults.push({ id, isCorrect, userAns, timeSpent: p.timeElapsed });
                    }

                    return {
                        ...p,
                        streak: newStreak,
                        killAnim: (isCorrect && newStreak > 0 && simulado.isReviewing) ? killAnim : p.killAnim,
                        results: newResults
                    };
                });

                if (isCorrect) {
                    setTimeout(() => setSimulado(curr => ({ ...curr, killAnim: null })), 2500);
                }
            };

            const finishSimulado = () => {
                const hits = simulado.results.filter(r => r.isCorrect).length;
                const skipped = simulado.results.filter(r => r.userAns === 'Pulo').length;
                const tot = simulado.deck.length;
                const session = { id: Date.now(), date: new Date().toLocaleDateString('pt-PT'), hits, skipped, total: tot, context: activeTab };
                setDb(p => ({ ...p, simuladoHistory: [session, ...p.simuladoHistory], simuladoPausado: null }));
                setSimulado(p => ({ ...p, showResults: true }));
            };

            const syncFlashcardsToAnki = async (flashcards) => {
                if (!flashcards || flashcards.length === 0) return { success: false, error: 'Nenhum flashcard' };
                const invokeAnki = async (action, params = {}) => {
                    let response;
                    try {
                        response = await fetch('http://127.0.0.1:8765', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action, version: 6, params })
                        });
                    } catch (e) {
                        throw new Error("Conexão recusada pelo Anki (Verifique se o Anki está aberto e com CORS configurado para *).");
                    }
                    const json = await response.json();
                    if (json.error) throw new Error(json.error);
                    return json.result;
                };

                try {
                    const uniqueDecks = [...new Set(flashcards.map(f => f.deckName))];
                    for (const deck of uniqueDecks) {
                        await invokeAnki('createDeck', { deck });
                    }

                    const models = await invokeAnki('modelNames');
                    let targetModel = null;
                    let frontField = null;
                    let backField = null;

                    const validModels = models.filter(m => !m.toLowerCase().includes('cloze') && !m.toLowerCase().includes('omissão') && !m.toLowerCase().includes('omissao'));
                    const basicModels = validModels.filter(m => m.toLowerCase().includes('basic') || m.toLowerCase().includes('básico') || m.toLowerCase().includes('padrão'));
                    const modelsToTry = basicModels.length > 0 ? basicModels : validModels;

                    for (const model of modelsToTry) {
                        try {
                            const fields = await invokeAnki('modelFieldNames', { modelName: model });
                            if (fields && fields.length >= 2) {
                                targetModel = model;
                                frontField = fields[0];
                                backField = fields[1];
                                break;
                            }
                        } catch (e) { continue; }
                    }

                    if (!targetModel) {
                        throw new Error("Nenhum modelo de nota válido com 2 campos encontrado no seu Anki.");
                    }

                    const notesPayload = flashcards.map(f => {
                        const fields = {};
                        fields[frontField] = f.front;
                        fields[backField] = f.back;
                        return {
                            deckName: f.deckName || "CadernoMed::Banco Geral",
                            modelName: targetModel,
                            fields: fields,
                            options: { allowDuplicate: true },
                            tags: ["CadernoMedIA"]
                        };
                    });

                    const result = await invokeAnki('addNotes', { notes: notesPayload });

                    if (Array.isArray(result)) {
                        const addedCount = result.filter(id => id !== null).length;
                        if (addedCount === 0 && flashcards.length > 0) {
                            throw new Error("O Anki recusou as notas. O modelo " + targetModel + " pode estar exigindo campos extras que não preenchemos.");
                        } else if (addedCount < flashcards.length) {
                            console.warn("Alguns flashcards foram ignorados pelo Anki.");
                        }
                    }

                    return { success: true };
                } catch (error) {
                    console.error("Erro no AnkiConnect:", error);
                    return { success: false, error: error.message };
                }
            };

            const handleGenerateFlashcards = async () => {
                const wrongResults = simulado.results.filter(r => !r.isCorrect);
                if (wrongResults.length === 0) return showAlert("Parabéns! Não teve erros neste simulado para gerar flashcards.");

                setSimulado(p => ({ ...p, isGeneratingFlashcards: true }));

                let newFlashcards = [];
                for (const r of wrongResults) {
                    const q = simulado.deck.find(d => d.id === r.id);
                    if (!q) continue;

                    let cardDeckName = "CadernoMed::Banco Geral";
                    if (q.facId || (q.tags && q.tags.includes("Módulos da faculdade"))) {
                        cardDeckName = `CadernoMed::Faculdade${q.facId ? '::' + q.facId : ''}`;
                    } else if (q.examId || (q.tags && q.tags.includes("Provas/Concursos"))) {
                        cardDeckName = `CadernoMed::Residência${q.examId ? '::' + q.examId : ''}`;
                    }

                    const prompt = `Atue como um especialista em memorização médica. Crie UM flashcard direto e curto (Frente e Verso) focado EXATAMENTE no erro desta questão.\nTema: ${q.title}\nQuestão: ${q.question}\nLição que o aluno deve fixar: ${q.lessonLearned}\n\nResponda APENAS em formato JSON estrito:\n{"front": "Pergunta curta e direta?", "back": "Resposta/Conceito chave explicativo."}`;

                    const aiRes = await callIA([{ role: 'user', parts: [{ text: prompt }] }]);
                    if (aiRes) {
                        try {
                            const clean = aiRes.replace(/```json/gi, '').replace(/```/g, '').trim();
                            const parsed = JSON.parse(clean);
                            if (parsed.front && parsed.back) {
                                newFlashcards.push({
                                    id: Date.now() + Math.random(),
                                    front: parsed.front,
                                    back: parsed.back,
                                    qId: q.id,
                                    date: new Date().toLocaleDateString('pt-PT'),
                                    deckName: cardDeckName
                                });
                            }
                        } catch (e) { console.error("Erro no parse do flashcard", e); }
                    }
                }

                if (newFlashcards.length > 0) {
                    setDb(p => ({ ...p, flashcards: [...newFlashcards, ...(p.flashcards || [])] }));

                    let ankiMsg = "";
                    try {
                        const ankiResult = await syncFlashcardsToAnki(newFlashcards);
                        if (ankiResult.success) {
                            ankiMsg = " e importados para o ANKI organizados por categoria!";
                        } else {
                            ankiMsg = ` (Erro Anki: ${ankiResult.error}).`;
                        }
                    } catch (e) {
                        ankiMsg = " (Erro inesperado Anki).";
                    }

                    showAlert(`✅ ${newFlashcards.length} Flashcard(s) gerados${ankiMsg}`);
                } else {
                    showAlert("❌ Falha ao gerar flashcards com a IA. Tente novamente.");
                }
                setSimulado(p => ({ ...p, isGeneratingFlashcards: false }));
            };

            const handleExplainSimuladoQuestion = async (type = 'explain') => {
                setSimulado(p => ({ ...p, isAiExplaining: true, aiExplanation: '' }));
                const q = simulado.deck[simulado.curIdx];
                const userAns = simulado.isReviewing ? (simulado.results.find(r => r.id === q.id)?.userAns || simulado.selAlt) : simulado.selAlt;

                let correctText = '';
                let userText = '';

                if (q.type === 'discursiva') {
                    correctText = q.alternatives[0] || '';
                    userText = userAns || 'Sem resposta';
                } else {
                    const correctIdx = (q.correctAlternative || 'A').charCodeAt(0) - 65;
                    correctText = q.alternatives[correctIdx] || '';
                    userText = (userAns && userAns !== 'Pulo') ? q.alternatives[userAns.charCodeAt(0) - 65] : 'Não soube responder (Pulo)';
                }

                let prompt = '';
                if (type === 'explain') prompt = `${getPersonaInstruction(aiConfig.persona, 'explain')}\n\nTema: ${q.title}\nQuestão: ${q.question}\n\nAlternativa/Espelho Correto: ${correctText}\nResposta do aluno: ${userAns} (${userText})`;
                else if (type === 'mnemonic') prompt = `Atue como Professor de Medicina. Crie uma mnemónica EXTREMAMENTE FÁCIL E CRIATIVA para o aluno memorizar o conceito por trás desta questão.\nTema: ${q.title}\nConceito correto: ${correctText}\n\nA mnemónica deve ser curta, impactante e fácil de lembrar na hora da prova. Formate com destaque nas letras.`;
                else if (type === 'summary') prompt = `Atue como Professor de Medicina. Crie um resumo "Flash" (máximo 3 a 4 tópicos curtos e diretos) sobre o tema central desta questão médica para revisão ultra rápida.\nTema: ${q.title}\nQuestão: ${q.question}\nResposta Correta: ${correctText}`;
                else if (type === 'pitfalls') prompt = `${getPersonaInstruction(aiConfig.persona, 'pitfalls')}\nTema: ${q.title}\nQuestão: ${q.question}\nAlternativas:\n${q.alternatives.join('\n')}\nResposta Correta: ${q.correctAlternative}`;
                else if (type === 'correction') prompt = `Atue como um Professor de Medicina examinador criterioso. 
Analise a resposta do aluno para a questão discursiva abaixo, comparando-a com o espelho de resposta oficial.
Determine se o aluno acertou ou errou (veredito binário).
Explique o que faltou ou o que estava correto.

QUESTÃO: ${q.question}
ESPELHO OFICIAL: ${correctText}
RESPOSTA DO ALUNO: ${userText}

Retorne sua resposta começando obrigatoriamente com "[VEREDITO: CORRETO]" ou "[VEREDITO: INCORRETO]" seguido da sua explicação pedagógica.`;

                const r = await callIA([{ role: 'user', parts: [{ text: prompt }] }]);

                if (type === 'correction' && r) {
                    const isCorrect = r.toUpperCase().includes('[VEREDITO: CORRETO]');
                    recordAnswer(q.id, isCorrect, userAns);
                    setSimulado(p => ({ ...p, showAns: true }));
                }

                setSimulado(p => ({ ...p, isAiExplaining: false, aiExplanation: r || 'Falha ao gerar explicação com IA. Tente novamente.' }));
            };

            const analyzePerformance = async () => {
                const results = simulado.results;
                if (!results || results.length === 0) return;

                const report = results.map((r, i) => {
                    const q = simulado.deck.find(d => String(d.id) === String(r.id));
                    return `Q${i + 1}: ${q?.title || 'Questão'} | Resultado: ${r.isCorrect ? 'ACERTO' : 'ERRO'} | Tempo: ${formatTime(r.timeSpent)} | Resposta: ${r.userAns}`;
                }).join('\n');

                const prompt = `${getPersonaInstruction(aiConfig.persona, 'batepapo')}\n\nAnalise o meu desempenho neste simulado questão a questão, considerando a relação entre o ACERTO/ERRO e o TEMPO GASTO.\n\nRelatório de Sessão:\n${report}\n\nIdentifique padrões: Onde fui rápido e errei? Onde fui lento e acertei? Onde fui lento e errei? O que isso diz sobre a minha confiança e domínio técnico desses temas? Dê dicas práticas de estudo para os pontos onde fui mais lento ou errei.`;

                setSimulado(p => ({ ...p, isAiChatting: true, aiChatMessages: [{ role: 'user', text: prompt }], isAiExplaining: true, aiExplanation: '' }));
                setTimeout(() => document.getElementById('ai-feedback-chat')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

                const r = await callIA([{ role: 'user', parts: [{ text: prompt }] }]);

                setSimulado(p => ({ ...p, isAiExplaining: false, aiChatMessages: [...p.aiChatMessages, { role: 'model', text: r || "Falha ao analisar desempenho. Tente novamente." }] }));
            };

            const generateFlashcardsFromMaterial = async (fileData, mimeType) => {
                if (!fileData) return;
                setIsAiLoading(true);
                setSyncStatus('syncing');

                const prompt = `Atue como um especialista em pedagogia médica e memorização espaçada.
Analise o material de estudo fornecido (Imagem ou PDF) e extraia os conceitos MAIS IMPORTANTES para criar flashcards de alta qualidade.
Crie EXATAMENTE ${flashcardGenSettings.qty} flashcards que sigam as melhores práticas: perguntas curtas, respostas diretas, um único conceito por cartão.
Foco Específico (Opcional): ${flashcardGenSettings.focus || 'Extrair o conteúdo mais relevante do material fornecido para memorização clínica'}.

IMPORTANTE: Retorne APENAS um array JSON válido, sem nenhum texto extra e sem formatação markdown.
Estratégia de Baralho: Identifique o tema principal e use-o para o deckName (Ex: CadernoMed::Tema).

Estrutura esperada:
[
  {
    "front": "Pergunta clara e direta?",
    "back": "Resposta concisa.",
    "deckName": "CadernoMed::NomeDoTema"
  }
]`;

                try {
                    const visionModel = (!aiConfig.key || aiConfig.model.includes('gemma')) ? 'gemini-1.5-flash' : null;
                    const res = await callIA([{ 
                        role: 'user', 
                        parts: [
                            { inlineData: { data: fileData.split(',')[1], mimeType: mimeType } }, 
                            { text: prompt }
                        ] 
                    }], visionModel);

                    if (res && !res.startsWith('[ERRO')) {
                        const match = res.match(/\[[\s\S]*\]/);
                        if (!match) throw new Error("JSON não encontrado na resposta");
                        let generated = JSON.parse(match[0]);
                        
                        const newCards = generated.map((c, i) => ({
                            id: Date.now() + i,
                            front: c.front,
                            back: c.back,
                            deckName: c.deckName || 'CadernoMed::Banco Geral',
                            date: new Date().toLocaleDateString('pt-PT')
                        }));

                        setDb(p => ({ ...p, flashcards: [...newCards, ...(p.flashcards || [])] }));
                        
                        showAlert(`✅ ${newCards.length} flashcards gerados com sucesso! Iniciando sincronização com Anki...`);
                        
                        // Envio automático ao Anki
                        const ankiRes = await syncFlashcardsToAnki(newCards);
                        if (ankiRes.success) {
                            showAlert(`✅ ${newCards.length} flashcards gerados e exportados para o Anki com sucesso!`);
                        } else {
                            showAlert(`⚠️ Flashcards salvos localmente, mas houve um erro no Anki: ${ankiRes.error}`);
                        }
                    } else {
                        throw new Error(res);
                    }
                } catch (err) {
                    console.error(err);
                    showAlert("❌ Erro na geração de flashcards: " + err.message);
                } finally {
                    setIsAiLoading(false);
                    setSyncStatus('synced');
                }
            };

            const triggerFeedbackChat = async (hits, tot, perc) => {
                const prompt = `Acabei de terminar um simulado focado. Tive ${hits} acertos em ${tot} questões (${perc}%). Podes fazer uma análise breve do meu desempenho e dar-me dicas de estudo ativo?`;
                setSimulado(p => ({ ...p, isAiChatting: true, aiChatMessages: [{ role: 'user', text: prompt }], isAiExplaining: true, aiExplanation: '' }));
                setTimeout(() => document.getElementById('ai-feedback-chat')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

                const r = await callIA([{ role: 'user', parts: [{ text: prompt }] }]);
                setSimulado(p => ({ ...p, isAiExplaining: false, aiChatMessages: [...p.aiChatMessages, { role: 'model', text: r || "Falha ao gerar feedback. Tente novamente." }] }));
            };

            // ==========================================
            // CRUD FORMULÁRIO E IMAGENS
            // ==========================================
            const handleFormSubmit = (e) => {
                e.preventDefault();
                const newObj = { ...formData, id: editingId || Date.now(), date: new Date().toLocaleDateString('pt-PT') };
                setDb(prev => {
                    let updatedExams = [...prev.exams];
                    if (newObj.examId && !updatedExams.some(ex => ex.id === newObj.examId)) {
                        updatedExams.push({ id: newObj.examId, name: newObj.examId });
                    }

                    let updatedFacs = [...prev.fac];
                    if (newObj.facId && !updatedFacs.some(f => f.id === newObj.facId)) {
                        updatedFacs.push({ id: newObj.facId, name: newObj.facId });
                    }

                    return {
                        ...prev,
                        exams: updatedExams,
                        fac: updatedFacs,
                        errors: editingId ? prev.errors.map(x => x.id === editingId ? newObj : x) : [newObj, ...prev.errors]
                    };
                });
                setShowForm(false); setEditingId(null); setFormData(emptyForm);
                window.scrollTo(0, 0);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleAlternativeChange = (idx, val) => {
                const n = [...formData.alternatives]; n[idx] = val;
                setFormData(prev => ({ ...prev, alternatives: n }));
            };

            const handleAltExplanationChange = (idx, val) => {
                const n = [...formData.alternativeExplanations]; n[idx] = val;
                setFormData(prev => ({ ...prev, alternativeExplanations: n }));
            };

            const handleImageUpload = (e, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const b64 = await compressImage(event.target.result);
                    setImageToEdit(b64); setImageEditTarget(target);
                };
                reader.readAsDataURL(file); e.target.value = '';
            };

            // ==========================================
            // RENDERIZAÇÃO DE COMPONENTES DE VISTA
            // ==========================================
            const [chartTab, setChartTab] = useState('activity'); // 'activity' ou 'performance'

            const renderDailyChart = () => {
                // Gerar datas dos últimos 7 dias
                const last7Days = Array.from({ length: 7 }).map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - (6 - i));
                    return {
                        full: d.toLocaleDateString('pt-PT'),
                        short: d.toLocaleDateString('pt-PT').substring(0, 5)
                    };
                });

                // Coletar dados
                const data = last7Days.map(day => {
                    // Questões adicionadas (erros)
                    const errorsCount = db.errors.filter(e => e.date === day.full).length;
                    
                    // Simulados e Aproveitamento
                    const daySims = db.simuladoHistory.filter(s => s.date === day.full);
                    const totalHits = daySims.reduce((acc, s) => acc + (s.hits || 0), 0);
                    const totalQs = daySims.reduce((acc, s) => acc + (s.total || 0), 0);
                    const avgAccuracy = totalQs > 0 ? Math.round((totalHits / totalQs) * 100) : 0;

                    return {
                        date: day.short,
                        fullDate: day.full,
                        activity: errorsCount,
                        performance: avgAccuracy,
                        sims: daySims.length
                    };
                });

                const maxActivity = Math.max(...data.map(d => d.activity), 1);
                
                return (
                    <div className="space-y-6">
                        {/* Toggles e Métricas Rápidas */}
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div className="flex bg-zinc-100 dark:bg-zinc-800 p-1 rounded-xl border border-zinc-200 dark:border-zinc-700">
                                <button 
                                    onClick={() => setChartTab('activity')}
                                    className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all ${chartTab === 'activity' ? 'bg-white dark:bg-zinc-700 text-emerald-600 shadow-sm' : 'text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300'}`}
                                >
                                    Frequência
                                </button>
                                <button 
                                    onClick={() => setChartTab('performance')}
                                    className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all ${chartTab === 'performance' ? 'bg-white dark:bg-zinc-700 text-indigo-600 shadow-sm' : 'text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300'}`}
                                >
                                    Aproveitamento
                                </button>
                            </div>

                            <div className="flex items-center gap-6">
                                <div className="text-right">
                                    <span className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest">Total Semana</span>
                                    <span className="text-lg font-black text-zinc-800 dark:text-zinc-100">{data.reduce((acc, d) => acc + d.activity, 0)} <small className="text-[10px] opacity-50">Qs</small></span>
                                </div>
                                <div className="text-right border-l border-zinc-200 dark:border-zinc-800 pl-6">
                                    <span className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest">Média Acerto</span>
                                    <span className="text-lg font-black text-indigo-500">{Math.round(data.filter(d => d.sims > 0).reduce((acc, d) => acc + d.performance, 0) / (data.filter(d => d.sims > 0).length || 1))}%</span>
                                </div>
                            </div>
                        </div>

                        {/* Área do Gráfico */}
                        <div className="relative h-48 flex items-end justify-between gap-2 sm:gap-4 px-2">
                            {/* Linhas de Grade */}
                            <div className="absolute inset-0 flex flex-col justify-between pointer-events-none opacity-5">
                                <div className="w-full border-t border-zinc-900 dark:border-white"></div>
                                <div className="w-full border-t border-zinc-900 dark:border-white"></div>
                                <div className="w-full border-t border-zinc-900 dark:border-white"></div>
                            </div>

                            {data.map((d, i) => {
                                const val = chartTab === 'activity' ? d.activity : d.performance;
                                const maxVal = chartTab === 'activity' ? maxActivity : 100;
                                const height = (val / maxVal) * 100;
                                const colorClass = chartTab === 'activity' ? 'from-emerald-400 to-teal-500' : 'from-indigo-500 to-purple-600';
                                
                                return (
                                    <div key={i} className="flex-1 flex flex-col items-center group relative h-full justify-end">
                                        {/* Tooltip */}
                                        <div className="absolute bottom-[calc(100%+8px)] left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none z-30">
                                            <div className="bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 text-[10px] font-black px-3 py-1.5 rounded-lg shadow-xl whitespace-nowrap flex flex-col items-center">
                                                <span>{val}{chartTab === 'performance' ? '%' : ' Questões'}</span>
                                                <span className="text-[8px] opacity-60 uppercase">{d.fullDate}</span>
                                                <div className="w-2 h-2 bg-zinc-900 dark:bg-zinc-100 rotate-45 -mb-1 mt-1"></div>
                                            </div>
                                        </div>

                                        {/* Barra */}
                                        <div 
                                            className={`w-full max-w-[40px] bg-gradient-to-t ${colorClass} rounded-t-xl transition-all duration-700 ease-out shadow-lg group-hover:brightness-110 relative overflow-hidden`}
                                            style={{ height: `${Math.max(height, 5)}%` }}
                                        >
                                            <div className="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                            {chartTab === 'performance' && val >= 70 && (
                                                <div className="absolute top-1 left-1/2 -translate-x-1/2 text-[8px] text-white/80 animate-bounce">
                                                    <i className="fa-solid fa-star"></i>
                                                </div>
                                            )}
                                        </div>

                                        {/* Label */}
                                        <span className="mt-4 text-[9px] md:text-[10px] font-black text-zinc-400 uppercase tracking-tighter sm:tracking-widest group-hover:text-zinc-800 dark:group-hover:text-zinc-100 transition-colors">
                                            {d.date}
                                        </span>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Insight de IA / Análise */}
                        <div className="bg-zinc-50 dark:bg-zinc-950/50 rounded-2xl p-4 border border-zinc-100 dark:border-zinc-800 flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 flex items-center justify-center shrink-0">
                                <i className="fa-solid fa-wand-magic-sparkles text-sm"></i>
                            </div>
                            <div className="flex-1">
                                <p className="text-[11px] font-bold text-zinc-600 dark:text-zinc-400 leading-tight">
                                    {chartTab === 'activity' ? (
                                        data[6].activity > data[5].activity ? "Sua frequência de registro aumentou hoje. Mantenha o ritmo para saturar seu banco de erros." : "Ritmo estável. Tente adicionar ao menos 5 novos erros por dia para maximizar o aprendizado."
                                    ) : (
                                        data[6].performance > 70 ? "Desempenho de excelência hoje! Seus acertos estão acima do limiar de aprovação (70%)." : "Foco em revisão: Seu aproveitamento oscilou. Recomendo uma sessão de 'Treino Rápido' nos temas com maior erro."
                                    )}
                                </p>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderDashboard = () => (
                <div className="p-3 sm:p-6 lg:p-10 space-y-6 sm:space-y-8 md:space-y-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
                        {/* Bento Main Card */}
                        <div className="sm:col-span-2 lg:row-span-2 bg-gradient-to-br from-zinc-900 via-indigo-950 to-emerald-950 border border-white/10 p-6 sm:p-10 rounded-[28px] sm:rounded-5xl shadow-2xl relative overflow-hidden flex flex-col justify-between group transition-all duration-500 hover:shadow-emerald-900/20">
                            <div className="absolute -right-10 -top-10 text-emerald-400/5 group-hover:text-emerald-400/10 group-hover:scale-110 group-hover:rotate-6 transition-all duration-700"><i className="fa-solid fa-brain text-[250px] sm:text-[350px] blur-[2px]"></i></div>
                            <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
                            <div className="relative z-10">
                                <span className="text-[8px] sm:text-[10px] font-black uppercase tracking-[0.3em] sm:tracking-[0.4em] text-emerald-400 mb-3 sm:mb-4 block drop-shadow-[0_0_8px_rgba(52,211,153,0.8)]"><i className="fa-solid fa-satellite-dish mr-2 animate-pulse"></i> Central de Inteligência</span>
                                <h2 className="text-lg sm:text-2xl md:text-3xl lg:text-4xl font-black text-white leading-tight tracking-tight">Sua jornada médica<br /><span className="bg-clip-text text-transparent bg-gradient-to-r from-emerald-300 to-teal-100 italic">em alta performance.</span></h2>
                            </div>
                            <div className="mt-6 sm:mt-16 flex flex-col sm:flex-row items-start sm:items-end justify-between relative z-10 gap-4 sm:gap-6">
                                <div>
                                    <span className="text-4xl sm:text-6xl font-black bg-clip-text text-transparent bg-gradient-to-br from-white to-zinc-400">{db.errors.length}</span>
                                    <span className="text-[9px] sm:text-[10px] font-black uppercase tracking-widest text-zinc-300 block mt-1 sm:mt-2 opacity-80">Questões no Caderno</span>
                                </div>
                            </div>
                        </div>

                        {/* Boas Vindas */}
                        <div className="sm:col-span-2 lg:col-span-2 bg-gradient-to-br from-emerald-500/10 to-teal-600/10 dark:from-emerald-500/20 dark:to-teal-600/20 p-6 sm:p-8 rounded-[32px] sm:rounded-[40px] border border-emerald-500/20 flex flex-col justify-between group overflow-hidden relative min-h-[180px] sm:min-h-[220px]">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/20 blur-3xl rounded-full -mr-16 -mt-16 group-hover:scale-150 transition-transform duration-700"></div>
                            <div className="relative z-10">
                                <h2 className="text-xl sm:text-2xl font-black text-zinc-900 dark:text-white tracking-tighter leading-tight mb-2">Bom retorno,<br/>Doutor Elite</h2>
                                <p className="text-xs font-bold text-zinc-500 dark:text-zinc-400">Pronto para a sua dose diária de excelência?</p>
                            </div>
                            <div className="flex gap-2 relative z-10">
                                <button onClick={() => startSimulado(true)} className="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 border border-emerald-400/50 text-white px-6 py-3 rounded-2xl font-black shadow-[0_0_30px_rgba(16,185,129,0.3)] flex items-center gap-3 transition-all hover:scale-105 active:scale-95 group/btn text-xs">
                                    <i className="fa-solid fa-bolt text-yellow-300 group-hover/btn:animate-bounce"></i> Treino Rápido
                                </button>
                            </div>
                        </div>

                        {/* Bento Stats */}
                        <div className="bg-white/60 dark:bg-zinc-900/60 backdrop-blur-xl border border-zinc-200/50 dark:border-zinc-800/50 shadow-xl p-6 sm:p-8 rounded-[32px] sm:rounded-[40px] flex flex-col justify-center items-center text-center transition-all duration-300 hover:-translate-y-2 group">
                            <div className="w-12 h-12 sm:w-16 sm:h-16 bg-gradient-to-br from-indigo-100 to-purple-100 dark:from-indigo-900/40 dark:to-purple-900/40 rounded-2xl sm:rounded-3xl flex items-center justify-center text-indigo-500 mb-4 sm:mb-6 shadow-inner group-hover:rotate-12 transition-transform duration-300 text-xl sm:text-2xl"><i className="fa-solid fa-layer-group"></i></div>
                            <span className="text-3xl sm:text-4xl font-black text-zinc-900 dark:text-white drop-shadow-sm">{db.simuladoHistory.length}</span>
                            <span className="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-zinc-500 dark:text-zinc-400 mt-2">Simulados Elite</span>
                        </div>

                        <div className="bg-white/60 dark:bg-zinc-900/60 backdrop-blur-xl border border-zinc-200/50 dark:border-zinc-800/50 shadow-xl p-6 sm:p-8 rounded-[32px] sm:rounded-[40px] flex flex-col justify-center items-center text-center transition-all duration-300 hover:-translate-y-2 group">
                            <div className="w-12 h-12 sm:w-16 sm:h-16 bg-gradient-to-br from-amber-100 to-orange-100 dark:from-amber-900/40 dark:to-orange-900/40 rounded-2xl sm:rounded-3xl flex items-center justify-center text-amber-500 mb-4 sm:mb-6 shadow-inner group-hover:rotate-12 transition-transform duration-300 text-xl sm:text-2xl"><i className="fa-solid fa-bolt-lightning"></i></div>
                            <span className="text-3xl sm:text-4xl font-black text-zinc-900 dark:text-white drop-shadow-sm">{db.perceptions.length}</span>
                            <span className="text-[8px] sm:text-[9px] font-black uppercase tracking-widest text-zinc-500 dark:text-zinc-400 mt-2">Insights Clínicos</span>
                        </div>

                        {/* Planner Row */}
                        <div className="sm:col-span-2 lg:col-span-4 bg-gradient-to-r from-white to-zinc-50 dark:from-zinc-900 dark:to-zinc-900/80 border border-zinc-200/80 dark:border-zinc-800 p-6 sm:p-8 rounded-[32px] sm:rounded-[40px] shadow-xl flex items-center justify-between group hover:border-emerald-500/30 transition-all duration-300 hover:-translate-y-1">
                            <div className="flex items-center gap-4 sm:gap-6">
                                <div className="w-12 h-12 sm:w-16 sm:h-16 bg-gradient-to-br from-emerald-400 to-teal-500 rounded-2xl sm:rounded-3xl flex items-center justify-center text-white shadow-lg shadow-emerald-500/20 group-hover:scale-110 transition-transform duration-300 shrink-0 text-xl sm:text-2xl"><i className="fa-solid fa-check-double"></i></div>
                                <div>
                                    <h4 className="font-black text-lg sm:text-xl text-zinc-900 dark:text-zinc-100 mb-1 leading-tight">Planner Semanal</h4>
                                    <p className="text-[10px] sm:text-sm font-bold text-zinc-500 dark:text-zinc-400 truncate max-w-[150px] sm:max-w-none">Suas metas de hoje estão prontas.</p>
                                </div>
                            </div>

                    </div>

                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-indigo-500 opacity-50"></div>
                            <div className="flex justify-between items-center mb-10">
                                <h3 className="text-xl font-black text-zinc-900 dark:text-white flex items-center gap-3"><i className="fa-solid fa-chart-line text-emerald-500 p-2 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl"></i> Evolução da Performance</h3>
                                <span className="text-[10px] font-black uppercase tracking-widest text-zinc-500 bg-zinc-100 dark:bg-zinc-800 px-3 py-1.5 rounded-lg border border-zinc-200 dark:border-zinc-700">Últimos 7 Dias</span>
                            </div>
                            {renderDailyChart()}
                        </div>

                        {/* Temas Críticos (Análise de Defasagem) */}
                        <div className="bg-white dark:bg-zinc-900 p-6 md:p-10 rounded-3xl md:rounded-5xl border border-zinc-200 dark:border-zinc-800 shadow-2xl h-fit">
                            <div className="flex items-center justify-between mb-8">
                                <h3 className="text-xl font-black text-zinc-900 dark:text-white flex items-center gap-3"><i className="fa-solid fa-triangle-exclamation text-rose-500 p-2 bg-rose-50 dark:bg-rose-900/20 rounded-xl"></i> Temas Críticos</h3>
                                <span className="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Gaps de Memória</span>
                            </div>

                            <div className="space-y-6">
                                {db.subjects.map(s => ({ name: s.name, count: db.errors.filter(e => e.subject === s.id).length }))
                                    .sort((a, b) => b.count - a.count)
                                    .slice(0, 5)
                                    .map((topic, i) => {
                                        const max = Math.max(...db.subjects.map(s => db.errors.filter(e => e.subject === s.id).length), 1);
                                        const perc = (topic.count / max) * 100;
                                        return (
                                            <div key={i} className="group">
                                                <div className="flex justify-between items-end mb-2">
                                                    <span className="text-xs font-black text-zinc-700 dark:text-zinc-200 uppercase tracking-wide truncate max-w-[150px]">{topic.name}</span>
                                                    <span className="text-[10px] font-black text-rose-500">{topic.count} erros</span>
                                                </div>
                                                <div className="h-2 w-full bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden border border-zinc-200/50 dark:border-zinc-700/50">
                                                    <div 
                                                        className="h-full bg-gradient-to-r from-rose-400 to-rose-600 rounded-full transition-all duration-1000 ease-out" 
                                                        style={{ width: `${perc}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                        );
                                    })
                                }

                                {db.errors.length === 0 && (
                                    <div className="py-10 text-center opacity-40">
                                        <i className="fa-solid fa-check-circle text-4xl mb-4 text-emerald-500"></i>
                                        <p className="text-[10px] font-black uppercase tracking-widest">Nenhum gap detectado ainda.</p>
                                    </div>
                                )}

                                <div className="mt-8 pt-6 border-t border-zinc-100 dark:border-zinc-800">
                                    <p className="text-[11px] font-bold text-zinc-500 italic leading-relaxed">
                                        <i className="fa-solid fa-circle-info mr-2 text-rose-400"></i>
                                        Estes temas concentram **{Math.round((db.errors.filter(e => db.subjects.slice(0, 5).some(s => s.id === e.subject)).length / (db.errors.length || 1)) * 100)}%** das suas dificuldades atuais. Priorize revisões focadas aqui.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderErrorList = () => (
                <div className="p-4 md:p-6 space-y-4 md:space-y-6 animate-in fade-in duration-500">
                    <div className="glass-panel p-4 md:p-6 rounded-3xl md:rounded-4xl shadow-xl flex flex-col gap-4 md:gap-6 bg-white/40 dark:bg-slate-900/40 border-none">
                        <div className="flex flex-col md:flex-row justify-between gap-4 md:gap-6 items-center">
                            <div className="flex flex-wrap gap-3">
                                <span className="text-[10px] font-black uppercase text-zinc-400 dark:text-zinc-500 tracking-[0.2em] flex items-center mr-2"><i className="fa-solid fa-sliders mr-2"></i> Filtros Ativos:</span>
                                <button onClick={() => setListFilters(p => ({ ...p, subj: [], tag: 'ALL' }))} className={`px-4 md:px-6 py-2 md:py-2.5 rounded-2xl text-[10px] md:text-xs font-black transition-all ${listFilters.subj.length === 0 ? 'premium-btn text-white shadow-lg' : 'bg-white dark:bg-slate-800 text-zinc-500 hover:bg-zinc-100 dark:hover:bg-slate-700'}`}>Todos os Temas</button>
                                {db.subjects.map(s => <button key={s.id} onClick={() => { setListFilters(p => ({ ...p, subj: p.subj.includes(s.id) ? p.subj.filter(i => i !== s.id) : [...p.subj, s.id], tag: 'ALL' })); }} className={`px-4 md:px-6 py-2 md:py-2.5 rounded-2xl text-[10px] md:text-xs font-black transition-all ${listFilters.subj.includes(s.id) ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-400 border-2 border-indigo-200 dark:border-indigo-800 shadow-md' : 'bg-white dark:bg-slate-900 border border-zinc-200 dark:border-slate-800 text-zinc-500 hover:bg-indigo-50 dark:hover:bg-slate-800'}`}>{s.name}</button>)}
                            </div>
                            {activeTab === 'caderno' && (
                                <button onClick={() => startSimulado(false)} disabled={currentPool.length === 0} className="premium-btn text-white px-8 py-3 rounded-2xl font-black shadow-xl flex items-center gap-2 hover:scale-105 active:scale-95 transition-all disabled:opacity-50"><i className="fa-solid fa-play"></i> Iniciar Elite Sim</button>
                            )}
                        </div>

                        <div className="relative w-full">
                            <i className="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-indigo-400"></i>
                            <input
                                type="text"
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                                placeholder="Busca profunda por tema ou palavra-chave..."
                                className="w-full bg-white dark:bg-slate-950/50 border border-zinc-200 dark:border-slate-800 rounded-3xl py-4 pl-14 pr-6 text-sm font-bold text-zinc-800 dark:text-zinc-100 outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner transition-all"
                            />
                        </div>
                    </div>

                    {activeTab === 'provas' && (
                        <div className="flex gap-2 overflow-x-auto pb-2 border-b border-zinc-200 dark:border-zinc-800 mb-4">
                            <button onClick={() => setListFilters(p => ({ ...p, exam: 'ALL' }))} className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 ${listFilters.exam === 'ALL' ? 'bg-indigo-600 text-white shadow-md' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-700'}`}>Todas as Provas</button>
                            {db.exams.map(ex => (
                                <button key={ex.id} onClick={() => setListFilters(p => ({ ...p, exam: ex.id }))} className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 flex items-center gap-2 ${listFilters.exam === ex.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>
                                    {ex.name}
                                    <span onClick={(e) => { e.stopPropagation(); if (window.confirm('Excluir este filtro de prova permanentemente?')) { setDb(p => ({ ...p, exams: p.exams.filter(x => x.id !== ex.id), errors: p.errors.map(err => err.examId === ex.id ? { ...err, examId: '' } : err) })); if (listFilters.exam === ex.id) setListFilters(p => ({ ...p, exam: 'ALL' })); } }} className="hover:text-red-500 text-zinc-400 ml-1 cursor-pointer transition-colors"><i className="fa-solid fa-xmark"></i></span>
                                </button>
                            ))}
                            <button
                                onClick={() => setListFilters(p => ({ ...p, tag: p.tag === 'ERROS' ? 'ALL' : 'ERROS' }))}
                                className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 flex items-center gap-2 ${listFilters.tag === 'ERROS' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}
                            >
                                <i className="fa-solid fa-triangle-exclamation"></i> ERROS
                            </button>
                        </div>
                    )}
                    {activeTab === 'faculdade' && (
                        <div className="flex gap-2 overflow-x-auto pb-2 border-b border-zinc-200 dark:border-zinc-800 mb-4">
                            <button onClick={() => setListFilters(p => ({ ...p, fac: 'ALL' }))} className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 ${listFilters.fac === 'ALL' ? 'bg-emerald-600 text-white shadow-md' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-700'}`}>Todos os Módulos</button>
                            {db.fac.map(f => (
                                <button key={f.id} onClick={() => setListFilters(p => ({ ...p, fac: f.id }))} className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 flex items-center gap-2 ${listFilters.fac === f.id ? 'bg-emerald-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>
                                    {f.name}
                                    <span onClick={(e) => { e.stopPropagation(); if (window.confirm('Excluir este módulo permanentemente?')) { setDb(p => ({ ...p, fac: p.fac.filter(x => x.id !== f.id), errors: p.errors.map(err => err.facId === f.id ? { ...err, facId: '' } : err) })); if (listFilters.fac === f.id) setListFilters(p => ({ ...p, fac: 'ALL' })); } }} className="hover:text-red-500 text-zinc-400 ml-1 cursor-pointer transition-colors"><i className="fa-solid fa-xmark"></i></span>
                                </button>
                            ))}
                        </div>
                    )}

                    {['provas', 'faculdade'].includes(activeTab) && currentPool.length > 0 && (
                        <div className="bg-gradient-to-br from-indigo-600 to-indigo-800 p-8 rounded-4xl shadow-2xl flex flex-col md:flex-row justify-between items-center gap-8 relative overflow-hidden mb-8 animate-in slide-in-from-top-4 border-none text-white">
                            <div className="absolute -right-10 -top-10 opacity-10"><i className="fa-solid fa-brain text-[150px]"></i></div>
                            <div className="relative z-10">
                                <h3 className="text-white font-black text-2xl flex items-center gap-3 mb-2"><i className="fa-solid fa-rocket text-amber-400 ai-glow rounded-full p-2 bg-indigo-900/50"></i> Desafio Elite</h3>
                                <p className="text-indigo-100 font-medium opacity-90">Sessão otimizada priorizando os seus <b className="text-white font-black underline decoration-sky-400 decoration-2">pontos cegos</b> e lacunas de conhecimento.</p>
                            </div>
                            <div className="flex items-center gap-4 w-full md:w-auto relative z-10">
                                <div className="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl px-5 py-3.5 flex items-center gap-3 shadow-lg">
                                    <i className="fa-solid fa-layer-group text-sky-300"></i>
                                    <select value={simQty} onChange={(e) => setSimQty(Number(e.target.value))} className="bg-transparent text-white font-black outline-none cursor-pointer text-sm">
                                        <option value={5} className="text-zinc-900">05 Qs</option>
                                        <option value={10} className="text-zinc-900">10 Qs</option>
                                        <option value={20} className="text-zinc-900">20 Qs</option>
                                        <option value={50} className="text-zinc-900">50 Qs</option>
                                        <option value={currentPool.length} className="text-zinc-900">Tudo ({currentPool.length})</option>
                                    </select>
                                </div>
                                <button onClick={() => { setSimUseSpaced(true); startSimulado(false, true); }} className="flex-1 md:flex-none bg-white text-indigo-700 px-10 py-4 rounded-2xl font-black shadow-xl hover:bg-sky-50 transition-all active:scale-95 flex items-center justify-center gap-3 text-xs uppercase tracking-widest">
                                    <i className="fa-solid fa-play"></i> Decolar
                                </button>
                            </div>
                        </div>
                    )}

                    {currentPool.length === 0 ? (
                        <div className="text-center py-20 text-zinc-300 dark:text-zinc-700 font-black italic"><i className="fa-solid fa-book-open text-6xl mb-4 block opacity-50"></i>Não existem questões registadas.</div>
                    ) : (
                        currentPool.slice(0, visibleCount).map(err => {
                            const subj = db.subjects.find(s => s.id === err.subject);
                            const acc = getAccuracy(err.history);
                            return (
                                <div key={err.id} className="bg-white dark:bg-zinc-900 rounded-3xl border border-zinc-200 dark:border-zinc-800 overflow-hidden shadow-sm hover:shadow-md transition-all group">
                                    <div className={`px-6 py-3 flex justify-between items-center border-b border-zinc-100 dark:border-zinc-800 ${subj ? subj.color.split(' ')[0] + ' ' + getDarkColorClass(subj.color).split(' ')[0] : 'bg-zinc-100 dark:bg-zinc-800'}`}>
                                        <span className="font-black text-[10px] uppercase tracking-widest text-zinc-800 dark:text-zinc-200">{subj?.name || 'Geral'}</span>
                                        <div className="flex gap-3 items-center">
                                            <div className="bg-white/60 dark:bg-black/30 px-3 py-1 rounded-lg text-[10px] font-black flex gap-2">
                                                <span className="text-green-600 dark:text-green-400"><i className="fa-solid fa-check"></i> {err.history?.correct || 0}</span>
                                                <span className="text-red-500 dark:text-red-400"><i className="fa-solid fa-xmark"></i> {err.history?.wrong || 0}</span>
                                                <span className="border-l border-zinc-300 dark:border-zinc-600 pl-2 ml-1 opacity-75">{acc}%</span>
                                            </div>
                                            <button onClick={() => { setFormData({ ...emptyForm, ...err, alternatives: err.alternatives || ['', '', '', '', ''], alternativeExplanations: err.alternativeExplanations || ['', '', '', '', ''], tags: err.tags || [] }); setEditingId(err.id); setShowForm(true); window.scrollTo(0, 0); }} className="w-8 h-8 rounded-full bg-white/50 dark:bg-black/20 text-zinc-500 hover:text-emerald-600 dark:text-zinc-400 dark:hover:text-emerald-400 flex items-center justify-center transition-colors"><i className="fa-solid fa-pen-nib"></i></button>
                                            <button onClick={() => { 
                                                showConfirm('Excluir esta questão permanentemente?', () => {
                                                    if (String(err.id).startsWith('ai_')) {
                                                        setDb(p => ({
                                                            ...p,
                                                            processedQuestionLists: (p.processedQuestionLists || []).map(list => ({
                                                                ...list,
                                                                questions: (list.questions || []).filter(q => `ai_${q.id}` !== String(err.id))
                                                            }))
                                                        }));
                                                    } else {
                                                        setDb(p => ({ ...p, errors: p.errors.filter(x => x.id !== err.id) }));
                                                    }
                                                }); 
                                            }} className="w-8 h-8 rounded-full bg-white/50 dark:bg-black/20 text-zinc-500 hover:text-red-600 dark:text-zinc-400 dark:hover:text-red-400 flex items-center justify-center transition-colors"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                    <div className="p-6 md:p-8">
                                        <h3 className="font-black text-xl mb-4 text-zinc-900 dark:text-zinc-100 leading-tight">{err.title}</h3>

                                        <div className="flex flex-wrap gap-1 mb-4">
                                            {err.examId && <span className="text-[10px] uppercase font-bold tracking-wider bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-1 rounded-md"><i className="fa-solid fa-file-signature mr-1"></i> {err.examId}</span>}
                                            {err.facId && <span className="text-[10px] uppercase font-bold tracking-wider bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-300 px-2 py-1 rounded-md"><i className="fa-solid fa-graduation-cap mr-1"></i> {err.facId}</span>}
                                            {(err.tags || []).map(tag => (
                                                <span key={tag} className="text-[10px] uppercase font-bold tracking-wider bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 px-2 py-1 rounded-md">
                                                    {tag}
                                                </span>
                                            ))}
                                        </div>

                                        <p className="text-sm opacity-80 mb-6 italic whitespace-pre-wrap leading-relaxed text-justify-custom text-zinc-800 dark:text-zinc-300">"{err.question}"</p>
                                        {err.image && <img src={err.image} className="max-h-48 rounded-xl border border-zinc-200 dark:border-zinc-700 mb-6 cursor-pointer hover:opacity-90 transition-opacity shadow-sm" onClick={() => setLightbox(err.image)} alt="Anexo" />}
                                        <div className="bg-emerald-50 dark:bg-emerald-900/20 p-5 rounded-2xl border border-emerald-100 dark:border-emerald-800/50 text-emerald-900 dark:text-emerald-300 text-sm font-bold flex gap-4 shadow-inner">
                                            <div className="w-8 h-8 rounded-full bg-white dark:bg-emerald-800 flex items-center justify-center shrink-0 shadow-sm"><i className="fa-solid fa-lightbulb text-amber-500"></i></div>
