                        zinc: { 50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7', 300: '#d4d4d8', 400: '#a1a1aa', 500: '#71717a', 600: '#52525b', 700: '#3f3f46', 800: '#27272a', 900: '#18181b', 950: '#09090b' }

                } 
            } 
        }

    <style id="custom-styles">
        .dark #question-text-container span[style*="background-color"] { color: #09090b !important; }
        .ai-glow { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px #10b981; } to { box-shadow: 0 0 20px #34d399; } }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .sidebar-active { background: rgba(16, 185, 129, 0.1); color: #10b981; border-right: 4px solid #10b981; }
        .text-justify-custom { text-align: justify; text-justify: inter-word; }
        input, textarea, select { outline: none !important; }
        body { -webkit-font-smoothing: antialiased; }
        .planner-scroll::-webkit-scrollbar { width: 6px; }
        .planner-scroll::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
        .dark .planner-scroll::-webkit-scrollbar-thumb { background: #3f3f46; }
        
        /* Checklist Checkbox Customizado */
        .check-custom {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid currentColor;
            border-radius: 0.35em;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .check-custom::before {
            content: "";
            width: 0.8em;
            height: 0.8em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: transform;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .check-custom:checked::before { transform: scale(1); }
        .check-custom:checked { background-color: currentColor; }
    </style>

<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen flex flex-col font-sans transition-colors duration-300">
    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        // Global Error Handler to avoid black screen and show the error
        window.addEventListener('error', (event) => {
            document.body.innerHTML = `<div style="padding: 20px; color: red; font-family: monospace; background: black; height: 100vh;">
                <h3>Erro Fatal:</h3>
                <p>${event.message}</p>
                <p>Linha: ${event.lineno}</p>
                <pre>${event.error?.stack}</pre>
            </div>`;
        });

        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // 1. CONSTANTES E UTILITÁRIOS GLOBAIS
        // ==========================================
        const ERROR_REASONS = ["Falta de Atenção", "Conteúdo não estudado", "Esquecimento", "Interpretação", "Tempo", "Pegadinha"];
        const DEFAULT_SUBJECTS = [
            { id: 'clinica_medica', name: 'Clínica Médica', color: 'bg-emerald-100 text-emerald-700' },
            { id: 'preventiva', name: 'Preventiva', color: 'bg-blue-100 text-blue-700' },
            { id: 'go', name: 'Ginecologia e Obstetrícia', color: 'bg-purple-100 text-purple-700' },
            { id: 'pediatria', name: 'Pediatria', color: 'bg-rose-100 text-rose-700' },
            { id: 'cirurgia', name: 'Cirurgia', color: 'bg-orange-100 text-orange-700' }
        ];
        const DEFAULT_EXAMS = [
            { id: 'ENAMED', name: 'ENAMED' },
            { id: 'Revalida', name: 'Revalida' }
        ];

        // --- Constantes do Planner ---
        const PRIORITIES = {
            none: { id: 'none', label: 'Nenhuma', color: 'bg-zinc-300 dark:bg-zinc-600', border: 'border-l-zinc-300 dark:border-l-zinc-600' },
            low: { id: 'low', label: 'Baixa', color: 'bg-sky-400', border: 'border-l-sky-400' },
            medium: { id: 'medium', label: 'Média', color: 'bg-blue-600', border: 'border-l-blue-600' },
            high: { id: 'high', label: 'Alta', color: 'bg-fuchsia-500', border: 'border-l-fuchsia-500' },
            urgent: { id: 'urgent', label: 'Urgente', color: 'bg-red-600', border: 'border-l-red-600' },
        };
        const RATINGS = [
            { value: 1, emoji: "😫", label: "Péssimo" },
            { value: 2, emoji: "😕", label: "Ruim" },
            { value: 3, emoji: "😐", label: "Médio" },
            { value: 4, emoji: "🙂", label: "Bom" },
            { value: 5, emoji: "🤩", label: "Excelente" },
        ];
        const DAYS = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];

        // --- Temas dos Checklists ---
        const CHECKLIST_THEMES = [
            { id: 'emerald', bg: 'bg-emerald-500', text: 'text-emerald-500', light: 'bg-emerald-50 dark:bg-emerald-900/20', border: 'border-emerald-200 dark:border-emerald-800' },
            { id: 'blue', bg: 'bg-blue-500', text: 'text-blue-500', light: 'bg-blue-50 dark:bg-blue-900/20', border: 'border-blue-200 dark:border-blue-800' },
            { id: 'rose', bg: 'bg-rose-500', text: 'text-rose-500', light: 'bg-rose-50 dark:bg-rose-900/20', border: 'border-rose-200 dark:border-rose-800' },
            { id: 'amber', bg: 'bg-amber-500', text: 'text-amber-500', light: 'bg-amber-50 dark:bg-amber-900/20', border: 'border-amber-200 dark:border-amber-800' },
            { id: 'purple', bg: 'bg-purple-500', text: 'text-purple-500', light: 'bg-purple-50 dark:bg-purple-900/20', border: 'border-purple-200 dark:border-purple-800' }
        ];

        const getDarkColorClass = (colorStr) => {
            if (!colorStr) return '';
            return colorStr.replace(/bg-(\w+)-100/g, 'dark:bg-$1-900/30').replace(/text-(\w+)-700/g, 'dark:text-$1-300');
        };

        const formatTime = (secs) => isNaN(secs) ? "00:00" : `${Math.floor(secs/60).toString().padStart(2,'0')}:${(secs%60).toString().padStart(2,'0')}`;
        const getAccuracy = (h) => { const tot = (h?.correct||0)+(h?.wrong||0); return tot===0?0:Math.round(((h?.correct||0)/tot)*100); };

        const sanitizeErrors = (list) => (Array.isArray(list) ? list : []).map(e => ({
            ...e,
            id: e.id || Date.now() + Math.random(),
            alternatives: Array.isArray(e.alternatives) && e.alternatives.length === 5 ? e.alternatives : ['','','','',''],
            alternativeExplanations: Array.isArray(e.alternativeExplanations) && e.alternativeExplanations.length === 5 ? e.alternativeExplanations : ['','','','',''],
            history: e.history || { correct: 0, wrong: 0 },
            date: e.date || new Date(e.id || Date.now()).toLocaleDateString('pt-PT'),
            examId: e.examId || '',
            facId: e.facId || e.faculdadeId || '',
            tags: Array.isArray(e.tags) ? e.tags : []
        }));

        const compressImage = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let { width, height } = img;
                    const max = 1200; // increased max dimension for better image quality
                    if (width > height) { if (width > max) { height *= max / width; width = max; } } 
                    else { if (height > max) { width *= max / height; height = max; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5)); 
                };
                img.src = base64Str;
            });
        };

        // ==========================================
        // 2. COMPONENTE: EDITOR DE IMAGEM
        // ==========================================
        const ImageEditor = ({ initialImage, onSave, onCancel }) => {
            const [texts, setTexts] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            
            const handleImageClick = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                const id = Date.now();
                setTexts([...texts, { id, text: 'Nova Nota', x, y, color: '#10b981', size: 22 }]);
                setSelectedId(id);
            };

            const handleExport = () => {
                const img = new Image(); 
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                    ctx.textBaseline = 'top';
                    texts.forEach(t => {
                        const fs = Math.max(12, t.size * (img.width / 800)); 
                        ctx.font = `bold ${fs}px sans-serif`; ctx.fillStyle = t.color;
                        ctx.strokeStyle = (t.color === '#ffffff' || t.color === '#f59e0b') ? '#000000' : '#ffffff';
                        ctx.lineWidth = Math.max(2, fs / 8);
                        
                        const lines = t.text.split('\n');
                        lines.forEach((line, index) => {
                            const lineY = (t.y * img.height) + (index * fs * 1.2);
                            ctx.strokeText(line, t.x * img.width, lineY);
                            ctx.fillText(line, t.x * img.width, lineY);
                        });
                    });
                    onSave(canvas.toDataURL('image/jpeg', 0.8));
                }; img.src = initialImage;
            };

            return (
                <div className="fixed inset-0 bg-zinc-950/95 z-[5000] flex flex-col md:flex-row p-4 gap-4 animate-in fade-in">
                    <div className="flex-1 bg-black/40 rounded-3xl flex items-center justify-center overflow-hidden relative border border-zinc-800 shadow-inner">
                        <div className="relative inline-block" style={{maxWidth: '100%', maxHeight: '100%'}}>
                            <img src={initialImage} onClick={handleImageClick} className="max-w-full max-h-[85vh] object-contain cursor-crosshair rounded-lg shadow-2xl" draggable="false" />
                            {texts.map(t => (
                                <div key={t.id} onClick={(e) => { e.stopPropagation(); setSelectedId(t.id); }} className={`absolute px-3 py-1.5 -translate-x-1/2 -translate-y-1/2 cursor-pointer border-2 font-bold whitespace-pre-wrap rounded-xl transition-all ${selectedId === t.id ? 'border-emerald-500 bg-emerald-500/20 scale-105' : 'border-transparent'}`} style={{ left: `${t.x * 100}%`, top: `${t.y * 100}%`, color: t.color, fontSize: `${t.size}px`, lineHeight: '1.2', textShadow: `0 0 5px ${(t.color === '#ffffff' || t.color === '#f59e0b') ? '#000000' : '#ffffff'}` }}>{t.text}</div>
                            ))}
                        </div>
                    </div>
                    <div className="w-full md:w-80 bg-white dark:bg-zinc-900 rounded-3xl p-6 flex flex-col gap-4 shadow-2xl shrink-0 h-full border border-zinc-200 dark:border-zinc-800">
                        <div className="flex justify-between items-center border-b border-zinc-100 dark:border-zinc-800 pb-4 shrink-0 text-zinc-800 dark:text-white">
                            <h3 className="font-black text-lg"><i className="fa-solid fa-pen-nib text-emerald-500 mr-2"></i> Editor Visual</h3>
                            <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-red-500 rounded-full transition-colors"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2">
                            {selectedId ? (
                                <div className="space-y-5 animate-in slide-in-from-right-4">
                                    <div>
                                        <label className="block text-xs font-black text-zinc-400 uppercase tracking-widest mb-2">Texto</label>
                                        <textarea value={texts.find(t=>t.id===selectedId).text} onChange={(e) => setTexts(texts.map(tx=>tx.id===selectedId?{...tx, text: e.target.value}:tx))} className="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold resize-none" rows="3"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-black text-zinc-400 uppercase tracking-widest mb-3">Cor</label>
                                        <div className="flex flex-wrap gap-3">{['#10b981', '#f59e0b', '#ef4444', '#3b82f6', '#ffffff', '#000000'].map(c => (<button key={c} onClick={() => setTexts(texts.map(tx=>tx.id===selectedId?{...tx, color: c}:tx))} className={`w-8 h-8 rounded-full border-2 transition-all ${texts.find(t=>t.id===selectedId).color === c ? 'border-emerald-500 scale-110 shadow-md' : 'border-zinc-200 dark:border-zinc-700'}`} style={{ backgroundColor: c }} />))}</div>
                                    </div>
                                    <div>
                                        <label className="flex justify-between text-xs font-black text-zinc-400 uppercase tracking-widest mb-3"><span>Tamanho</span><span className="text-emerald-500">{texts.find(t=>t.id===selectedId).size}px</span></label>
                                        <input type="range" min="12" max="100" value={texts.find(t=>t.id===selectedId).size} onChange={(e) => setTexts(texts.map(tx=>tx.id===selectedId?{...tx, size: parseInt(e.target.value)}:tx))} className="w-full accent-emerald-500" />
                                    </div>
                                    <div className="pt-4 border-t border-zinc-100 dark:border-zinc-800">
                                        <button onClick={() => {setTexts(texts.filter(t=>t.id!==selectedId)); setSelectedId(null);}} className="w-full bg-red-50 dark:bg-red-900/20 hover:bg-red-600 hover:text-white text-red-600 font-bold py-3 rounded-xl transition-all"><i className="fa-solid fa-trash mr-2"></i> Apagar</button>
                                    </div>
                                </div>
                            ) : <div className="flex flex-col items-center justify-center h-full opacity-50"><i className="fa-solid fa-hand-pointer text-4xl mb-4"></i><p className="text-sm font-bold text-center">Clica na imagem para anotar.</p></div>}
                        </div>
                        <button onClick={handleExport} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 mt-4"><i className="fa-solid fa-floppy-disk mr-2"></i> Salvar Imagem</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2.5 COMPONENTE: FLASHCARD ITEM
        // ==========================================
        const FlashcardItem = ({ card, onDelete }) => {
            const [flipped, setFlipped] = useState(false);
            return (
                <div 
                    onClick={() => setFlipped(!flipped)}
                    className={`p-6 rounded-[32px] border transition-all cursor-pointer relative min-h-[180px] flex items-center justify-center text-center shadow-lg group ${flipped ? 'bg-indigo-50 border-indigo-200 dark:bg-indigo-900/20 dark:border-indigo-800' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 hover:border-emerald-500'}`}
                >
                    <button onClick={(e) => { e.stopPropagation(); onDelete(card.id); }} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center z-10"><i className="fa-solid fa-trash"></i></button>
                    <div className={`absolute top-4 left-5 text-[10px] font-black uppercase tracking-widest ${flipped ? 'text-indigo-400' : 'text-zinc-400'}`}>{flipped ? 'Verso (Resposta)' : 'Frente (Pergunta)'}</div>
                    <div className="w-full px-2 mt-4">
                        <p className={`font-bold text-lg leading-relaxed ${flipped ? 'text-indigo-700 dark:text-indigo-300' : 'text-zinc-800 dark:text-zinc-100'}`}>
                            {flipped ? card.back : card.front}
                        </p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2.6 COMPONENTE: DAY COLUMN (PLANNER)
        // ==========================================
        const DayColumn = ({ day, tasks, onUpdate }) => {
            const [input, setInput] = useState("");
            const [priority, setPriority] = useState('none');
            const scrollRef = useRef(null);

            const addTask = (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                const newTask = {
                    id: Date.now().toString() + Math.random(),
                    text: input,
                    done: false,
                    priority: priority,
                    rating: null
                };
                onUpdate([...tasks, newTask]);
                setInput("");
                setPriority('none');
            };

            const toggleTask = (id) => onUpdate(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
            const deleteTask = (id) => onUpdate(tasks.filter(t => t.id !== id));
            const rateTask = (id, rating) => onUpdate(tasks.map(t => t.id === id ? { ...t, rating: t.rating === rating ? null : rating } : t));

            const handleDragStart = (e, index) => e.dataTransfer.setData('taskIndex', index);
            const handleDrop = (e, index) => {
                const fromIndex = e.dataTransfer.getData('taskIndex');
                if (fromIndex === '') return;
                const updated = [...tasks];
                const [moved] = updated.splice(fromIndex, 1);
                updated.splice(index, 0, moved);
                onUpdate(updated);
            };

            const completed = tasks.filter(t => t.done).length;
            const total = tasks.length;
            const progress = total === 0 ? 0 : Math.round((completed / total) * 100);

            return (
                <div className="w-[320px] shrink-0 flex flex-col bg-white dark:bg-zinc-900 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all hover:shadow-md">
                    <div className={`p-5 border-b border-zinc-100 dark:border-zinc-800 ${["Sábado", "Domingo"].includes(day) ? 'bg-indigo-50/50 dark:bg-indigo-900/10' : ''}`}>
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-black text-lg tracking-tight">{day}</h3>
                            <span className={`text-xs font-bold px-2 py-1 rounded-full ${progress === 100 ? 'bg-green-100 text-green-600' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500'}`}>
                                {completed}/{total}
                            </span>
                        </div>
                        <div className="h-1.5 bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                            <div className={`h-full transition-all duration-500 ${progress === 100 ? 'bg-green-500' : 'bg-indigo-500'}`} style={{ width: `${progress}%` }} />
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 planner-scroll" ref={scrollRef}>
                        {tasks.map((task, index) => (
                            <div key={task.id} draggable onDragStart={(e) => handleDragStart(e, index)} onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleDrop(e, index)}
                                className={`group flex flex-col p-4 rounded-2xl border-l-4 transition-all cursor-grab active:cursor-grabbing ${task.done ? 'bg-zinc-50 dark:bg-zinc-800/40 opacity-70' : 'bg-white dark:bg-zinc-800 shadow-sm border border-zinc-100 dark:border-zinc-700'} ${PRIORITIES[task.priority]?.border}`}
                            >
                                <div className="flex items-start gap-3">
                                    <button onClick={() => toggleTask(task.id)} className={`mt-1 shrink-0 transition-colors ${task.done ? 'text-green-500' : 'text-zinc-300 hover:text-indigo-500'}`}>
                                        {task.done ? <i className="fa-solid fa-circle-check text-lg"></i> : <i className="fa-regular fa-circle text-lg"></i>}
                                    </button>
                                    
                                    <span className={`flex-1 text-sm font-medium leading-relaxed ${task.done ? 'line-through text-zinc-400' : ''}`}>
                                        {task.text}
                                    </span>

                                    <button onClick={() => deleteTask(task.id)} className="opacity-0 group-hover:opacity-100 p-1 text-zinc-300 hover:text-red-500 transition-all">
                                        <i className="fa-solid fa-trash text-sm"></i>
                                    </button>
                                </div>

                                {task.done && (
                                    <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-700 flex justify-center gap-2 animate-in fade-in slide-in-from-top-1">
                                        {RATINGS.map(r => (
                                            <button key={r.value} onClick={() => rateTask(task.id, r.value)} className={`text-xl hover:scale-125 transition-all ${task.rating === r.value ? 'opacity-100 grayscale-0 scale-110' : 'opacity-20 grayscale hover:opacity-100 hover:grayscale-0'}`}>
                                                {r.emoji}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ))}
                        
                        {tasks.length === 0 && (
                            <div className="py-10 text-center opacity-20">
                                <i className="fa-solid fa-plus text-3xl mx-auto mb-2 block"></i>
                                <p className="text-xs font-bold uppercase tracking-widest">Vazio</p>
                            </div>
                        )}
                    </div>

                    <div className="p-4 border-t border-zinc-100 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-900/50">
                        <form onSubmit={addTask} className="space-y-3">
                            <div className="flex gap-2 justify-center">
                                {Object.entries(PRIORITIES).map(([key, p]) => (
                                    <button key={key} type="button" onClick={() => setPriority(key)} title={p.label}

            const testIA = async () => {
                setIsAiLoading(true);
                const r = await callIA([{role:'user', parts:[{text:"Responda apenas: CONECTADO"}]}]);
                setIsAiLoading(false);
                if(r && r.includes('CONECTADO')) showAlert("✅ Conexão IA estabelecida com sucesso!");
                else showAlert(`❌ Erro ao conectar com a IA: ${r ? r.replace(/\[ERRO_\w+\] /, '') : 'Desconhecido'}`);
            };

            useEffect(() => {
                const handlePaste = async (e) => {
                    if (isAiLoading) return;
                    const item = Array.from(e.clipboardData.items).find(x => x.type.startsWith('image'));
                    if (!item) return;
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        const b64 = await compressImage(ev.target.result);
                        if (activeTab === 'chat') {
                            setIsAiLoading(true);
                            const visionModel = (!aiConfig.key || aiConfig.model.includes('gemma')) ? 'gemini-1.5-flash' : null;
                            const r = await callIA([{ role: 'user', parts: [{ inlineData: { data: b64.split(',')[1], mimeType: 'image/jpeg' } }, { text: "Analise esta imagem médica e faça um resumo." }] }], visionModel);
                            setIsAiLoading(false);
                            if (r) setChatMessages(p => [...p, { role: 'user', text: '[Imagem Colada]' }, { role: 'model', text: r }]);
                        } else if (activeTab === 'resumos') {
                            setDb(p => ({...p, summaries: [{id: Date.now(), image: b64, date: new Date().toLocaleDateString('pt-PT')}, ...(p.summaries || [])]}));
                        } else if (activeTab === 'jogos' && gameState.view === 'edit') {
                            setGameState(prev => {
                                const g = prev.data;
                                let updatedPairs = [...g.pairs];
                                let pasted = false;
                                for (let i = 0; i < updatedPairs.length; i++) {
                                    if (updatedPairs[i].a.type === 'text' && updatedPairs[i].a.val === '') {
                                        updatedPairs[i].a = { type: 'image', val: b64 };
                                        pasted = true; break;
                                    } else if (updatedPairs[i].b.type === 'text' && updatedPairs[i].b.val === '') {
                                        updatedPairs[i].b = { type: 'image', val: b64 };
                                        pasted = true; break;
                                    }
                                }
                                if (!pasted) {
                                    updatedPairs.push({id: Date.now() + Math.random(), a: {type: 'image', val: b64}, b: {type: 'text', val: ''}});
                                }
                                return { ...prev, data: { ...g, pairs: updatedPairs } };
                            });
                        } else if (activeTab === 'jogos' && gameState.view === 'list') {
                            showConfirm("Deseja gerar um jogo da memória automaticamente a partir desta imagem usando IA?", () => processGameAI(b64));
                        } else {
                            if (!showForm || !editingId) processOCR(b64);
                            else setFormData(p => ({ ...p, image: b64 }));
                        }
                    };
                    reader.readAsDataURL(item.getAsFile());
                };
                document.addEventListener('paste', handlePaste);
                return () => document.removeEventListener('paste', handlePaste);
            }, [showForm, editingId, isAiLoading, activeTab, gameState]);

            // ==========================================
            // LÓGICA DE SIMULADOS E FILTROS
            // ==========================================
            const currentPool = useMemo(() => {
                let p = db.errors;
                if (activeTab === 'provas') {
                    const examNames = db.exams.map(ex => ex.name.toLowerCase());
                    p = p.filter(e => e.examId || (e.tags && e.tags.some(t => {
                        const lowT = t.toLowerCase();
                        return lowT.includes('prova') || lowT.includes('concurso') || examNames.some(name => lowT.includes(name));
                    })));
                    
                    if (listFilters.exam !== 'ALL') {
                        const exam = db.exams.find(ex => ex.id === listFilters.exam);
                        const searchTerms = [listFilters.exam.toLowerCase()];
                        if (exam) searchTerms.push(exam.name.toLowerCase());
                        
                        p = p.filter(e => 
                            (e.examId && searchTerms.some(term => e.examId.toLowerCase().includes(term))) ||
                            (e.tags && e.tags.some(t => searchTerms.some(term => t.toLowerCase().includes(term))))
                        );
                    }
                }
                if (activeTab === 'faculdade') {
                    if (listFilters.fac !== 'ALL') {
                        const fac = db.fac.find(f => f.id === listFilters.fac);
                        const searchTerms = [listFilters.fac.toLowerCase()];
                        if (fac) searchTerms.push(fac.name.toLowerCase());

                        p = p.filter(e => 
                            (e.facId && searchTerms.some(term => e.facId.toLowerCase().includes(term))) ||
                            (e.tags && e.tags.some(t => searchTerms.some(term => t.toLowerCase().includes(term)))) ||
                            (e.subject && searchTerms.some(term => e.subject.toLowerCase().includes(term))) ||
                            (e.title && searchTerms.some(term => e.title.toLowerCase().includes(term)))
                        );
                    } else {
                        p = p.filter(e => e.facId || (e.tags && e.tags.some(t => t.toLowerCase().includes('faculdade') || t.toLowerCase().includes('módulo'))));
                    }
                }
                if (listFilters.subj.length > 0) {
                    const selectedSubjects = db.subjects.filter(s => listFilters.subj.includes(s.id));
                    const allTerms = [];
                    selectedSubjects.forEach(s => {
                        allTerms.push(s.id.toLowerCase());
                        allTerms.push(s.name.toLowerCase());
                        if (s.searchTerms) s.searchTerms.forEach(t => allTerms.push(t.toLowerCase()));
                    });
                    const uniqueTerms = [...new Set(allTerms)];

                    p = p.filter(e => {
                        const subjMatch = e.subject && uniqueTerms.some(term => e.subject.toLowerCase().includes(term) || term.includes(e.subject.toLowerCase()));
                        const tagMatch = e.tags && e.tags.some(t => uniqueTerms.some(term => t.toLowerCase().includes(term) || term.includes(t.toLowerCase())));
                        const titleMatch = e.title && uniqueTerms.some(term => e.title.toLowerCase().includes(term));
                        return subjMatch || tagMatch || titleMatch;
                    });
                }

                if (listFilters.tag !== 'ALL') {
                    if (listFilters.tag === 'ERROS') {
                        p = p.filter(e => (e.history?.wrong || 0) > 0);
                    } else if (listFilters.tag === 'QUESTÕES NOVAS') {
                        p = p.filter(e => (e.history?.correct || 0) === 0 && (e.history?.wrong || 0) === 0);
                    } else {
                        p = p.filter(e => e.tags && e.tags.includes(listFilters.tag));
                    }
                }
                
                if (searchTerm.trim()) {
                    const lowerTerm = searchTerm.toLowerCase();
                    p = p.filter(e => 
                        (e.title && e.title.toLowerCase().includes(lowerTerm)) || 
                        (e.question && e.question.toLowerCase().includes(lowerTerm))
                    );
                }
                
                return p.sort((a, b) => b.id - a.id);
            }, [db.errors, activeTab, listFilters, searchTerm]);

            const filteredSummaries = useMemo(() => {
                let s = db.summaries || [];
                if (summarySearch.trim()) {
                    const term = summarySearch.toLowerCase();
                    s = s.filter(x => (x.title && x.title.toLowerCase().includes(term)));
                }
                return s;
            }, [db.summaries, summarySearch]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (summaryLightbox) {
                        const idx = filteredSummaries.findIndex(x => x.id === summaryLightbox);
                        if (idx !== -1) {
                            if (e.key === 'ArrowLeft') setSummaryLightbox(filteredSummaries[(idx - 1 + filteredSummaries.length) % filteredSummaries.length].id);
                            if (e.key === 'ArrowRight') setSummaryLightbox(filteredSummaries[(idx + 1) % filteredSummaries.length].id);
                            if (e.key === 'Escape') setSummaryLightbox(null);
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [summaryLightbox, filteredSummaries]);

            const clearDeck = () => setSimulado({ isActive: false, deck: [], curIdx: 0, showAns: false, selAlt: null, showResults: false, isReviewing: false, timeElapsed: 0, results: [], aiExplanation: '', isAiExplaining: false, isGeneratingFlashcards: false, crossedAlts: [], highlightedText: '' });

            const startSimulado = (isQuick = false, forceSpaced = false) => {
                let pool = isQuick ? db.errors : currentPool;
                if (pool.length === 0) return showAlert("Não existem questões suficientes para este filtro.");

                if (simUseSpaced || forceSpaced) {
                    pool = [...pool].map(q => {
                        const h = q.history || { correct: 0, wrong: 0 };
                        const total = h.correct + h.wrong;
                        
                        let timestamp = Date.now();
                        if (q.id && !isNaN(Number(q.id)) && Number(q.id) > 100000000000) {
                            timestamp = Number(q.id);
                        } else if (q.date) {
                            if (q.date.includes('/')) {
                                const p = q.date.split('/');
                                timestamp = new Date(p[2], p[1] - 1, p[0]).getTime();
                            } else {
                                timestamp = new Date(q.date).getTime();
                            }
                        }
                        if (isNaN(timestamp)) timestamp = Date.now();
                        
                        const ageInDays = Math.max(0, (Date.now() - timestamp) / (1000 * 60 * 60 * 24));
                        
                        let score = 0;
                        
                        if (total === 0) {
                            score = 15000 + (ageInDays * 50) + (Math.random() * 3000);
                        } else {
                            const errRatio = h.wrong / total;
                            if (errRatio > 0) {
                                score = (errRatio * 10000) + (h.wrong * 100) + (ageInDays * 50) + (Math.random() * 2000);
                            } else {
                                score = (ageInDays * 10) + (Math.random() * 500);
                            }
                        }

                        return { ...q, _score: score };
                    }).sort((a, b) => b._score - a._score); 
                } else {
                    pool = [...pool].sort(() => 0.5 - Math.random());
                }

                let deck = pool.slice(0, isQuick ? 5 : simQty);
                
                if (simUseSpaced || forceSpaced) {
                    for (let i = deck.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [deck[i], deck[j]] = [deck[j], deck[i]];
                    }
                }

                setSimulado({ isActive: true, deck, curIdx: 0, showAns: false, selAlt: null, showResults: false, isReviewing: false, timeElapsed: 0, results: [], aiExplanation: '', isAiExplaining: false, isGeneratingFlashcards: false, crossedAlts: [], highlightedText: '' });
                window.scrollTo(0, 0);
            };

            const recordAnswer = (id, isCorrect, userAns) => {
                setDb(p => {
                    const stats = { ...p.dailyStats };
                    const todayStr = new Date().toLocaleDateString('pt-PT');
                    stats[todayStr] = { answered: (stats[todayStr]?.answered || 0) + 1 };
                    return {
                        ...p,
                        dailyStats: stats,
                        errors: p.errors.map(e => e.id === id ? { ...e, history: { correct: (e.history?.correct || 0) + (isCorrect ? 1 : 0), wrong: (e.history?.wrong || 0) + (isCorrect ? 0 : 1) } } : e)
                    };
                });
                setSimulado(p => ({ ...p, results: p.results.some(r => r.id === id) ? p.results : [...p.results, { id, isCorrect, userAns, timeSpent: p.timeElapsed }] }));
            };

            const finishSimulado = () => {
                const hits = simulado.results.filter(r => r.isCorrect).length;
                const tot = simulado.deck.length;
                const session = { id: Date.now(), date: new Date().toLocaleDateString('pt-PT'), hits, total: tot, context: activeTab };
                setDb(p => ({ ...p, simuladoHistory: [session, ...p.simuladoHistory] }));
                setSimulado(p => ({ ...p, showResults: true }));
            };

            const handleGenerateFlashcards = async () => {
                const wrongResults = simulado.results.filter(r => !r.isCorrect);
                if (wrongResults.length === 0) return showAlert("Parabéns! Não teve erros neste simulado para gerar flashcards.");
                
                setSimulado(p => ({ ...p, isGeneratingFlashcards: true }));
                
                const currentContext = activeTab === 'caderno' ? 'Banco Geral' : (activeTab === 'provas' ? 'Provas' : 'Módulos');
                const deckName = `Simulado - ${currentContext} (${new Date().toLocaleDateString('pt-PT')} ${new Date().toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'})})`;
                
                let newFlashcards = [];
                for (const r of wrongResults) {
                    const q = simulado.deck.find(d => d.id === r.id);
                    if (!q) continue;
                    
                    const prompt = `Atue como um especialista em memorização médica. Crie UM flashcard direto e curto (Frente e Verso) focado EXATAMENTE no erro desta questão.\nTema: ${q.title}\nQuestão: ${q.question}\nLição que o aluno deve fixar: ${q.lessonLearned}\n\nResponda APENAS em formato JSON estrito:\n{"front": "Pergunta curta e direta?", "back": "Resposta/Conceito chave explicativo."}`;
                    
                    const aiRes = await callIA([{ role: 'user', parts: [{ text: prompt }] }]);
                    if (aiRes) {
                        try {
                            const clean = aiRes.replace(/```json/gi, '').replace(/```/g, '').trim();
                            const parsed = JSON.parse(clean);
                            if (parsed.front && parsed.back) {
                                newFlashcards.push({
                                    id: Date.now() + Math.random(),
                                    front: parsed.front,
                                    back: parsed.back,
                                    qId: q.id,
                                    date: new Date().toLocaleDateString('pt-PT'),
                                    deckName: deckName
                                });
                            }
                        } catch (e) { console.error("Erro no parse do flashcard", e); }
                    }
                }
                
                if (newFlashcards.length > 0) {
                    setDb(p => ({ ...p, flashcards: [...newFlashcards, ...(p.flashcards || [])] }));
                    showAlert(`✅ ${newFlashcards.length} Flashcard(s) gerados com sucesso e guardados na aba Flashcards!`);
                } else {
                    showAlert("❌ Falha ao gerar flashcards com a IA. Tente novamente.");
                }
                setSimulado(p => ({ ...p, isGeneratingFlashcards: false }));
            };

            const handleExplainSimuladoQuestion = async (type = 'explain') => {
                setSimulado(p => ({ ...p, isAiExplaining: true, aiExplanation: '' }));
                const q = simulado.deck[simulado.curIdx];
                const userAns = simulado.isReviewing ? simulado.results.find(r=>r.id===q.id)?.userAns : simulado.selAlt;
                
                const correctText = q.alternatives[q.correctAlternative.charCodeAt(0) - 65] || '';
                const userText = (userAns && userAns !== 'Pulo') ? q.alternatives[userAns.charCodeAt(0) - 65] : 'Não soube responder (Pulo)';
                
                let prompt = '';
                if (type === 'explain') prompt = `${getPersonaInstruction(aiConfig.persona, 'explain')}\n\nTema: ${q.title}\nQuestão: ${q.question}\n\nAlternativa Correta (${q.correctAlternative}): ${correctText}\nAlternativa do aluno: ${userAns} (${userText})`;
                else if (type === 'mnemonic') prompt = `Atue como Professor de Medicina. Crie uma mnemónica EXTREMAMENTE FÁCIL E CRIATIVA para o aluno memorizar o conceito por trás desta questão.\nTema: ${q.title}\nConceito correto: ${correctText}\n\nA mnemónica deve ser curta, impactante e fácil de lembrar na hora da prova. Formate com destaque nas letras.`;
                else if (type === 'summary') prompt = `Atue como Professor de Medicina. Crie um resumo "Flash" (máximo 3 a 4 tópicos curtos e diretos) sobre o tema central desta questão médica para revisão ultra rápida.\nTema: ${q.title}\nQuestão: ${q.question}\nResposta Correta: ${correctText}`;
                else if (type === 'pitfalls') prompt = `${getPersonaInstruction(aiConfig.persona, 'pitfalls')}\nTema: ${q.title}\nQuestão: ${q.question}\nAlternativas:\n${q.alternatives.join('\n')}\nResposta Correta: ${q.correctAlternative}`;
                
                const r = await callIA([{ role: 'user', parts: [{ text: prompt }] }]);
                
                setSimulado(p => ({ ...p, isAiExplaining: false, aiExplanation: r || 'Falha ao gerar explicação com IA. Tente novamente.' }));
            };

            // ==========================================
            // CRUD FORMULÁRIO E IMAGENS
            // ==========================================
            const handleFormSubmit = (e) => {
                e.preventDefault();
                const newObj = { ...formData, id: editingId || Date.now(), date: new Date().toLocaleDateString('pt-PT') };
                setDb(prev => {
                    let updatedExams = [...prev.exams];
                    if (newObj.examId && !updatedExams.some(ex => ex.id === newObj.examId)) {
                        updatedExams.push({ id: newObj.examId, name: newObj.examId });
                    }
                    
                    let updatedFacs = [...prev.fac];
                    if (newObj.facId && !updatedFacs.some(f => f.id === newObj.facId)) {
                        updatedFacs.push({ id: newObj.facId, name: newObj.facId });
                    }

                    return {
                        ...prev,
                        exams: updatedExams,
                        fac: updatedFacs,
                        errors: editingId ? prev.errors.map(x => x.id === editingId ? newObj : x) : [newObj, ...prev.errors]
                    };
                });
                setShowForm(false); setEditingId(null); setFormData(emptyForm);
                window.scrollTo(0, 0);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleAlternativeChange = (idx, val) => {
                const n = [...formData.alternatives]; n[idx] = val;
                setFormData(prev => ({ ...prev, alternatives: n }));
            };

            const handleAltExplanationChange = (idx, val) => {
                const n = [...formData.alternativeExplanations]; n[idx] = val;
                setFormData(prev => ({ ...prev, alternativeExplanations: n }));
            };

            const handleImageUpload = (e, target) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const b64 = await compressImage(event.target.result);
                    setImageToEdit(b64); setImageEditTarget(target);
                };
                reader.readAsDataURL(file); e.target.value = '';
            };

            // ==========================================
            // RENDERIZAÇÃO DE COMPONENTES DE VISTA
            // ==========================================
            const renderDailyChart = () => {
                const last7 = Array.from({length: 7}).map((_, i) => { const d = new Date(); d.setDate(d.getDate() - (6-i)); return d.toLocaleDateString('pt-PT').substring(0,5); });
                const activity = last7.map(d => ({ date: d, count: db.errors.filter(e => e.date?.startsWith(d)).length }));
                const max = Math.max(...activity.map(a=>a.count), 1);
                return (
                    <div className="flex items-end justify-between h-32 gap-2 mt-4">
                        {activity.map((a, i) => (
                            <div key={i} className="flex-1 flex flex-col items-center gap-2 group relative">
                                <div className="w-full bg-emerald-500/20 rounded-t-lg relative transition-all" style={{ height: `${(a.count/max)*100}%`, minHeight: '4px' }}>
                                    <div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-zinc-800 text-white text-[10px] px-2 py-1 rounded whitespace-nowrap z-50 shadow-md">{a.count} Qs</div>
                                </div>
                                <span className="text-[10px] font-bold text-zinc-500">{a.date}</span>
                            </div>
                        ))}
                    </div>
                );
            };

            const renderDashboard = () => (
                <div className="p-6 space-y-8 animate-in fade-in duration-300">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 text-center shadow-sm"><span className="text-zinc-400 text-[10px] font-black uppercase tracking-widest block mb-1">Questões Totais</span><span className="text-4xl font-black text-emerald-600 dark:text-emerald-400">{db.errors.length}</span></div>
                        <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 text-center shadow-sm"><span className="text-zinc-400 text-[10px] font-black uppercase tracking-widest block mb-1">Simulados Feitos</span><span className="text-4xl font-black text-amber-500">{db.simuladoHistory.length}</span></div>
                        <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 text-center shadow-sm"><span className="text-zinc-400 text-[10px] font-black uppercase tracking-widest block mb-1">Insights Clínicos</span><span className="text-4xl font-black text-sky-500">{db.perceptions.length}</span></div>
                        <button onClick={()=>startSimulado(true)} className="bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl p-6 font-black shadow-lg hover:scale-105 active:scale-95 transition-all flex flex-col items-center justify-center gap-2 border border-emerald-500"><i className="fa-solid fa-play text-2xl"></i> Treino Rápido</button>
                    </div>
                    <div className="bg-white dark:bg-zinc-900 p-8 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-sm">
                        <h3 className="text-lg font-black flex items-center gap-2 text-zinc-800 dark:text-zinc-100"><i className="fa-solid fa-chart-column text-emerald-500"></i> Atividade Semanal</h3>
                        {renderDailyChart()}
                    </div>
                </div>
            );

            const renderErrorList = () => (
                <div className="p-6 space-y-6 animate-in fade-in duration-300">
                    <div className="bg-white dark:bg-zinc-900 p-4 rounded-3xl border border-zinc-200 dark:border-zinc-800 flex flex-col gap-4 shadow-sm">
                        <div className="flex flex-col md:flex-row justify-between gap-4 items-center">
                            <div className="flex flex-wrap gap-2">
                                <span className="text-xs font-black uppercase text-zinc-400 tracking-widest mr-2 flex items-center"><i className="fa-solid fa-filter mr-2"></i> Filtros:</span>
                                <button onClick={()=>setListFilters(p=>({...p, subj:[], tag:'ALL'}))} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${listFilters.subj.length === 0 ? 'bg-emerald-600 text-white shadow-md' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-700'}`}>Tudo</button>
                                {db.subjects.map(s => <button key={s.id} onClick={()=>{setListFilters(p=>({...p, subj: p.subj.includes(s.id)?p.subj.filter(i=>i!==s.id):[...p.subj, s.id], tag: 'ALL'}));}} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${listFilters.subj.includes(s.id)?'bg-emerald-600 text-white shadow-md':'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>{s.name}</button>)}
                            </div>
                            {activeTab === 'caderno' && (
                                <button onClick={()=>startSimulado(false)} disabled={currentPool.length===0} className="bg-amber-500 text-zinc-900 px-6 py-2.5 rounded-xl font-black shadow-md flex items-center gap-2 hover:bg-amber-600 transition-all active:scale-95 disabled:opacity-50"><i className="fa-solid fa-play"></i> Treinar Contexto</button>
                            )}
                        </div>

                        {/* Sub-filtros dinâmicos */}
                        {listFilters.subj.includes('clinica_medica') && (
                            <div className="flex flex-wrap gap-2 pt-2 border-t border-zinc-100 dark:border-zinc-800 animate-in slide-in-from-left-2">
                                <span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest flex items-center mr-2">Sub-filtros:</span>
                                {['Endocrinologia', 'Nefrologia', 'Cardiologia', 'Hematologia', 'Infectologia', 'Reumatologia'].map(tag => (
                                    <button 
                                        key={tag} 
                                        onClick={() => setListFilters(p => ({ ...p, tag: p.tag === tag ? 'ALL' : tag }))}
                                        className={`px-3 py-1 rounded-lg text-[10px] font-black transition-all ${listFilters.tag === tag ? 'bg-teal-500 text-white shadow-sm' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-700'}`}
                                    >
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        )}

                        <div className="relative w-full">
                            <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                            <input 
                                type="text" 
                                value={searchTerm} 
                                onChange={e => setSearchTerm(e.target.value)} 
                                placeholder="Buscar por tema ou palavra-chave no enunciado..." 
                                className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-2xl py-3 pl-12 pr-4 text-sm font-bold text-zinc-700 dark:text-zinc-200 outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                            />
                        </div>
                    </div>

                    {activeTab === 'provas' && (
                        <div className="flex gap-2 overflow-x-auto pb-2 border-b border-zinc-200 dark:border-zinc-800 mb-4">
                            <button onClick={()=>setListFilters(p=>({...p, exam:'ALL'}))} className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 ${listFilters.exam==='ALL' ? 'bg-indigo-600 text-white shadow-md' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-700'}`}>Todas as Provas</button>
                            {db.exams.map(ex => (
                                <button key={ex.id} onClick={()=>setListFilters(p=>({...p, exam:ex.id}))} className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 flex items-center gap-2 ${listFilters.exam===ex.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>
                                    {ex.name} 
                                    <span onClick={(e) => { e.stopPropagation(); if(window.confirm('Excluir este filtro de prova permanentemente?')) { setDb(p=>({...p, exams: p.exams.filter(x=>x.id!==ex.id), errors: p.errors.map(err=>err.examId===ex.id?{...err, examId:''}:err)})); if(listFilters.exam===ex.id) setListFilters(p=>({...p, exam:'ALL'})); } }} className="hover:text-red-500 text-zinc-400 ml-1 cursor-pointer transition-colors"><i className="fa-solid fa-xmark"></i></span>
                                </button>
                            ))}
                            <button 
                                onClick={() => setListFilters(p => ({ ...p, tag: p.tag === 'ERROS' ? 'ALL' : 'ERROS' }))}
                                className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 flex items-center gap-2 ${listFilters.tag === 'ERROS' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}
                            >
                                <i className="fa-solid fa-triangle-exclamation"></i> ERROS
                            </button>
                        </div>
                    )}
                    {activeTab === 'faculdade' && (
                        <div className="flex gap-2 overflow-x-auto pb-2 border-b border-zinc-200 dark:border-zinc-800 mb-4">
                            <button onClick={()=>setListFilters(p=>({...p, fac:'ALL'}))} className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 ${listFilters.fac==='ALL' ? 'bg-emerald-600 text-white shadow-md' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-700'}`}>Todos os Módulos</button>
                            {db.fac.map(f => (
                                <button key={f.id} onClick={()=>setListFilters(p=>({...p, fac:f.id}))} className={`px-4 py-1.5 rounded-lg text-xs font-bold shrink-0 flex items-center gap-2 ${listFilters.fac===f.id ? 'bg-emerald-600 text-white shadow-md' : 'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>
                                    {f.name} 
                                    <span onClick={(e) => { e.stopPropagation(); if(window.confirm('Excluir este módulo permanentemente?')) { setDb(p=>({...p, fac: p.fac.filter(x=>x.id!==f.id), errors: p.errors.map(err=>err.facId===f.id?{...err, facId:''}:err)})); if(listFilters.fac===f.id) setListFilters(p=>({...p, fac:'ALL'})); } }} className="hover:text-red-500 text-zinc-400 ml-1 cursor-pointer transition-colors"><i className="fa-solid fa-xmark"></i></span>
                                </button>
                            ))}
                        </div>
                    )}

                    {['provas', 'faculdade'].includes(activeTab) && currentPool.length > 0 && (
                        <div className="bg-gradient-to-r from-emerald-50 to-teal-50 dark:from-emerald-900/20 dark:to-teal-900/20 p-6 rounded-3xl border border-emerald-200 dark:border-emerald-800/50 flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm relative overflow-hidden mb-6 animate-in slide-in-from-top-2">
                            <div className="absolute -right-4 -top-4 opacity-10 dark:opacity-5"><i className="fa-solid fa-brain text-9xl"></i></div>
                            <div className="relative z-10">
                                <h3 className="text-emerald-800 dark:text-emerald-400 font-black text-xl flex items-center gap-2 mb-1"><i className="fa-solid fa-rocket text-amber-500 ai-glow rounded-full"></i> Simulado Personalizado</h3>
                                <p className="text-sm text-emerald-600 dark:text-emerald-500 font-medium">Prioriza os seus <b className="font-black">erros frequentes</b> e as <b className="font-black">questões mais antigas</b> deste filtro.</p>
                            </div>
                            <div className="flex items-center gap-3 w-full md:w-auto relative z-10">
                                <div className="bg-white dark:bg-zinc-900 border border-emerald-200 dark:border-emerald-800 rounded-xl px-4 py-3 flex items-center gap-3 shadow-sm">
                                    <i className="fa-solid fa-list-ol text-emerald-500"></i>
                                    <select value={simQty} onChange={(e)=>setSimQty(Number(e.target.value))} className="bg-transparent text-emerald-700 dark:text-emerald-400 font-black outline-none cursor-pointer text-sm">
                                        <option value={5}>5 Questões</option>
                                        <option value={10}>10 Questões</option>
                                        <option value={20}>20 Questões</option>
                                        <option value={50}>50 Questões</option>
                                        <option value={currentPool.length}>Todas ({currentPool.length})</option>
                                    </select>
                                </div>
                                <button onClick={()=>{setSimUseSpaced(true); startSimulado(false, true);}} className="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-xl font-black shadow-lg shadow-emerald-600/30 transition-all active:scale-95 flex items-center justify-center gap-2 text-sm uppercase tracking-wide">
                                    <i className="fa-solid fa-play"></i> Iniciar
                                </button>
                            </div>
                        </div>
                    )}

                    {currentPool.length === 0 ? (
                        <div className="text-center py-20 text-zinc-300 dark:text-zinc-700 font-black italic"><i className="fa-solid fa-book-open text-6xl mb-4 block opacity-50"></i>Não existem questões registadas.</div>
                    ) : (
                        currentPool.slice(0, visibleCount).map(err => {
                            const subj = db.subjects.find(s=>s.id===err.subject);
                            const acc = getAccuracy(err.history);
                            return (
                                <div key={err.id} className="bg-white dark:bg-zinc-900 rounded-3xl border border-zinc-200 dark:border-zinc-800 overflow-hidden shadow-sm hover:shadow-md transition-all group">
                                    <div className={`px-6 py-3 flex justify-between items-center border-b border-zinc-100 dark:border-zinc-800 ${subj ? subj.color.split(' ')[0] + ' ' + getDarkColorClass(subj.color).split(' ')[0] : 'bg-zinc-100 dark:bg-zinc-800'}`}>
                                        <span className="font-black text-[10px] uppercase tracking-widest text-zinc-800 dark:text-zinc-200">{subj?.name || 'Geral'}</span>
                                        <div className="flex gap-3 items-center">
                                            <div className="bg-white/60 dark:bg-black/30 px-3 py-1 rounded-lg text-[10px] font-black flex gap-2">
                                                <span className="text-green-600 dark:text-green-400"><i className="fa-solid fa-check"></i> {err.history?.correct||0}</span>
                                                <span className="text-red-500 dark:text-red-400"><i className="fa-solid fa-xmark"></i> {err.history?.wrong||0}</span>
                                                <span className="border-l border-zinc-300 dark:border-zinc-600 pl-2 ml-1 opacity-75">{acc}%</span>
                                            </div>
                                            <button onClick={()=>{setFormData({...emptyForm, ...err, alternatives: err.alternatives||['','','','',''], alternativeExplanations: err.alternativeExplanations||['','','','',''], tags: err.tags||[]}); setEditingId(err.id); setShowForm(true); window.scrollTo(0,0);}} className="w-8 h-8 rounded-full bg-white/50 dark:bg-black/20 text-zinc-500 hover:text-emerald-600 dark:text-zinc-400 dark:hover:text-emerald-400 flex items-center justify-center transition-colors"><i className="fa-solid fa-pen-nib"></i></button>
                                            <button onClick={()=>{showConfirm('Excluir esta questão permanentemente?', ()=>setDb(p=>({...p, errors: p.errors.filter(x=>x.id!==err.id)})));}} className="w-8 h-8 rounded-full bg-white/50 dark:bg-black/20 text-zinc-500 hover:text-red-600 dark:text-zinc-400 dark:hover:text-red-400 flex items-center justify-center transition-colors"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                    <div className="p-6 md:p-8">
                                        <h3 className="font-black text-xl mb-4 text-zinc-900 dark:text-zinc-100 leading-tight">{err.title}</h3>
                                        
                                        <div className="flex flex-wrap gap-1 mb-4">
                                            {err.examId && <span className="text-[10px] uppercase font-bold tracking-wider bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-1 rounded-md"><i className="fa-solid fa-file-signature mr-1"></i> {err.examId}</span>}
                                            {err.facId && <span className="text-[10px] uppercase font-bold tracking-wider bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-300 px-2 py-1 rounded-md"><i className="fa-solid fa-graduation-cap mr-1"></i> {err.facId}</span>}
                                            {(err.tags || []).map(tag => (
                                                <span key={tag} className="text-[10px] uppercase font-bold tracking-wider bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 px-2 py-1 rounded-md">
                                                    {tag}
                                                </span>
                                            ))}
                                        </div>

                                        <p className="text-sm opacity-80 mb-6 italic whitespace-pre-wrap leading-relaxed text-justify-custom text-zinc-800 dark:text-zinc-300">"{err.question}"</p>
                                        {err.image && <img src={err.image} className="max-h-48 rounded-xl border border-zinc-200 dark:border-zinc-700 mb-6 cursor-pointer hover:opacity-90 transition-opacity shadow-sm" onClick={()=>setLightbox(err.image)} alt="Anexo" />}
                                        <div className="bg-emerald-50 dark:bg-emerald-900/20 p-5 rounded-2xl border border-emerald-100 dark:border-emerald-800/50 text-emerald-900 dark:text-emerald-300 text-sm font-bold flex gap-4 shadow-inner">
                                            <div className="w-8 h-8 rounded-full bg-white dark:bg-emerald-800 flex items-center justify-center shrink-0 shadow-sm"><i className="fa-solid fa-lightbulb text-amber-500"></i></div>
                                            <span className="flex-1 leading-relaxed text-justify-custom pt-1">{err.lessonLearned}</span>
                                        </div>
                                    </div>
                                </div>
                            )
                        })
                    )}
                    {currentPool.length > visibleCount && <div className="text-center mt-8"><button onClick={() => setVisibleCount(v=>v+20)} className="bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 px-8 py-3 rounded-2xl font-bold flex items-center gap-2 mx-auto transition-colors text-zinc-700 dark:text-zinc-300 shadow-sm"><i className="fa-solid fa-chevron-down"></i> Carregar Mais Questões</button></div>}
                </div>
            );

            const renderSimuladoActive = () => {
                const baseQ = simulado.deck[simulado.curIdx]; if(!baseQ) return null;
                const q = db.errors.find(e => e.id === baseQ.id) || baseQ;
                const showCol = simulado.showAns || simulado.isReviewing;
                
                const handleHighlight = () => {
                    const selection = window.getSelection();
                    if (!selection || !selection.toString().trim()) return;
                    const text = selection.toString();

                    const escapeHtml = (unsafe) => (unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");

                    let currentContent = simulado.highlightedText || escapeHtml(q.question);
                    const escapedSelected = escapeHtml(text);
                    const safeRegex = new RegExp(escapedSelected.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                    const newContent = currentContent.replace(safeRegex, `<mark class="bg-yellow-300 dark:bg-yellow-600/50 dark:text-white rounded-sm px-1">$&</mark>`);

                    setSimulado(p => ({ ...p, highlightedText: newContent }));
                    selection.removeAllRanges();
                };

                return (
                    <div className="max-w-3xl mx-auto py-10 w-full animate-in fade-in duration-300 pt-12">
                        <div className="bg-white dark:bg-zinc-900 rounded-[40px] p-8 md:p-10 shadow-2xl border border-zinc-200 dark:border-zinc-800 relative text-zinc-900 dark:text-zinc-100">
                            <button onClick={clearDeck} className="absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-zinc-100 dark:bg-zinc-800 text-zinc-400 hover:text-red-500 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
                            <div className="flex justify-between items-center mb-8 border-b border-zinc-100 dark:border-zinc-800 pb-4">
                                <span className="font-black text-emerald-500 uppercase text-[10px] tracking-widest flex items-center gap-2"><i className={`fa-solid ${simulado.isReviewing ? 'fa-magnifying-glass' : 'fa-play'}`}></i> {simulado.isReviewing ? 'Revisão da Prova' : 'Sessão Ativa'}</span>
                                <div className="flex items-center gap-4">
                                    <button onClick={()=>{setFormData({...emptyForm, ...q, alternatives: q.alternatives||['','','','',''], alternativeExplanations: q.alternativeExplanations||['','','','',''], tags: q.tags||[]}); setEditingId(q.id); setShowForm(true); setSimulado(p=>({...p, highlightedText: ''})); window.scrollTo(0,0);}} className="text-zinc-400 hover:text-emerald-500 transition-colors flex items-center gap-2 text-xs font-bold uppercase tracking-wider" title="Editar Questão Atual"><i className="fa-solid fa-pen-nib"></i> <span className="hidden sm:inline">Editar</span></button>
                                    <span className="font-bold text-sm bg-zinc-100 dark:bg-zinc-800 px-4 py-1.5 rounded-full border border-zinc-200 dark:border-zinc-700">{simulado.curIdx+1} / {simulado.deck.length}</span>
                                </div>
                            </div>
                            
                            <h2 className="text-2xl font-black mb-6 leading-tight">{q.title}</h2>
                            <div className="mb-8 p-6 bg-zinc-50 dark:bg-zinc-950 rounded-3xl border border-zinc-200 dark:border-zinc-800 relative group">
                                {(!simulado.showAns && !simulado.isReviewing) && (
                                    <div className="absolute -top-4 right-6 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                        <button onClick={handleHighlight} className="bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 px-3 py-1.5 rounded-lg text-xs font-bold shadow-md hover:text-amber-500 transition-colors" title="Selecione um texto com o rato e clique aqui">
                                            <i className="fa-solid fa-highlighter"></i> Destacar
                                        </button>
                                        {simulado.highlightedText && (
                                            <button onClick={() => setSimulado(p => ({...p, highlightedText: ''}))} className="bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 px-3 py-1.5 rounded-lg text-xs font-bold shadow-md hover:text-red-500 transition-colors" title="Limpar destaques">
                                                <i className="fa-solid fa-eraser"></i>
                                            </button>
                                        )}
                                    </div>
                                )}
                                <p className="text-lg leading-relaxed text-justify-custom whitespace-pre-wrap font-medium" dangerouslySetInnerHTML={{ __html: simulado.highlightedText || ((q.question||'').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;")) }}></p>
                                {q.image && <img src={q.image} className="mt-8 max-h-72 rounded-2xl mx-auto cursor-pointer shadow-lg border border-white/10 hover:opacity-90 transition-opacity" onClick={()=>setLightbox(q.image)} alt="Contexto Visual" />}
                            </div>

                            <div className="space-y-4">
                                {q.alternatives.map((alt, i) => {
                                    if(!alt) return null; const L = String.fromCharCode(65+i); const isCorr = L===q.correctAlternative;
                                    const isSel = simulado.isReviewing ? (simulado.results.find(r=>r.id===q.id)?.userAns === L) : (simulado.selAlt === L);
                                    const isCrossed = simulado.crossedAlts?.includes(L);
                                    
                                    let btnClass = "border-zinc-200 dark:border-zinc-700 hover:bg-zinc-50 dark:hover:bg-zinc-800 bg-white dark:bg-zinc-900 text-zinc-700 dark:text-zinc-200 cursor-pointer";
                                    if (showCol) {
                                        if (isCorr) btnClass = "bg-emerald-50 border-emerald-500 text-emerald-900 dark:bg-emerald-900/30 dark:border-emerald-500 dark:text-emerald-300 shadow-md scale-[1.02] cursor-default z-10";
                                        else if (isSel) btnClass = "bg-red-50 border-red-400 text-red-900 dark:bg-red-900/30 dark:border-red-500 dark:text-red-300 shadow-sm cursor-default";
                                        else btnClass = "opacity-40 border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-950 cursor-default";
                                    }

                                    return (
                                        <div key={i} className="flex flex-col gap-2 group relative">
                                            <div className="flex gap-2">
                                                {(!showCol) && (
                                                    <button
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            setSimulado(p => ({ ...p, crossedAlts: isCrossed ? (p.crossedAlts||[]).filter(x => x !== L) : [...(p.crossedAlts||[]), L] }));
                                                        }}
                                                        className={`w-14 shrink-0 flex items-center justify-center rounded-2xl border-2 transition-all ${isCrossed ? 'bg-zinc-200 dark:bg-zinc-800 border-zinc-300 dark:border-zinc-700 text-zinc-400 shadow-inner' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 text-zinc-300 hover:text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}
                                                        title={isCrossed ? "Restaurar alternativa" : "Riscar alternativa (Eliminar)"}
                                                    >
                                                        <i className={`fa-solid ${isCrossed ? 'fa-rotate-left' : 'fa-strikethrough'}`}></i>
                                                    </button>
                                                )}
                                                <button
                                                    disabled={showCol || isCrossed}
                                                    onClick={()=>{setSimulado(p=>({...p, selAlt:L, showAns:true})); recordAnswer(q.id, isCorr, L);}}
                                                    className={`flex-1 text-left p-5 rounded-2xl border-2 transition-all font-bold text-[15px] flex gap-4 ${btnClass} ${isCrossed && !showCol ? 'opacity-30 line-through grayscale' : ''}`}
                                                >
                                                    <span className="shrink-0 opacity-50">{L})</span><span className="text-justify-custom leading-relaxed">{alt}</span>
                                                </button>
                                            </div>
                                            {(showCol && q.alternativeExplanations?.[i]) && (
                                                <div className={`ml-14 p-4 rounded-xl text-xs font-medium animate-in slide-in-from-left-2 leading-relaxed text-justify-custom ${isCorr ? 'bg-emerald-50 border-l-4 border-emerald-400 text-emerald-900 dark:bg-emerald-900/20 dark:text-emerald-300 dark:border-emerald-600' : 'bg-zinc-50 border-l-4 border-zinc-300 text-zinc-600 dark:bg-zinc-800/50 dark:border-zinc-600 dark:text-zinc-400'}`}>
                                                    <i className="fa-solid fa-reply mr-2 opacity-50"></i> {q.alternativeExplanations[i]}
                                                </div>
                                            )}
                                        </div>
                                    )
                                })}
                            </div>

                            {(!simulado.showAns && !simulado.isReviewing) && (
                                <button onClick={()=>{setSimulado(p=>({...p, showAns:true, selAlt:'Pulo'})); recordAnswer(q.id, false, 'Pulo');}} className="w-full mt-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-2xl font-black text-zinc-500 hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors shadow-inner">Não sei a resposta (Pular)</button>
                            )}

                            {showCol && (
                                <div className="mt-10 pt-8 border-t border-zinc-200 dark:border-zinc-800 animate-in slide-in-from-top-4">
                                    <div className="bg-emerald-50 dark:bg-emerald-900/20 p-6 rounded-3xl border border-emerald-100 dark:border-emerald-800 mb-8 font-bold text-emerald-900 dark:text-emerald-200 flex gap-4 shadow-inner">
                                        <div className="bg-white dark:bg-emerald-800 w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-sm"><i className="fa-solid fa-lightbulb text-amber-500 text-lg"></i></div> 
                                        <span className="text-justify-custom leading-relaxed flex-1 pt-2">{q.lessonLearned}</span>
                                    </div>

                                    {/* --- FERRAMENTAS DE FIXAÇÃO IA --- */}
                                    {!simulado.aiExplanation && !simulado.isAiExplaining && (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 mb-8">
                                            <button onClick={() => handleExplainSimuladoQuestion('explain')} className="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800/50 text-indigo-700 dark:text-indigo-400 font-black py-4 px-2 rounded-2xl hover:bg-indigo-100 dark:hover:bg-indigo-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
