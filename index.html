                                                <i className="fa-solid fa-chalkboard-user text-2xl ai-glow rounded-full"></i> <span className="text-xs uppercase tracking-widest">Professor IA</span>
                                            </button>
                                            <button onClick={() => handleExplainSimuladoQuestion('mnemonic')} className="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/50 text-amber-700 dark:text-amber-400 font-black py-4 px-2 rounded-2xl hover:bg-amber-100 dark:hover:bg-amber-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                <i className="fa-solid fa-lightbulb text-2xl"></i> <span className="text-xs uppercase tracking-widest">Mnemónica</span>
                                            </button>
                                            <button onClick={() => handleExplainSimuladoQuestion('summary')} className="bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800/50 text-emerald-700 dark:text-emerald-400 font-black py-4 px-2 rounded-2xl hover:bg-emerald-100 dark:hover:bg-emerald-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                <i className="fa-solid fa-bolt text-2xl"></i> <span className="text-xs uppercase tracking-widest">Resumo Flash</span>
                                            </button>
                                            <button onClick={() => handleExplainSimuladoQuestion('pitfalls')} className="bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-800/50 text-rose-700 dark:text-rose-400 font-black py-4 px-2 rounded-2xl hover:bg-rose-100 dark:hover:bg-rose-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                <i className="fa-solid fa-triangle-exclamation text-2xl"></i> <span className="text-xs uppercase tracking-widest">Pegadinhas</span>
                                            </button>
                                            <button onClick={() => {
                                                const userAns = simulado.isReviewing ? simulado.results.find(r=>r.id===q.id)?.userAns : simulado.selAlt;
                                                const correctText = q.alternatives[q.correctAlternative.charCodeAt(0) - 65] || '';
                                                const userText = (userAns && userAns !== 'Pulo') ? q.alternatives[userAns.charCodeAt(0) - 65] : 'Não soube responder (Pulo)';
                                                const promptContext = `${getPersonaInstruction(aiConfig.persona, 'batepapo')}\n\nTema: ${q.title}\nQuestão: ${q.question}\n\nAlternativa Correta (${q.correctAlternative}): ${correctText}\nMinha resposta: ${userAns} (${userText})`;
                                                setSimulado(p => ({ ...p, isAiChatting: true, aiChatMessages: [{ role: 'user', text: promptContext }], isAiExplaining: true, aiExplanation: '' }));
                                                callIA([{ role: 'user', parts: [{ text: promptContext }] }]).then(r => {
                                                    setSimulado(p => ({ ...p, isAiExplaining: false, aiChatMessages: [...p.aiChatMessages, { role: 'model', text: r || "Falha ao gerar resposta da IA. Tente novamente." }] }));
                                                });
                                            }} className="bg-sky-50 dark:bg-sky-900/20 border border-sky-200 dark:border-sky-800/50 text-sky-700 dark:text-sky-400 font-black py-4 px-2 rounded-2xl hover:bg-sky-100 dark:hover:bg-sky-900/40 transition-all flex flex-col items-center justify-center gap-2 shadow-sm text-center">
                                                <i className="fa-solid fa-comments text-2xl"></i> <span className="text-xs uppercase tracking-widest">Bate-Papo</span>
                                            </button>
                                        </div>
                                    )}

                                    {simulado.isAiExplaining && !simulado.isAiChatting && (
                                        <div className="mb-8 p-6 bg-slate-50 dark:bg-slate-900/40 rounded-3xl border border-slate-200 dark:border-slate-800 flex items-center justify-center gap-4 text-emerald-600 dark:text-emerald-400 font-bold shadow-inner">
                                            <i className="fa-solid fa-circle-notch fa-spin text-2xl"></i> A preparar a sua ferramenta de fixação...
                                        </div>
                                    )}

                                    {simulado.aiExplanation && (
                                        <div className="mb-8 p-6 md:p-8 bg-slate-50 dark:bg-slate-900/40 rounded-3xl border border-slate-200 dark:border-slate-800 text-slate-900 dark:text-slate-100 shadow-inner animate-in slide-in-from-top-2 relative">
                                            <button onClick={() => setSimulado(p => ({...p, aiExplanation: ''}))} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-500 hover:text-slate-700 transition-colors" title="Fechar ferramenta"><i className="fa-solid fa-xmark"></i></button>
                                            <h4 className="font-black flex items-center gap-2 mb-6 text-emerald-600 dark:text-emerald-500 text-lg border-b border-slate-200 dark:border-slate-700 pb-4"><i className="fa-solid fa-robot"></i> Resposta do Mentor IA</h4>
                                            <div className="text-[15px] leading-relaxed text-justify-custom whitespace-pre-wrap font-medium" dangerouslySetInnerHTML={{__html: simulado.aiExplanation.replace(/\*\*(.*?)\*\*/g, '<b class="font-black">$1</b>').replace(/\n/g, '<br/>')}}></div>
                                        </div>
                                    )}

                                    {simulado.isAiChatting && (
                                        <div className="mb-8 p-6 md:p-8 bg-slate-50 dark:bg-slate-900/40 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-inner animate-in slide-in-from-top-2 relative">
                                            <button onClick={() => setSimulado(p => ({...p, isAiChatting: false, aiChatMessages: [], isAiExplaining: false}))} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-500 hover:text-slate-700 transition-colors" title="Fechar Bate-Papo"><i className="fa-solid fa-xmark"></i></button>
                                            <h4 className="font-black flex items-center gap-2 mb-6 text-sky-600 dark:text-sky-500 text-lg border-b border-slate-200 dark:border-slate-700 pb-4"><i className="fa-solid fa-comments"></i> Bate-Papo com o Mentor IA</h4>
                                            
                                            <div className="space-y-4 mb-4 max-h-[400px] overflow-y-auto pr-2 chat-scroll flex flex-col">
                                                {(simulado.aiChatMessages || []).map((msg, i) => {
                                                    if (i === 0 && msg.role === 'user') return null; // hide initial prompt
                                                    return (
                                                        <div key={i} className={`flex gap-3 ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                            {msg.role === 'model' && <div className="w-8 h-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center shrink-0"><i className="fa-solid fa-robot"></i></div>}
                                                            <div className={`p-4 rounded-2xl max-w-[85%] text-[15px] font-medium leading-relaxed whitespace-pre-wrap text-justify-custom ${msg.role === 'user' ? 'bg-sky-600 text-white rounded-tr-sm' : 'bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-tl-sm'}`} dangerouslySetInnerHTML={{__html: msg.text.replace(/\*\*(.*?)\*\*/g, '<b class="font-black">$1</b>').replace(/\n/g, '<br/>')}}></div>
                                                        </div>
                                                    )
                                                })}
                                                {simulado.isAiExplaining && (
                                                    <div className="flex gap-3 justify-start">
                                                        <div className="w-8 h-8 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center shrink-0"><i className="fa-solid fa-robot"></i></div>
                                                        <div className="p-4 rounded-2xl bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-tl-sm flex items-center gap-2">
                                                            <i className="fa-solid fa-circle-notch fa-spin"></i> O Mentor está a digitar...
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <div className="flex gap-2">
                                                <input type="text" id="inlineChatInput" placeholder="Responda ao Mentor..." onKeyDown={(e) => {
                                                    if (e.key === 'Enter') {
                                                        const val = e.target.value;
                                                        if (!val.trim() || simulado.isAiExplaining) return;
                                                        e.target.value = '';
                                                        setSimulado(p => {
                                                            const newMsgs = [...(p.aiChatMessages||[]), { role: 'user', text: val }];
                                                            const msgsToApi = newMsgs.map(m => ({ role: m.role, parts: [{text: m.text}] }));
                                                            callIA(msgsToApi).then(r => {
                                                                setSimulado(p2 => ({ ...p2, isAiExplaining: false, aiChatMessages: [...p2.aiChatMessages, { role: 'model', text: r || "Erro na comunicação." }] }));
                                                            });
                                                            return { ...p, isAiExplaining: true, aiChatMessages: newMsgs };
                                                        });
                                                    }
                                                }} className="flex-1 bg-white dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-sky-500 text-sm font-bold text-zinc-800 dark:text-zinc-100" />
                                                <button onClick={(e) => {
                                                    const input = e.currentTarget.previousElementSibling;
                                                    if (input && input.value.trim() && !simulado.isAiExplaining) {
                                                        const val = input.value;
                                                        input.value = '';
                                                        setSimulado(p => {
                                                            const newMsgs = [...(p.aiChatMessages||[]), { role: 'user', text: val }];
                                                            const msgsToApi = newMsgs.map(m => ({ role: m.role, parts: [{text: m.text}] }));
                                                            callIA(msgsToApi).then(r => {
                                                                setSimulado(p2 => ({ ...p2, isAiExplaining: false, aiChatMessages: [...p2.aiChatMessages, { role: 'model', text: r || "Erro na comunicação." }] }));
                                                            });
                                                            return { ...p, isAiExplaining: true, aiChatMessages: newMsgs };
                                                        });
                                                    }
                                                }} className="bg-sky-600 hover:bg-sky-700 text-white w-12 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-paper-plane"></i></button>
                                            </div>
                                        </div>
                                    )}
                                    {/* ----------------------------- */}

                                    <button onClick={()=>{ 
                                        if(simulado.isReviewing) { setSimulado(p=>({...p, isReviewing:false, showResults:true, aiExplanation: '', isAiExplaining: false, crossedAlts: [], highlightedText: ''})); window.scrollTo(0,0); }
                                        else if(simulado.curIdx < simulado.deck.length-1) { setSimulado(p=>({...p, curIdx:p.curIdx+1, showAns:false, selAlt:null, timeElapsed:0, aiExplanation: '', isAiExplaining: false, crossedAlts: [], highlightedText: ''})); window.scrollTo(0,0); }
                                        else finishSimulado(); 
                                    }} className="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-emerald-600/20 hover:bg-emerald-700 active:scale-95 transition-all text-lg flex justify-center items-center gap-3">
                                        {simulado.isReviewing ? 'Voltar aos Resultados' : (simulado.curIdx < simulado.deck.length-1 ? 'Avançar para Próxima' : 'Ver Resultados Finais')} <i className="fa-solid fa-arrow-right"></i>
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderSimuladoResultsUI = () => {
                const hits = simulado.results.filter(r=>r.isCorrect).length;
                const tot = simulado.deck.length;
                const perc = Math.round((hits/tot)*100);

                return (
                    <div className="max-w-4xl mx-auto py-10 w-full animate-in fade-in pt-12">
                        <div className="bg-white dark:bg-zinc-900 rounded-[40px] p-10 shadow-2xl border border-zinc-200 dark:border-zinc-800 text-center">
                            <h2 className="text-4xl font-black mb-4 dark:text-white">Simulado Concluído!</h2>
                            <p className="text-zinc-500 font-bold mb-10 uppercase tracking-widest text-xs">Resumo do Desempenho</p>
                            
                            <div className="flex flex-wrap justify-center gap-6 mb-12">
                                <div className="bg-zinc-50 dark:bg-zinc-950 p-8 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner flex-1 min-w-[200px]"><span className={`block text-6xl font-black mb-2 ${perc>=70?'text-emerald-500':perc>=50?'text-amber-500':'text-red-500'}`}>{perc}%</span><span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Taxa de Acerto</span></div>
                                <div className="bg-zinc-50 dark:bg-zinc-950 p-8 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner flex-1 min-w-[200px]"><span className="block text-6xl font-black text-emerald-500 mb-2">{hits}</span><span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Certas</span></div>
                                <div className="bg-zinc-50 dark:bg-zinc-950 p-8 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner flex-1 min-w-[200px]"><span className="block text-6xl font-black text-red-500 mb-2">{tot-hits}</span><span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Erradas</span></div>
                            </div>
                            
                            <div className="text-left mb-12">
                                <h3 className="font-black text-lg mb-6 dark:text-white flex items-center gap-2"><i className="fa-solid fa-list-check text-emerald-500"></i> Gabarito da Sessão</h3>
                                <div className="space-y-3">
                                    {simulado.deck.map((q, i) => {
                                        const r = simulado.results.find(x=>x.id===q.id);
                                        return (
                                            <div key={q.id} onClick={()=>{setSimulado(p=>({...p, curIdx:i, isReviewing:true, showResults:false, crossedAlts: [], highlightedText: ''})); window.scrollTo(0,0);}} className="p-4 bg-zinc-50 dark:bg-zinc-950 rounded-2xl border border-zinc-200 dark:border-zinc-800 flex justify-between items-center cursor-pointer hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all group">
                                                <span className="font-bold text-sm truncate mr-4 text-zinc-700 dark:text-zinc-300 group-hover:text-emerald-700 dark:group-hover:text-emerald-400 transition-colors">Q{i+1}. {q.title}</span>
                                                <div className="flex items-center gap-3 shrink-0">
                                                    <span className="text-[10px] font-mono text-zinc-400 bg-white dark:bg-zinc-900 px-2 py-1 rounded border dark:border-zinc-700"><i className="fa-regular fa-clock"></i> {formatTime(r?.timeSpent)}</span>
                                                    <span className={`w-24 text-center px-3 py-1.5 rounded-lg text-xs font-black uppercase ${r?.isCorrect ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-100 text-red-700 border border-red-200'}`}>{r?.isCorrect?'<i class="fa-solid fa-check"></i> Certo':'<i class="fa-solid fa-xmark"></i> Errado'}</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row gap-4">
                                <button onClick={()=>{ setActiveTab('chat'); handleChatSend(`Acabei de terminar um simulado focado. Tive ${hits} acertos em ${tot} questões (${perc}%). Podes fazer uma análise breve do meu desempenho e dar-me dicas de estudo ativo?`); }} className="flex-1 py-5 bg-emerald-600 text-white font-black rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 hover:bg-emerald-700 transition-all text-lg"><i className="fa-solid fa-robot ai-glow rounded-full text-xl"></i> Discutir com IA</button>
                                
                                {tot - hits > 0 && (
                                    <button onClick={handleGenerateFlashcards} disabled={simulado.isGeneratingFlashcards} className="flex-1 py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 hover:bg-indigo-700 transition-all text-lg disabled:opacity-50 disabled:active:scale-100">
                                        {simulado.isGeneratingFlashcards ? <i className="fa-solid fa-circle-notch fa-spin text-xl"></i> : <i className="fa-solid fa-clone ai-glow rounded-full text-xl"></i>} 
                                        {simulado.isGeneratingFlashcards ? 'Gerando Cartões...' : 'Gerar Flashcards dos Erros'}
                                    </button>
                                )}
                                
                                <button onClick={clearDeck} className="flex-1 py-5 bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 dark:text-zinc-300 font-black rounded-2xl hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-all text-lg">Voltar</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderSimuladosTab = () => (
                <div className="p-6 space-y-8 animate-in fade-in">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-white dark:bg-zinc-900 p-8 md:p-10 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800">
                            <h2 className="text-2xl font-black mb-8 flex items-center gap-3 text-emerald-600 dark:text-emerald-500"><i className="fa-solid fa-sliders"></i> Configurar Novo Treino</h2>
                            <div className="space-y-8 text-zinc-900 dark:text-zinc-100">
                                <div>
                                    <label className="text-xs font-black text-zinc-400 uppercase mb-3 block tracking-widest"><i className="fa-solid fa-layer-group mr-2"></i> Volume de Questões</label>
                                    <div className="flex gap-2 bg-zinc-50 dark:bg-zinc-950 p-2 rounded-2xl border border-zinc-200 dark:border-zinc-800">
                                        {[10, 20, 50].map(n => (<button key={n} onClick={()=>setSimQty(n)} className={`flex-1 py-3 rounded-xl font-black transition-all ${simQty===n ? 'bg-emerald-600 text-white shadow-md' : 'hover:bg-zinc-200 dark:hover:bg-zinc-800 text-zinc-500'}`}>{n} Qs</button>))}
                                    </div>
                                </div>
                                <button onClick={()=>setSimUseSpaced(!simUseSpaced)} className={`w-full p-6 rounded-3xl border-2 flex justify-between items-center group transition-all active:scale-[0.98] ${simUseSpaced ? 'bg-emerald-50 border-emerald-500 dark:bg-emerald-900/20 dark:border-emerald-600' : 'bg-zinc-50 border-zinc-200 dark:bg-zinc-950 dark:border-zinc-800'}`}>
                                    <div className="text-left">
                                        <span className={`font-black block text-lg mb-1 ${simUseSpaced ? 'text-emerald-800 dark:text-emerald-400' : 'text-zinc-600 dark:text-zinc-400'}`}>Revisão Espaçada IA</span>
                                        <span className="text-xs font-bold opacity-60">Prioriza automaticamente os erros e temas esquecidos</span>
                                    </div>
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center shadow-sm transition-all ${simUseSpaced ? 'bg-emerald-500 text-white scale-110' : 'bg-zinc-300 dark:bg-zinc-700 text-transparent'}`}><i className="fa-solid fa-check"></i></div>
                                </button>
                                <button onClick={()=>startSimulado()} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-6 rounded-3xl shadow-xl shadow-emerald-600/20 active:scale-95 transition-all text-xl flex items-center justify-center gap-3"><i className="fa-solid fa-play"></i> Iniciar Simulado</button>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-zinc-900 p-8 md:p-10 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col">
                            <h2 className="text-2xl font-black mb-8 flex items-center gap-3 text-zinc-400"><i className="fa-solid fa-clock-rotate-left"></i> Sessões Anteriores</h2>
                            <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                                {db.simuladoHistory.map(h => (
                                    <div key={h.id} className="p-5 bg-zinc-50 dark:bg-zinc-950 rounded-3xl flex justify-between items-center border border-zinc-200 dark:border-zinc-800 animate-in slide-in-from-bottom-2 hover:border-emerald-500 transition-colors">
                                        <div>
                                            <span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest block mb-1"><i className="fa-regular fa-calendar mr-1"></i> {h.date}</span>
                                            <span className="font-bold dark:text-zinc-100 text-sm">{h.hits} de {h.total} Acertos <span className="opacity-50 font-normal ml-1">({h.context||'Geral'})</span></span>
                                        </div>
                                        <span className={`px-4 py-2 rounded-xl text-sm font-black border ${h.hits/h.total >= 0.7 ? 'bg-emerald-100 text-emerald-700 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800' : 'bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-900/30 dark:border-amber-800'}`}>{Math.round(h.hits/h.total*100)}%</span>
                                    </div>
                                ))}
                                {db.simuladoHistory.length === 0 && (
                                    <div className="h-full flex flex-col items-center justify-center opacity-40 text-center py-10">
                                        <i className="fa-solid fa-ghost text-6xl mb-4"></i>
                                        <p className="font-black italic">Nenhuma sessão registada.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderJogosTab = () => {
                if (gameState.view === 'edit') {
                    const g = gameState.data;
                    const updatePair = (pId, field, type, val) => {
                        setGameState(prev => ({...prev, data: {...prev.data, pairs: prev.data.pairs.map(p => p.id === pId ? {...p, [field]: {type, val}} : p)}}));
                    };
                    const addPair = () => setGameState(prev => ({...prev, data: {...prev.data, pairs: [...prev.data.pairs, {id: Date.now() + Math.random(), a: {type:'text', val:''}, b: {type:'text', val:''}}]}}));
                    const removePair = (pId) => setGameState(prev => ({...prev, data: {...prev.data, pairs: prev.data.pairs.filter(p => p.id !== pId)}}));
                    
                    const handleImg = (e, pId, field) => {
                        const file = e.target.files[0]; if (!file) return;
                        const reader = new FileReader();
                        reader.onload = async (ev) => {
                            const b64 = await compressImage(ev.target.result);
                            updatePair(pId, field, 'image', b64);
                        };
                        reader.readAsDataURL(file); e.target.value = '';
                    };

                    const saveGame = () => {
                        if(!g.title.trim()) return showAlert('Dê um título ao jogo!');
                        if(g.pairs.length < 2) return showAlert('Adicione pelo menos 2 pares para jogar.');
                        
                        setDb(p => {
                            const isNew = !p.games?.find(x => x.id === g.id);
                            const newGames = isNew ? [g, ...(p.games || [])] : (p.games||[]).map(x => x.id === g.id ? g : x);
                            return { ...p, games: newGames };
                        });
                        setGameState({ view: 'list', data: null, play: null });
                        showAlert('Jogo guardado com sucesso!');
                    };

                    const deleteGame = () => {
                        if(window.confirm('Tem a certeza que deseja excluir este jogo permanentemente?')) {
                            setDb(p => ({...p, games: (p.games || []).filter(x => x.id !== g.id)}));
                            setGameState({ view: 'list', data: null, play: null });
                            showAlert('Jogo excluído com sucesso!');
                        }
                    };

                    return (
                        <div className="p-6 space-y-6 animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 max-w-4xl mx-auto">
                                <div className="flex justify-between items-center mb-8 border-b border-zinc-100 dark:border-zinc-800 pb-4">
                                    <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500 flex items-center gap-3"><i className="fa-solid fa-gamepad"></i> Criador de Jogos</h2>
                                    <button onClick={() => setGameState({view:'list', data:null, play:null})} className="w-10 h-10 flex items-center justify-center bg-zinc-100 dark:bg-zinc-800 text-zinc-400 hover:text-red-500 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>

                                <div className="mb-6">
                                    <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Título do Jogo</label>
                                    <input value={g.title} onChange={e=>setGameState(p=>({...p, data:{...p.data, title:e.target.value}}))} placeholder="Ex: Anatomia Cardíaca" className="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-zinc-800 dark:text-zinc-100" />
                                </div>

                                <div className="space-y-4 mb-8">
                                    {g.pairs.map((p, i) => (
                                        <div key={p.id} className="flex flex-col md:flex-row gap-4 p-5 border border-zinc-200 dark:border-zinc-800 rounded-3xl bg-zinc-50 dark:bg-zinc-950 relative group">
                                            <button onClick={()=>removePair(p.id)} className="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-red-100 text-red-500 dark:bg-red-900/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-md"><i className="fa-solid fa-trash text-xs"></i></button>
                                            
                                            {['a', 'b'].map(side => (
                                                <div key={side} className="flex-1 flex flex-col gap-2">
                                                    <span className="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Par {i+1} - Lado {side.toUpperCase()}</span>
                                                    {p[side].type === 'image' ? (
                                                        <div className="relative h-24 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl overflow-hidden flex items-center justify-center group/img">
                                                            <img src={p[side].val} onClick={(e) => { e.stopPropagation(); setLightbox(p[side].val); }} className="max-h-full max-w-full object-contain cursor-zoom-in hover:scale-105 transition-transform" title="Clique para ampliar" />
                                                            <button onClick={()=>updatePair(p.id, side, 'text', '')} className="absolute inset-0 bg-black/50 text-white flex items-center justify-center opacity-0 group-hover/img:opacity-100 transition-all font-bold text-sm"><i className="fa-solid fa-trash mr-2"></i> Remover Imagem</button>
                                                        </div>
                                                    ) : (
                                                        <div className="flex gap-2 h-24">
                                                            <textarea value={p[side].val} onChange={e=>updatePair(p.id, side, 'text', e.target.value)} placeholder="Texto correspondente..." className="flex-1 p-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 outline-none focus:ring-2 focus:ring-indigo-500 resize-none font-bold text-sm text-zinc-800 dark:text-zinc-200 shadow-sm"></textarea>
                                                            <label className="w-16 shrink-0 bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors border border-indigo-100 dark:border-indigo-800 shadow-sm" title="Adicionar Imagem">
                                                                <i className="fa-solid fa-image text-xl mb-1"></i><span className="text-[9px] font-black uppercase">Img</span>
                                                                <input type="file" accept="image/*" className="hidden" onChange={e=>handleImg(e, p.id, side)} />
                                                            </label>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>

                                <div className="flex flex-col sm:flex-row gap-4">
                                    <button onClick={addPair} className="flex-1 py-4 rounded-2xl bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 font-black hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors flex items-center justify-center gap-2"><i className="fa-solid fa-plus"></i> Novo Par</button>
                                    <button onClick={saveGame} className="flex-1 py-4 rounded-2xl bg-indigo-600 text-white font-black hover:bg-indigo-700 transition-colors shadow-lg flex items-center justify-center gap-2"><i className="fa-solid fa-floppy-disk"></i> Salvar Jogo</button>
                                    {db.games?.some(x => x.id === g.id) && (
                                        <button onClick={deleteGame} className="py-4 px-6 rounded-2xl bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 font-black hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors shadow-sm flex items-center justify-center gap-2" title="Excluir este jogo permanentemente"><i className="fa-solid fa-trash"></i> Excluir</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                }

                if (gameState.view === 'play') {
                    const { deck, flipped, matched, moves, isFinished } = gameState.play;
                    
                    const handleCardClick = (idx) => {
                        if (isFinished || flipped.length === 2 || flipped.includes(idx) || matched.includes(idx)) return;
                        
                        const newFlipped = [...flipped, idx];
                        setGameState(prev => ({...prev, play: {...prev.play, flipped: newFlipped}}));
                        
                        if (newFlipped.length === 2) {
                            const match = deck[newFlipped[0]].pairId === deck[newFlipped[1]].pairId;
                            setTimeout(() => {
                                setGameState(prev => {
                                    const p = prev.play;
                                    const newMatched = match ? [...p.matched, newFlipped[0], newFlipped[1]] : p.matched;
                                    const finished = newMatched.length === deck.length;
                                    return {...prev, play: {
                                        ...p, 
                                        flipped: [], 
                                        matched: newMatched,
                                        moves: p.moves + 1,
                                        isFinished: finished
                                    }};
                                });
                            }, 1200); // 1.2s para memorizar a posição
                        }
                    };

                    return (
                        <div className="p-6 space-y-6 animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 min-h-[60vh]">
                                <div className="flex justify-between items-center mb-8 border-b border-zinc-100 dark:border-zinc-800 pb-4">
                                    <div>
                                        <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500">{gameState.data.title}</h2>
                                        <p className="text-sm font-bold text-zinc-400">Movimentos: <span className="text-indigo-500">{moves}</span> | Pares: {matched.length/2}/{deck.length/2}</p>
                                    </div>
                                    <button onClick={() => setGameState({view:'list', data:null, play:null})} className="px-6 py-3 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 font-black rounded-2xl hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">Voltar</button>
                                </div>

                                {isFinished ? (
                                    <div className="text-center py-20 animate-in zoom-in duration-500">
                                        <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl shadow-emerald-500/20"><i className="fa-solid fa-trophy text-5xl"></i></div>
                                        <h3 className="text-4xl font-black text-emerald-600 mb-4">Desafio Concluído!</h3>
                                        <p className="text-lg text-zinc-600 dark:text-zinc-400 font-bold mb-8">Memória afiada. Resolvido em {moves} movimentos.</p>
                                        <button onClick={() => setGameState({view:'list', data:null, play:null})} className="px-10 py-4 bg-indigo-600 text-white rounded-3xl font-black shadow-xl hover:bg-indigo-700 transition-all text-lg">Escolher Outro Jogo</button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                        {deck.map((card, idx) => {
                                            const isFlipped = flipped.includes(idx) || matched.includes(idx);
                                            const isMatchedThis = matched.includes(idx);
                                            return (
                                                <div key={idx} onClick={() => handleCardClick(idx)} className={`aspect-[4/3] rounded-3xl cursor-pointer transition-all duration-300 border-[3px] flex items-center justify-center p-2 sm:p-3 text-center shadow-sm relative overflow-hidden ${isFlipped ? (isMatchedThis ? 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-400 dark:border-emerald-600' : 'bg-white dark:bg-zinc-800 border-indigo-400 dark:border-indigo-600 scale-[1.02] shadow-lg') : 'bg-indigo-50 dark:bg-indigo-900/30 border-indigo-200 dark:border-indigo-800 hover:border-indigo-400 dark:hover:border-indigo-500 hover:scale-105'}`}>
                                                    {isFlipped ? (
                                                        card.data.type === 'image' 
                                                            ? <img src={card.data.val} onClick={(e) => { e.stopPropagation(); setLightbox(card.data.val); }} className="w-full h-full object-contain rounded-xl animate-in fade-in cursor-zoom-in" title="Clique para ampliar" />
                                                            : <div className="w-full h-full overflow-y-auto flex flex-col justify-center" style={{ scrollbarWidth: 'none', msOverflowStyle: 'none' }}><span className="font-bold text-xs sm:text-sm text-zinc-800 dark:text-zinc-100 break-words leading-tight animate-in fade-in m-auto">{card.data.val}</span></div>
                                                    ) : (
                                                        <i className="fa-solid fa-brain text-4xl text-indigo-300 dark:text-indigo-700/50 opacity-50"></i>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                // List View
                return (
                    <div className="p-6 space-y-8 animate-in fade-in">
                        <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                            <div>
                                <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500 mb-2"><i className="fa-solid fa-gamepad mr-2"></i> Jogos de Memória</h2>
                                <p className="text-sm font-bold text-zinc-400">Crie os seus próprios jogos associando imagens a textos ou textos a textos para reter a memória ativamente.</p>
                            </div>
                            <div className="flex gap-4 w-full md:w-auto">
                                <input type="file" id="game-ai-up" accept="image/*,application/pdf" onChange={(e) => {
                                    const file = e.target.files[0]; if (!file) return;
                                    const reader = new FileReader();
                                    reader.onload = async (ev) => {
                                        const b64 = await compressImage(ev.target.result);
                                        processGameAI(b64);
                                    };
                                    reader.readAsDataURL(file); e.target.value = '';
                                }} className="hidden" />
                                <label htmlFor="game-ai-up" className="w-full md:w-auto cursor-pointer bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400 px-8 py-4 rounded-3xl font-black shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95 whitespace-nowrap border border-indigo-100 dark:border-indigo-800 hover:bg-indigo-100 dark:hover:bg-indigo-900/50"><i className="fa-solid fa-wand-magic-sparkles text-lg text-amber-500"></i> Gerar com IA</label>
                                <button onClick={() => setGameState({view:'edit', data: {id: Date.now(), title: '', pairs: [{id:Date.now()+1, a:{type:'text',val:''}, b:{type:'text',val:''}}, {id:Date.now()+2, a:{type:'text',val:''}, b:{type:'text',val:''}}]}, play: null})} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-3xl font-black shadow-lg shadow-indigo-600/20 flex items-center gap-3 transition-all active:scale-95 shrink-0 whitespace-nowrap"><i className="fa-solid fa-plus text-lg"></i> Criar Jogo</button>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {(db.games || []).map(g => (
                                <div key={g.id} className="bg-white dark:bg-zinc-900 p-8 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-lg group transition-all flex flex-col relative overflow-hidden">
                                    <div className="absolute -right-6 -top-6 text-indigo-50 dark:text-indigo-900/10 transition-transform group-hover:scale-110 z-0">
                                        <i className="fa-solid fa-puzzle-piece text-9xl"></i>
                                    </div>
                                    <div className="relative z-10 flex-1">
                                        <h3 className="font-black text-xl text-zinc-800 dark:text-zinc-100 mb-2 leading-tight pr-8">{g.title}</h3>
                                        <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest mb-8">{g.pairs.length} Pares de Cartas</p>
                                    </div>
                                    
                                    <div className="flex gap-3 relative z-10">
                                        <button onClick={() => {
                                            let deck = [];
                                            g.pairs.forEach(p => {
                                                if((p.a.val || p.a.type==='image') && (p.b.val || p.b.type==='image')) {
                                                    deck.push({ id: p.id+'_a', pairId: p.id, data: p.a });
                                                    deck.push({ id: p.id+'_b', pairId: p.id, data: p.b });
                                                }
                                            });
                                            deck = deck.sort(() => 0.5 - Math.random());
                                            setGameState({ view: 'play', data: g, play: { deck, flipped: [], matched: [], moves: 0, isFinished: false } });
                                        }} className="flex-1 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-400 py-3 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-indigo-200 dark:hover:bg-indigo-900/60 transition-colors"><i className="fa-solid fa-play"></i> Jogar</button>
                                        <button onClick={() => setGameState({view:'edit', data: g, play: null})} className="w-12 h-12 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-indigo-600 rounded-2xl flex items-center justify-center transition-colors"><i className="fa-solid fa-pen-nib"></i></button>
                                        <button onClick={() => {if(window.confirm('Excluir este jogo permanentemente?')) setDb(p=>({...p, games: p.games.filter(x=>x.id!==g.id)}));}} className="w-12 h-12 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-2xl flex items-center justify-center transition-colors"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                            {(!db.games || db.games.length === 0) && (
                                <div className="col-span-full py-20 text-center text-zinc-400 font-black italic">
                                    <i className="fa-solid fa-gamepad text-6xl mb-4 block opacity-30"></i> 
                                    Nenhum jogo criado ainda. <br/>Crie um jogo da memória para estudar!
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderChecklistsTab = () => {
                if (checklistState.view === 'edit') {
                    const c = checklistState.data;
                    const updateChecklist = (field, val) => setChecklistState(p => ({...p, data: {...p.data, [field]: val}}));
                    
                    const addItem = () => updateChecklist('items', [...c.items, { id: Date.now() + Math.random(), text: '', note: '', done: false }]);
                    const updateItem = (id, field, val) => updateChecklist('items', c.items.map(i => i.id === id ? {...i, [field]: val} : i));
                    const removeItem = (id) => updateChecklist('items', c.items.filter(i => i.id !== id));

                    const saveChecklist = () => {
                        if(!c.title.trim()) return showAlert('O checklist precisa de um título!');
                        if(c.items.length === 0 || c.items.every(i => !i.text.trim())) return showAlert('Adicione pelo menos um item válido.');
                        
                        setDb(p => {
                            const cleanItems = c.items.filter(i => i.text.trim());
                            const finalChecklist = { ...c, items: cleanItems, lastUpdated: Date.now() };
                            const isNew = !p.checklists?.find(x => x.id === c.id);
                            return { ...p, checklists: isNew ? [finalChecklist, ...(p.checklists || [])] : (p.checklists || []).map(x => x.id === c.id ? finalChecklist : x) };
                        });
                        setChecklistState({ view: 'list', data: null });
                        showAlert('Checklist guardado com sucesso!');
                    };

                    const selectedTheme = CHECKLIST_THEMES.find(t => t.id === c.theme) || CHECKLIST_THEMES[0];

                    return (
                        <div className="max-w-3xl mx-auto p-6 space-y-6 animate-in fade-in pb-20">
                            <button onClick={() => setChecklistState({view:'list', data:null})} className="flex items-center gap-2 text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 font-bold transition-colors mb-4"><i className="fa-solid fa-arrow-left"></i> Voltar à Galeria</button>
                            
                            <div className={`bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border-t-8 border-x border-b border-zinc-200 dark:border-zinc-800 ${selectedTheme.border.replace('border-', 'border-t-')}`}>
                                <div className="mb-8">
                                    <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Tema de Cores</label>
                                    <div className="flex gap-3">
                                        {CHECKLIST_THEMES.map(theme => (
                                            <button key={theme.id} onClick={() => updateChecklist('theme', theme.id)} className={`w-8 h-8 rounded-full transition-all ${theme.bg} ${c.theme === theme.id ? 'ring-4 ring-zinc-200 dark:ring-zinc-700 scale-110 shadow-md' : 'opacity-40 hover:opacity-100'}`} title={`Tema ${theme.id}`}></button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-6 mb-10">
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Título do Protocolo / Checklist</label>
                                        <input value={c.title} onChange={e=>updateChecklist('title', e.target.value)} placeholder="Ex: Protocolo de Sepse - 1ª Hora" className={`w-full p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-950 font-black text-xl outline-none focus:ring-2 focus:ring-${c.theme}-500 transition-all border border-zinc-200 dark:border-zinc-800 text-zinc-800 dark:text-zinc-100`} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Descrição Curta (Opcional)</label>
                                        <textarea value={c.description} onChange={e=>updateChecklist('description', e.target.value)} placeholder="Ex: Passos críticos para evitar mortalidade..." className="w-full p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-950 font-bold text-sm outline-none focus:ring-2 focus:ring-zinc-500 transition-all resize-none border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400" rows="2"></textarea>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="font-black text-zinc-700 dark:text-zinc-300">Itens de Verificação</h3>
                                    </div>
                                    
                                    {c.items.map((item, i) => (
                                        <div key={item.id} className={`p-4 rounded-2xl border transition-all bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 group relative`}>
                                            <div className="flex items-start gap-4">
                                                <div className={`mt-1 w-6 h-6 rounded-full border-2 border-zinc-300 dark:border-zinc-700 flex items-center justify-center text-[10px] font-black text-zinc-400`}>{i+1}</div>
                                                <div className="flex-1 space-y-3">
                                                    <input value={item.text} onChange={e=>updateItem(item.id, 'text', e.target.value)} placeholder="Nome do passo (Ex: Medir Lactato)" className="w-full bg-transparent font-bold text-zinc-800 dark:text-zinc-100 outline-none border-b border-dashed border-zinc-300 dark:border-zinc-700 focus:border-zinc-500 pb-1" />
                                                    <div className="flex gap-2">
                                                        <i className="fa-solid fa-lightbulb text-amber-500 mt-2 opacity-70"></i>
                                                        <textarea value={item.note} onChange={e=>updateItem(item.id, 'note', e.target.value)} placeholder="Dica didática ou detalhe do protocolo (opcional)..." rows="1" className="w-full bg-transparent text-xs font-medium text-zinc-500 dark:text-zinc-400 italic outline-none resize-none"></textarea>
                                                    </div>
                                                </div>
                                                <button onClick={()=>removeItem(item.id)} className="text-zinc-300 hover:text-red-500 dark:text-zinc-600 dark:hover:text-red-400 transition-colors p-2"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-8 flex flex-col sm:flex-row gap-4">
                                    <button onClick={addItem} className="flex-1 py-4 rounded-2xl bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 font-black hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors shadow-sm"><i className="fa-solid fa-plus mr-2"></i> Adicionar Passo</button>
                                    <button onClick={saveChecklist} className={`flex-1 py-4 rounded-2xl text-white font-black transition-colors shadow-lg shadow-${c.theme}-500/30 ${selectedTheme.bg} hover:brightness-110`}><i className="fa-solid fa-floppy-disk mr-2"></i> Gravar Checklist</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (checklistState.view === 'execute') {
                    const c = db.checklists?.find(x => x.id === checklistState.data?.id);
                    if (!c) return null;
                    
                    const theme = CHECKLIST_THEMES.find(t => t.id === c.theme) || CHECKLIST_THEMES[0];
                    const completedCount = c.items.filter(i => i.done).length;
                    const totalCount = c.items.length;
                    const progress = Math.round((completedCount / totalCount) * 100);
                    const isAllDone = completedCount === totalCount;

                    const toggleItem = (itemId) => {
                        setDb(p => ({
                            ...p, checklists: p.checklists.map(chk => {
                                if (chk.id !== c.id) return chk;
                                return {
                                    ...chk,
                                    lastUpdated: Date.now(),
                                    items: chk.items.map(i => i.id === itemId ? { ...i, done: !i.done } : i)
                                };
                            })
                        }));
                    };

                    const resetChecklist = () => {
                        if(window.confirm('Deseja desmarcar todos os itens e recomeçar?')) {
                            setDb(p => ({
                                ...p, checklists: p.checklists.map(chk => chk.id === c.id ? { ...chk, items: chk.items.map(i => ({...i, done: false})) } : chk)
                            }));
                        }
                    };

                    return (
                        <div className="max-w-3xl mx-auto p-6 space-y-6 animate-in fade-in pb-24">
                            <button onClick={() => setChecklistState({view:'list', data:null})} className="flex items-center gap-2 text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 font-bold transition-colors mb-2"><i className="fa-solid fa-arrow-left"></i> Voltar à Galeria</button>
                            
                            <div className="bg-white dark:bg-zinc-900 rounded-[40px] shadow-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden">
                                <div className={`${theme.light} p-8 md:p-10 border-b ${theme.border} relative overflow-hidden transition-all`}>
                                    {isAllDone && <div className="absolute inset-0 bg-white/20 dark:bg-black/20 flex items-center justify-center pointer-events-none"><i className={`fa-solid fa-check text-[150px] opacity-10 ${theme.text}`}></i></div>}
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-start gap-4 mb-6">
                                            <div>
                                                <h2 className={`text-3xl font-black ${theme.text} mb-2 leading-tight`}>{c.title}</h2>
                                                {c.description && <p className="text-zinc-600 dark:text-zinc-400 font-medium">{c.description}</p>}
                                            </div>
                                            <button onClick={resetChecklist} className="w-10 h-10 shrink-0 bg-white dark:bg-zinc-800 rounded-full flex items-center justify-center text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 shadow-sm transition-colors" title="Recomeçar Checklist"><i className="fa-solid fa-rotate-left"></i></button>
                                        </div>
                                        
                                        <div className="bg-white/60 dark:bg-zinc-950/40 rounded-2xl p-4 border border-white/40 dark:border-zinc-800/50 backdrop-blur-sm">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-black uppercase tracking-widest text-zinc-500">Progresso</span>
                                                <span className={`text-sm font-black ${theme.text}`}>{completedCount} / {totalCount} ({progress}%)</span>
                                            </div>
                                            <div className="h-2.5 bg-zinc-200/50 dark:bg-zinc-800 rounded-full overflow-hidden">
                                                <div className={`h-full ${theme.bg} transition-all duration-500 ease-out`} style={{width: `${progress}%`}}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 md:p-8 space-y-3">
                                    {c.items.map((item, i) => (
                                        <div key={item.id} onClick={() => toggleItem(item.id)} className={`group p-4 md:p-5 rounded-3xl border-2 transition-all cursor-pointer flex gap-4 ${item.done ? 'bg-zinc-50 dark:bg-zinc-950/50 border-zinc-200 dark:border-zinc-800 opacity-60' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600 shadow-sm'}`}>
                                            <div className="mt-1">
                                                <input type="checkbox" checked={item.done} onChange={()=>{}} className={`check-custom ${item.done ? theme.text : 'text-zinc-300 dark:text-zinc-600'}`} />
                                            </div>
                                            <div className="flex-1 pt-0.5">
                                                <h4 className={`text-lg font-bold leading-tight transition-colors ${item.done ? 'line-through text-zinc-500' : 'text-zinc-800 dark:text-zinc-100'}`}>{item.text}</h4>
                                                {item.note && (
                                                    <div className={`mt-2 flex gap-2 items-start ${item.done ? 'opacity-50' : ''}`}>
                                                        <i className="fa-solid fa-lightbulb text-amber-500 mt-1 flex-shrink-0"></i>
                                                        <p className="text-sm font-medium text-zinc-500 dark:text-zinc-400 italic leading-relaxed">{item.note}</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {isAllDone && (
                                    <div className={`p-6 border-t border-zinc-100 dark:border-zinc-800 text-center font-black ${theme.text} bg-zinc-50 dark:bg-zinc-950 animate-in slide-in-from-bottom-4`}>
                                        <i className="fa-solid fa-check-double text-2xl mb-2 block"></i>
                                        Protocolo concluído com sucesso!
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                // List View
                return (
                    <div className="p-6 space-y-8 animate-in fade-in">
                        <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                            <div>
                                <h2 className="text-2xl font-black text-emerald-600 dark:text-emerald-500 mb-2"><i className="fa-solid fa-list-check mr-2"></i> Checklists Médicos</h2>
                                <p className="text-sm font-bold text-zinc-400">Crie protocolos didáticos passo-a-passo. Ótimo para fixar rotinas de emergência ou enfermarias.</p>
                            </div>
                            <button onClick={() => setChecklistState({view:'edit', data: {id: Date.now(), title: '', description: '', theme: 'emerald', items: [{id:Date.now()+1, text:'', note:'', done:false}]}})} className="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-3xl font-black shadow-lg shadow-emerald-600/20 flex items-center gap-3 transition-all active:scale-95 shrink-0 whitespace-nowrap"><i className="fa-solid fa-plus text-lg"></i> Criar Protocolo</button>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {(db.checklists || []).map(c => {
                                const theme = CHECKLIST_THEMES.find(t => t.id === c.theme) || CHECKLIST_THEMES[0];
                                const doneCount = c.items.filter(i=>i.done).length;
                                const total = c.items.length;
                                const isAllDone = total > 0 && doneCount === total;
                                
                                return (
                                    <div key={c.id} className="bg-white dark:bg-zinc-900 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-lg group transition-all flex flex-col relative overflow-hidden cursor-pointer hover:-translate-y-1 hover:shadow-xl" onClick={() => setChecklistState({view:'execute', data: {id: c.id}})}>
                                        <div className={`h-3 w-full ${theme.bg}`}></div>
                                        <div className="p-6 md:p-8 flex-1 flex flex-col">
                                            <div className="flex justify-between items-start mb-4 gap-2">
                                                <h3 className={`font-black text-xl ${theme.text} leading-tight line-clamp-2`}>{c.title}</h3>
                                            </div>
                                            {c.description && <p className="text-sm font-bold text-zinc-500 mb-6 line-clamp-2 leading-relaxed">{c.description}</p>}
                                            
                                            <div className="mt-auto">
                                                <div className="flex justify-between items-end mb-2">
                                                    <span className="text-xs font-black uppercase text-zinc-400 tracking-widest">{total} Passos</span>
                                                    <span className={`font-black ${isAllDone ? theme.text : 'text-zinc-400'}`}>{doneCount}/{total}</span>
                                                </div>
                                                <div className="h-1.5 w-full bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                                                    <div className={`h-full ${theme.bg} transition-all duration-300`} style={{width: `${total === 0 ? 0 : (doneCount/total)*100}%`}}></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-zinc-50 dark:bg-zinc-950 border-t border-zinc-100 dark:border-zinc-800 p-4 flex justify-between items-center">
                                            <span className="text-xs font-bold text-zinc-400 flex items-center gap-1"><i className="fa-regular fa-clock"></i> Atualizado</span>
                                            <div className="flex gap-2">
                                                <button onClick={(e) => { e.stopPropagation(); setChecklistState({view:'edit', data: c}); }} className="w-10 h-10 rounded-full bg-white dark:bg-zinc-900 shadow-sm border border-zinc-200 dark:border-zinc-700 flex items-center justify-center text-zinc-500 hover:text-indigo-500 transition-colors"><i className="fa-solid fa-pen-nib"></i></button>
                                                <button onClick={(e) => { e.stopPropagation(); if(window.confirm('Excluir este checklist?')) setDb(p=>({...p, checklists: p.checklists.filter(x=>x.id!==c.id)})); }} className="w-10 h-10 rounded-full bg-white dark:bg-zinc-900 shadow-sm border border-zinc-200 dark:border-zinc-700 flex items-center justify-center text-zinc-500 hover:text-red-500 transition-colors"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            {(!db.checklists || db.checklists.length === 0) && (
                                <div className="col-span-full py-20 text-center text-zinc-400 font-black italic">
                                    <i className="fa-solid fa-list-check text-6xl mb-4 block opacity-30"></i> 
                                    Nenhum checklist criado. <br/>Crie protocolos passo-a-passo para memorização e prática!
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderPlannerTab = () => {
                const activeWeek = (db.weeks || []).find(w => w.id === activeWeekId);

                if (!activeWeekId || !activeWeek) {
                    return (
                        <div className="max-w-4xl mx-auto p-6 md:p-12 animate-in fade-in">
                            <header className="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-12">
                                <div>
                                    <h1 className="text-4xl font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-3">
                                        <i className="fa-solid fa-calendar-days text-3xl"></i> Planner Semanal
                                    </h1>
                                    <p className="text-zinc-500 dark:text-zinc-400 mt-2 flex items-center gap-2">
                                        <i className="fa-solid fa-cloud text-sm"></i> Guardado automaticamente offline e online
                                    </p>
                                </div>
                                <button onClick={() => setIsCreatingWeek(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-full font-bold shadow-lg flex items-center justify-center gap-2 transition-all hover:scale-105 w-full md:w-auto">
                                    <i className="fa-solid fa-plus text-lg"></i> Nova Semana
                                </button>
                            </header>

                            {isCreatingWeek && (
                                <div className="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl mb-12 border border-indigo-100 dark:border-zinc-800 animate-in fade-in zoom-in duration-300">
                                    <h2 className="text-xl font-bold mb-6 text-zinc-800 dark:text-zinc-100">Configurar Nova Semana</h2>
                                    <form onSubmit={handleCreateWeek} className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-semibold text-zinc-600 dark:text-zinc-400 mb-2">Título da Semana</label>
                                            <input type="text" value={newWeekTitle} onChange={(e) => setNewWeekTitle(e.target.value)} className="w-full p-4 bg-zinc-50 dark:bg-zinc-800 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-zinc-800 dark:text-zinc-100" placeholder="Ex: Foco no Projeto Alpha" autoFocus />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-zinc-600 dark:text-zinc-400 mb-2">Período</label>
                                            <input type="text" value={newWeekDate} onChange={(e) => setNewWeekDate(e.target.value)} className="w-full p-4 bg-zinc-50 dark:bg-zinc-800 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-zinc-800 dark:text-zinc-100" placeholder="Ex: 07/04 a 13/04" />
                                        </div>
                                        <div className="flex gap-4 pt-4">
                                            <button type="submit" className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-colors shadow-lg">Começar Semana</button>
                                            <button type="button" onClick={() => setIsCreatingWeek(false)} className="flex-1 bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 py-4 rounded-2xl font-bold hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">Cancelar</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            <div className="grid gap-6 md:grid-cols-2">
                                {(db.weeks || []).map(week => (
                                    <div key={week.id} onClick={() => setActiveWeekId(week.id)} className="bg-white dark:bg-zinc-900 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-sm hover:shadow-xl hover:border-indigo-400 dark:hover:border-indigo-600 transition-all cursor-pointer group relative">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="font-bold text-xl text-zinc-800 dark:text-zinc-100 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">{week.title}</h3>
                                                <p className="text-sm text-zinc-500 mt-1">{week.dateRange}</p>
                                            </div>
                                            <button onClick={(e) => handleDeleteWeek(e, week.id)} className="opacity-0 group-hover:opacity-100 p-2 text-zinc-400 hover:text-red-500 transition-all bg-zinc-50 dark:bg-zinc-800 rounded-full">
                                                <i className="fa-solid fa-trash text-sm"></i>
                                            </button>
                                        </div>
                                        <div className="flex items-center justify-between mt-6 pt-4 border-t border-zinc-50 dark:border-zinc-800">
                                            <div className="flex items-center gap-2">
                                                <span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Avaliação:</span>
                                                <span className="text-2xl">{week.rating > 0 ? RATINGS.find(r => r.value === week.rating)?.emoji : "⏳"}</span>
                                            </div>
                                            <div className="text-indigo-500 font-bold text-sm bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 rounded-full">Abrir Planner <i className="fa-solid fa-arrow-right text-xs ml-1"></i></div>
                                        </div>
                                    </div>
                                ))}
                                
                                {(!db.weeks || db.weeks.length === 0) && !isCreatingWeek && (
                                    <div className="col-span-full py-20 text-center bg-white dark:bg-zinc-900 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-sm">
                                        <i className="fa-solid fa-calendar-days text-5xl mx-auto text-zinc-300 dark:text-zinc-700 mb-4 block"></i>
                                        <p className="text-zinc-500 dark:text-zinc-400 font-bold">Ainda não tem semanas criadas.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                // Renderiza a Visualização da Semana Ativa
                return (
                    <div className="flex flex-col h-[calc(100vh-120px)] animate-in fade-in bg-zinc-50 dark:bg-zinc-950 rounded-[40px] shadow-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden">
                        <header className="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 p-4 md:p-6 flex flex-col md:flex-row md:items-center justify-between shrink-0 gap-4">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setActiveWeekId(null)} className="w-10 h-10 flex items-center justify-center hover:bg-zinc-100 dark:bg-zinc-800 rounded-full text-zinc-500 transition-colors shadow-sm border border-zinc-200 dark:border-zinc-700">
                                    <i className="fa-solid fa-arrow-left text-lg"></i>
                                </button>
                                <div>
                                    <h1 className="font-black text-xl text-indigo-600 dark:text-indigo-400 leading-none">{activeWeek.title}</h1>
                                    <p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mt-1">{activeWeek.dateRange}</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4 overflow-x-auto pb-2 md:pb-0">
                                <div className="flex items-center gap-2 bg-zinc-50 dark:bg-zinc-800 px-4 py-2 rounded-2xl border border-zinc-200 dark:border-zinc-700 shrink-0">
                                    <span className="text-[10px] font-black text-zinc-400 uppercase tracking-widest mr-2">Avaliação Semanal:</span>
                                    {RATINGS.map((r) => (
                                        <button key={r.value} onClick={() => updateWeek(activeWeek.id, { rating: activeWeek.rating === r.value ? 0 : r.value })} title={r.label}
                                            className={`text-xl transition-all hover:scale-125 ${activeWeek.rating === r.value ? 'opacity-100 scale-110 drop-shadow-md' : 'opacity-30 grayscale hover:grayscale-0'}`}
                                        >
                                            {r.emoji}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-x-auto flex p-4 md:p-6 gap-6 bg-zinc-50/50 dark:bg-zinc-950/50 planner-scroll items-start">
                            {DAYS.map(day => (
                                <DayColumn 
                                    key={day}
                                    day={day}
                                    tasks={activeWeek.days?.[day] || []}
