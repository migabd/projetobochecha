                                        <div key={item.id} onClick={() => toggleItem(item.id)} className={`group p-4 md:p-5 rounded-3xl border-2 transition-all cursor-pointer flex gap-4 ${item.done ? 'bg-zinc-50 dark:bg-zinc-950/50 border-zinc-200 dark:border-zinc-800 opacity-60' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600 shadow-sm'}`}>
                                            <div className="mt-1">
                                                <input type="checkbox" checked={item.done} onChange={() => { }} className={`check-custom ${item.done ? theme.text : 'text-zinc-300 dark:text-zinc-600'}`} />
                                            </div>
                                            <div className="flex-1 pt-0.5">
                                                <h4 className={`text-lg font-bold leading-tight transition-colors ${item.done ? 'line-through text-zinc-500' : 'text-zinc-800 dark:text-zinc-100'}`}>{item.text}</h4>
                                                {item.note && (
                                                    <div className={`mt-2 flex gap-2 items-start ${item.done ? 'opacity-50' : ''}`}>
                                                        <i className="fa-solid fa-lightbulb text-amber-500 mt-1 flex-shrink-0"></i>
                                                        <p className="text-sm font-medium text-zinc-500 dark:text-zinc-400 italic leading-relaxed">{item.note}</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {isAllDone && (
                                    <div className={`p-6 border-t border-zinc-100 dark:border-zinc-800 text-center font-black ${theme.text} bg-zinc-50 dark:bg-zinc-950 animate-in slide-in-from-bottom-4`}>
                                        <i className="fa-solid fa-check-double text-2xl mb-2 block"></i>
                                        Protocolo concluído com sucesso!
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                // List View
                return (
                    <div className="p-6 space-y-8 animate-in fade-in">
                        <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                            <div>
                                <h2 className="text-2xl font-black text-emerald-600 dark:text-emerald-500 mb-2"><i className="fa-solid fa-list-check mr-2"></i> Checklists Médicos</h2>
                                <p className="text-sm font-bold text-zinc-400">Crie protocolos didáticos passo-a-passo. Ótimo para fixar rotinas de emergência ou enfermarias.</p>
                            </div>
                            <button onClick={() => setChecklistState({ view: 'edit', data: { id: Date.now(), title: '', description: '', theme: 'emerald', items: [{ id: Date.now() + 1, text: '', note: '', done: false }] } })} className="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-3xl font-black shadow-lg shadow-emerald-600/20 flex items-center gap-3 transition-all active:scale-95 shrink-0 whitespace-nowrap"><i className="fa-solid fa-plus text-lg"></i> Criar Protocolo</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {(db.checklists || []).map(c => {
                                const theme = CHECKLIST_THEMES.find(t => t.id === c.theme) || CHECKLIST_THEMES[0];
                                const doneCount = c.items.filter(i => i.done).length;
                                const total = c.items.length;
                                const isAllDone = total > 0 && doneCount === total;

                                return (
                                    <div key={c.id} className="bg-white dark:bg-zinc-900 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-lg group transition-all flex flex-col relative overflow-hidden cursor-pointer hover:-translate-y-1 hover:shadow-xl" onClick={() => setChecklistState({ view: 'execute', data: { id: c.id } })}>
                                        <div className={`h-3 w-full ${theme.bg}`}></div>
                                        <div className="p-6 md:p-8 flex-1 flex flex-col">
                                            <div className="flex justify-between items-start mb-4 gap-2">
                                                <h3 className={`font-black text-xl ${theme.text} leading-tight line-clamp-2`}>{c.title}</h3>
                                            </div>
                                            {c.description && <p className="text-sm font-bold text-zinc-500 mb-6 line-clamp-2 leading-relaxed">{c.description}</p>}

                                            <div className="mt-auto">
                                                <div className="flex justify-between items-end mb-2">
                                                    <span className="text-xs font-black uppercase text-zinc-400 tracking-widest">{total} Passos</span>
                                                    <span className={`font-black ${isAllDone ? theme.text : 'text-zinc-400'}`}>{doneCount}/{total}</span>
                                                </div>
                                                <div className="h-1.5 w-full bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                                                    <div className={`h-full ${theme.bg} transition-all duration-300`} style={{ width: `${total === 0 ? 0 : (doneCount / total) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-zinc-50 dark:bg-zinc-950 border-t border-zinc-100 dark:border-zinc-800 p-4 flex justify-between items-center">
                                            <span className="text-xs font-bold text-zinc-400 flex items-center gap-1"><i className="fa-regular fa-clock"></i> Atualizado</span>
                                            <div className="flex gap-2">
                                                <button onClick={(e) => { e.stopPropagation(); setChecklistState({ view: 'edit', data: c }); }} className="w-10 h-10 rounded-full bg-white dark:bg-zinc-900 shadow-sm border border-zinc-200 dark:border-zinc-700 flex items-center justify-center text-zinc-500 hover:text-indigo-500 transition-colors"><i className="fa-solid fa-pen-nib"></i></button>
                                                <button onClick={(e) => { e.stopPropagation(); if (window.confirm('Excluir este checklist?')) setDb(p => ({ ...p, checklists: p.checklists.filter(x => x.id !== c.id) })); }} className="w-10 h-10 rounded-full bg-white dark:bg-zinc-900 shadow-sm border border-zinc-200 dark:border-zinc-700 flex items-center justify-center text-zinc-500 hover:text-red-500 transition-colors"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            {(!db.checklists || db.checklists.length === 0) && (
                                <div className="col-span-full py-20 text-center text-zinc-400 font-black italic">
                                    <i className="fa-solid fa-list-check text-6xl mb-4 block opacity-30"></i>
                                    Nenhum checklist criado. <br />Crie protocolos passo-a-passo para memorização e prática!
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderPlannerTab = () => {
                const activeWeek = (db.weeks || []).find(w => w.id === activeWeekId);

                if (!activeWeekId || !activeWeek) {
                    return (
                        <div className="max-w-4xl mx-auto p-6 md:p-12 animate-in fade-in">
                            <header className="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-12">
                                <div>
                                    <h1 className="text-4xl font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-3">
                                        <i className="fa-solid fa-calendar-days text-3xl"></i> Planner Semanal
                                    </h1>
                                    <p className="text-zinc-500 dark:text-zinc-400 mt-2 flex items-center gap-2">
                                        <i className="fa-solid fa-cloud text-sm"></i> Guardado automaticamente offline e online
                                    </p>
                                </div>
                                <button onClick={() => setIsCreatingWeek(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-full font-bold shadow-lg flex items-center justify-center gap-2 transition-all hover:scale-105 w-full md:w-auto">
                                    <i className="fa-solid fa-plus text-lg"></i> Nova Semana
                                </button>
                            </header>

                            {isCreatingWeek && (
                                <div className="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl mb-12 border border-indigo-100 dark:border-zinc-800 animate-in fade-in zoom-in duration-300">
                                    <h2 className="text-xl font-bold mb-6 text-zinc-800 dark:text-zinc-100">Configurar Nova Semana</h2>
                                    <form onSubmit={handleCreateWeek} className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-semibold text-zinc-600 dark:text-zinc-400 mb-2">Título da Semana</label>
                                            <input type="text" value={newWeekTitle} onChange={(e) => setNewWeekTitle(e.target.value)} className="w-full p-4 bg-zinc-50 dark:bg-zinc-800 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-zinc-800 dark:text-zinc-100" placeholder="Ex: Foco no Projeto Alpha" autoFocus />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-zinc-600 dark:text-zinc-400 mb-2">Período</label>
                                            <input type="text" value={newWeekDate} onChange={(e) => setNewWeekDate(e.target.value)} className="w-full p-4 bg-zinc-50 dark:bg-zinc-800 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-zinc-800 dark:text-zinc-100" placeholder="Ex: 07/04 a 13/04" />
                                        </div>
                                        <div className="flex gap-4 pt-4">
                                            <button type="submit" className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-colors shadow-lg">Começar Semana</button>
                                            <button type="button" onClick={() => setIsCreatingWeek(false)} className="flex-1 bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 py-4 rounded-2xl font-bold hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">Cancelar</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            <div className="grid gap-6 md:grid-cols-2">
                                {(db.weeks || []).map(week => (
                                    <div key={week.id} onClick={() => setActiveWeekId(week.id)} className="bg-white dark:bg-zinc-900 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-sm hover:shadow-xl hover:border-indigo-400 dark:hover:border-indigo-600 transition-all cursor-pointer group relative">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="font-bold text-xl text-zinc-800 dark:text-zinc-100 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">{week.title}</h3>
                                                <p className="text-sm text-zinc-500 mt-1">{week.dateRange}</p>
                                            </div>
                                            <button onClick={(e) => handleDeleteWeek(e, week.id)} className="opacity-0 group-hover:opacity-100 p-2 text-zinc-400 hover:text-red-500 transition-all bg-zinc-50 dark:bg-zinc-800 rounded-full">
                                                <i className="fa-solid fa-trash text-sm"></i>
                                            </button>
                                        </div>
                                        <div className="flex items-center justify-between mt-6 pt-4 border-t border-zinc-50 dark:border-zinc-800">
                                            <div className="flex items-center gap-2">
                                                <span className="text-[10px] font-black uppercase text-zinc-400 tracking-widest">Avaliação:</span>
                                                <span className="text-2xl">{week.rating > 0 ? RATINGS.find(r => r.value === week.rating)?.emoji : "⏳"}</span>
                                            </div>
                                            <div className="text-indigo-500 font-bold text-sm bg-indigo-50 dark:bg-indigo-900/30 px-4 py-2 rounded-full">Abrir Planner <i className="fa-solid fa-arrow-right text-xs ml-1"></i></div>
                                        </div>
                                    </div>
                                ))}

                                {(!db.weeks || db.weeks.length === 0) && !isCreatingWeek && (
                                    <div className="col-span-full py-20 text-center bg-white dark:bg-zinc-900 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-sm">
                                        <i className="fa-solid fa-calendar-days text-5xl mx-auto text-zinc-300 dark:text-zinc-700 mb-4 block"></i>
                                        <p className="text-zinc-500 dark:text-zinc-400 font-bold">Ainda não tem semanas criadas.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                // Renderiza a Visualização da Semana Ativa
                return (
                    <div className="flex flex-col h-[calc(100vh-120px)] animate-in fade-in bg-zinc-50 dark:bg-zinc-950 rounded-[40px] shadow-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden">
                        <header className="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 p-4 md:p-6 flex flex-col md:flex-row md:items-center justify-between shrink-0 gap-4">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setActiveWeekId(null)} className="w-10 h-10 flex items-center justify-center hover:bg-zinc-100 dark:bg-zinc-800 rounded-full text-zinc-500 transition-colors shadow-sm border border-zinc-200 dark:border-zinc-700">
                                    <i className="fa-solid fa-arrow-left text-lg"></i>
                                </button>
                                <div>
                                    <h1 className="font-black text-xl text-indigo-600 dark:text-indigo-400 leading-none">{activeWeek.title}</h1>
                                    <p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mt-1">{activeWeek.dateRange}</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4 overflow-x-auto pb-2 md:pb-0">
                                <div className="flex items-center gap-2 bg-zinc-50 dark:bg-zinc-800 px-4 py-2 rounded-2xl border border-zinc-200 dark:border-zinc-700 shrink-0">
                                    <span className="text-[10px] font-black text-zinc-400 uppercase tracking-widest mr-2">Avaliação Semanal:</span>
                                    {RATINGS.map((r) => (
                                        <button key={r.value} onClick={() => updateWeek(activeWeek.id, { rating: activeWeek.rating === r.value ? 0 : r.value })} title={r.label}
                                            className={`text-xl transition-all hover:scale-125 ${activeWeek.rating === r.value ? 'opacity-100 scale-110 drop-shadow-md' : 'opacity-30 grayscale hover:grayscale-0'}`}
                                        >
                                            {r.emoji}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-x-auto flex p-4 md:p-6 gap-6 bg-zinc-50/50 dark:bg-zinc-950/50 planner-scroll items-start">
                            {DAYS.map(day => (
                                <DayColumn
                                    key={day}
                                    day={day}
                                    tasks={activeWeek.days?.[day] || []}
                                    onUpdate={(newTasks) => {
                                        const updatedDays = { ...activeWeek.days, [day]: newTasks };
                                        updateWeek(activeWeek.id, { days: updatedDays });
                                    }}
                                />
                            ))}
                        </main>
                    </div>
                );
            };

            const renderTabContent = () => {
                if (showForm) return (
                    <div className="relative overflow-hidden p-5 md:p-8 max-w-4xl mx-auto bg-white dark:bg-zinc-900 rounded-3xl md:rounded-[40px] border dark:border-zinc-800 shadow-2xl animate-in slide-in-from-top-4 mt-4 md:mt-6 mb-10 text-zinc-900 dark:text-zinc-100">

                        {/* --- OVERLAY DE CARREGAMENTO OCR --- */}
                        {isAiLoading && (
                            <div className="absolute inset-0 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-md z-50 flex flex-col items-center justify-center animate-in fade-in duration-300">
                                <div className="w-20 h-20 border-4 border-emerald-200 dark:border-emerald-900/50 border-t-emerald-500 dark:border-t-emerald-400 rounded-full animate-spin mb-6 shadow-[0_0_30px_rgba(16,185,129,0.3)]"></div>
                                <h3 className="text-2xl font-black text-emerald-600 dark:text-emerald-400 mb-3 tracking-widest uppercase">A processar imagem...</h3>
                                <p className="text-sm font-bold text-zinc-500 dark:text-zinc-400 animate-pulse flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-amber-500"></i> Extraindo texto e analisando alternativas com IA</p>
                            </div>
                        )}

                        <div className="flex justify-between items-center mb-10 border-b border-zinc-100 dark:border-zinc-800 pb-6">
                            <h2 className="text-3xl font-black text-emerald-600 dark:text-emerald-500 flex items-center gap-3"><i className="fa-solid fa-file-medical"></i> {editingId ? 'Editar Registo' : 'Novo Erro Médico'}</h2>
                            <button onClick={() => { setShowForm(false); setEditingId(null); setFormData(emptyForm); }} className="w-10 h-10 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-red-500 rounded-full flex items-center justify-center transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
                        </div>

                        <form onSubmit={handleFormSubmit} className="space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div><label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Tema / Diagnóstico</label><input required value={formData.title} onChange={handleInputChange} name="title" placeholder="Ex: Sífilis na Gestação" className="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 font-bold outline-none focus:ring-2 focus:ring-emerald-500 transition-all" /></div>
                                <div><label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Área Médica</label><select value={formData.subject} onChange={handleInputChange} name="subject" className="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 font-bold outline-none focus:ring-2 focus:ring-emerald-500 transition-all cursor-pointer">{db.subjects.map(s => <option key={s.id} value={s.id} className="dark:bg-zinc-900">{s.name}</option>)}</select></div>
                            </div>

                            <div>
                                <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2 flex justify-between items-end">
                                    <span>Enunciado da Questão</span>
                                    <div className="flex gap-2">
                                        <input type="file" id="ocr-up" accept="image/*" className="hidden" onChange={handleOCRUpload} />
                                        <label htmlFor="ocr-up" className="cursor-pointer bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 px-3 py-1 rounded-lg text-[10px] font-black hover:bg-emerald-200 transition-all border border-emerald-200 dark:border-emerald-800"><i className="fa-solid fa-wand-magic-sparkles mr-1"></i> Extrair Texto (OCR)</label>
                                        <input type="file" id="file-q" accept="image/*" className="hidden" onChange={e => handleImageUpload(e, 'error')} />
                                        <label htmlFor="file-q" className="cursor-pointer bg-zinc-200 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 px-3 py-1 rounded-lg text-[10px] font-black hover:bg-zinc-300 transition-all border border-zinc-300 dark:border-zinc-700"><i className="fa-solid fa-paperclip mr-1"></i> Anexar Imagem</label>
                                    </div>
                                </label>
                                <textarea required value={formData.question} onChange={handleInputChange} name="question" rows="4" placeholder="Cole aqui o texto (ou pressione Ctrl+V para colar um Print Screen e a IA resolve automaticamente)..." className="w-full p-5 rounded-3xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 outline-none focus:ring-2 focus:ring-emerald-500 text-justify leading-relaxed font-medium shadow-inner"></textarea>
                                {formData.image && <div className="mt-4 relative inline-block p-2 bg-zinc-100 dark:bg-zinc-900 rounded-2xl border border-zinc-200 dark:border-zinc-800"><img src={formData.image} className="max-h-40 rounded-xl cursor-pointer hover:opacity-90 transition-opacity" onClick={() => setImageToEdit(formData.image)} alt="Anexo" /><button type="button" onClick={() => setFormData({ ...formData, image: null })} className="absolute -top-2 -right-2 bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg border-2 border-white dark:border-zinc-900 hover:scale-110 transition-transform"><i className="fa-solid fa-trash text-xs"></i></button></div>}
                            </div>

                            {/* --- SEÇÃO DE FILTROS E TAGS --- */}
                            <div className="bg-zinc-50 dark:bg-zinc-950 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner">
                                <label className="flex items-center gap-2 text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-3">
                                    <i className="fa-solid fa-tags"></i> Filtros e Categorias
                                </label>

                                <div className="flex flex-wrap gap-2 mb-3">
                                    {(formData.tags || []).map(tag => (
                                        <span key={tag} className="bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-400 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm">
                                            {tag}
                                            <button type="button" onClick={() => removeTag(tag)} className="hover:text-red-500 rounded-full p-0.5 transition"><i className="fa-solid fa-xmark"></i></button>
                                        </span>
                                    ))}
                                </div>

                                <div className="flex gap-2 mb-3">
                                    <input
                                        value={tagInput}
                                        onChange={(e) => setTagInput(e.target.value)}
                                        onKeyDown={handleAddTag}
                                        placeholder="Adicionar filtro (ex: Residência USP) e aperte Enter"
                                        className="flex-1 border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-bold text-zinc-700 dark:text-zinc-200"
                                    />
                                </div>

                                <div className="flex flex-wrap gap-2">
                                    <span className="text-xs text-zinc-500 self-center mr-1 font-bold">Sugestões rápidas:</span>
                                    <button type="button" onClick={() => addSpecificTag("Provas/Concursos")} className="text-xs bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 rounded-lg px-3 py-2 hover:bg-zinc-50 dark:hover:bg-zinc-700 transition font-bold shadow-sm">+ Provas/Concursos</button>
                                    <button type="button" onClick={() => addSpecificTag("Módulos da faculdade")} className="text-xs bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 rounded-lg px-3 py-2 hover:bg-zinc-50 dark:hover:bg-zinc-700 transition font-bold shadow-sm">+ Módulos da faculdade</button>
                                </div>

                                {/* --- SUBFILTROS DINÂMICOS --- */}
                                {(formData.tags?.includes("Provas/Concursos") || formData.tags?.includes("Módulos da faculdade")) && (
                                    <div className="mt-4 pt-4 border-t border-zinc-200 dark:border-zinc-800 space-y-3 animate-in slide-in-from-top-2">
                                        {formData.tags?.includes("Provas/Concursos") && (
                                            <div>
                                                <label className="block text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1">Especifique a Prova (Subfiltro)</label>
                                                <input value={formData.examId} onChange={handleInputChange} name="examId" placeholder="Ex: ENAMED 2024, USP, SUS-SP" className="w-full border border-indigo-200 dark:border-indigo-900/50 bg-indigo-50/50 dark:bg-indigo-900/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-bold text-indigo-700 dark:text-indigo-300" />
                                            </div>
                                        )}
                                        {formData.tags?.includes("Módulos da faculdade") && (
                                            <div>
                                                <label className="block text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1">Especifique o Módulo (Subfiltro)</label>
                                                <input value={formData.facId} onChange={handleInputChange} name="facId" placeholder="Ex: Cardiologia 4º Ano, Internato GO" className="w-full border border-emerald-200 dark:border-emerald-900/50 bg-emerald-50/50 dark:bg-emerald-900/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-bold text-emerald-700 dark:text-emerald-300" />
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                            {/* --- FIM SEÇÃO DE FILTROS --- */}

                            <div className="bg-zinc-50 dark:bg-zinc-950 p-6 md:p-8 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner">
                                <span className="text-xs font-black uppercase text-zinc-500 dark:text-zinc-400 tracking-widest flex items-center gap-2 mb-6"><i className="fa-solid fa-list-check"></i> Alternativas & Correção Detalhada</span>
                                <div className="space-y-4">
                                    {formData.alternatives.map((alt, i) => (
                                        <div key={i} className={`flex flex-col gap-3 p-5 rounded-2xl border-2 transition-all ${formData.correctAlternative === String.fromCharCode(65 + i) ? 'bg-emerald-50/50 border-emerald-400 dark:bg-emerald-900/10 dark:border-emerald-600 shadow-sm' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800'}`}>
                                            <div className="flex gap-4 items-center">
                                                <div className={`w-10 h-10 flex justify-center items-center rounded-xl font-black text-lg shrink-0 transition-colors ${formData.correctAlternative === String.fromCharCode(65 + i) ? 'bg-emerald-500 text-white shadow-md' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-400'}`}>{String.fromCharCode(65 + i)}</div>
                                                <input value={alt} onChange={e => handleAlternativeChange(i, e.target.value)} placeholder={`Texto da alternativa ${String.fromCharCode(65 + i)}`} className="flex-1 bg-transparent outline-none font-bold text-sm border-b border-dashed border-zinc-300 dark:border-zinc-700 focus:border-emerald-500 pb-1" />
                                                <div className="shrink-0 flex items-center justify-center w-10 h-10"><input type="radio" checked={formData.correctAlternative === String.fromCharCode(65 + i)} onChange={() => setFormData({ ...formData, correctAlternative: String.fromCharCode(65 + i) })} className="w-6 h-6 accent-emerald-500 cursor-pointer" title="Marcar como Gabarito" /></div>
                                            </div>
                                            <textarea value={formData.alternativeExplanations[i]} onChange={e => handleAltExplanationChange(i, e.target.value)} placeholder="Justificativa (Por que está certa ou errada?)..." rows="1" className="w-full bg-transparent text-xs opacity-80 italic outline-none ml-14 pl-2 border-l-2 border-zinc-200 dark:border-zinc-700 resize-none font-medium"></textarea>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-emerald-50 dark:bg-emerald-900/20 p-6 md:p-8 rounded-3xl border border-emerald-200 dark:border-emerald-800/50 shadow-inner">
                                <label className="block text-[10px] font-black text-emerald-600 dark:text-emerald-400 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-lightbulb text-lg text-amber-500"></i> Lição de Ouro</label>
                                <input required value={formData.lessonLearned} onChange={handleInputChange} name="lessonLearned" placeholder="Qual foi o seu erro? (Ex: Esqueci que a vacina é viva atenuada)" className="w-full bg-transparent font-black text-lg outline-none text-emerald-900 dark:text-emerald-100 border-b-2 border-dashed border-emerald-300 dark:border-emerald-700 focus:border-emerald-500 pb-2" />
                            </div>

                            <div className="flex flex-col-reverse md:flex-row gap-4 justify-end pt-8 border-t border-zinc-100 dark:border-zinc-800">
                                <button type="button" onClick={() => { setShowForm(false); setEditingId(null); setFormData(emptyForm); }} className="px-8 py-4 font-black text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-2xl transition-all">Cancelar</button>
                                <button type="submit" className="px-12 py-4 bg-emerald-600 text-white font-black rounded-2xl shadow-xl shadow-emerald-600/20 hover:bg-emerald-700 active:scale-95 transition-all text-lg"><i className="fa-solid fa-floppy-disk mr-2"></i> Gravar no Caderno</button>
                            </div>
                        </form>
                    </div>
                );

                if (simulado.isActive) return simulado.showResults ? renderSimuladoResultsUI() : renderSimuladoActive();

                const renderElaboradorTab = () => {
                    const handleElaboradorFile = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = async (ev) => {
                            let b64 = ev.target.result;
                            let mime = file.type || 'application/octet-stream';
                            if (mime.startsWith('image/')) b64 = await compressImage(b64);
                            setElaboradorState(p => ({ ...p, fileData: b64, mimeType: mime, fileName: file.name }));
                        };
                        reader.readAsDataURL(file);
                        e.target.value = '';
                    };

                    const generateElaborador = async () => {
                        setElaboradorState(p => ({ ...p, isGenerating: true, status: 'generating' }));
                        try {
                            const { type, difficulty, qty, focus } = elaboradorState.settings;

                            let typeInst = "Múltipla Escolha com 5 alternativas (A a E)";
                            if (type === 'ce') typeInst = "Certo ou Errado com apenas 2 alternativas: ['A) Certo', 'B) Errado']";
                            if (type === 'discursiva') typeInst = "Discursiva com apenas 1 alternativa representando o espelho de correção: ['A) Espelho de Resposta: ...']";

                            const prompt = `Atue como o examinador médico mais carrasco, impiedoso e exigente do mundo, padrão de excelência extrema de nível UTI.
Crie EXATAMENTE ${qty} questões do tipo: ${typeInst}. NÃO crie nem mais, nem menos do que o solicitado.
Nível de dificuldade: ${difficulty.toUpperCase()} (questões de hipercomplexidade clínica, raciocínio de multi-etapas, desenhadas para derrubar até especialistas, repletas de pegadinhas cruéis e detalhes vitais escondidos no enunciado).
Tema/Foco opcional: ${focus || 'Baseado estritamente no documento ou imagem anexado'}.

${elaboradorState.fileData ? 'NOTA DE VISÃO: Analise cuidadosamente a imagem ou documento fornecido. Se for uma imagem médica (RX, TC, Foto Clínica, ECG), baseie o caso clínico nos achados visuais. Se for um texto/PDF, use os dados fornecidos.' : ''}

INSTRUÇÃO CRÍTICA DE VARIEDADE (Seed: ${Date.now()}): É OBRIGATÓRIO que as questões sejam COMPLETAMENTE NOVAS e INÉDITAS. Explore ângulos clínicos inusitados, rodapés de livro, complicações raras, exceções à regra e cenários diagnósticos confusos. NÃO repita o mesmo padrão, foco ou doença principal que seria gerado por padrão. Fuja do óbvio!

IMPORTANTE: Retorne APENAS um objeto JSON válido, sem nenhum texto extra e sem formatação markdown.
[
  {
    "title": "Tema curto da questão (Ex: Sepse Pediátrica)",
    "question": "Enunciado clinicamente denso...",
    "alternatives": ["A) ...", "B) ..."],
    "alternativeExplanations": ["Exp A", "Exp B"],
    "correctAlternative": "A",
    "lessonLearned": "O detalhe matador desta questão."
  }
]`;
                            const visionModel = (!aiConfig.key || aiConfig.model.includes('gemma')) ? 'gemini-1.5-flash' : null;
                            let msgs = [];
                            if (elaboradorState.fileData) {
                                msgs = [{ role: 'user', parts: [{ inlineData: { data: elaboradorState.fileData.split(',')[1], mimeType: elaboradorState.mimeType } }, { text: prompt }] }];
                            } else {
                                msgs = [{ role: 'user', parts: [{ text: prompt }] }];
                            }

                            const res = await callIA(msgs, visionModel);
                            if (res && !res.startsWith('[ERRO')) {
                                const match = res.match(/\[[\s\S]*\]/);
                                if (!match) throw new Error("JSON não encontrado na resposta");
                                let generated = JSON.parse(match[0]);
                                if (Array.isArray(generated)) {
                                    generated = generated.slice(0, qty).map(q => ({
                                        ...q,
                                        tags: [...(q.tags || []), ...(elaboradorState.settings.customTag ? [elaboradorState.settings.customTag] : [])]
                                    }));
                                }
                                setElaboradorState(p => ({ ...p, questions: generated, status: 'done', isGenerating: false }));
                                showAlert(`✅ ${generated.length} questões de nível ${difficulty} geradas com sucesso!`);
                            } else {
                                throw new Error(res);
                            }
                        } catch (err) {
                            console.error(err);
                            showAlert("❌ Erro na geração: " + err.message);
                            setElaboradorState(p => ({ ...p, isGenerating: false, status: 'error' }));
                        }
                    };

                    const convertPlatformQuestions = async () => {
                        if (!elaboradorState.convertFilter) return showAlert("Selecione um filtro válido para converter.");

                        let pool = db.errors.filter(e => e.examId === elaboradorState.convertFilter || e.facId === elaboradorState.convertFilter || (e.tags && e.tags.includes(elaboradorState.convertFilter)));
                        if (pool.length === 0) return showAlert("Nenhuma questão encontrada para este filtro.");

                        pool.sort((a, b) => (a.isTransformed ? 1 : 0) - (b.isTransformed ? 1 : 0));

                        const qty = Math.min(Number(elaboradorState.convertQty) || 5, pool.length);
                        if (qty > 20) return showAlert("Por favor, limite a conversão a no máximo 20 questões por vez para evitar sobrecarga da IA.");

                        const selectedPool = pool.slice(0, qty);
                        const originalIds = selectedPool.map(q => q.id);

                        setElaboradorState(p => ({ ...p, isConverting: true, status: 'generating', originalIdsToMarkTransformed: originalIds }));

                        try {
                            const targetType = elaboradorState.convertTargetType;
                            let typeInst = "Múltipla Escolha com 5 alternativas (A a E)";
                            if (targetType === 'ce') typeInst = "Certo ou Errado com apenas 2 alternativas: ['A) Certo', 'B) Errado']";
                            if (targetType === 'discursiva') typeInst = "Discursiva com apenas 1 alternativa representando o espelho de correção: ['A) Espelho de Resposta: ...']";

                            const questionsJSON = JSON.stringify(selectedPool.map(q => ({ title: q.title, question: q.question, alternatives: q.alternatives, correctAlternative: q.correctAlternative })));

                            const prompt = `Atue como um Professor de Medicina.
Vou te fornecer um array JSON com ${selectedPool.length} questões. Sua tarefa é transformar CADA UMA destas questões para o seguinte formato: ${typeInst}.
Você deve retornar EXATAMENTE ${selectedPool.length} questões. Não adicione questões extras além das fornecidas.

Mantenha o mesmo nível de dificuldade e o mesmo núcleo de conhecimento clínico. Mude a estrutura do enunciado e das alternativas de acordo com o formato solicitado.

Aqui estão as questões originais:
${questionsJSON}

IMPORTANTE: Retorne APENAS um objeto JSON válido representando o novo array de questões convertidas. Siga rigorosamente esta estrutura:
[
  {
    "title": "Mesmo tema",
    "question": "Novo enunciado adaptado",
    "alternatives": ["A) ...", "B) ..."],
    "alternativeExplanations": ["Exp A", "Exp B"],
    "correctAlternative": "A",
    "lessonLearned": "Lição de ouro extraída."
  }
]`;

                            const res = await callIA([{ role: 'user', parts: [{ text: prompt }] }]);
                            if (res && !res.startsWith('[ERRO')) {
                                const match = res.match(/\[[\s\S]*\]/);
                                if (!match) throw new Error("JSON não encontrado na resposta");
                                let generated = JSON.parse(match[0]);
                                if (Array.isArray(generated)) {
                                    generated = generated.slice(0, qty).map(q => ({
                                        ...q,
                                        tags: [...(q.tags || []), ...(elaboradorState.settings.customTag ? [elaboradorState.settings.customTag] : [])]
                                     }));
                                }
                                setElaboradorState(p => ({ ...p, questions: generated, status: 'done', isConverting: false }));
                                showAlert(`✅ ${generated.length} questões convertidas com sucesso!`);
                            } else {
                                throw new Error(res);
                            }
                        } catch (err) {
                            console.error(err);
                            showAlert("❌ Erro na conversão: " + err.message);
                            setElaboradorState(p => ({ ...p, isConverting: false, status: 'error' }));
                        }
                    };

                    const saveListToPlatform = () => {
                        const listName = prompt("Digite um nome para salvar esta lista na plataforma:");
                        if (!listName) return;

                        const newList = {
                            id: Date.now().toString(),
                            name: listName,
                            date: new Date().toLocaleDateString('pt-PT'),
                            questions: elaboradorState.questions.map((q, i) => ({
                                id: Date.now() + i,
                                title: q.title || 'Questão Gerada',
                                question: q.question,
                                alternatives: q.alternatives,
                                alternativeExplanations: q.alternativeExplanations,
                                correctAlternative: q.correctAlternative,
                                lessonLearned: q.lessonLearned || '',
                                type: elaboradorState.settings.type,
                                difficulty: elaboradorState.settings.difficulty,
                                tags: q.tags || []
                            }))
                        };

                        setDb(p => ({
                            ...p,
                            processedQuestionLists: [newList, ...(p.processedQuestionLists || [])]
                        }));

                        showAlert(`✅ Lista "${listName}" gravada na plataforma com sucesso!`);
                    };

                    const saveToCaderno = () => {
                        const newErrors = elaboradorState.questions.map((q, i) => ({
                            id: Date.now() + i,
                            date: new Date().toLocaleDateString('pt-PT'),
                            title: q.title || 'Questão Gerada',
                            subject: db.subjects[0]?.id || 'clinica_medica',
                            examId: '', facId: '', type: elaboradorState.settings.type,
                            question: q.question,
                            alternatives: q.alternatives,
                            alternativeExplanations: q.alternativeExplanations,
                            correctAlternative: q.correctAlternative,
                            lessonLearned: q.lessonLearned || '',
                            reason: ERROR_REASONS[0],
                            tags: [...(q.tags || []), 'Gerada por IA', 'Elaborador']
                        }));
                        setDb(p => {
                            const updatedErrors = p.errors.map(err =>
                                elaboradorState.originalIdsToMarkTransformed.includes(err.id)
                                    ? { ...err, isTransformed: true }
                                    : err
                            );
                            setElaboradorState(prev => ({ ...prev, originalIdsToMarkTransformed: [] }));
                            return { ...p, errors: [...newErrors, ...updatedErrors] };
                        });

                        showAlert(`✅ ${newErrors.length} questões salvas no seu Caderno Geral!`);
                        setElaboradorState(p => ({ ...p, questions: [], status: 'idle', fileData: null, fileName: '' }));
                    };

                    const solveElaborador = () => {
                        if (elaboradorState.questions.length === 0) return;
                        const deck = elaboradorState.questions.map((q, i) => ({
                            ...q,
                            id: 'tmp_' + Date.now() + '_' + i,
                            date: new Date().toLocaleDateString('pt-PT'),
                            subject: db.subjects[0]?.id || 'clinica_medica',
                            type: elaboradorState.settings.type,
                            reason: ERROR_REASONS[0],
                            tags: [...(q.tags || []), 'Gerada por IA', 'Elaborador']
                        }));
                        setSimulado({
                            isActive: true, deck, curIdx: 0, showAns: false, selAlt: null, showResults: false,
                            isReviewing: false, timeElapsed: 0, results: [], aiExplanation: '', isAiExplaining: false,
                            isGeneratingFlashcards: false, crossedAlts: [], highlightedText: '',
                            source: 'elaborador'
                        });
                        setElaboradorState(p => ({ ...p, questions: [], status: 'idle', fileData: null, fileName: '' }));
                    };

                    const printElaboradorPDF = () => {
                        if (elaboradorState.questions.length === 0) return;
                        const printWindow = window.open('', '_blank');
                        if (!printWindow) return showAlert("Permita pop-ups para gerar o PDF.");
                        let html = `<html><head><title>Lista de Questões Elite</title>
                            <style>
                                body { font-family: 'Helvetica', sans-serif; padding: 25px; line-height: 1.6; color: #111; font-size: 13px; }
                                h1 { text-align: center; color: #047857; border-bottom: 2px solid #047857; padding-bottom: 15px; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
                                .header-info { text-align: center; margin-bottom: 30px; font-weight: bold; color: #555; }
                                .question { margin-bottom: 35px; page-break-inside: avoid; border: 1px solid #eaeaea; padding: 20px; border-radius: 8px; }
                                .title { font-weight: 900; font-size: 1.2em; margin-bottom: 10px; color: #065f46; }
                                .text { margin-bottom: 15px; text-align: justify; }
                                .alternatives { list-style-type: none; padding-left: 0; margin-top: 10px; }
                                .alternatives li { margin-bottom: 8px; padding: 8px; border: 1px dashed #ccc; border-radius: 4px; }
                                .gabarito-section { page-break-before: always; margin-top: 50px; }
                                .gabarito-title { text-align: center; font-size: 18px; font-weight: 900; color: #b91c1c; border-bottom: 2px solid #b91c1c; padding-bottom: 10px; margin-bottom: 25px; }
                                .gabarito-item { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
                                @media print { body { padding: 0; } @page { margin: 1.5cm; } }
                            </style>
                        </head><body>
                        <h1>Lista de Questões de Alto Desempenho</h1>
                        <div class="header-info">Gerado pelo Caderno IA PRO | Questões: ${elaboradorState.questions.length} | Nível: ${elaboradorState.settings.difficulty.toUpperCase()}</div>
                        `;
                        elaboradorState.questions.forEach((q, idx) => {
                            html += `<div class="question"><div class="title">Q${idx + 1}. ${q.title || 'Tema Elite'}</div>
                                <div class="text">${(q.question || '').replace(/\n/g, '<br>')}</div>`;
                            
                            if (q.type === 'discursiva') {
                                html += `<div style="border: 1px solid #e5e7eb; height: 120px; margin-top: 15px; border-radius: 8px; padding: 10px; color: #9ca3af; font-style: italic;">Espaço para resposta discursiva...</div>`;
                            } else {
                                html += `<ul class="alternatives">`;
                                (q.alternatives || []).forEach((alt, i) => {
                                    if (alt) html += `<li><strong>${String.fromCharCode(65 + i)})</strong> ${alt}</li>`;
                                });
                                html += `</ul>`;
                            }
                            html += `</div>`;
                        });

                        html += `<div class="gabarito-section"><div class="gabarito-title">GABARITO E EXPLICAÇÕES (CONFIDENCIAL)</div>`;
                        elaboradorState.questions.forEach((q, idx) => {
                            const answerContent = q.type === 'discursiva' ? (q.alternatives[0] || 'Espelho não disponível') : (q.correctAlternative || '?');
                            html += `<div class="gabarito-item">
                                <strong>Q${idx + 1}. Resposta: ${answerContent}</strong><br/>
                                <span style="font-size:11px;color:#444;"><em>Lição Ouro: ${q.lessonLearned}</em></span>
                            </div>`;
                        });
                        html += `</div></body></html>`;
                        printWindow.document.write(html); printWindow.document.close(); printWindow.focus();
                        setTimeout(() => printWindow.print(), 500);
                    };

                    return (
                        <div className="p-6 md:p-10 space-y-8 animate-in fade-in pb-24 text-zinc-900 dark:text-zinc-100">
                            <div className="bg-gradient-to-br from-emerald-900 to-zinc-900 p-10 rounded-[40px] shadow-2xl relative overflow-hidden border border-emerald-800">
                                <div className="absolute -right-10 -top-10 text-emerald-500/10"><i className="fa-solid fa-wand-magic-sparkles text-[250px]"></i></div>
                                <div className="relative z-10">
                                    <h2 className="text-3xl lg:text-4xl font-black text-white mb-2"><i className="fa-solid fa-flask text-emerald-400 mr-3"></i> Elaborador de Elite</h2>
                                    <p className="text-emerald-100/70 font-medium">Extraia o suco do seu material. Faça upload de PDFs, PPTs ou documentos e deixe a IA formular questões de altíssima complexidade.</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-1 space-y-6">
                                    <div className="bg-white dark:bg-zinc-900 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-xl">
                                        <h3 className="font-black text-lg mb-4 text-emerald-600 dark:text-emerald-400 border-b border-zinc-100 dark:border-zinc-800 pb-3"><i className="fa-solid fa-gears"></i> Parâmetros</h3>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1">Formato</label>
                                                <select value={elaboradorState.settings.type} onChange={e => setElaboradorState(p => ({ ...p, settings: { ...p.settings, type: e.target.value } }))} className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500">
                                                    <option value="multiple">Múltipla Escolha (A a E)</option>
                                                    <option value="ce">Certo ou Errado</option>
                                                    <option value="discursiva">Questões Discursivas</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1">Dificuldade</label>
                                                <select value={elaboradorState.settings.difficulty} onChange={e => setElaboradorState(p => ({ ...p, settings: { ...p.settings, difficulty: e.target.value } }))} className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500 text-red-600 dark:text-red-400">
                                                    <option value="difícil">Difícil (Residência)</option>
                                                    <option value="extremo">Extremo (R4 / Subespecialidade)</option>
                                                    <option value="uti">UTI (Pegadinhas Matadoras)</option>
                                                </select>
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="flex-1">
                                                    <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1">Qtd</label>
                                                    <input type="number" min="1" max="20" value={elaboradorState.settings.qty} onChange={e => setElaboradorState(p => ({ ...p, settings: { ...p.settings, qty: e.target.value } }))} className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500 text-center" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1">Foco Específico (Opcional)</label>
                                                <input type="text" placeholder="Ex: Focar apenas no tratamento medicamentoso" value={elaboradorState.settings.focus} onChange={e => setElaboradorState(p => ({ ...p, settings: { ...p.settings, focus: e.target.value } }))} className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500" />
                                            </div>

                    case 'elaborador': return renderElaboradorTab();
                    case 'analise_reversa': {
                        const handleReverseFiles = (e) => {
                            const fileList = Array.from(e.target.files);
                            if (!fileList.length) return;
                            const readers = fileList.map(file => new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onload = async (ev) => {
                                    let b64 = ev.target.result;
                                    let mime = file.type || 'application/octet-stream';
                                    if (mime.startsWith('image/')) b64 = await compressImage(b64);
                                    resolve({ name: file.name, data: b64, mimeType: mime });
                                };
                                reader.readAsDataURL(file);
                            }));
                            Promise.all(readers).then(results => {
                                setReverseAnalysis(p => ({ ...p, files: [...p.files, ...results] }));
                            });
                            e.target.value = '';

                        const removeReverseFile = (idx) => {

                        };

                        const runReverseAnalysis = async () => {
                            if (reverseAnalysis.files.length === 0) return showAlert('Envie pelo menos um PDF ou imagem de prova antiga.');
                            const banca = reverseAnalysis.bancaName.trim() || 'Banca Não Identificada';
                            setReverseAnalysis(p => ({ ...p, isAnalyzing: true, result: '' }));

                            try {
                                const prompt = `Você é um analista de bancas de concursos médicos de ALTÍSSIMO NÍVEL. Sua missão é realizar uma ANÁLISE REVERSA COMPLETA e DETALHADA de provas antigas da banca "${banca}".

Analise TODOS os documentos/imagens de provas anexados e produza um mapeamento EXTREMAMENTE DETALHADO, didático e estratégico.

INSTRUÇÃO ABSOLUTA E OBRIGATÓRIA (LEIA COM ATENÇÃO): É EXTREMAMENTE PROIBIDO resumir, agrupar ou pular questões. Você deve agir como um processador exaustivo. Para CADA QUESTÃO INDIVIDUAL presente no documento (sejam 5, 20 ou 50 questões), você DEVE criar um item no array "questoesAnalisadas". NÃO use frases como "questões de 1 a 10" ou omita dados. Para CADA uma, extraia a "Lição sobre o Padrão da Banca" (explicando cirurgicamente como aquela questão reflete o estilo, pegadinhas e padrão). Se houver 30 questões no documento, o array final DEVE ter exatamente 30 itens. Falhar nisso comprometerá a análise.

IMPORTANTE: Você DEVE retornar APENAS um objeto JSON válido, sem texto extra e sem marcação markdown (como \`\`\`json). Siga EXATAMENTE esta estrutura de chaves:

{
  "dnaBanca": {
    "dificuldadeGeral": 8,
    "perfilEstilo": "Resumo conciso do perfil psicológico e estilo da banca (ex: Conceitual, focado em rodapés de livro, prática mista, etc.)",
    "caracteristicasMarcantes": [
      "Característica marcante 1 com exemplos práticos",
      "Característica marcante 2",
      "Característica marcante 3"
    ]
  },
  "morfologiaAlternativaCorreta": {
    "comprimentoMedio": "Descrição detalhada (ex: Geralmente a mais longa e completa, ou extremamente concisa)",
    "linguagemUtilizada": "Linguagem técnica, rebuscada, ou simples e direta?",
    "termosAbsolutosVsRelativos": "Análise sobre o uso de absolutismos ('sempre', 'nunca') vs. relativizações ('frequentemente', 'pode ocorrer')",
    "distribuicaoGabarito": "Quais letras costumam concentrar o gabarito correto estatisticamente (ex: Forte tendência nas letras C e D)",
    "detalhesAdicionais": "Nuances sobre como a alternativa correta se destaca visual e semanticamente das erradas"
  },
  "padroesLinguisticos": {
    "estiloEnunciado": "Análise do padrão dos enunciados (casos clínicos longos, diretos, com dupla negação, etc.)",
    "palavrasChaveRecorrentes": ["EXCETO", "INCORRETO", "conduta inicial", "pode-se afirmar"],
    "usoDuplaNegacao": "Explicação se a banca usa ou não construções negativas complexas como armadilha",
    "conectivosLogicos": "Conectivos preferidos para introduzir exceções ou mudar o rumo da questão"
  },
  "logicaConstrucaoQuestoes": {
    "focoPrincipal": "A banca exige raciocínio em múltiplas etapas ou memorização pura de diretrizes?",
    "construcaoDistratores": [
      "Mecanismo 1 usado para criar alternativas incorretas (ex: trocar a dosagem correta pelo dobro)",
      "Mecanismo 2 (ex: associar o tratamento certo ao patógeno errado)",
      "Mecanismo 3"
    ],
    "armadilhasComuns": "As pegadinhas mais cruéis e recorrentes da banca",
    "regraVsExcecao": "A banca foca na regra geral ou nas exceções raras?"
  },
  "temasMaisCobrados": [
    { "tema": "Nome do Tema (ex: Sepse, Calendário Vacinal, Pré-Eclâmpsia)", "profundidade": "Superficial / Intermediária / Profunda" }
  ],
  "estrategiasResolucao": [
    "Estratégia prática e acionável 1 para o aluno aplicar na hora da prova",
    "Estratégia 2 para eliminação rápida de distratores",
    "Estratégia 3 focada em gerenciamento de tempo ou gatilhos visuais"
  ],
  "questoesAnalisadas": [
    {
      "identificacao": "Questão 1",
      "enunciadoResumido": "Resumo de 1 linha...",
      "gabarito": "Letra correta",
      "licaoPadraoBanca": "Lição DIRETA E CURTA (máx 2 frases) mostrando a armadilha ou o padrão exibido na questão."
    }
  ]
}`;

                                const parts = reverseAnalysis.files.map(f => ({
                                    inlineData: { data: f.data.split(',')[1], mimeType: f.mimeType }

                                const visionModel = (!aiConfig.key || aiConfig.model.includes('gemma')) ? 'gemini-1.5-flash' : null;

                                if (res && !res.startsWith('[ERRO')) {

                                        result: jsonStr,
                                        history: [newEntry, ...p.history],
                                        files: []
                                    }));
                                } else {
                                    throw new Error(res);
                                }

## 🔴 LÓGICA DE CONSTRUÇÃO DE QUESTÕES E DISTRATORES

${(obj.logicaConstrucaoQuestoes?.construcaoDistratores || []).map(d => `  * ${d}`).join('\n')}

## 🔵 TEMAS E ÁREAS MAIS COBRADAS
${(obj.temasMaisCobrados || []).map(t => `- **${t.tema}**: ${t.profundidade}`).join('\n')}

## 🟣 ESTRATÉGIAS DE RESOLUÇÃO RECOMENDADAS
${(obj.estrategiasResolucao || []).map(e => `- [ ] ${e}`).join('\n')}

## 🗂️ COMENTÁRIO INDIVIDUAL DE TODAS AS QUESTÕES APRESENTADAS
${(obj.questoesAnalisadas || []).map(q => `### ${q.identificacao}
- **Enunciado**: ${q.enunciadoResumido}
- **Gabarito**: ${q.gabarito}
- **💡 Lição sobre o Padrão da Banca**: ${q.licaoPadraoBanca}
`).join('\n')}
`;

                                                                                    <span className="text-xs font-bold text-zinc-700 dark:text-zinc-300 leading-tight">{d}</span>
                                                                               </div>

                                                    {/* Módulo 4: Temas e Áreas mais Cobradas (Azul/Sky) */}

                                                                                {t.profundidade}

                                                            <p className="text-[10px] font-bold text-sky-600 dark:text-sky-400 flex items-center gap-1">
                                                                <i className="fa-solid fa-circle-info"></i> Priorize revisões ativas nestes eixos de maior densidade.
                                                            </p>
                                                        </div>
                                                    </div>

                                                {/* Seção Inferior: Estratégias de Resolução (Roxo/Violeta Premium) */}

                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 relative z-10">

                                                    {parsedResult.questoesAnalisadas && parsedResult.questoesAnalisadas.length > 0 ? (
                                                        <div className="grid grid-cols-1 gap-6">

                                                                    <div className="absolute top-0 right-0 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 text-[10px] font-black px-3 py-1 rounded-bl-xl rounded-tr-2xl uppercase tracking-widest">{idx + 1}</div>

                                                                    <div className="mb-4">

                                                                        <p className="text-xs font-bold text-zinc-800 dark:text-zinc-200 bg-emerald-50 dark:bg-emerald-900/10 px-3 py-2 rounded-lg border border-emerald-100 dark:border-emerald-900/30">{q.gabarito}</p>
                                                                    </div>
                                                                    
                                                                    <div className="bg-amber-50 dark:bg-amber-900/10 rounded-xl p-4 border border-amber-200 dark:border-amber-900/30">
                                                                        <div className="flex items-center gap-2 mb-2">
                                                                            <i className="fa-solid fa-lightbulb text-amber-500"></i>
                                                                            <span className="text-[10px] font-black uppercase tracking-widest text-amber-700 dark:text-amber-500">Lição sobre o Padrão da Banca</span>

                                                                Isso geralmente ocorre quando o volume de questões no PDF excede o limite de memória ou quando você visualiza um relatório antigo. Tente reenviar a prova!
                                                            </p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                                            a.click(); URL.revokeObjectURL(url);

                                                            navigator.clipboard.writeText(activeResult);
                                                            showAlert('✅ Relatório copiado!');

                                                    <div className="prose prose-sm dark:prose-invert max-w-none" dangerouslySetInnerHTML={{ __html: activeResult.replace(/## (.*)/g, '<h2 class="text-xl font-black text-violet-600 dark:text-violet-400 mt-8 mb-4 flex items-center gap-2"><i class="fa-solid fa-caret-right"></i> $1</h2>').replace(/\*\*(.*?)\*\*/g, '<b class="font-black text-violet-700 dark:text-violet-300">$1</b>').replace(/- (.*)/g, '<div class="flex gap-2 items-start mb-2"><span class="text-violet-400 mt-1 shrink-0">▸</span><span>$1</span></div>').replace(/\n/g, '<br/>') }}></div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                                            {reverseAnalysis.history.map(entry => (
                                                <div key={entry.id} onClick={() => setReverseAnalysis(p => ({ ...p, result: entry.result, bancaName: entry.bancaName }))} className="bg-white dark:bg-zinc-900 p-5 rounded-2xl border border-zinc-200 dark:border-zinc-800 shadow-sm cursor-pointer hover:border-violet-500 dark:hover:border-violet-500 hover:shadow-md group transition-all relative">
                                                    <button onClick={(e) => { e.stopPropagation(); if(window.confirm('Excluir este registro de análise?')) setReverseAnalysis(p => ({...p, history: p.history.filter(x => x.id !== entry.id)})); }} className="absolute top-3 right-3 w-7 h-7 rounded-full bg-zinc-50 dark:bg-zinc-800 text-zinc-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center shadow-2xs" title="Excluir"><i className="fa-solid fa-trash text-xs"></i></button>
