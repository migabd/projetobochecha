                                    onUpdate={(newTasks) => {
                                        const updatedDays = { ...activeWeek.days, [day]: newTasks };
                                        updateWeek(activeWeek.id, { days: updatedDays });
                                    }}
                                />
                            ))}
                        </main>
                    </div>
                );
            };

            const renderTabContent = () => {
                if (showForm) return (
                    <div className="relative overflow-hidden p-8 max-w-4xl mx-auto bg-white dark:bg-zinc-900 rounded-[40px] border dark:border-zinc-800 shadow-2xl animate-in slide-in-from-top-4 mt-6 mb-10 text-zinc-900 dark:text-zinc-100">
                        
                        {/* --- OVERLAY DE CARREGAMENTO OCR --- */}
                        {isAiLoading && (
                            <div className="absolute inset-0 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-md z-50 flex flex-col items-center justify-center animate-in fade-in duration-300">
                                <div className="w-20 h-20 border-4 border-emerald-200 dark:border-emerald-900/50 border-t-emerald-500 dark:border-t-emerald-400 rounded-full animate-spin mb-6 shadow-[0_0_30px_rgba(16,185,129,0.3)]"></div>
                                <h3 className="text-2xl font-black text-emerald-600 dark:text-emerald-400 mb-3 tracking-widest uppercase">A processar imagem...</h3>
                                <p className="text-sm font-bold text-zinc-500 dark:text-zinc-400 animate-pulse flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-amber-500"></i> Extraindo texto e analisando alternativas com IA</p>
                            </div>
                        )}

                        <div className="flex justify-between items-center mb-10 border-b border-zinc-100 dark:border-zinc-800 pb-6">
                            <h2 className="text-3xl font-black text-emerald-600 dark:text-emerald-500 flex items-center gap-3"><i className="fa-solid fa-file-medical"></i> {editingId ? 'Editar Registo' : 'Novo Erro Médico'}</h2>
                            <button onClick={()=>{setShowForm(false); setEditingId(null); setFormData(emptyForm);}} className="w-10 h-10 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-red-500 rounded-full flex items-center justify-center transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
                        </div>

                        <form onSubmit={handleFormSubmit} className="space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div><label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Tema / Diagnóstico</label><input required value={formData.title} onChange={handleInputChange} name="title" placeholder="Ex: Sífilis na Gestação" className="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 font-bold outline-none focus:ring-2 focus:ring-emerald-500 transition-all" /></div>
                                <div><label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Área Médica</label><select value={formData.subject} onChange={handleInputChange} name="subject" className="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 font-bold outline-none focus:ring-2 focus:ring-emerald-500 transition-all cursor-pointer">{db.subjects.map(s=><option key={s.id} value={s.id} className="dark:bg-zinc-900">{s.name}</option>)}</select></div>
                            </div>
                            
                            <div>
                                <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2 flex justify-between items-end">
                                    <span>Enunciado da Questão</span>
                                    <div className="flex gap-2">
                                        <input type="file" id="ocr-up" accept="image/*" className="hidden" onChange={handleOCRUpload} />
                                        <label htmlFor="ocr-up" className="cursor-pointer bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 px-3 py-1 rounded-lg text-[10px] font-black hover:bg-emerald-200 transition-all border border-emerald-200 dark:border-emerald-800"><i className="fa-solid fa-wand-magic-sparkles mr-1"></i> Extrair Texto (OCR)</label>
                                        <input type="file" id="file-q" accept="image/*" className="hidden" onChange={e => handleImageUpload(e, 'error')} />
                                        <label htmlFor="file-q" className="cursor-pointer bg-zinc-200 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 px-3 py-1 rounded-lg text-[10px] font-black hover:bg-zinc-300 transition-all border border-zinc-300 dark:border-zinc-700"><i className="fa-solid fa-paperclip mr-1"></i> Anexar Imagem</label>
                                    </div>
                                </label>
                                <textarea required value={formData.question} onChange={handleInputChange} name="question" rows="4" placeholder="Cole aqui o texto (ou pressione Ctrl+V para colar um Print Screen e a IA resolve automaticamente)..." className="w-full p-5 rounded-3xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 outline-none focus:ring-2 focus:ring-emerald-500 text-justify leading-relaxed font-medium shadow-inner"></textarea>
                                {formData.image && <div className="mt-4 relative inline-block p-2 bg-zinc-100 dark:bg-zinc-900 rounded-2xl border border-zinc-200 dark:border-zinc-800"><img src={formData.image} className="max-h-40 rounded-xl cursor-pointer hover:opacity-90 transition-opacity" onClick={()=>setImageToEdit(formData.image)} alt="Anexo" /><button type="button" onClick={()=>setFormData({...formData, image:null})} className="absolute -top-2 -right-2 bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg border-2 border-white dark:border-zinc-900 hover:scale-110 transition-transform"><i className="fa-solid fa-trash text-xs"></i></button></div>}
                            </div>

                            {/* --- SEÇÃO DE FILTROS E TAGS --- */}
                            <div className="bg-zinc-50 dark:bg-zinc-950 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner">
                                <label className="flex items-center gap-2 text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-3">
                                    <i className="fa-solid fa-tags"></i> Filtros e Categorias
                                </label>
                                
                                <div className="flex flex-wrap gap-2 mb-3">
                                    {(formData.tags || []).map(tag => (
                                        <span key={tag} className="bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-400 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm">
                                            {tag}
                                            <button type="button" onClick={() => removeTag(tag)} className="hover:text-red-500 rounded-full p-0.5 transition"><i className="fa-solid fa-xmark"></i></button>
                                        </span>
                                    ))}
                                </div>

                                <div className="flex gap-2 mb-3">
                                    <input 
                                        value={tagInput}
                                        onChange={(e) => setTagInput(e.target.value)}
                                        onKeyDown={handleAddTag}
                                        placeholder="Adicionar filtro (ex: Residência USP) e aperte Enter"
                                        className="flex-1 border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-bold text-zinc-700 dark:text-zinc-200"
                                    />
                                </div>

                                <div className="flex flex-wrap gap-2">
                                    <span className="text-xs text-zinc-500 self-center mr-1 font-bold">Sugestões rápidas:</span>
                                    <button type="button" onClick={() => addSpecificTag("Provas/Concursos")} className="text-xs bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 rounded-lg px-3 py-2 hover:bg-zinc-50 dark:hover:bg-zinc-700 transition font-bold shadow-sm">+ Provas/Concursos</button>
                                    <button type="button" onClick={() => addSpecificTag("Módulos da faculdade")} className="text-xs bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 rounded-lg px-3 py-2 hover:bg-zinc-50 dark:hover:bg-zinc-700 transition font-bold shadow-sm">+ Módulos da faculdade</button>
                                </div>

                                {/* --- SUBFILTROS DINÂMICOS --- */}
                                {(formData.tags?.includes("Provas/Concursos") || formData.tags?.includes("Módulos da faculdade")) && (
                                    <div className="mt-4 pt-4 border-t border-zinc-200 dark:border-zinc-800 space-y-3 animate-in slide-in-from-top-2">
                                        {formData.tags?.includes("Provas/Concursos") && (
                                            <div>
                                                <label className="block text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1">Especifique a Prova (Subfiltro)</label>
                                                <input value={formData.examId} onChange={handleInputChange} name="examId" placeholder="Ex: ENAMED 2024, USP, SUS-SP" className="w-full border border-indigo-200 dark:border-indigo-900/50 bg-indigo-50/50 dark:bg-indigo-900/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-bold text-indigo-700 dark:text-indigo-300" />
                                            </div>
                                        )}
                                        {formData.tags?.includes("Módulos da faculdade") && (
                                            <div>
                                                <label className="block text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1">Especifique o Módulo (Subfiltro)</label>
                                                <input value={formData.facId} onChange={handleInputChange} name="facId" placeholder="Ex: Cardiologia 4º Ano, Internato GO" className="w-full border border-emerald-200 dark:border-emerald-900/50 bg-emerald-50/50 dark:bg-emerald-900/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all font-bold text-emerald-700 dark:text-emerald-300" />
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                            {/* --- FIM SEÇÃO DE FILTROS --- */}

                            <div className="bg-zinc-50 dark:bg-zinc-950 p-6 md:p-8 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-inner">
                                <span className="text-xs font-black uppercase text-zinc-500 dark:text-zinc-400 tracking-widest flex items-center gap-2 mb-6"><i className="fa-solid fa-list-check"></i> Alternativas & Correção Detalhada</span>
                                <div className="space-y-4">
                                    {formData.alternatives.map((alt, i) => (
                                        <div key={i} className={`flex flex-col gap-3 p-5 rounded-2xl border-2 transition-all ${formData.correctAlternative===String.fromCharCode(65+i) ? 'bg-emerald-50/50 border-emerald-400 dark:bg-emerald-900/10 dark:border-emerald-600 shadow-sm' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800'}`}>
                                            <div className="flex gap-4 items-center">
                                                <div className={`w-10 h-10 flex justify-center items-center rounded-xl font-black text-lg shrink-0 transition-colors ${formData.correctAlternative===String.fromCharCode(65+i)?'bg-emerald-500 text-white shadow-md':'bg-zinc-100 dark:bg-zinc-800 text-zinc-400'}`}>{String.fromCharCode(65+i)}</div>
                                                <input value={alt} onChange={e=>handleAlternativeChange(i, e.target.value)} placeholder={`Texto da alternativa ${String.fromCharCode(65+i)}`} className="flex-1 bg-transparent outline-none font-bold text-sm border-b border-dashed border-zinc-300 dark:border-zinc-700 focus:border-emerald-500 pb-1" />
                                                <div className="shrink-0 flex items-center justify-center w-10 h-10"><input type="radio" checked={formData.correctAlternative===String.fromCharCode(65+i)} onChange={()=>setFormData({...formData, correctAlternative:String.fromCharCode(65+i)})} className="w-6 h-6 accent-emerald-500 cursor-pointer" title="Marcar como Gabarito" /></div>
                                            </div>
                                            <textarea value={formData.alternativeExplanations[i]} onChange={e=>handleAltExplanationChange(i, e.target.value)} placeholder="Justificativa (Por que está certa ou errada?)..." rows="1" className="w-full bg-transparent text-xs opacity-80 italic outline-none ml-14 pl-2 border-l-2 border-zinc-200 dark:border-zinc-700 resize-none font-medium"></textarea>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="bg-emerald-50 dark:bg-emerald-900/20 p-6 md:p-8 rounded-3xl border border-emerald-200 dark:border-emerald-800/50 shadow-inner">
                                <label className="block text-[10px] font-black text-emerald-600 dark:text-emerald-400 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-lightbulb text-lg text-amber-500"></i> Lição de Ouro</label>
                                <input required value={formData.lessonLearned} onChange={handleInputChange} name="lessonLearned" placeholder="Qual foi o seu erro? (Ex: Esqueci que a vacina é viva atenuada)" className="w-full bg-transparent font-black text-lg outline-none text-emerald-900 dark:text-emerald-100 border-b-2 border-dashed border-emerald-300 dark:border-emerald-700 focus:border-emerald-500 pb-2" />
                            </div>
                            
                            <div className="flex flex-col-reverse md:flex-row gap-4 justify-end pt-8 border-t border-zinc-100 dark:border-zinc-800">
                                <button type="button" onClick={()=>{setShowForm(false); setEditingId(null); setFormData(emptyForm);}} className="px-8 py-4 font-black text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-2xl transition-all">Cancelar</button>
                                <button type="submit" className="px-12 py-4 bg-emerald-600 text-white font-black rounded-2xl shadow-xl shadow-emerald-600/20 hover:bg-emerald-700 active:scale-95 transition-all text-lg"><i className="fa-solid fa-floppy-disk mr-2"></i> Gravar no Caderno</button>
                            </div>
                        </form>
                    </div>
                );

                if (simulado.isActive) return simulado.showResults ? renderSimuladoResultsUI() : renderSimuladoActive();

                switch(activeTab) {
                    case 'dashboard': return renderDashboard();
                    case 'simulados': return renderSimuladosTab();
                    case 'planner': return renderPlannerTab();
                    case 'checklists': return renderChecklistsTab(); // NOVO TAB CHECKLISTS
                    case 'jogos': return renderJogosTab();
                    case 'percepcoes': return (
                        <div className="p-6 space-y-8 animate-in fade-in text-zinc-900 dark:text-zinc-100">
                            <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col md:flex-row gap-6 mb-8">
                                <div className="flex-1 relative">
                                    <div className="absolute top-4 left-4 text-amber-500"><i className="fa-solid fa-bolt text-xl"></i></div>
                                    <textarea value={newPerc} onChange={e=>setNewPerc(e.target.value)} placeholder="Novo insight clínico ou padrão de erro detetado..." className="w-full h-32 p-4 pl-12 rounded-3xl bg-zinc-50 dark:bg-zinc-950 outline-none focus:ring-2 focus:ring-amber-400 border border-zinc-200 dark:border-zinc-800 resize-none font-bold text-lg" />
                                </div>
                                <button onClick={()=>{if(newPerc.trim()){setDb(p=>({...p, perceptions:[{id:Date.now(), text:newPerc, date:new Date().toLocaleDateString('pt-PT')}, ...p.perceptions]})); setNewPerc('');}}} className="bg-amber-500 hover:bg-amber-600 px-10 py-4 rounded-3xl font-black text-zinc-900 shadow-xl shadow-amber-500/20 transition-all active:scale-95 text-lg whitespace-nowrap">Gravar Insight</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {db.perceptions.map(p=>(
                                    <div key={p.id} className="bg-white dark:bg-zinc-900 p-8 rounded-[32px] border-t-8 border-amber-400 shadow-lg relative group animate-in slide-in-from-bottom-2 border-x border-b border-zinc-200 dark:border-zinc-800">
                                        <p className="text-base font-bold leading-relaxed mb-6 text-justify dark:text-zinc-100">"{p.text}"</p>
                                        <div className="flex justify-between items-center text-xs text-zinc-400 font-black uppercase tracking-widest border-t border-zinc-100 dark:border-zinc-800 pt-5">
                                            <span><i className="fa-regular fa-calendar mr-1"></i> {p.date}</span>
                                            <button onClick={()=>{if(window.confirm('Excluir?'))setDb(p=>({...p, perceptions: p.perceptions.filter(x=>x.id!==p.id)}));}} className="w-8 h-8 rounded-full bg-zinc-100 dark:bg-zinc-800 text-red-500 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-red-500 hover:text-white"><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                    case 'resumos': return (
                        <div className="p-6 space-y-8 animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                                <div>
                                    <h2 className="text-2xl font-black text-emerald-600 dark:text-emerald-500 mb-2"><i className="fa-solid fa-images mr-2"></i> Galeria de Resumos</h2>
                                    <p className="text-sm font-bold text-zinc-400">Anexe fluxogramas e mapas mentais para revisão visual rápida.</p>
                                </div>
                                <div className="flex gap-4 w-full md:w-auto">
                                    <input type="file" id="r-up" accept="image/*" onChange={(e) => handleImageUpload(e, 'summary')} className="hidden" />
                                    <label htmlFor="r-up" className="w-full md:w-auto cursor-pointer bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95 whitespace-nowrap"><i className="fa-solid fa-plus text-lg"></i> Adicionar Resumo</label>
                                </div>
                            </div>

                            <div className="relative w-full mb-8">
                                <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                                <input 
                                    type="text" 
                                    value={summarySearch} 
                                    onChange={e => setSummarySearch(e.target.value)} 
                                    placeholder="Buscar resumo por título ou tag..." 
                                    className="w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl py-4 pl-12 pr-4 text-sm font-bold text-zinc-700 dark:text-zinc-200 outline-none focus:ring-2 focus:ring-emerald-500 transition-all shadow-sm"
                                />
                            </div>

                            <div className="columns-1 md:columns-2 lg:columns-3 gap-8 space-y-8">
                                {filteredSummaries.map(s=>{
                                    if(!s || !s.id) return null;
                                    return (
                                    <div key={s.id} className="bg-white dark:bg-zinc-900 rounded-[32px] overflow-hidden border border-zinc-200 dark:border-zinc-800 relative shadow-lg group break-inside-avoid">
                                        <img src={s.image} className="w-full cursor-pointer hover:opacity-90 transition-opacity" onClick={()=>setSummaryLightbox(s.id)} alt="Resumo Visual" />
                                        <div className="px-5 pt-4 pb-2 bg-zinc-50 dark:bg-zinc-950">
                                            <input
                                                value={s.title || ''}
                                                onChange={(e) => setDb(p => ({...p, summaries: p.summaries.map(x => x.id === s.id ? {...x, title: e.target.value} : x)}))}
                                                placeholder="Adicionar título ou tag..."
                                                className="w-full bg-transparent border-b border-dashed border-zinc-300 dark:border-zinc-700 focus:border-emerald-500 outline-none text-sm font-bold text-zinc-800 dark:text-zinc-200 pb-1 transition-colors"
                                            />
                                        </div>
                                        <div className="px-5 pb-4 pt-2 flex justify-between items-center bg-zinc-50 dark:bg-zinc-950">
                                            <span className="text-xs font-black text-zinc-400 uppercase tracking-widest"><i className="fa-regular fa-calendar mr-1"></i> {s.date}</span>
                                            <button onClick={()=>{if(window.confirm('Excluir imagem?')){setDb(p=>({...p, summaries: (p.summaries||[]).filter(x=>x.id!==s.id)}));}}} className="w-8 h-8 rounded-full bg-zinc-200 dark:bg-zinc-800 text-zinc-500 hover:bg-red-500 hover:text-white flex items-center justify-center transition-all"><i className="fa-solid fa-trash text-xs"></i></button>
                                        </div>
                                    </div>
                                )})}
                                {filteredSummaries.length === 0 && <div className="col-span-full py-20 text-center text-zinc-400 font-black italic"><i className="fa-regular fa-image text-6xl mb-4 block opacity-30"></i> Nenhum resumo encontrado.</div>}
                            </div>
                        </div>
                    );
                    case 'flashcards': {
                        const grouped = (db.flashcards || []).reduce((acc, card) => {
                            const deck = card.deckName || 'Cartões Avulsos (Antigos)';
                            if (!acc[deck]) acc[deck] = [];
                            acc[deck].push(card);
                            return acc;
                        }, {});

                        if (!activeDeck) {
                            return (
                                <div className="p-6 space-y-8 animate-in fade-in">
                                    <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex justify-between items-center mb-8">
                                        <div>
                                            <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500 mb-2"><i className="fa-solid fa-clone mr-2"></i> Flashcards IA</h2>
                                            <p className="text-sm font-bold text-zinc-400">Os seus cartões de memorização estão agrupados pelos simulados correspondentes.</p>
                                        </div>
                                    </div>
                                    
                                    {Object.keys(grouped).length === 0 ? (
                                        <div className="py-20 text-center text-zinc-400 font-black italic">
                                            <i className="fa-solid fa-clone text-6xl mb-4 block opacity-30"></i> 
                                            Nenhum flashcard gerado ainda. <br/>Faça um simulado, erre algumas questões e peça à IA para gerar!
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {Object.entries(grouped).map(([deckName, cards]) => (
                                                <div key={deckName} onClick={() => setActiveDeck(deckName)} className="bg-white dark:bg-zinc-900 p-8 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-lg cursor-pointer hover:border-indigo-500 dark:hover:border-indigo-500 group transition-all flex flex-col items-center text-center">
                                                    <div className="w-16 h-16 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-500 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                                        <i className="fa-solid fa-layer-group text-2xl"></i>
                                                    </div>
                                                    <h3 className="font-black text-lg text-zinc-800 dark:text-zinc-100 mb-2 leading-tight">{deckName}</h3>
                                                    <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest">{cards.length} Cartões</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        } else {
                            return (
                                <div className="p-6 space-y-8 animate-in fade-in">
                                    <div className="flex items-center gap-4 mb-8">
                                        <button onClick={() => setActiveDeck(null)} className="w-12 h-12 rounded-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 flex items-center justify-center hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all shadow-sm shrink-0"><i className="fa-solid fa-arrow-left text-zinc-500"></i></button>
                                        <div>
                                            <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500 leading-tight">{activeDeck}</h2>
                                            <p className="text-sm font-bold text-zinc-400">Pratique os seus erros deste simulado.</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {(grouped[activeDeck] || []).map(c => (
                                            <FlashcardItem key={c.id} card={c} onDelete={(id) => { 
                                                if(window.confirm('Excluir este flashcard?')) {
                                                    setDb(p => {
                                                        const newFlashcards = p.flashcards.filter(x => x.id !== id);
                                                        if (newFlashcards.filter(x => (x.deckName || 'Cartões Avulsos (Antigos)') === activeDeck).length === 0) {
                                                            setActiveDeck(null);
                                                        }
                                                        return { ...p, flashcards: newFlashcards };
                                                    });
                                                }
                                            }} />
                                        ))}
                                    </div>
                                </div>
                            );
                        }
                    }
                    case 'chat': return (
                        <div className="p-4 md:p-6 h-[calc(100vh-120px)] flex flex-col animate-in fade-in">
                            <div className="flex-1 flex flex-col bg-white dark:bg-zinc-900 rounded-[40px] shadow-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden">
                                <div className="p-6 border-b border-zinc-100 dark:border-zinc-800 font-bold flex items-center justify-between bg-zinc-50/80 dark:bg-zinc-950/50 shrink-0 backdrop-blur-md">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center text-white ai-glow shadow-lg"><i className="fa-solid fa-robot text-xl"></i></div>
                                        <div><span className="font-black text-emerald-600 dark:text-emerald-500 block text-lg tracking-tight">Mentor IA PRO</span><span className="text-[10px] font-black uppercase text-green-500 tracking-[0.2em] flex items-center gap-1"><span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Online ({aiConfig.model})</span></div>
                                    </div>
                                    <button onClick={()=>{if(window.confirm('Apagar histórico de chat?')) setChatMessages([]);}} className="w-10 h-10 flex items-center justify-center bg-zinc-100 dark:bg-zinc-800 text-zinc-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition-all"><i className="fa-solid fa-trash-can"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 chat-scroll bg-zinc-50/30 dark:bg-zinc-950/30">
                                    {chatMessages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'} animate-in slide-in-from-bottom-2`}>
                                            <div className={`max-w-[90%] md:max-w-[75%] p-5 rounded-3xl shadow-sm ${m.role==='user'?'bg-emerald-600 text-white rounded-tr-sm shadow-md':'bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-800 dark:text-zinc-100 rounded-tl-sm shadow-sm'}`}>
                                                <div className="text-[15px] leading-relaxed whitespace-pre-wrap font-medium" dangerouslySetInnerHTML={{__html: (m.text || '').replace(/\*\*(.*?)\*\*/g, '<b class="font-black">$1</b>').replace(/\n/g, '<br/>')}}></div>
                                            </div>
                                        </div>
                                    ))}
                                    {isAiLoading && <div className="flex justify-start"><div className="bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 p-5 rounded-3xl rounded-tl-sm text-emerald-600 dark:text-emerald-400 font-bold text-sm shadow-sm flex items-center gap-3"><i className="fa-solid fa-circle-notch fa-spin text-lg"></i> O Mentor está a escrever...</div></div>}
                                    <div ref={chatEndRef} />
                                </div>
                                <div className="p-4 md:p-6 bg-white dark:bg-zinc-900 border-t border-zinc-100 dark:border-zinc-800 flex gap-3 md:gap-4 shrink-0">
                                    <textarea value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault(); handleChatSend();}}} placeholder="Faça uma pergunta médica ou peça uma mnemónica..." className="flex-1 p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-3xl outline-none text-sm resize-none font-bold shadow-inner text-zinc-900 dark:text-zinc-100 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all" rows="2" />
                                    <button onClick={handleChatSend} disabled={!chatInput.trim() || isAiLoading} className="w-16 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl shadow-xl flex items-center justify-center transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100"><i className="fa-solid fa-paper-plane text-xl"></i></button>
                                </div>
                            </div>
                        </div>
                    );
                    default: return renderErrorList();
                }
            };

            return (
                <div className={`flex-1 flex overflow-hidden font-sans ${db.darkMode ? 'dark' : ''}`}>
                    <aside className={`${sidebarOpen ? 'w-64' : 'w-0 overflow-hidden'} bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 transition-all flex flex-col h-screen shrink-0 z-50 shadow-2xl`}>
                        <div className="p-6 font-black text-emerald-600 dark:text-emerald-400 text-2xl border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-center gap-3 tracking-tighter"><i className="fa-solid fa-brain ai-glow rounded-full"></i> CADERNO IA</div>
                        <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                            <p className="px-4 text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em] mb-4 mt-2">Navegação Principal</p>
                            {[
                                {id:'dashboard', icon:'fa-chart-pie', label:'Visão Geral'},
                                {id:'caderno', icon:'fa-layer-group', label:'Banco Geral'},
                                {id:'provas', icon:'fa-file-signature', label:'Provas / Concursos'},
                                {id:'faculdade', icon:'fa-graduation-cap', label:'Módulos Fac'},
                                {id:'planner', icon:'fa-calendar-days', label:'Planner Semanal'},
                                {id:'checklists', icon:'fa-list-check', label:'Checklists Clínicos'}, // NOVO TAB
                                {id:'simulados', icon:'fa-shuffle', label:'Treino IA'},
                                {id:'resumos', icon:'fa-images', label:'Galeria Visual'},
                                {id:'flashcards', icon:'fa-clone', label:'Flashcards IA'},
                                {id:'jogos', icon:'fa-gamepad', label:'Jogos de Memória'},
                                {id:'percepcoes', icon:'fa-bolt', label:'Insights Clínicos'},
                                {id:'chat', icon:'fa-robot', label:'Mentor Virtual'}
                            ].map(t => (
                                <button key={t.id} onClick={()=>{setActiveTab(t.id); clearDeck(); setShowForm(false); setActiveDeck(null); setSearchTerm(''); setSummarySearch(''); setGameState({view:'list', data:null, play:null}); setActiveWeekId(null); setIsCreatingWeek(false); setChecklistState({view:'list', data:null}); window.scrollTo(0,0);}} className={`w-full text-left p-4 rounded-2xl font-black flex items-center gap-4 transition-all ${activeTab===t.id ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 sidebar-active shadow-sm' : 'text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800'}`}>
                                    <i className={`fa-solid ${t.icon} text-lg w-6 text-center`}></i> <span className="tracking-tight">{t.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-zinc-200 dark:border-zinc-800 space-y-2 bg-zinc-50 dark:bg-zinc-950/50">
                            <button onClick={()=>setDb(p=>({...p, darkMode: !p.darkMode}))} className="w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-black text-zinc-500 hover:bg-white dark:hover:bg-zinc-800 transition-all border border-transparent hover:border-zinc-200 dark:hover:border-zinc-700 shadow-sm"><i className={`fa-solid ${db.darkMode?'fa-sun':'fa-moon'} w-5 text-center`}></i> Tema {db.darkMode?'Claro':'Escuro'}</button>
                            <button onClick={()=>setShowSettings(true)} className="w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-black text-zinc-500 hover:bg-white dark:hover:bg-zinc-800 transition-all border border-transparent hover:border-zinc-200 dark:hover:border-zinc-700 shadow-sm"><i className="fa-solid fa-gear w-5 text-center"></i> Configurações</button>
                        </div>
                    </aside>

                    <div className="flex-1 flex flex-col h-screen overflow-hidden bg-zinc-50 dark:bg-zinc-950 relative">
                        <header className="px-6 py-5 flex justify-between items-center shrink-0 max-w-[1400px] mx-auto w-full z-40 bg-zinc-50/80 dark:bg-zinc-950/80 backdrop-blur-md sticky top-0 border-b border-zinc-200 dark:border-zinc-800">
                            <div className="flex items-center gap-4">
                                <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="w-12 h-12 flex items-center justify-center rounded-2xl bg-white dark:bg-zinc-900 shadow-sm border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all"><i className={`fa-solid fa-chevron-left text-zinc-500 ${sidebarOpen ? "" : "rotate-180"}`}></i></button>
                                <h1 className="text-xl font-black tracking-tight text-zinc-800 dark:text-white hidden md:block capitalize">{activeTab === 'caderno' ? 'Banco de Questões' : activeTab}</h1>
                            </div>
                            <div className="flex items-center gap-3">
                                {'showSaveFilePicker' in window ? (
                                    <button onClick={fileHandle ? null : handleEnableAutoSave} className={`px-5 py-3 rounded-2xl font-bold shadow-md flex items-center gap-2 transition-all text-sm ${fileHandle ? 'bg-emerald-100 text-emerald-700 border border-emerald-200 cursor-default dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800' : (isDirty.current ? 'bg-amber-500 hover:bg-amber-600 text-white animate-pulse' : 'bg-slate-700 hover:bg-slate-800 text-white')}`} title={fileHandle ? "Sincronização automática ativa" : "Ativar gravação automática no PC"}>
                                        {fileHandle ? (isAutoSaving ? <><i className="fa-solid fa-spinner fa-spin"></i> Guardando...</> : <><i className="fa-solid fa-circle-check"></i> Sincronizado</>) : <><i className="fa-solid fa-rotate"></i> Ligar Auto-Save</>}
                                    </button>
                                ) : (
                                    <div className="flex gap-2">
                                        <button onClick={saveToFileFallback} className={`px-5 py-3 rounded-2xl font-bold shadow-md flex items-center gap-2 transition-all text-sm ${isDirty.current ? 'bg-amber-500 hover:bg-amber-600 text-white animate-pulse' : 'bg-slate-700 hover:bg-slate-800 text-white'}`} title="O Firefox não suporta auto-save direto. Clique para baixar a versão atualizada.">
                                            <i className="fa-solid fa-download"></i> {isDirty.current ? 'Salvar Alterações (HTML)' : 'Baixar Cópia HTML'}
                                        </button>
                                        <button onClick={exportData} className="px-5 py-3 rounded-2xl font-bold bg-zinc-200 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 hover:bg-zinc-300 transition-all text-sm" title="Backup JSON dos dados">
                                            <i className="fa-solid fa-file-code"></i> JSON
                                        </button>
                                    </div>
                                )}
                                {(!simulado.isActive && !showForm && ['caderno','provas','faculdade'].includes(activeTab)) && (
                                    <button onClick={()=>{setFormData({...emptyForm, subject: db.subjects[0]?.id}); setEditingId(null); setShowForm(true); window.scrollTo(0,0);}} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-black shadow-lg shadow-emerald-600/20 active:scale-95 flex items-center gap-2 animate-in slide-in-from-right-2 transition-all"><i className="fa-solid fa-plus text-lg"></i> <span className="hidden sm:inline">Nova Questão</span></button>
                                )}
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto pb-24 px-2 md:px-6">
                            <div className="max-w-[1400px] mx-auto w-full h-full">{renderTabContent()}</div>
                        </div>
                    </div>

                    {/* MODAIS CONFIGURAÇÕES E ALERTAS */}
                    {imageToEdit && <ImageEditor initialImage={imageToEdit} onSave={(b64) => {
                        if(imageEditTarget === 'error') setFormData(p => ({...p, image: b64}));
                        if(imageEditTarget === 'summary') setDb(p=>({...p, summaries: [{id:Date.now(), image:b64, date:new Date().toLocaleDateString('pt-PT')}, ...(p.summaries || [])]}));
                        setImageToEdit(null); setImageEditTarget(null);
                    }} onCancel={() => {setImageToEdit(null); setImageEditTarget(null);}} />}

                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex justify-center items-center p-4 animate-in zoom-in-95 duration-200">
                            <div className="bg-white dark:bg-slate-900 rounded-[40px] p-10 w-full max-w-lg shadow-2xl border border-slate-200 dark:border-slate-700 max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-10"><h2 className="text-3xl font-black tracking-tighter text-slate-800 dark:text-white">Definições</h2><button onClick={()=>setShowSettings(false)} className="text-slate-400 hover:text-red-500 transition-colors"><i className="fa-solid fa-circle-xmark text-2xl"></i></button></div>
                                <div className="space-y-8">
                                    <section className="bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-inner">
                                        <h3 className="text-xs font-black uppercase text-emerald-500 mb-4 tracking-widest"><i className="fa-solid fa-wand-magic-sparkles mr-2"></i> IA Gemini</h3>
                                        
                                        <div>
                                            <div className="flex justify-between items-end mb-2">
                                                <label className="block text-xs font-bold text-slate-500 dark:text-slate-400">Modelo de Inteligência Artificial</label>
                                                <button onClick={fetchModels} className="text-[10px] font-black text-emerald-500 hover:text-emerald-600 transition-colors uppercase tracking-widest flex items-center gap-1"><i className="fa-solid fa-rotate"></i> Atualizar Lista</button>
                                            </div>
                                            <select 
                                                value={aiConfig.model}
                                                onChange={e=>{setAiConfig(p=>({...p, model: e.target.value})); localStorage.setItem('gemini_model', e.target.value);}}
                                                className="w-full p-4 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none mb-4 text-sm font-bold shadow-inner text-slate-800 dark:text-white focus:border-emerald-500 transition-colors cursor-pointer"
                                            >
                                                {availableModels.map(m => (
                                                    <option key={m} value={m}>{m}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">Personalidade do Mentor</label>
                                            <select 
                                                value={aiConfig.persona}
                                                onChange={e=>{setAiConfig(p=>({...p, persona: e.target.value})); localStorage.setItem('gemini_persona', e.target.value);}}
                                                className="w-full p-4 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none mb-4 text-sm font-bold shadow-inner text-slate-800 dark:text-white focus:border-emerald-500 transition-colors cursor-pointer"
                                            >
                                                <option value="amigavel">Amigável (Encoraja e explica com paciência)</option>
                                                <option value="compreensiva">Compreensiva (Empática e acolhedora com os erros)</option>
                                                <option value="ironica">Irônica (Sarcástica e provocativa)</option>
                                                <option value="arrogante">Arrogante (Rude, grosseiro e impaciente)</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">Chave da API (Não será salva, insira a cada sessão)</label>
                                            <input type="password" value={aiConfig.key} onChange={e=>{setAiConfig(p=>({...p, key: e.target.value}));}} placeholder="Sua Chave API Google" className="w-full p-4 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none mb-4 text-sm font-bold shadow-inner text-slate-800 dark:text-white focus:border-emerald-500 transition-colors"/>
                                        </div>

                                        <button onClick={testIA} disabled={isAiLoading} className="w-full py-4 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 rounded-2xl font-black text-sm shadow-sm hover:bg-emerald-200 dark:hover:bg-emerald-900/50 active:scale-95 transition-all disabled:opacity-50"><i className="fa-solid fa-wifi mr-2"></i> Testar Conexão com IA</button>
                                    </section>
                                    <section>
                                        <h3 className="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Backup Base de Dados</h3>
                                        <button onClick={exportData} className="w-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-5 rounded-2xl font-black flex justify-between items-center text-sm shadow-sm transition-all hover:bg-slate-200"><span className="text-slate-600 dark:text-slate-300">Baixar Cópia Exata (.json)</span><i className="fa-solid fa-download text-indigo-500"></i></button>
                                        <label htmlFor="imp-master" className="w-full mt-3 bg-emerald-600 hover:bg-emerald-700 text-white p-5 rounded-2xl font-black flex justify-between items-center cursor-pointer text-sm shadow-xl transition-all"><span>Importar Dados</span><i className="fa-solid fa-upload"></i></label>
                                        <input type="file" id="imp-master" accept=".json,.html" onChange={importData} className="hidden" />
                                    </section>

                                    <section className="pt-6 border-t border-slate-100 dark:border-slate-800">
                                        <h3 className="text-xs font-black uppercase text-red-500 mb-4 tracking-widest flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation"></i> Zona de Perigo</h3>
                                        <button 
                                            onClick={handleFactoryReset} 
                                            className="w-full bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 p-5 rounded-2xl font-black flex justify-between items-center text-sm shadow-sm transition-all hover:bg-red-600 hover:text-white group border border-red-100 dark:border-red-900/30"
                                        >
                                            <span>Restaurar Padrão de Fábrica</span>
                                            <i className="fa-solid fa-trash-can group-hover:animate-pulse"></i>
                                        </button>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}
                    {dialog.isOpen && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[2000] flex justify-center items-center p-4"><div className="bg-white dark:bg-slate-800 p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl border dark:border-slate-700"><h3 className="font-black text-xl mb-4 text-slate-800 dark:text-white">{dialog.type==='alert'?'Aviso':'Confirmação'}</h3><p className="mb-8 whitespace-pre-wrap text-slate-600 dark:text-slate-300 leading-relaxed text-sm font-medium">{dialog.message}</p><div className="flex gap-2 justify-end">{dialog.type==='confirm'&&<button onClick={closeDialog} className="px-4 py-2 bg-slate-100 dark:bg-slate-700 rounded-xl font-bold">Cancelar</button>}<button onClick={()=>{if(dialog.onConfirm)dialog.onConfirm(); closeDialog();}} className="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg">OK</button></div></div></div>}
                    {lightbox && <div className="fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center p-8 cursor-zoom-out" onClick={()=>setLightbox(null)}><img src={lightbox} className="max-h-full object-contain rounded-xl shadow-[0_0_100px_rgba(0,0,0,0.8)]" /></div>}

                    {/* --- ASSISTENTE FLUTUANTE IA --- */}
                    <div className="fixed bottom-6 right-6 z-[6000] flex flex-col items-end gap-4">
                        {floatingAi.isOpen && (
                            <div className="bg-white dark:bg-zinc-900 border border-emerald-200 dark:border-emerald-800 rounded-3xl shadow-2xl p-6 w-[350px] max-w-[calc(100vw-3rem)] animate-in slide-in-from-bottom-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-black text-emerald-600 dark:text-emerald-400 flex items-center gap-2"><i className="fa-solid fa-robot ai-glow rounded-full"></i> IA Rápida</h3>
                                    <button onClick={() => setFloatingAi(p => ({...p, isOpen: false}))} className="text-zinc-400 hover:text-red-500 transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-zinc-100 dark:bg-zinc-800"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="space-y-4 text-zinc-900 dark:text-zinc-100">
                                    <p className="text-[10px] font-black uppercase tracking-widest text-zinc-500 dark:text-zinc-400">Selecione algo na tela ou digite:</p>
                                    <textarea 
                                        value={floatingAi.query} 
                                        onChange={e => setFloatingAi(p => ({...p, query: e.target.value}))} 
                                        placeholder="O que deseja saber?"
                                        className="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-4 text-sm font-bold resize-none outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                                        rows="3"
                                    />
                                    {floatingAi.result && (
                                        <div className="p-4 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800/50 rounded-2xl text-xs leading-relaxed text-justify-custom font-medium max-h-[40vh] overflow-y-auto shadow-inner text-emerald-900 dark:text-emerald-200">
                                            <div dangerouslySetInnerHTML={{__html: floatingAi.result.replace(/\*\*(.*?)\*\*/g, '<b class="font-black">$1</b>').replace(/\n/g, '<br/>')}}></div>
                                        </div>
                                    )}
                                    <button 
                                        disabled={!floatingAi.query.trim() || floatingAi.isLoading}
                                        onClick={async () => {
                                            setFloatingAi(p => ({...p, isLoading: true, result: ''}));
                                            const context = `[INSTRUÇÃO DE MENTORIA: Você é o Mentor IA PRO, um tutor médico EXTREMAMENTE rude e irônico. O aluno é burro e você está aqui para lembrá-lo disso. Responda de forma curta e ácida.\nBASE DE DADOS DO ALUNO: ${buildPlatformContext()}]\n\n`;
                                            const res = await callIA([{role: 'user', parts: [{text: context + `O aluno perguntou sobre o seguinte elemento da tela ou fez o seguinte pedido: "${floatingAi.query}"`}]}]);
                                            setFloatingAi(p => ({...p, isLoading: false, result: res || 'Falha ao obter resposta. Verifique sua conexão e chave API.'}));
                                        }}
                                        className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-600/20 hover:bg-emerald-700 active:scale-95 disabled:opacity-50 disabled:active:scale-100 transition-all flex justify-center items-center gap-2"
                                    >
                                        {floatingAi.isLoading ? <i className="fa-solid fa-circle-notch fa-spin text-lg"></i> : <i className="fa-solid fa-wand-magic-sparkles text-lg"></i>} 
                                        {floatingAi.isLoading ? 'Analisando...' : 'Perguntar à IA'}
                                    </button>
                                </div>
                            </div>
                        )}
                        <button 
                            onClick={() => {
                                const sel = window.getSelection().toString().trim();
                                setFloatingAi(p => ({
                                    isOpen: !p.isOpen, 
                                    query: sel ? sel : p.query,
                                    result: p.isOpen ? p.result : '',
                                    isLoading: false
                                }));
                            }} 
                            className="w-16 h-16 bg-emerald-600 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 hover:bg-emerald-700 transition-all active:scale-95 border-4 border-white dark:border-zinc-950"
                            title="Assistente Rápido IA"
                        >
                            <i className="fa-solid fa-robot text-2xl ai-glow rounded-full"></i>
                        </button>
                    </div>

                    {/* --- VISUALIZADOR DE RESUMOS EM ECRÃ INTEIRO COM SETAS --- */}
                    {summaryLightbox && (() => {
                        const idx = filteredSummaries.findIndex(x => x.id === summaryLightbox);
                        if (idx === -1) return null;
                        const s = filteredSummaries[idx];
                        const prev = () => setSummaryLightbox(filteredSummaries[(idx - 1 + filteredSummaries.length) % filteredSummaries.length].id);
                        const next = () => setSummaryLightbox(filteredSummaries[(idx + 1) % filteredSummaries.length].id);

                        return (
                            <div className="fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center p-8" onClick={() => setSummaryLightbox(null)}>
                                <button onClick={(e) => { e.stopPropagation(); setSummaryLightbox(null); }} className="absolute top-6 right-6 text-white/50 hover:text-white transition-colors text-4xl z-50"><i className="fa-solid fa-xmark"></i></button>

                                {filteredSummaries.length > 1 && (
                                    <button onClick={(e) => { e.stopPropagation(); prev(); }} className="absolute left-4 md:left-10 text-white/30 hover:text-white text-5xl md:text-7xl z-50 transition-colors p-4"><i className="fa-solid fa-chevron-left"></i></button>
                                )}

                                <div className="relative max-h-[90vh] flex flex-col items-center justify-center gap-6" onClick={(e) => e.stopPropagation()}>
                                    <img src={s.image} className="max-h-[75vh] max-w-full object-contain rounded-xl shadow-[0_0_100px_rgba(0,0,0,0.8)]" />
                                    {s.title && <div className="text-white text-lg font-black bg-zinc-900/80 px-8 py-3 rounded-full border border-zinc-700 backdrop-blur-sm shadow-xl shrink-0">{s.title}</div>}
                                </div>

                                {filteredSummaries.length > 1 && (
                                    <button onClick={(e) => { e.stopPropagation(); next(); }} className="absolute right-4 md:right-10 text-white/30 hover:text-white text-5xl md:text-7xl z-50 transition-colors p-4"><i className="fa-solid fa-chevron-right"></i></button>
                                )}
                            </div>
                        );
                    })()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
