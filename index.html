                        if (g.pairs.length < 2) return showAlert('Adicione pelo menos 2 pares para jogar.');

                        setDb(p => {
                            const isNew = !p.games?.find(x => x.id === g.id);
                            const newGames = isNew ? [g, ...(p.games || [])] : (p.games || []).map(x => x.id === g.id ? g : x);
                            return { ...p, games: newGames };
                        });
                        setGameState({ view: 'list', data: null, play: null });
                        showAlert('Jogo guardado com sucesso!');
                    };

                    const deleteGame = () => {
                        if (window.confirm('Tem a certeza que deseja excluir este jogo permanentemente?')) {
                            setDb(p => ({ ...p, games: (p.games || []).filter(x => x.id !== g.id) }));
                            setGameState({ view: 'list', data: null, play: null });
                            showAlert('Jogo excluído com sucesso!');
                        }
                    };

                    return (
                        <div className="p-6 space-y-6 animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 max-w-4xl mx-auto">
                                <div className="flex justify-between items-center mb-8 border-b border-zinc-100 dark:border-zinc-800 pb-4">
                                    <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500 flex items-center gap-3"><i className="fa-solid fa-gamepad"></i> Criador de Jogos</h2>
                                    <button onClick={() => setGameState({ view: 'list', data: null, play: null })} className="w-10 h-10 flex items-center justify-center bg-zinc-100 dark:bg-zinc-800 text-zinc-400 hover:text-red-500 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
                                </div>

                                <div className="mb-6">
                                    <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Título do Jogo</label>
                                    <input value={g.title} onChange={e => setGameState(p => ({ ...p, data: { ...p.data, title: e.target.value } }))} placeholder="Ex: Anatomia Cardíaca" className="w-full p-4 rounded-2xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-950 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-zinc-800 dark:text-zinc-100" />
                                </div>

                                <div className="space-y-4 mb-8">
                                    {g.pairs.map((p, i) => (
                                        <div key={p.id} className="flex flex-col md:flex-row gap-4 p-5 border border-zinc-200 dark:border-zinc-800 rounded-3xl bg-zinc-50 dark:bg-zinc-950 relative group">
                                            <button onClick={() => removePair(p.id)} className="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-red-100 text-red-500 dark:bg-red-900/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all shadow-md"><i className="fa-solid fa-trash text-xs"></i></button>

                                            {['a', 'b'].map(side => (
                                                <div key={side} className="flex-1 flex flex-col gap-2">
                                                    <span className="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Par {i + 1} - Lado {side.toUpperCase()}</span>
                                                    {p[side].type === 'image' ? (
                                                        <div className="relative h-24 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl overflow-hidden flex items-center justify-center group/img">
                                                            <img src={p[side].val} onClick={(e) => { e.stopPropagation(); setLightbox(p[side].val); }} className="max-h-full max-w-full object-contain cursor-zoom-in hover:scale-105 transition-transform" title="Clique para ampliar" />
                                                            <button onClick={() => updatePair(p.id, side, 'text', '')} className="absolute inset-0 bg-black/50 text-white flex items-center justify-center opacity-0 group-hover/img:opacity-100 transition-all font-bold text-sm"><i className="fa-solid fa-trash mr-2"></i> Remover Imagem</button>
                                                        </div>
                                                    ) : (
                                                        <div className="flex gap-2 h-24">
                                                            <textarea value={p[side].val} onChange={e => updatePair(p.id, side, 'text', e.target.value)} placeholder="Texto correspondente..." className="flex-1 p-3 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 outline-none focus:ring-2 focus:ring-indigo-500 resize-none font-bold text-sm text-zinc-800 dark:text-zinc-200 shadow-sm"></textarea>
                                                            <label className="w-16 shrink-0 bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors border border-indigo-100 dark:border-indigo-800 shadow-sm" title="Adicionar Imagem">
                                                                <i className="fa-solid fa-image text-xl mb-1"></i><span className="text-[9px] font-black uppercase">Img</span>
                                                                <input type="file" accept="image/*" className="hidden" onChange={e => handleImg(e, p.id, side)} />
                                                            </label>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>

                                <div className="flex flex-col sm:flex-row gap-4">
                                    <button onClick={addPair} className="flex-1 py-4 rounded-2xl bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 font-black hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors flex items-center justify-center gap-2"><i className="fa-solid fa-plus"></i> Novo Par</button>
                                    <button onClick={saveGame} className="flex-1 py-4 rounded-2xl bg-indigo-600 text-white font-black hover:bg-indigo-700 transition-colors shadow-lg flex items-center justify-center gap-2"><i className="fa-solid fa-floppy-disk"></i> Salvar Jogo</button>
                                    {db.games?.some(x => x.id === g.id) && (
                                        <button onClick={deleteGame} className="py-4 px-6 rounded-2xl bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 font-black hover:bg-red-200 dark:hover:bg-red-900/50 transition-colors shadow-sm flex items-center justify-center gap-2" title="Excluir este jogo permanentemente"><i className="fa-solid fa-trash"></i> Excluir</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                }

                if (gameState.view === 'play') {
                    const { deck, flipped, matched, moves, isFinished } = gameState.play;

                    const handleCardClick = (idx) => {
                        if (isFinished || flipped.length === 2 || flipped.includes(idx) || matched.includes(idx)) return;

                        const newFlipped = [...flipped, idx];
                        setGameState(prev => ({ ...prev, play: { ...prev.play, flipped: newFlipped } }));

                        if (newFlipped.length === 2) {
                            const match = deck[newFlipped[0]].pairId === deck[newFlipped[1]].pairId;
                            setTimeout(() => {
                                setGameState(prev => {
                                    const p = prev.play;
                                    const newMatched = match ? [...p.matched, newFlipped[0], newFlipped[1]] : p.matched;
                                    const finished = newMatched.length === deck.length;
                                    return {
                                        ...prev, play: {
                                            ...p,
                                            flipped: [],
                                            matched: newMatched,
                                            moves: p.moves + 1,
                                            isFinished: finished
                                        }
                                    };
                                });
                            }, 1200); // 1.2s para memorizar a posição
                        }
                    };

                    return (
                        <div className="p-6 space-y-6 animate-in fade-in">
                            <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 min-h-[60vh]">
                                <div className="flex justify-between items-center mb-8 border-b border-zinc-100 dark:border-zinc-800 pb-4">
                                    <div>
                                        <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500">{gameState.data.title}</h2>
                                        <p className="text-sm font-bold text-zinc-400">Movimentos: <span className="text-indigo-500">{moves}</span> | Pares: {matched.length / 2}/{deck.length / 2}</p>
                                    </div>
                                    <button onClick={() => setGameState({ view: 'list', data: null, play: null })} className="px-6 py-3 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 font-black rounded-2xl hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">Voltar</button>
                                </div>

                                {isFinished ? (
                                    <div className="text-center py-20 animate-in zoom-in duration-500">
                                        <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl shadow-emerald-500/20"><i className="fa-solid fa-trophy text-5xl"></i></div>
                                        <h3 className="text-4xl font-black text-emerald-600 mb-4">Desafio Concluído!</h3>
                                        <p className="text-lg text-zinc-600 dark:text-zinc-400 font-bold mb-8">Memória afiada. Resolvido em {moves} movimentos.</p>
                                        <button onClick={() => setGameState({ view: 'list', data: null, play: null })} className="px-10 py-4 bg-indigo-600 text-white rounded-3xl font-black shadow-xl hover:bg-indigo-700 transition-all text-lg">Escolher Outro Jogo</button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                        {deck.map((card, idx) => {
                                            const isFlipped = flipped.includes(idx) || matched.includes(idx);
                                            const isMatchedThis = matched.includes(idx);
                                            return (
                                                <div key={idx} onClick={() => handleCardClick(idx)} className={`aspect-[4/3] rounded-3xl cursor-pointer transition-all duration-300 border-[3px] flex items-center justify-center p-2 sm:p-3 text-center shadow-sm relative overflow-hidden ${isFlipped ? (isMatchedThis ? 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-400 dark:border-emerald-600' : 'bg-white dark:bg-zinc-800 border-indigo-400 dark:border-indigo-600 scale-[1.02] shadow-lg') : 'bg-indigo-50 dark:bg-indigo-900/30 border-indigo-200 dark:border-indigo-800 hover:border-indigo-400 dark:hover:border-indigo-500 hover:scale-105'}`}>
                                                    {isFlipped ? (
                                                        card.data.type === 'image'
                                                            ? <img src={card.data.val} onClick={(e) => { e.stopPropagation(); setLightbox(card.data.val); }} className="w-full h-full object-contain rounded-xl animate-in fade-in cursor-zoom-in" title="Clique para ampliar" />
                                                            : <div className="w-full h-full overflow-y-auto flex flex-col justify-center" style={{ scrollbarWidth: 'none', msOverflowStyle: 'none' }}><span className="font-bold text-xs sm:text-sm text-zinc-800 dark:text-zinc-100 break-words leading-tight animate-in fade-in m-auto">{card.data.val}</span></div>
                                                    ) : (
                                                        <i className="fa-solid fa-brain text-4xl text-indigo-300 dark:text-indigo-700/50 opacity-50"></i>
                                                    )}
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                // List View
                return (
                    <div className="p-6 space-y-8 animate-in fade-in">
                        <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                            <div>
                                <h2 className="text-2xl font-black text-indigo-600 dark:text-indigo-500 mb-2"><i className="fa-solid fa-gamepad mr-2"></i> Jogos de Memória</h2>
                                <p className="text-sm font-bold text-zinc-400">Crie os seus próprios jogos associando imagens a textos ou textos a textos para reter a memória ativamente.</p>
                            </div>
                            <div className="flex gap-4 w-full md:w-auto">
                                <input type="file" id="game-ai-up" accept="image/*,application/pdf" onChange={(e) => {
                                    const file = e.target.files[0]; if (!file) return;
                                    const reader = new FileReader();
                                    reader.onload = async (ev) => {
                                        const b64 = await compressImage(ev.target.result);
                                        processGameAI(b64);
                                    };
                                    reader.readAsDataURL(file); e.target.value = '';
                                }} className="hidden" />
                                <label htmlFor="game-ai-up" className="w-full md:w-auto cursor-pointer bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400 px-8 py-4 rounded-3xl font-black shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95 whitespace-nowrap border border-indigo-100 dark:border-indigo-800 hover:bg-indigo-100 dark:hover:bg-indigo-900/50"><i className="fa-solid fa-wand-magic-sparkles text-lg text-amber-500"></i> Gerar com IA</label>
                                <button onClick={() => setGameState({ view: 'edit', data: { id: Date.now(), title: '', pairs: [{ id: Date.now() + 1, a: { type: 'text', val: '' }, b: { type: 'text', val: '' } }, { id: Date.now() + 2, a: { type: 'text', val: '' }, b: { type: 'text', val: '' } }] }, play: null })} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-3xl font-black shadow-lg shadow-indigo-600/20 flex items-center gap-3 transition-all active:scale-95 shrink-0 whitespace-nowrap"><i className="fa-solid fa-plus text-lg"></i> Criar Jogo</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {(db.games || []).map(g => (
                                <div key={g.id} className="bg-white dark:bg-zinc-900 p-8 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-lg group transition-all flex flex-col relative overflow-hidden">
                                    <div className="absolute -right-6 -top-6 text-indigo-50 dark:text-indigo-900/10 transition-transform group-hover:scale-110 z-0">
                                        <i className="fa-solid fa-puzzle-piece text-9xl"></i>
                                    </div>
                                    <div className="relative z-10 flex-1">
                                        <h3 className="font-black text-xl text-zinc-800 dark:text-zinc-100 mb-2 leading-tight pr-8">{g.title}</h3>
                                        <p className="text-zinc-500 font-bold text-sm uppercase tracking-widest mb-8">{g.pairs.length} Pares de Cartas</p>
                                    </div>

                                    <div className="flex gap-3 relative z-10">
                                        <button onClick={() => {
                                            let deck = [];
                                            g.pairs.forEach(p => {
                                                if ((p.a.val || p.a.type === 'image') && (p.b.val || p.b.type === 'image')) {
                                                    deck.push({ id: p.id + '_a', pairId: p.id, data: p.a });
                                                    deck.push({ id: p.id + '_b', pairId: p.id, data: p.b });
                                                }
                                            });
                                            deck = deck.sort(() => 0.5 - Math.random());
                                            setGameState({ view: 'play', data: g, play: { deck, flipped: [], matched: [], moves: 0, isFinished: false } });
                                        }} className="flex-1 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-400 py-3 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-indigo-200 dark:hover:bg-indigo-900/60 transition-colors"><i className="fa-solid fa-play"></i> Jogar</button>
                                        <button onClick={() => setGameState({ view: 'edit', data: g, play: null })} className="w-12 h-12 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-indigo-600 rounded-2xl flex items-center justify-center transition-colors"><i className="fa-solid fa-pen-nib"></i></button>
                                        <button onClick={() => { if (window.confirm('Excluir este jogo permanentemente?')) setDb(p => ({ ...p, games: p.games.filter(x => x.id !== g.id) })); }} className="w-12 h-12 bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-2xl flex items-center justify-center transition-colors"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            ))}
                            {(!db.games || db.games.length === 0) && (
                                <div className="col-span-full py-20 text-center text-zinc-400 font-black italic">
                                    <i className="fa-solid fa-gamepad text-6xl mb-4 block opacity-30"></i>
                                    Nenhum jogo criado ainda. <br />Crie um jogo da memória para estudar!
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderResumosTab = () => {
                const resetViewer = () => setViewerState({ rotate: 0, zoom: 1, brightness: 100, contrast: 100, invert: false });
                const currentImg = filteredSummaries.find(x => x.id === summaryLightbox);

                return (
                    <div className="p-6 space-y-8 animate-in fade-in">
                        {/* Header da Galeria */}
                        <div className="bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-6 mb-8 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/5 rounded-full -mr-32 -mt-32 blur-3xl"></div>
                            <div className="relative z-10">
                                <h2 className="text-3xl font-black text-emerald-600 dark:text-emerald-500 mb-2 flex items-center gap-3">
                                    <i className="fa-solid fa-images text-4xl"></i> Galeria Visual Elite
                                </h2>
                                <p className="text-sm font-bold text-zinc-400 max-w-md">Gerencie seus resumos e imagens médicas com ferramentas avançadas de visualização e edição rápida.</p>
                            </div>
                            <div className="relative w-full md:w-96 z-10">
                                <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                                <input
                                    type="text"
                                    value={summarySearch}
                                    onChange={e => setSummarySearch(e.target.value)}
                                    placeholder="Procurar resumos..."
                                    className="w-full pl-12 pr-4 py-4 rounded-2xl bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 outline-none focus:ring-2 focus:ring-emerald-500 font-bold transition-all shadow-inner"
                                />
                            </div>
                        </div>

                        {/* Grid de Imagens */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
                            {(filteredSummaries || []).map((s) => (
                                <div key={s.id} className="group relative bg-white dark:bg-zinc-900 rounded-[32px] border border-zinc-200 dark:border-zinc-800 overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 cursor-zoom-in" onClick={() => { setSummaryLightbox(s.id); resetViewer(); }}>
                                    <div className="aspect-[3/4] flex items-center justify-center bg-zinc-100 dark:bg-zinc-950 relative">
                                        <img src={s.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3 backdrop-blur-[2px]">
                                            <button onClick={(e) => { e.stopPropagation(); setSummaryLightbox(s.id); resetViewer(); }} className="w-10 h-10 rounded-full bg-white text-emerald-600 flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><i className="fa-solid fa-expand"></i></button>
                                            <button onClick={(e) => { e.stopPropagation(); copyToClipboard(s.image); }} className="w-10 h-10 rounded-full bg-white text-blue-600 flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><i className="fa-solid fa-copy"></i></button>
                                            <button onClick={(e) => { e.stopPropagation(); downloadImage(s.image, `resumo-${s.id}.jpg`); }} className="w-10 h-10 rounded-full bg-white text-amber-600 flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><i className="fa-solid fa-download"></i></button>
                                        </div>
                                    </div>
                                    <div className="p-5 border-t border-zinc-100 dark:border-zinc-800 bg-white dark:bg-zinc-900">
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="text-[10px] font-black uppercase tracking-widest text-emerald-500 bg-emerald-50 dark:bg-emerald-900/20 px-2 py-0.5 rounded-md">{s.date}</span>
                                            <div className="flex gap-3">
                                                <button onClick={(e) => { e.stopPropagation(); const newTitle = window.prompt('Renomear Resumo Visual:', s.title || ''); if (newTitle !== null) { setDb(p => ({ ...p, summaries: p.summaries.map(x => x.id === s.id ? { ...x, title: newTitle.trim() } : x) })); } }} className="text-zinc-300 hover:text-indigo-500 transition-colors" title="Renomear"><i className="fa-solid fa-pen text-sm"></i></button>
                                                <button onClick={(e) => { e.stopPropagation(); if (window.confirm('Excluir este resumo?')) setDb(p => ({ ...p, summaries: p.summaries.filter(x => x.id !== s.id) })); }} className="text-zinc-300 hover:text-red-500 transition-colors" title="Excluir"><i className="fa-solid fa-trash-can text-sm"></i></button>
                                            </div>
                                        </div>
                                        <h4 className="text-zinc-800 dark:text-zinc-100 font-bold text-sm truncate group-hover:text-emerald-500 transition-colors">{s.title || 'Resumo Visual'}</h4>
                                    </div>
                                </div>
                            ))}
                            {filteredSummaries.length === 0 && (
                                <div className="col-span-full py-32 text-center bg-white dark:bg-zinc-900 rounded-[40px] border-2 border-dashed border-zinc-200 dark:border-zinc-800">
                                    <div className="w-24 h-24 bg-zinc-50 dark:bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                        <i className="fa-solid fa-image text-4xl text-zinc-300 dark:text-zinc-600"></i>
                                    </div>
                                    <p className="text-zinc-500 dark:text-zinc-400 font-black text-xl mb-2">Nenhum resumo encontrado.</p>
                                    <p className="text-zinc-400 text-sm font-bold">Cole imagens na plataforma (Ctrl+V) ou arraste arquivos para esta tela!</p>
                                </div>
                            )}
                        </div>

                        {/* Visualizador Elite (Lightbox) */}
                        {summaryLightbox && currentImg && (
                            <div className="fixed inset-0 bg-zinc-950/98 z-[5000] flex flex-col animate-in fade-in duration-300 backdrop-blur-xl" onKeyDown={(e) => {
                                if (e.key === 'Escape') setSummaryLightbox(null);
                                if (e.key === 'ArrowRight') setSummaryLightbox(filteredSummaries[(filteredSummaries.findIndex(x => x.id === summaryLightbox) + 1) % filteredSummaries.length].id);
                                if (e.key === 'ArrowLeft') setSummaryLightbox(filteredSummaries[(filteredSummaries.findIndex(x => x.id === summaryLightbox) - 1 + filteredSummaries.length) % filteredSummaries.length].id);
                            }} tabIndex="0">

                                {/* Top Bar do Viewer */}
                                <div className="p-6 flex justify-between items-center bg-black/20 border-b border-white/5 shrink-0">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setSummaryLightbox(null)} className="w-12 h-12 rounded-2xl bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-all"><i className="fa-solid fa-xmark text-xl"></i></button>
                                        <div>
                                            <div className="flex items-center gap-3">
                                                <h3 className="text-white font-black text-lg leading-none">{currentImg.title || 'Resumo Visual'}</h3>
                                                <button onClick={() => { const newTitle = window.prompt('Renomear Resumo Visual:', currentImg.title || ''); if (newTitle !== null) { setDb(p => ({ ...p, summaries: p.summaries.map(x => x.id === currentImg.id ? { ...x, title: newTitle.trim() } : x) })); } }} className="text-white/40 hover:text-white transition-colors" title="Renomear"><i className="fa-solid fa-pen text-xs"></i></button>
                                            </div>
                                            <p className="text-white/40 text-[10px] font-black uppercase tracking-[0.2em] mt-2"><i className="fa-solid fa-calendar-day mr-1"></i> Criado em {currentImg.date}</p>
                                        </div>
                                    </div>

                                    <div className="flex items-center gap-2 bg-white/5 p-2 rounded-2xl border border-white/5">
                                        <button onClick={() => setViewerState(p => ({ ...p, rotate: (p.rotate - 90) % 360 }))} className="w-10 h-10 rounded-xl hover:bg-white/10 text-white transition-all" title="Rodar Esquerda"><i className="fa-solid fa-rotate-left"></i></button>
                                        <button onClick={() => setViewerState(p => ({ ...p, rotate: (p.rotate + 90) % 360 }))} className="w-10 h-10 rounded-xl hover:bg-white/10 text-white transition-all" title="Rodar Direita"><i className="fa-solid fa-rotate-right"></i></button>
                                        <div className="w-px h-6 bg-white/10 mx-1"></div>
                                        <button onClick={() => setViewerState(p => ({ ...p, zoom: Math.max(0.5, p.zoom - 0.25) }))} className="w-10 h-10 rounded-xl hover:bg-white/10 text-white transition-all" title="Zoom Out"><i className="fa-solid fa-magnifying-glass-minus"></i></button>
                                        <span className="text-white/60 font-black text-[10px] px-2">{Math.round(viewerState.zoom * 100)}%</span>
                                        <button onClick={() => setViewerState(p => ({ ...p, zoom: Math.min(4, p.zoom + 0.25) }))} className="w-10 h-10 rounded-xl hover:bg-white/10 text-white transition-all" title="Zoom In"><i className="fa-solid fa-magnifying-glass-plus"></i></button>
                                        <div className="w-px h-6 bg-white/10 mx-1"></div>
                                        <button onClick={() => setViewerState(p => ({ ...p, invert: !p.invert }))} className={`w-10 h-10 rounded-xl transition-all ${viewerState.invert ? 'bg-emerald-500 text-white shadow-lg' : 'hover:bg-white/10 text-white'}`} title="Modo Negativo (Leitura)"><i className="fa-solid fa-circle-half-stroke"></i></button>
                                        <button onClick={resetViewer} className="w-10 h-10 rounded-xl hover:bg-white/10 text-white transition-all" title="Resetar Visualização"><i className="fa-solid fa-arrows-rotate"></i></button>
                                    </div>

                                    <div className="flex gap-3">
                                        <button onClick={() => copyToClipboard(currentImg.image)} className="px-6 py-3 bg-white/10 hover:bg-white/20 text-white rounded-xl font-black text-xs transition-all flex items-center gap-2"><i className="fa-solid fa-copy"></i> Copiar</button>
                                        <button onClick={() => downloadImage(currentImg.image, `resumo-${currentImg.id}.jpg`)} className="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-black text-xs shadow-lg transition-all flex items-center gap-2"><i className="fa-solid fa-download"></i> Download</button>
                                    </div>
                                </div>

                                {/* Área de Visualização Principal */}
                                <div className="flex-1 relative flex items-center justify-center overflow-hidden p-10 group/viewer">
                                    <button onClick={() => setSummaryLightbox(filteredSummaries[(filteredSummaries.findIndex(x => x.id === summaryLightbox) - 1 + filteredSummaries.length) % filteredSummaries.length].id)} className="absolute left-6 top-1/2 -translate-y-1/2 w-16 h-16 rounded-full bg-white/5 hover:bg-white/10 text-white flex items-center justify-center backdrop-blur-md opacity-0 group-hover/viewer:opacity-100 transition-all z-20 border border-white/5"><i className="fa-solid fa-chevron-left text-2xl"></i></button>

                                    <div className="relative transition-transform duration-300 ease-out flex items-center justify-center" style={{
                                        transform: `scale(${viewerState.zoom}) rotate(${viewerState.rotate}deg)`,
                                        filter: `brightness(${viewerState.brightness}%) contrast(${viewerState.contrast}%) ${viewerState.invert ? 'invert(1)' : ''}`,
                                        maxWidth: '100%',
                                        maxHeight: '100%'
                                    }}>
                                        <img src={currentImg.image} className="max-w-[90vw] max-h-[75vh] object-contain shadow-[0_0_100px_rgba(0,0,0,0.5)] rounded-lg" />
                                    </div>

                                    <button onClick={() => setSummaryLightbox(filteredSummaries[(filteredSummaries.findIndex(x => x.id === summaryLightbox) + 1) % filteredSummaries.length].id)} className="absolute right-6 top-1/2 -translate-y-1/2 w-16 h-16 rounded-full bg-white/5 hover:bg-white/10 text-white flex items-center justify-center backdrop-blur-md opacity-0 group-hover/viewer:opacity-100 transition-all z-20 border border-white/5"><i className="fa-solid fa-chevron-right text-2xl"></i></button>
                                </div>

                                {/* Footer com Info */}
                                <div className="p-6 bg-black/40 flex justify-center items-center gap-6 shrink-0 border-t border-white/5">
                                    <span className="text-white/60 font-black text-xs uppercase tracking-widest">{(filteredSummaries || []).findIndex(x => x.id === summaryLightbox) + 1} de {(filteredSummaries || []).length} Resumos</span>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderResumosHtmlTab = () => {
                const summariesList = db.summariesHtml || [];
                const filteredList = summariesList.filter(s => {
                    if (!htmlSummaryState.search.trim()) return true;
                    const term = htmlSummaryState.search.toLowerCase();
                    return (s.title && s.title.toLowerCase().includes(term)) || 
                           (s.category && s.category.toLowerCase().includes(term));
                });

                const extractTextFromPDF = async (data) => {
                    try {
                        const pdf = await pdfjsLib.getDocument({ data }).promise;
                        let fullText = "";
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            const strings = content.items.map(item => item.str);
                            fullText += strings.join(" ") + "\n";
                        }
                        return fullText;
                    } catch (e) {
                        console.error("Erro PDF.js:", e);
                        throw new Error("Falha ao extrair texto do PDF. O arquivo pode estar protegido ou corrompido.");
                    }
                };

                const saveSummary = () => {
                    const { id, title, category, content } = htmlSummaryState.editor;
                    if (!title.trim()) return showAlert("O resumo precisa de um título!");
                    if (!content.trim()) return showAlert("O conteúdo HTML não pode estar vazio!");

                    setDb(p => {
                        const existing = (p.summariesHtml || []).find(x => x.id === id);
                        let updated;
                        if (existing) {
                            updated = p.summariesHtml.map(x => x.id === id ? { ...x, title, category, content, date: new Date().toLocaleDateString('pt-PT') } : x);
                        } else {
                            updated = [{ id: id || Date.now(), title, category, content, date: new Date().toLocaleDateString('pt-PT') }, ...(p.summariesHtml || [])];
                        }
                        return { ...p, summariesHtml: updated };
                    });

                    showAlert("✅ Resumo HTML salvo com sucesso!");
                    setHtmlSummaryState(p => ({ ...p, view: 'list' }));
                };

                const handleFileUpload = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    const name = file.name.toLowerCase();
                    const isHtml = name.endsWith('.html') || name.endsWith('.htm');
                    const isPdf = name.endsWith('.pdf');
                    const isTxt = name.endsWith('.txt');

                    if (isHtml) {
                        reader.onload = (ev) => {
                            const content = ev.target.result;
                            setHtmlSummaryState(p => ({
                                ...p, view: 'edit',
                                editor: { ...p.editor, id: Date.now(), title: file.name.replace(/\.html?$/i, ''), category: 'Geral', content, materialText: '', isGenerating: false, aiPrompt: '' }
                            }));
                        };
                        reader.readAsText(file);
                    } else if (isPdf) {
                        setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, isGenerating: true } }));
                        reader.onload = async (ev) => {
                            try {
                                const typedarray = new Uint8Array(ev.target.result);
                                const text = await extractTextFromPDF(typedarray);
                                setHtmlSummaryState(p => ({
                                    ...p, view: 'edit',
                                    editor: { ...p.editor, id: Date.now(), title: file.name.replace(/\.pdf$/i, ''), category: 'Geral', content: '', materialText: text, isGenerating: false, aiPrompt: '' }
                                }));
                                showAlert("✅ PDF processado! O material foi extraído. Agora use o Mentor IA para gerar o resumo de elite.");
                            } catch (err) {
                                setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, isGenerating: false } }));
                                showAlert("❌ Erro ao ler PDF: " + err.message);
                            }
                        };
                        reader.readAsArrayBuffer(file);
                    } else if (isTxt) {
                        reader.onload = (ev) => {
                            const text = ev.target.result;
                            setHtmlSummaryState(p => ({
                                ...p, view: 'edit',
                                editor: { ...p.editor, id: Date.now(), title: file.name.replace(/\.txt$/i, ''), category: 'Geral', content: '', materialText: text, isGenerating: false, aiPrompt: '' }
                            }));
                            showAlert("✅ Arquivo de texto carregado! Use o Mentor IA para gerar o resumo.");
                        };
                        reader.readAsText(file);
                    }
                    e.target.value = '';
                };

                const injectSnippet = (snippet) => {
                    setHtmlSummaryState(p => ({
                        ...p,
                        editor: {
                            ...p.editor,
                            content: p.editor.content + snippet
                        }
                    }));
                };

                const generateWithAI = async () => {
                    const { aiPrompt, materialText } = htmlSummaryState.editor;
                    if (!aiPrompt.trim() && !materialText.trim()) return showAlert("Digite o tema ou forneça um material (PDF/TXT) para a IA gerar o resumo.");
                    
                    setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, isGenerating: true } }));
                    
                    const sysInstruction = `Você é um Professor de Medicina de Elite criando um resumo EXTREMAMENTE DETALHADO, LONGO E APROFUNDADO em formato HTML puro.
                    O usuário espera um conteúdo denso, com múltiplas seções, tabelas comparativas, critérios diagnósticos completos e mnemônicas de memorização.
                    
                    ESTRUTURA OBRIGATÓRIA:
                    1. Utilize Tailwind CSS (light/dark mode) para um design premium.
                    2. Use <h3> para seções principais e <h4> para subseções com cores como text-emerald-600 dark:text-emerald-400.
                    3. SEMPRE inclua pelo menos uma tabela estilizada se houver dados comparativos.
                    4. Use blocos de destaque (bg-emerald-50, bg-red-50, etc) para avisos importantes.
                    5. O resumo deve ser EXTENSO e COMPLETO. Não economize palavras. Explore cada detalhe.
                    6. Retorne apenas o conteúdo HTML interno, sem tags <html>, <head> ou <body>.
                    7. Utilize técnicas de "Chain-of-Thought" para estruturar o raciocínio clínico.`;

                    const userMessage = materialText 
                        ? `ESTUDE O MATERIAL ABAIXO E CRIE UM RESUMO EXTREMAMENTE COMPLETO E DETALHADO SOBRE ELE:\n\nMATERIAL: ${materialText}\n\nINSTRUÇÕES ADICIONAIS DO ALUNO: ${aiPrompt}`
                        : `TEMA DO RESUMO: ${aiPrompt}`;

                    const res = await callIA([
                        { role: 'user', parts: [{ text: `${sysInstruction}\n\n${userMessage}` }] }
                    ]);

                    setHtmlSummaryState(p => ({
                        ...p,
                        editor: {
                            ...p.editor,
                            isGenerating: false,
                            content: res ? res.replace(/```html|```/g, '').trim() : p.editor.content
                        }
                    }));

                    if (!res) showAlert("❌ Falha ao gerar resumo com a IA.");
                    else showAlert("✨ Resumo de Elite gerado com sucesso! Verifique a profundidade do conteúdo.");
                };

                const smartModifyWithAI = async () => {
                    const prompt = htmlSummaryState.editor.aiPrompt;
                    const currentContent = htmlSummaryState.editor.content;

                    if (!currentContent || !currentContent.trim()) return showAlert("⚠️ O resumo atual está vazio.");
                    if (!prompt.trim()) return showAlert("⚠️ Digite o que deseja alterar.");

                    setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, isGenerating: true } }));

                    const sysInstruction = `Você é um Assistente de Elite. Aplique a modificação solicitada no resumo HTML preservando o estilo premium.
                    CÓDIGO ATUAL:
                    ${currentContent}
                    INSTRUÇÃO DE MUDANÇA: "${prompt}"
                    Retorne apenas o novo código HTML completo, sem explicações.`;

                    const res = await callIA([{ role: 'user', parts: [{ text: sysInstruction }] }]);

                    if (res) {
                        setHtmlSummaryState(p => ({
                            ...p,
                            editor: { ...p.editor, isGenerating: false, content: res.replace(/```html|```/g, '').trim() }
                        }));
                        showAlert("✨ Resumo atualizado inteligentemente!");
                    } else {
                        setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, isGenerating: false } }));
                        showAlert("❌ Falha na modificação.");
                    }
                };

                if (htmlSummaryState.view === 'edit') {
                    const ed = htmlSummaryState.editor;
                    return (
                        <div className="p-6 space-y-6 animate-in fade-in max-w-[1600px] mx-auto w-full">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white dark:bg-zinc-900 p-6 rounded-3xl border border-zinc-200 dark:border-zinc-800 shadow-sm">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setHtmlSummaryState(p => ({ ...p, view: 'list' }))} className="w-10 h-10 rounded-full bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-all">
                                        <i className="fa-solid fa-arrow-left text-zinc-500"></i>
                                    </button>
                                    <div>
                                        <h2 className="text-xl font-black text-emerald-600 dark:text-emerald-500 flex items-center gap-2">
                                            <i className="fa-solid fa-file-code"></i> {ed.id ? "Editar Resumo HTML" : "Novo Resumo HTML"}
                                        </h2>
                                        <p className="text-xs font-bold text-zinc-400">Extraia conhecimento de PDFs/Textos ou gere direto com a IA.</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    {ed.materialText && (
                                        <div className="bg-emerald-50 dark:bg-emerald-900/30 px-3 py-2 rounded-xl border border-emerald-200 dark:border-emerald-800 flex items-center gap-2">
                                            <i className="fa-solid fa-file-lines text-emerald-500"></i>
                                            <span className="text-[10px] font-black text-emerald-600 dark:text-emerald-400 uppercase">Material Carregado</span>
                                            <button onClick={() => setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, materialText: '' } }))} className="text-emerald-400 hover:text-red-500"><i className="fa-solid fa-circle-xmark"></i></button>
                                        </div>
                                    )}
                                    <button onClick={saveSummary} className="bg-emerald-600 hover:bg-emerald-700 text-white font-black px-6 py-3 rounded-xl shadow-md transition-all active:scale-95 flex items-center gap-2 text-sm">
                                        <i className="fa-solid fa-floppy-disk"></i> Salvar Resumo
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" value={ed.title} onChange={e => setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, title: e.target.value } }))} placeholder="Título do Resumo" className="w-full p-4 rounded-xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 font-bold outline-none focus:ring-2 focus:ring-emerald-500 text-sm text-zinc-800 dark:text-zinc-100" />
                                <input type="text" value={ed.category} onChange={e => setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, category: e.target.value } }))} placeholder="Categoria / Disciplina" className="w-full p-4 rounded-xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 font-bold outline-none focus:ring-2 focus:ring-emerald-500 text-sm text-zinc-800 dark:text-zinc-100" />
                            </div>

                            <div className="bg-gradient-to-r from-emerald-500/10 via-teal-500/5 to-transparent p-5 rounded-2xl border border-emerald-500/20 flex flex-col md:flex-row gap-3 items-center">
                                <i className="fa-solid fa-wand-magic-sparkles text-emerald-500 text-lg"></i>
                                <input type="text" value={ed.aiPrompt} onChange={e => setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, aiPrompt: e.target.value } }))} placeholder={ed.materialText ? "O que extrair do material?" : "O que deseja gerar ou alterar?"} className="flex-1 p-3 rounded-xl bg-white dark:bg-zinc-950 border border-emerald-500/30 text-sm font-medium outline-none focus:ring-2 focus:ring-emerald-500 text-zinc-800 dark:text-zinc-100" />
                                <div className="flex gap-2 w-full md:w-auto shrink-0 justify-end">
                                    <button onClick={generateWithAI} disabled={ed.isGenerating} className="flex-1 md:flex-initial px-5 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-black rounded-xl text-xs shadow-md">
                                        {ed.isGenerating ? <i className="fa-solid fa-spinner fa-spin"></i> : <><i className="fa-solid fa-robot mr-1"></i> {ed.materialText ? 'Gerar do Material' : 'Gerar do Zero'}</>}
                                    </button>
                                    <button onClick={smartModifyWithAI} disabled={ed.isGenerating} className="flex-1 md:flex-initial px-5 py-3 bg-teal-600 hover:bg-teal-700 text-white font-black rounded-xl text-xs shadow-md">
                                        <i className="fa-solid fa-wand-magic-sparkles mr-1"></i> Modificar com IA
                                    </button>
                                </div>
                            </div>

                            <div>
                                <span className="text-[10px] font-black uppercase tracking-widest text-zinc-400 block mb-2">Componentes de Elite:</span>
                                <div className="flex flex-wrap gap-2">
                                    {[
                                        { label: 'Título', icon: 'fa-heading', code: '\n<h3 class="text-xl font-black text-emerald-600 dark:text-emerald-400 mt-6 mb-3 border-b border-emerald-100 dark:border-emerald-900/40 pb-2 flex items-center gap-2"><i class="fa-solid fa-stethoscope"></i> Seção</h3>\n' },
                                        { label: 'Alerta', icon: 'fa-triangle-exclamation', code: '\n<div class="p-4 bg-red-50 dark:bg-red-950/40 border-l-4 border-red-500 rounded-r-2xl text-red-800 dark:text-red-300 font-bold my-4 shadow-sm">Alerta Médica</div>\n' },
                                        { label: 'Dica', icon: 'fa-lightbulb', code: '\n<div class="p-4 bg-emerald-50 dark:bg-emerald-950/40 border-l-4 border-emerald-500 rounded-r-2xl text-emerald-800 dark:text-emerald-300 font-bold my-4 shadow-sm">Dica de Elite</div>\n' },
                                        { label: 'Tabela', icon: 'fa-table', code: '\n<div class="overflow-x-auto my-4"><table class="w-full border border-zinc-200 dark:border-zinc-800 text-sm"><tr><th class="p-3 bg-zinc-100 dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800">Item</th><th class="p-3 bg-zinc-100 dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800">Valor</th></tr><tr><td class="p-3 border-b border-zinc-200 dark:border-zinc-800">A</td><td class="p-3 border-b border-zinc-200 dark:border-zinc-800">B</td></tr></table></div>\n' }
                                    ].map((snip, i) => (
                                        <button key={i} onClick={() => injectSnippet(snip.code)} className="px-3 py-2 bg-white dark:bg-zinc-900 hover:bg-zinc-50 dark:hover:bg-zinc-800 border border-zinc-200 dark:border-zinc-800 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 shadow-2xs">
                                            <i className={`fa-solid ${snip.icon} text-emerald-500`}></i> {snip.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[600px]">
                                <div className="flex flex-col rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 overflow-hidden shadow-sm">
                                    <div className="px-4 py-3 bg-zinc-50 dark:bg-zinc-950 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center shrink-0">
                                        <span className="text-xs font-black uppercase tracking-widest text-zinc-500">Código HTML</span>
                                        <button onClick={() => navigator.clipboard.writeText(ed.content).then(() => showAlert('Copiado!'))} className="text-zinc-400 hover:text-zinc-600 text-xs font-bold transition-colors">Copiar</button>
                                    </div>
                                    <textarea value={ed.content} onChange={e => setHtmlSummaryState(p => ({ ...p, editor: { ...p.editor, content: e.target.value } }))} placeholder="Código HTML..." className="flex-1 p-4 bg-zinc-50/50 dark:bg-zinc-950/50 outline-none font-mono text-xs resize-none overflow-y-auto" />
                                </div>
                                <div className="flex flex-col rounded-3xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 overflow-hidden shadow-sm">
                                    <div className="px-4 py-3 bg-zinc-50 dark:bg-zinc-950 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center shrink-0">
                                        <span className="text-xs font-black uppercase tracking-widest text-emerald-500">Preview Live</span>
                                    </div>
                                    <div className="flex-1 p-8 overflow-y-auto bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100">
                                        {ed.content.trim() ? <div dangerouslySetInnerHTML={{ __html: ed.content }} className="prose prose-sm dark:prose-invert max-w-none" /> : <div className="h-full flex flex-col items-center justify-center text-zinc-300 italic font-bold">Preview do Resumo aparecerá aqui.</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="p-3 sm:p-6 space-y-6 sm:space-y-8 animate-in fade-in max-w-[1600px] mx-auto w-full">
                        <div className="bg-white dark:bg-zinc-900 p-6 sm:p-8 rounded-[28px] sm:rounded-[40px] shadow-xl border border-zinc-200 dark:border-zinc-800 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-80 h-80 bg-emerald-500/5 rounded-full -mr-40 -mt-40 blur-3xl pointer-events-none"></div>
                            <div className="relative z-10">
                                <h2 className="text-xl sm:text-3xl font-black text-emerald-600 dark:text-emerald-500 mb-1 sm:mb-2 flex items-center gap-3">
                                    <i className="fa-solid fa-file-code text-2xl sm:text-4xl"></i> Resumos HTML
                                </h2>
                                <p className="text-xs sm:text-sm font-bold text-zinc-400 max-w-xl">Crie estudos aprofundados. Aceita <b>PDF, TXT e HTML</b> para ingestão direta.</p>
                            </div>
                            <div className="flex flex-wrap gap-2.5 sm:gap-3 w-full lg:w-auto relative z-10 shrink-0">
                                <div className="relative group flex-1 sm:flex-initial">
                                    <input type="file" accept=".html,.htm,.pdf,.txt" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                    <button className="w-full sm:w-auto px-4 py-3 sm:py-3.5 bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-700 dark:text-zinc-300 font-black rounded-xl sm:rounded-2xl transition-all flex items-center justify-center gap-2 text-[11px] sm:text-sm border border-zinc-200 dark:border-zinc-800">
                                        <i className="fa-solid fa-file-import"></i> Alimentar
                                    </button>
                                </div>
                                <button onClick={() => setHtmlSummaryState(p => ({ ...p, view: 'edit', editor: { id: null, title: '', category: 'Clínica Médica', content: '<h3 class="text-xl font-black text-emerald-600 dark:text-emerald-400 mb-4">Conceitos Iniciais</h3>\n<p>Escreva o resumo aqui...</p>', isGenerating: false, aiPrompt: '', materialText: '' } }))} className="flex-1 sm:flex-initial px-4 py-3 sm:py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-black rounded-xl sm:rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2 text-[11px] sm:text-sm">
                                    <i className="fa-solid fa-plus"></i> Novo Resumo
                                </button>
                            </div>
                        </div>

                        {/* Barra de Pesquisa */}
                        <div className="relative max-w-md">
                            <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                            <input
                                type="text"
                                value={htmlSummaryState.search}
                                onChange={e => setHtmlSummaryState(p => ({ ...p, search: e.target.value }))}
                                placeholder="Filtrar por título ou categoria..."
                                className="w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 font-bold outline-none focus:ring-2 focus:ring-emerald-500 shadow-sm text-sm"
                            />
                        </div>

                        {/* Grid de Resumos HTML */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredList.map(item => (
                                <div key={item.id} className="bg-white dark:bg-zinc-900 rounded-3xl border border-zinc-200 dark:border-zinc-800 p-6 shadow-md hover:shadow-xl transition-all flex flex-col justify-between group relative overflow-hidden">
                                    <div>
                                        <div className="flex justify-between items-start gap-2 mb-3">
                                            <span className="px-2.5 py-1 bg-emerald-50 dark:bg-emerald-950 text-emerald-600 dark:text-emerald-400 rounded-lg text-[10px] font-black uppercase tracking-widest border border-emerald-100 dark:border-emerald-900/40">
                                                {item.category || 'Geral'}
                                            </span>
                                            <span className="text-[10px] font-bold text-zinc-400">{item.date}</span>
                                        </div>
                                        <h4 className="font-black text-lg text-zinc-800 dark:text-zinc-100 mb-2 leading-tight group-hover:text-emerald-500 transition-colors">{item.title}</h4>
                                        
                                        {/* Mini Preview Stripped ou Iframe simulado */}
                                        <div className="p-3 rounded-xl bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800/60 max-h-24 overflow-hidden relative my-3">
                                            <div className="text-xs text-zinc-500 dark:text-zinc-400 line-clamp-3 select-none" dangerouslySetInnerHTML={{ __html: item.content }} />
                                            <div className="absolute inset-x-0 bottom-0 h-8 bg-gradient-to-t from-zinc-50 dark:from-zinc-950 to-transparent"></div>
                                        </div>
                                    </div>

                                    <div className="flex items-center justify-between border-t border-zinc-100 dark:border-zinc-800 pt-4 mt-2">
                                        <button onClick={() => setHtmlSummaryState(p => ({ ...p, view: 'edit', editor: { id: item.id, title: item.title, category: item.category || '', content: item.content, isGenerating: false, aiPrompt: '' } }))} className="px-4 py-2 bg-emerald-50 dark:bg-emerald-950/50 hover:bg-emerald-100 dark:hover:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400 rounded-xl font-black text-xs transition-all flex items-center gap-1.5">
                                            <i className="fa-solid fa-pen"></i> Editar / Abrir
                                        </button>
                                        <div className="flex items-center gap-1.5">
                                            <button onClick={() => {
                                                const blob = new Blob([item.content], { type: 'text/html;charset=utf-8' });
                                                const url = URL.createObjectURL(blob);
                                                const a = document.createElement('a');
                                                a.href = url; a.download = `${item.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;
                                                a.click(); URL.revokeObjectURL(url);
                                            }} className="w-8 h-8 rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-500 flex items-center justify-center transition-all" title="Baixar arquivo .html">
                                                <i className="fa-solid fa-download text-xs"></i>
                                            </button>
                                            <button onClick={() => navigator.clipboard.writeText(item.content).then(() => showAlert('HTML copiado!'))} className="w-8 h-8 rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-500 flex items-center justify-center transition-all" title="Copiar HTML">
                                                <i className="fa-solid fa-copy text-xs"></i>
                                            </button>
                                            <button onClick={() => {
                                                if (window.confirm('Excluir permanentemente este resumo em HTML?')) {
                                                    setDb(p => ({ ...p, summariesHtml: (p.summariesHtml || []).filter(x => x.id !== item.id) }));
                                                }
                                            }} className="w-8 h-8 rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:bg-red-50 dark:hover:bg-red-950 hover:text-red-500 text-zinc-400 transition-all flex items-center justify-center" title="Excluir">
                                                <i className="fa-solid fa-trash text-xs"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {filteredList.length === 0 && (
                                <div className="col-span-full py-24 text-center bg-white dark:bg-zinc-900 rounded-[32px] border-2 border-dashed border-zinc-200 dark:border-zinc-800">
                                    <div className="w-16 h-16 bg-emerald-50 dark:bg-emerald-950 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i className="fa-solid fa-code text-2xl"></i>
                                    </div>
                                    <p className="text-zinc-500 dark:text-zinc-400 font-black text-lg mb-1">Nenhum resumo em HTML encontrado.</p>
                                    <p className="text-zinc-400 text-xs font-bold max-w-sm mx-auto">Crie seu primeiro resumo com ricas formatações ou faça upload de arquivos .html existentes.</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const renderChecklistsTab = () => {
                if (checklistState.view === 'edit') {
                    const c = checklistState.data;
                    const updateChecklist = (field, val) => setChecklistState(p => ({ ...p, data: { ...p.data, [field]: val } }));

                    const addItem = () => updateChecklist('items', [...c.items, { id: Date.now() + Math.random(), text: '', note: '', done: false }]);
                    const updateItem = (id, field, val) => updateChecklist('items', c.items.map(i => i.id === id ? { ...i, [field]: val } : i));
                    const removeItem = (id) => updateChecklist('items', c.items.filter(i => i.id !== id));

                    const saveChecklist = () => {
                        if (!c.title.trim()) return showAlert('O checklist precisa de um título!');
                        if (c.items.length === 0 || c.items.every(i => !i.text.trim())) return showAlert('Adicione pelo menos um item válido.');

                        setDb(p => {
                            const cleanItems = c.items.filter(i => i.text.trim());
                            const finalChecklist = { ...c, items: cleanItems, lastUpdated: Date.now() };
                            const isNew = !p.checklists?.find(x => x.id === c.id);
                            return { ...p, checklists: isNew ? [finalChecklist, ...(p.checklists || [])] : (p.checklists || []).map(x => x.id === c.id ? finalChecklist : x) };
                        });
                        setChecklistState({ view: 'list', data: null });
                        showAlert('Checklist guardado com sucesso!');
                    };

                    const selectedTheme = CHECKLIST_THEMES.find(t => t.id === c.theme) || CHECKLIST_THEMES[0];

                    return (
                        <div className="max-w-3xl mx-auto p-6 space-y-6 animate-in fade-in pb-20">
                            <button onClick={() => setChecklistState({ view: 'list', data: null })} className="flex items-center gap-2 text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 font-bold transition-colors mb-4"><i className="fa-solid fa-arrow-left"></i> Voltar à Galeria</button>

                            <div className={`bg-white dark:bg-zinc-900 p-8 rounded-[40px] shadow-xl border-t-8 border-x border-b border-zinc-200 dark:border-zinc-800 ${selectedTheme.border.replace('border-', 'border-t-')}`}>
                                <div className="mb-8">
                                    <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Tema de Cores</label>
                                    <div className="flex gap-3">
                                        {CHECKLIST_THEMES.map(theme => (
                                            <button key={theme.id} onClick={() => updateChecklist('theme', theme.id)} className={`w-8 h-8 rounded-full transition-all ${theme.bg} ${c.theme === theme.id ? 'ring-4 ring-zinc-200 dark:ring-zinc-700 scale-110 shadow-md' : 'opacity-40 hover:opacity-100'}`} title={`Tema ${theme.id}`}></button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-6 mb-10">
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Título do Protocolo / Checklist</label>
                                        <input value={c.title} onChange={e => updateChecklist('title', e.target.value)} placeholder="Ex: Protocolo de Sepse - 1ª Hora" className={`w-full p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-950 font-black text-xl outline-none focus:ring-2 focus:ring-${c.theme}-500 transition-all border border-zinc-200 dark:border-zinc-800 text-zinc-800 dark:text-zinc-100`} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-2">Descrição Curta (Opcional)</label>
                                        <textarea value={c.description} onChange={e => updateChecklist('description', e.target.value)} placeholder="Ex: Passos críticos para evitar mortalidade..." className="w-full p-4 rounded-2xl bg-zinc-50 dark:bg-zinc-950 font-bold text-sm outline-none focus:ring-2 focus:ring-zinc-500 transition-all resize-none border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400" rows="2"></textarea>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="font-black text-zinc-700 dark:text-zinc-300">Itens de Verificação</h3>
                                    </div>

                                    {c.items.map((item, i) => (
                                        <div key={item.id} className={`p-4 rounded-2xl border transition-all bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 group relative`}>
                                            <div className="flex items-start gap-4">
                                                <div className={`mt-1 w-6 h-6 rounded-full border-2 border-zinc-300 dark:border-zinc-700 flex items-center justify-center text-[10px] font-black text-zinc-400`}>{i + 1}</div>
                                                <div className="flex-1 space-y-3">
                                                    <input value={item.text} onChange={e => updateItem(item.id, 'text', e.target.value)} placeholder="Nome do passo (Ex: Medir Lactato)" className="w-full bg-transparent font-bold text-zinc-800 dark:text-zinc-100 outline-none border-b border-dashed border-zinc-300 dark:border-zinc-700 focus:border-zinc-500 pb-1" />
                                                    <div className="flex gap-2">
                                                        <i className="fa-solid fa-lightbulb text-amber-500 mt-2 opacity-70"></i>
                                                        <textarea value={item.note} onChange={e => updateItem(item.id, 'note', e.target.value)} placeholder="Dica didática ou detalhe do protocolo (opcional)..." rows="1" className="w-full bg-transparent text-xs font-medium text-zinc-500 dark:text-zinc-400 italic outline-none resize-none"></textarea>
                                                    </div>
                                                </div>
                                                <button onClick={() => removeItem(item.id)} className="text-zinc-300 hover:text-red-500 dark:text-zinc-600 dark:hover:text-red-400 transition-colors p-2"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-8 flex flex-col sm:flex-row gap-4">
                                    <button onClick={addItem} className="flex-1 py-4 rounded-2xl bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 font-black hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors shadow-sm"><i className="fa-solid fa-plus mr-2"></i> Adicionar Passo</button>
                                    <button onClick={saveChecklist} className={`flex-1 py-4 rounded-2xl text-white font-black transition-colors shadow-lg shadow-${c.theme}-500/30 ${selectedTheme.bg} hover:brightness-110`}><i className="fa-solid fa-floppy-disk mr-2"></i> Gravar Checklist</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (checklistState.view === 'execute') {
                    const c = db.checklists?.find(x => x.id === checklistState.data?.id);
                    if (!c) return null;

                    const theme = CHECKLIST_THEMES.find(t => t.id === c.theme) || CHECKLIST_THEMES[0];
                    const completedCount = c.items.filter(i => i.done).length;
                    const totalCount = c.items.length;
                    const progress = Math.round((completedCount / totalCount) * 100);
                    const isAllDone = completedCount === totalCount;

                    const toggleItem = (itemId) => {
                        setDb(p => ({
                            ...p, checklists: p.checklists.map(chk => {
                                if (chk.id !== c.id) return chk;
                                return {
                                    ...chk,
                                    lastUpdated: Date.now(),
                                    items: chk.items.map(i => i.id === itemId ? { ...i, done: !i.done } : i)
                                };
                            })
                        }));
                    };

                    const resetChecklist = () => {
                        if (window.confirm('Deseja desmarcar todos os itens e recomeçar?')) {
                            setDb(p => ({
                                ...p, checklists: p.checklists.map(chk => chk.id === c.id ? { ...chk, items: chk.items.map(i => ({ ...i, done: false })) } : chk)
                            }));
                        }
                    };

                    return (
                        <div className="max-w-3xl mx-auto p-6 space-y-6 animate-in fade-in pb-24">
                            <button onClick={() => setChecklistState({ view: 'list', data: null })} className="flex items-center gap-2 text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 font-bold transition-colors mb-2"><i className="fa-solid fa-arrow-left"></i> Voltar à Galeria</button>

                            <div className="bg-white dark:bg-zinc-900 rounded-[40px] shadow-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden">
                                <div className={`${theme.light} p-8 md:p-10 border-b ${theme.border} relative overflow-hidden transition-all`}>
                                    {isAllDone && <div className="absolute inset-0 bg-white/20 dark:bg-black/20 flex items-center justify-center pointer-events-none"><i className={`fa-solid fa-check text-[150px] opacity-10 ${theme.text}`}></i></div>}
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-start gap-4 mb-6">
                                            <div>
                                                <h2 className={`text-3xl font-black ${theme.text} mb-2 leading-tight`}>{c.title}</h2>
                                                {c.description && <p className="text-zinc-600 dark:text-zinc-400 font-medium">{c.description}</p>}
                                            </div>
                                            <button onClick={resetChecklist} className="w-10 h-10 shrink-0 bg-white dark:bg-zinc-800 rounded-full flex items-center justify-center text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 shadow-sm transition-colors" title="Recomeçar Checklist"><i className="fa-solid fa-rotate-left"></i></button>
                                        </div>

                                        <div className="bg-white/60 dark:bg-zinc-950/40 rounded-2xl p-4 border border-white/40 dark:border-zinc-800/50 backdrop-blur-sm">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-black uppercase tracking-widest text-zinc-500">Progresso</span>
                                                <span className={`text-sm font-black ${theme.text}`}>{completedCount} / {totalCount} ({progress}%)</span>
                                            </div>
                                            <div className="h-2.5 bg-zinc-200/50 dark:bg-zinc-800 rounded-full overflow-hidden">
                                                <div className={`h-full ${theme.bg} transition-all duration-500 ease-out`} style={{ width: `${progress}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 md:p-8 space-y-3">
                                    {c.items.map((item, i) => (
