<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caderno de Erros Médicos IA PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { emerald: { 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b', 950: '#022c22' }, zinc: { 50: '#fafafa', 100: '#f4f4f5', 200: '#e4e4e7', 300: '#d4d4d8', 400: '#a1a1aa', 500: '#71717a', 600: '#52525b', 700: '#3f3f46', 800: '#27272a', 900: '#18181b', 950: '#09090b' } } } } }
    </script>
    <style id="custom-styles">
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: #f9fafb;
            -webkit-font-smoothing: antialiased;
        }

        .dark body {
            background: #09090b;
            color: #f4f4f5;
        }

        .glass-obsidian {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .dark .glass-obsidian {
            background: rgba(15, 15, 18, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .premium-btn {
            background: #22c55e;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-btn:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
        }

        .neon-emerald {
            color: #22c55e;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        .dark .neon-emerald {
            color: #4ade80;
            text-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }

        .bento-card {
            border: 1px solid transparent;
        }

        .bento-card:hover {
            border-color: rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.02);
        }

        .dark .bento-card:hover {
            border-color: rgba(74, 222, 128, 0.2);
            background: rgba(74, 222, 128, 0.02);
        }

        .sidebar-active {
            background: rgba(34, 197, 94, 0.1);
            border-left: 4px solid #22c55e;
            color: #16a34a !important;
        }

        .dark .sidebar-active {
            background: rgba(74, 222, 128, 0.05);
            color: #4ade80 !important;
        }

        .ai-glow {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
            border: 2px solid rgba(34, 197, 94, 0.3);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                opacity: 0.8;
            }

            to {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        input,
        textarea,
        select {
            outline: none !important;
        }

        .text-justify-custom {
            text-align: justify;
            text-justify: inter-word;
        }

        .planner-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .planner-scroll::-webkit-scrollbar-thumb {
            background: #22c55e;
            border-radius: 10px;
        }

        .planner-scroll::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 10px;
        }

        .dark .planner-scroll::-webkit-scrollbar-thumb {
            background: #3f3f46;
        }

        /* Checklist Checkbox Customizado */
        .check-custom {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid currentColor;
            border-radius: 0.35em;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .check-custom::before {
            content: "";
            width: 0.8em;
            height: 0.8em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: transform;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .check-custom:checked::before {
            transform: scale(1);
        }

        .check-custom:checked {
            background-color: currentColor;
        }

        /* Barra de Sincronização */
        .sync-progress-bar {
            height: 3px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sync-active {
            background: linear-gradient(90deg, #10b981 0%, #3b82f6 50%, #10b981 100%);
            background-size: 200% 100%;
            animation: sync-shimmer 1.5s infinite linear;
        }

        .sync-error {
            background: #ef4444;
        }

        .sync-success {
            background: #10b981;
        }

        @keyframes sync-shimmer {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        @keyframes superKillPulse {
            0% {
                transform: scale(0.2) rotate(-15deg);
                opacity: 0;
            }

            20% {
                transform: scale(1.2) rotate(5deg);
                opacity: 1;
            }

            40% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }

            80% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: scale(2) rotate(10deg);
                opacity: 0;
            }
        }

        @keyframes bgFlash {
            0% {
                background: rgba(239, 68, 68, 0);
            }

            15% {
                background: rgba(239, 68, 68, 0.2);
            }

            100% {
                background: rgba(239, 68, 68, 0);
            }
        }

        .kill-overlay-container {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bgFlash 2.5s ease-out forwards;
        }

        .kill-text {
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 900;
            text-transform: uppercase;
            color: #ffd700;
            text-align: center;
            line-height: 1;
            text-shadow: 0 0 20px #ef4444, 0 0 40px #ef4444, 4px 4px 0 #b91c1c, -4px -4px 0 #b91c1c;
            -webkit-text-stroke: 3px #000;
            animation: superKillPulse 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            letter-spacing: -2px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script id="data-store">
        window.__INITIAL_STATE__ = {
            errors: [],
            summaries: [],
            summariesHtml: []
        };
    </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen flex flex-col font-sans transition-colors duration-300">
    <div id="root" class="flex-1 flex flex-col"></div>
    <script type="text/babel">

        // Global Error Handler to avoid black screen and show the error
        window.addEventListener('error', (event) => {
            document.body.innerHTML = `<div style="padding: 20px; color: red; font-family: monospace; background: black; height: 100vh;">
                <h3>Erro Fatal:</h3>
                <p>${event.message}</p>
                <p>Linha: ${event.lineno}</p>
                <pre>${event.error?.stack}</pre>
            </div>`;
        });

        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // 1. CONSTANTES E UTILITÁRIOS GLOBAIS
        // ==========================================
        const ERROR_REASONS = ["Falta de Atenção", "Conteúdo não estudado", "Esquecimento", "Interpretação", "Tempo", "Pegadinha"];
        const KILL_STREAKS = ["First Blood", "Double Kill", "Triple Kill", "Quadra Kill", "Penta Kill", "Hexa Kill", "Hepta Kill", "Octa Kill", "Nona Kill", "Deca Kill", "Undeca Kill", "Dodeca Kill", "Trideca Kill", "Tetradeca Kill", "Pentadeca Kill", "Hexadeca Kill", "Heptadeca Kill", "Octadeca Kill", "Eneadeca Kill", "Icosa Kill"];
        const DEFAULT_SUBJECTS = [
            { id: 'clinica_medica', name: 'Clínica Médica', color: 'bg-emerald-100 text-emerald-700' },
            { id: 'preventiva', name: 'Preventiva', color: 'bg-blue-100 text-blue-700' },
            { id: 'go', name: 'Ginecologia e Obstetrícia', color: 'bg-purple-100 text-purple-700' },
            { id: 'pediatria', name: 'Pediatria', color: 'bg-rose-100 text-rose-700' },
            { id: 'cirurgia', name: 'Cirurgia', color: 'bg-orange-100 text-orange-700' }
        ];
        const DEFAULT_EXAMS = [
            { id: 'ENAMED', name: 'ENAMED' },
            { id: 'Revalida', name: 'Revalida' }
        ];

        // --- Constantes do Planner ---
        const PRIORITIES = {
            none: { id: 'none', label: 'Nenhuma', color: 'bg-zinc-300 dark:bg-zinc-600', border: 'border-l-zinc-300 dark:border-l-zinc-600' },
            low: { id: 'low', label: 'Baixa', color: 'bg-sky-400', border: 'border-l-sky-400' },
            medium: { id: 'medium', label: 'Média', color: 'bg-blue-600', border: 'border-l-blue-600' },
            high: { id: 'high', label: 'Alta', color: 'bg-fuchsia-500', border: 'border-l-fuchsia-500' },
            urgent: { id: 'urgent', label: 'Urgente', color: 'bg-red-600', border: 'border-l-red-600' },
        };
        const RATINGS = [
            { value: 1, emoji: "😫", label: "Péssimo" },
            { value: 2, emoji: "😕", label: "Ruim" },
            { value: 3, emoji: "😐", label: "Médio" },
            { value: 4, emoji: "🙂", label: "Bom" },
            { value: 5, emoji: "🤩", label: "Excelente" },
        ];
        const DAYS = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];

        // --- Temas dos Checklists ---
        const CHECKLIST_THEMES = [
            { id: 'emerald', bg: 'bg-emerald-500', text: 'text-emerald-500', light: 'bg-emerald-50 dark:bg-emerald-900/20', border: 'border-emerald-200 dark:border-emerald-800' },
            { id: 'blue', bg: 'bg-blue-500', text: 'text-blue-500', light: 'bg-blue-50 dark:bg-blue-900/20', border: 'border-blue-200 dark:border-blue-800' },
            { id: 'rose', bg: 'bg-rose-500', text: 'text-rose-500', light: 'bg-rose-50 dark:bg-rose-900/20', border: 'border-rose-200 dark:border-rose-800' },
            { id: 'amber', bg: 'bg-amber-500', text: 'text-amber-500', light: 'bg-amber-50 dark:bg-amber-900/20', border: 'border-amber-200 dark:border-amber-800' },
            { id: 'purple', bg: 'bg-purple-500', text: 'text-purple-500', light: 'bg-purple-50 dark:bg-purple-900/20', border: 'border-purple-200 dark:border-purple-800' }
        ];

        const getDarkColorClass = (colorStr) => {
            if (!colorStr) return '';
            return colorStr.replace(/bg-(\w+)-100/g, 'dark:bg-$1-900/30').replace(/text-(\w+)-700/g, 'dark:text-$1-300');
        };

        const formatTime = (secs) => isNaN(secs) ? "00:00" : `${Math.floor(secs / 60).toString().padStart(2, '0')}:${(secs % 60).toString().padStart(2, '0')}`;
        const getAccuracy = (h) => { const tot = (h?.correct || 0) + (h?.wrong || 0); return tot === 0 ? 0 : Math.round(((h?.correct || 0) / tot) * 100); };

        const sanitizeErrors = (list) => (Array.isArray(list) ? list : []).map(e => ({
            ...e,
            id: e.id || Date.now() + Math.random(),
            alternatives: Array.isArray(e.alternatives) && e.alternatives.length === 5 ? e.alternatives : ['', '', '', '', ''],
            alternativeExplanations: Array.isArray(e.alternativeExplanations) && e.alternativeExplanations.length === 5 ? e.alternativeExplanations : ['', '', '', '', ''],
            history: e.history || { correct: 0, wrong: 0 },
            date: e.date || new Date(e.id || Date.now()).toLocaleDateString('pt-PT'),
            examId: e.examId || '',
            facId: e.facId || e.faculdadeId || '',
            tags: Array.isArray(e.tags) ? e.tags : []
        }));

        const compressImage = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let { width, height } = img;
                    const max = 1200; // increased max dimension for better image quality
                    if (width > height) { if (width > max) { height *= max / width; width = max; } }
                    else { if (height > max) { width *= max / height; height = max; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                };
                img.src = base64Str;
            });
        };

        // ==========================================
        // 2. COMPONENTE: EDITOR DE IMAGEM
        // ==========================================
        const ImageEditor = ({ initialImage, onSave, onCancel }) => {
            const [texts, setTexts] = useState([]);
            const [selectedId, setSelectedId] = useState(null);

            const handleImageClick = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                const id = Date.now();
                setTexts([...texts, { id, text: 'Nova Nota', x, y, color: '#10b981', size: 22 }]);
                setSelectedId(id);
            };

            const handleExport = () => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                    ctx.textBaseline = 'top';
                    texts.forEach(t => {
                        const fs = Math.max(12, t.size * (img.width / 800));
                        ctx.font = `bold ${fs}px sans-serif`; ctx.fillStyle = t.color;
                        ctx.strokeStyle = (t.color === '#ffffff' || t.color === '#f59e0b') ? '#000000' : '#ffffff';
                        ctx.lineWidth = Math.max(2, fs / 8);

                        const lines = t.text.split('\n');
                        lines.forEach((line, index) => {
                            const lineY = (t.y * img.height) + (index * fs * 1.2);
                            ctx.strokeText(line, t.x * img.width, lineY);
                            ctx.fillText(line, t.x * img.width, lineY);
                        });
                    });
                    onSave(canvas.toDataURL('image/jpeg', 0.8));
                }; img.src = initialImage;
            };

            return (
                <div className="fixed inset-0 bg-zinc-950/95 z-[5000] flex flex-col md:flex-row p-4 gap-4 animate-in fade-in">
                    <div className="flex-1 bg-black/40 rounded-3xl flex items-center justify-center overflow-hidden relative border border-zinc-800 shadow-inner">
                        <div className="relative inline-block" style={{ maxWidth: '100%', maxHeight: '100%' }}>
                            <img src={initialImage} onClick={handleImageClick} className="max-w-full max-h-[85vh] object-contain cursor-crosshair rounded-lg shadow-2xl" draggable="false" />
                            {texts.map(t => (
                                <div key={t.id} onClick={(e) => { e.stopPropagation(); setSelectedId(t.id); }} className={`absolute px-3 py-1.5 -translate-x-1/2 -translate-y-1/2 cursor-pointer border-2 font-bold whitespace-pre-wrap rounded-xl transition-all ${selectedId === t.id ? 'border-emerald-500 bg-emerald-500/20 scale-105' : 'border-transparent'}`} style={{ left: `${t.x * 100}%`, top: `${t.y * 100}%`, color: t.color, fontSize: `${t.size}px`, lineHeight: '1.2', textShadow: `0 0 5px ${(t.color === '#ffffff' || t.color === '#f59e0b') ? '#000000' : '#ffffff'}` }}>{t.text}</div>
                            ))}
                        </div>
                    </div>
                    <div className="w-full md:w-80 bg-white dark:bg-zinc-900 rounded-3xl p-6 flex flex-col gap-4 shadow-2xl shrink-0 h-full border border-zinc-200 dark:border-zinc-800">
                        <div className="flex justify-between items-center border-b border-zinc-100 dark:border-zinc-800 pb-4 shrink-0 text-zinc-800 dark:text-white">
                            <h3 className="font-black text-lg"><i className="fa-solid fa-pen-nib text-emerald-500 mr-2"></i> Editor Visual</h3>
                            <button onClick={onCancel} className="w-8 h-8 flex items-center justify-center bg-zinc-100 dark:bg-zinc-800 text-zinc-500 hover:text-red-500 rounded-full transition-colors"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2">
                            {selectedId ? (
                                <div className="space-y-5 animate-in slide-in-from-right-4">
                                    <div>
                                        <label className="block text-xs font-black text-zinc-400 uppercase tracking-widest mb-2">Texto</label>
                                        <textarea value={texts.find(t => t.id === selectedId).text} onChange={(e) => setTexts(texts.map(tx => tx.id === selectedId ? { ...tx, text: e.target.value } : tx))} className="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold resize-none" rows="3"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-black text-zinc-400 uppercase tracking-widest mb-3">Cor</label>
                                        <div className="flex flex-wrap gap-3">{['#10b981', '#f59e0b', '#ef4444', '#3b82f6', '#ffffff', '#000000'].map(c => (<button key={c} onClick={() => setTexts(texts.map(tx => tx.id === selectedId ? { ...tx, color: c } : tx))} className={`w-8 h-8 rounded-full border-2 transition-all ${texts.find(t => t.id === selectedId).color === c ? 'border-emerald-500 scale-110 shadow-md' : 'border-zinc-200 dark:border-zinc-700'}`} style={{ backgroundColor: c }} />))}</div>
                                    </div>
                                    <div>
                                        <label className="flex justify-between text-xs font-black text-zinc-400 uppercase tracking-widest mb-3"><span>Tamanho</span><span className="text-emerald-500">{texts.find(t => t.id === selectedId).size}px</span></label>
                                        <input type="range" min="12" max="100" value={texts.find(t => t.id === selectedId).size} onChange={(e) => setTexts(texts.map(tx => tx.id === selectedId ? { ...tx, size: parseInt(e.target.value) } : tx))} className="w-full accent-emerald-500" />
                                    </div>
                                    <div className="pt-4 border-t border-zinc-100 dark:border-zinc-800">
                                        <button onClick={() => { setTexts(texts.filter(t => t.id !== selectedId)); setSelectedId(null); }} className="w-full bg-red-50 dark:bg-red-900/20 hover:bg-red-600 hover:text-white text-red-600 font-bold py-3 rounded-xl transition-all"><i className="fa-solid fa-trash mr-2"></i> Apagar</button>
                                    </div>
                                </div>
                            ) : <div className="flex flex-col items-center justify-center h-full opacity-50"><i className="fa-solid fa-hand-pointer text-4xl mb-4"></i><p className="text-sm font-bold text-center">Clica na imagem para anotar.</p></div>}
                        </div>
                        <button onClick={handleExport} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 mt-4"><i className="fa-solid fa-floppy-disk mr-2"></i> Salvar Imagem</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2.5 COMPONENTE: FLASHCARD ITEM
        // ==========================================
        const FlashcardItem = ({ card, onDelete }) => {
            const [flipped, setFlipped] = useState(false);
            return (
                <div
                    onClick={() => setFlipped(!flipped)}
                    className={`p-6 rounded-[32px] border transition-all cursor-pointer relative min-h-[180px] flex items-center justify-center text-center shadow-lg group ${flipped ? 'bg-emerald-50 border-emerald-200 dark:bg-emerald-900/20 dark:border-emerald-800' : 'bg-white dark:bg-zinc-900 border-zinc-200 dark:border-zinc-800 hover:border-emerald-500'}`}
                >
                    <button onClick={(e) => { e.stopPropagation(); onDelete(card.id); }} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center z-10"><i className="fa-solid fa-trash"></i></button>
                    <div className={`absolute top-4 left-5 text-[10px] font-black uppercase tracking-widest ${flipped ? 'text-emerald-400' : 'text-zinc-400'}`}>{flipped ? 'Verso (Resposta)' : 'Frente (Pergunta)'}</div>
                    <div className="w-full px-2 mt-4">
                        <p className={`font-bold text-lg leading-relaxed ${flipped ? 'text-emerald-700 dark:text-emerald-300' : 'text-zinc-800 dark:text-zinc-100'}`}>
                            {flipped ? card.back : card.front}
                        </p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2.6 COMPONENTE: DAY COLUMN (PLANNER)
        // ==========================================
        const DayColumn = ({ day, tasks, onUpdate }) => {
            const [input, setInput] = useState("");
            const [priority, setPriority] = useState('none');
            const scrollRef = useRef(null);

            const addTask = (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                const newTask = {
                    id: Date.now().toString() + Math.random(),
                    text: input,
                    done: false,
                    priority: priority,
                    rating: null
                };
                onUpdate([...tasks, newTask]);
                setInput("");
                setPriority('none');
            };

            const toggleTask = (id) => onUpdate(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
            const deleteTask = (id) => onUpdate(tasks.filter(t => t.id !== id));
            const rateTask = (id, rating) => onUpdate(tasks.map(t => t.id === id ? { ...t, rating: t.rating === rating ? null : rating } : t));

            const handleDragStart = (e, index) => e.dataTransfer.setData('taskIndex', index);
            const handleDrop = (e, index) => {
                const fromIndex = e.dataTransfer.getData('taskIndex');
                if (fromIndex === '') return;
                const updated = [...tasks];
                const [moved] = updated.splice(fromIndex, 1);
                updated.splice(index, 0, moved);
                onUpdate(updated);
            };

            const completed = tasks.filter(t => t.done).length;
            const total = tasks.length;
            const progress = total === 0 ? 0 : Math.round((completed / total) * 100);

            return (
                <div className="w-full md:w-[320px] shrink-0 flex flex-col bg-white dark:bg-zinc-900 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-sm overflow-hidden transition-all hover:shadow-md">
                    <div className={`p-5 border-b border-zinc-100 dark:border-zinc-800 ${["Sábado", "Domingo"].includes(day) ? 'bg-emerald-50/50 dark:bg-emerald-900/10' : ''}`}>
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-black text-lg tracking-tight">{day}</h3>
                            <span className={`text-xs font-bold px-2 py-1 rounded-full ${progress === 100 ? 'bg-green-100 text-green-600' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500'}`}>
                                {completed}/{total}
                            </span>
                        </div>
                        <div className="h-1.5 bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                            <div className={`h-full transition-all duration-500 ${progress === 100 ? 'bg-green-500' : 'bg-emerald-500'}`} style={{ width: `${progress}%` }} />
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 planner-scroll" ref={scrollRef}>
                        {tasks.map((task, index) => (
                            <div key={task.id} draggable onDragStart={(e) => handleDragStart(e, index)} onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleDrop(e, index)}
                                className={`group flex flex-col p-4 rounded-2xl border-l-4 transition-all cursor-grab active:cursor-grabbing ${task.done ? 'bg-zinc-50 dark:bg-zinc-800/40 opacity-70' : 'bg-white dark:bg-zinc-800 shadow-sm border border-zinc-100 dark:border-zinc-700'} ${PRIORITIES[task.priority]?.border}`}
                            >
                                <div className="flex items-start gap-3">
                                    <button onClick={() => toggleTask(task.id)} className={`mt-1 shrink-0 transition-colors ${task.done ? 'text-green-500' : 'text-zinc-300 hover:text-emerald-500'}`}>
                                        {task.done ? <i className="fa-solid fa-circle-check text-lg"></i> : <i className="fa-regular fa-circle text-lg"></i>}
                                    </button>

                                    <span className={`flex-1 text-sm font-medium leading-relaxed ${task.done ? 'line-through text-zinc-400' : ''}`}>
                                        {task.text}
                                    </span>

                                    <button onClick={() => deleteTask(task.id)} className="opacity-0 group-hover:opacity-100 p-1 text-zinc-300 hover:text-red-500 transition-all">
                                        <i className="fa-solid fa-trash text-sm"></i>
                                    </button>
                                </div>

                                {task.done && (
                                    <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-700 flex justify-center gap-2 animate-in fade-in slide-in-from-top-1">
                                        {RATINGS.map(r => (
                                            <button key={r.value} onClick={() => rateTask(task.id, r.value)} className={`text-xl hover:scale-125 transition-all ${task.rating === r.value ? 'opacity-100 grayscale-0 scale-110' : 'opacity-20 grayscale hover:opacity-100 hover:grayscale-0'}`}>
                                                {r.emoji}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ))}

                        {tasks.length === 0 && (
                            <div className="py-10 text-center opacity-20">
                                <i className="fa-solid fa-plus text-3xl mx-auto mb-2 block"></i>
                                <p className="text-xs font-bold uppercase tracking-widest">Vazio</p>
                            </div>
                        )}
                    </div>

                    <div className="p-4 border-t border-zinc-100 dark:border-zinc-800 bg-zinc-50/50 dark:bg-zinc-900/50">
                        <form onSubmit={addTask} className="space-y-3">
                            <div className="flex gap-2 justify-center">
                                {Object.entries(PRIORITIES).map(([key, p]) => (
                                    <button key={key} type="button" onClick={() => setPriority(key)} title={p.label}
                                        className={`w-4 h-4 rounded-full transition-all ${p.color} ${priority === key ? 'ring-4 ring-emerald-200 dark:ring-emerald-900 scale-125' : 'opacity-40 hover:opacity-100'}`}
                                    />
                                ))}
                            </div>
                            <div className="relative">
                                <input type="text" value={input} onChange={(e) => setInput(e.target.value)} placeholder="Adicionar tarefa..." className="w-full pl-4 pr-12 py-3 bg-white dark:bg-zinc-800 rounded-2xl text-sm border-none shadow-inner focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-zinc-900 dark:text-zinc-100" />
                                <button type="submit" disabled={!input.trim()} className="absolute right-2 top-2 w-8 h-8 flex items-center justify-center bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 disabled:opacity-30 transition-all">
                                    <i className="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. COMPONENTE PRINCIPAL (APP)
        // ==========================================
        const FluxogramasTab = ({ fluxogramas, setDb, onPlay }) => {
            const [view, setView] = React.useState('decks');
            const [selectedDeck, setSelectedDeck] = React.useState(null);

            const decks = (fluxogramas || []).reduce((acc, f) => {
                const deck = f.category || 'Geral';
                if (!acc[deck]) acc[deck] = [];
                acc[deck].push(f);
                return acc;
            }, {});

            if (view === 'decks') {
                return (
                    <div className="p-6 space-y-8 animate-in fade-in pb-24">
                        <div className="bg-gradient-to-br from-emerald-900 to-zinc-900 p-10 rounded-[40px] shadow-2xl relative overflow-hidden border border-emerald-800">
                            <div className="absolute -right-10 -top-10 text-emerald-500/10"><i className="fa-solid fa-diagram-project text-[250px]"></i></div>
                            <div className="relative z-10">
                                <h2 className="text-3xl lg:text-4xl font-black text-white mb-2"><i className="fa-solid fa-folder-tree text-emerald-400 mr-3"></i> Baralhos de Fluxos</h2>
                                <p className="text-emerald-100/70 font-medium">Categorize seus estudos de conduta médica.</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {Object.entries(decks).map(([name, items]) => (
                                <div key={name} onClick={() => { setSelectedDeck(name); setView('gallery'); }} className="bg-white dark:bg-zinc-900 p-8 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-xl cursor-pointer hover:border-emerald-500 group transition-all flex flex-col items-center text-center">
                                    <div className="w-20 h-20 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-500 rounded-3xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform shadow-inner">
                                        <i className="fa-solid fa-diagram-project text-3xl"></i>
                                    </div>
                                    <h3 className="font-black text-xl text-zinc-800 dark:text-zinc-100 mb-2">{name}</h3>
                                    <span className="px-4 py-1.5 bg-zinc-100 dark:bg-zinc-800 rounded-full text-[10px] font-black uppercase tracking-widest text-zinc-500">{items.length} Itens</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            const currentFlows = decks[selectedDeck] || [];

            return (
                <div className="p-6 space-y-8 animate-in fade-in pb-24">
                    <div className="flex items-center gap-6">
                        <button onClick={() => setView('decks')} className="w-14 h-14 rounded-2xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 flex items-center justify-center text-zinc-500 hover:bg-emerald-500 hover:text-white transition-all shadow-md group">
                            <i className="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                        </button>
                        <div>
                            <h2 className="text-2xl font-black text-emerald-600 dark:text-emerald-400">{selectedDeck}</h2>
                            <p className="text-sm font-bold text-zinc-400">Escolha um fluxograma para iniciar o treinamento.</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {currentFlows.map(f => (
                            <div key={f.id} className="bg-white dark:bg-zinc-900 rounded-[32px] border border-zinc-200 dark:border-zinc-800 shadow-xl overflow-hidden group hover:border-emerald-500 transition-all">
                                <div className="aspect-video bg-zinc-100 dark:bg-zinc-950 flex items-center justify-center relative overflow-hidden">
                                    {f.image ? <img src={f.image} className="w-full h-full object-cover opacity-60 group-hover:scale-110 transition-transform duration-700" /> : <i className="fa-solid fa-diagram-project text-4xl text-zinc-300"></i>}
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-6">
                                        <h4 className="text-white font-black text-lg leading-tight">{f.title}</h4>
                                    </div>
                                </div>
                                <div className="p-6 flex gap-3">
                                    <button onClick={() => onPlay(f)} className="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg hover:bg-emerald-500 transition-all active:scale-95 flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-play"></i> Treinar
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            // --- ESTADO INICIAL (DB) ---
            const [db, setDb] = useState(() => {
                const emptyDb = {
                    errors: [],
                    subjects: DEFAULT_SUBJECTS,
                    perceptions: [],
                    exams: DEFAULT_EXAMS,
                    fac: [],
                    simuladoHistory: [],
                    flashcards: [],
                    games: [],
                    weeks: [],
                    checklists: [],
                    summaries: [],
                    summariesHtml: [],
                    processedQuestionLists: [],
                    dailyStats: {},
                    darkMode: true,
                    simuladoPausado: null,
                    fluxogramas: []
                };

                // Forçar "Zerar" se o usuário solicitou limpeza total (v7)
                const IS_RESET_VERSION = 'v7_cleared';
                if (localStorage.getItem('caderno_reset_status') !== IS_RESET_VERSION) {
                    const keysToClear = [
                        'caderno_db_master', 'caderno_med_v42_final', 'caderno_med_pro_final',
                        'caderno_med_v45_final', 'chat_med_ia_master', 'caderno_gist_config',
                        'gemini_api_key', 'gemini_model', 'gemini_persona'
                    ];
                    keysToClear.forEach(k => localStorage.removeItem(k));
                    localStorage.setItem('caderno_reset_status', IS_RESET_VERSION);
                    return emptyDb;
                }

                try {
                    const saved = localStorage.getItem('caderno_db_master');
                    return saved ? JSON.parse(saved) : emptyDb;
                } catch (e) { return emptyDb; }
            });

            // --- SINCRONIZAÇÃO E CONTROLE ---
            const [syncStatus, setSyncStatus] = useState('offline'); // 'offline', 'connecting', 'synced', 'syncing', 'error'
            const [syncErrorMsg, setSyncErrorMsg] = useState('');
            const [lastSyncTime, setLastSyncTime] = useState(null);
            const syncStatusRef = useRef(syncStatus);
            useEffect(() => { syncStatusRef.current = syncStatus; }, [syncStatus]);

            const isDirty = useRef(false);
            const lastGistReceiveTime = useRef(0);
            const isFirstRenderDb = useRef(true);
            const isFirstRenderChat = useRef(true);

            // ----- GIST SYNC CONFIG -----
            const [gistConfig, setGistConfig] = useState(() => {
                const saved = localStorage.getItem('caderno_gist_config');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return { ...parsed, token: '' }; // Force token to be empty on load
                }
                return { token: '', id: '', autoSync: true, version: 7 };
            });

            useEffect(() => {
                const toSave = { ...gistConfig, token: '' }; // Never save token to localStorage
                localStorage.setItem('caderno_gist_config', JSON.stringify(toSave));
            }, [gistConfig]);

            // Migração/Update de credenciais forçado (limpeza total na v6)
            useEffect(() => {
                const CURRENT_VERSION = 7;
                if (gistConfig.version !== CURRENT_VERSION) {
                    setGistConfig({
                        token: '',
                        id: '',
                        autoSync: true,
                        version: CURRENT_VERSION
                    });
                }
            }, []);

            // ----- Sincronização via GitHub Gist -----
            const mergeAdditive = (localArr, remoteArr) => {
                const map = new Map();
                (localArr || []).forEach(x => { if (x && x.id) map.set(x.id, x); });
                (remoteArr || []).forEach(x => {
                    if (!x || !x.id) return;
                    const loc = map.get(x.id);
                    map.set(x.id, { ...loc, ...x });
                });
                return Array.from(map.values());
            };

            const performFullMerge = (remote) => {
                if (!remote) return;
                setDb(prev => ({
                    ...prev,
                    ...remote,
                    errors: mergeAdditive(prev.errors, remote.errors),
                    flashcards: mergeAdditive(prev.flashcards, remote.flashcards),
                    checklists: mergeAdditive(prev.checklists, remote.checklists),
                    summariesHtml: mergeAdditive(prev.summariesHtml, remote.summariesHtml),
                    weeks: mergeAdditive(prev.weeks, remote.weeks),
                    games: mergeAdditive(prev.games, remote.games),
                    perceptions: mergeAdditive(prev.perceptions, remote.perceptions),
                    processedQuestionLists: mergeAdditive(prev.processedQuestionLists, remote.processedQuestionLists),
                    fluxogramas: mergeAdditive(prev.fluxogramas, remote.fluxogramas),
                    dailyStats: { ...(prev.dailyStats || {}), ...(remote.dailyStats || {}) }
                }));
                if (remote.chatMessages) setChatMessages(remote.chatMessages);
                setSyncStatus('synced');
                setLastSyncTime(new Date());
            };

            // ==========================================
            // SINCRONIZAÇÃO GIST (GITHUB)
            // ==========================================
            const syncToGist = async (dataToSave) => {
                const token = gistConfig.token?.trim();
                const id = gistConfig.id?.trim();
                if (!token || !id) return;

                setSyncStatus('syncing');
                try {
                    const response = await fetch(`https://api.github.com/gists/${id}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github+json',
                            'X-GitHub-Api-Version': '2022-11-28',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            files: {
                                "caderno_med_data.json": {
                                    content: JSON.stringify({ ...dataToSave, chatMessages })
                                }
                            }
                        })
                    });
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(`GitHub API ${response.status}: ${errData.message || 'Erro desconhecido'}`);
                    }
                    setSyncStatus('synced');
                    setLastSyncTime(new Date());
                    isDirty.current = false;
                    console.log("Gist: Sincronizado com sucesso.");
                } catch (err) {
                    console.error("Erro ao sincronizar Gist:", err);
                    setSyncErrorMsg(err.message);
                    setSyncStatus('error');
                }
            };

            const syncFromGist = async (isManual = false) => {
                const token = gistConfig.token?.trim();
                const id = gistConfig.id?.trim();
                if (!token || !id) return;

                console.log("Sync Gist: Iniciando download ultra-seguro...");
                setSyncStatus('connecting');
                setSyncErrorMsg('');
                try {
                    // Passo 1: Pegar metadados do Gist
                    const response = await fetch(`https://api.github.com/gists/${id}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github+json',
                            'X-GitHub-Api-Version': '2022-11-28'
                        }
                    });

                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(`Erro GitHub ${response.status}: ${errData.message || 'Token ou ID inválido'}`);
                    }

                    const gist = await response.json();
                    const file = gist.files["caderno_med_data.json"];

                    if (!file) throw new Error("Arquivo de dados não encontrado no Gist.");

                    // Passo 2: DOWNLOAD ROBUSTO (Usa raw_url para evitar truncamento do GitHub)
                    let content = file.content;
                    if (file.truncated || !content) {
                        console.log("Sync Gist: Arquivo truncado ou grande. Buscando via RAW URL...");
                        const rawRes = await fetch(file.raw_url);
                        if (!rawRes.ok) throw new Error("Falha ao baixar conteúdo bruto do arquivo.");
                        content = await rawRes.text();
                    }

                    if (content) {
                        try {
                            const remote = JSON.parse(content);
                            lastGistReceiveTime.current = Date.now();
                            performFullMerge(remote);
                            if (isManual) showAlert("✅ Sincronização concluída! Dados restaurados com 100% de integridade.");
                        } catch (parseErr) {
                            console.error("Erro no Parse JSON:", parseErr);
                            throw new Error("O arquivo na nuvem está incompleto. Tente 'Forçar Subir Dados' para resetar a nuvem.");
                        }
                    }
                } catch (err) {
                    console.error("Erro Crítico no Sync:", err);
                    setSyncErrorMsg(err.message);
                    setSyncStatus('error');
                    if (isManual) showAlert(`❌ Erro Crítico: ${err.message}`);
                }
            };

            const createGist = async () => {
                const token = gistConfig.token?.trim();
                if (!token) return showAlert("Insira o Token do GitHub primeiro.");
                setSyncStatus('connecting');
                try {
                    const response = await fetch(`https://api.github.com/gists`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Accept': 'application/vnd.github+json',
                            'X-GitHub-Api-Version': '2022-11-28',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            description: "Backup Caderno de Erros Médicos IA PRO",
                            public: false,
                            files: {
                                "caderno_med_data.json": {
                                    content: JSON.stringify({ ...db, chatMessages })
                                }
                            }
                        })
                    });
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        let msg = errData.message || 'Erro desconhecido';
                        if (response.status === 404) msg = "Não encontrado. Verifique se o Token tem a permissão 'gist' marcada.";
                        if (response.status === 401) msg = "Token inválido ou expirado.";
                        throw new Error(`GitHub API ${response.status}: ${msg}`);
                    }
                    const gist = await response.json();
                    setGistConfig(p => ({ ...p, id: gist.id }));
                    showAlert(`✅ Gist Privado criado com sucesso!\nID: ${gist.id}\nOs seus dados já foram salvos.`);
                    setSyncStatus('synced');
                } catch (err) {
                    showAlert(`❌ Erro ao criar Gist: ${err.message}`);
                }
            };

            // Auto-Sync Gist
            useEffect(() => {
                if (isFirstRenderDb.current || !gistConfig.id || !gistConfig.token || !gistConfig.autoSync) {
                    if (isFirstRenderDb.current) isFirstRenderDb.current = false;
                    return;
                }
                const timer = setTimeout(() => {
                    if (Date.now() - lastGistReceiveTime.current < 5000) return;
                    syncToGist(db);
                }, 3000);
                return () => clearTimeout(timer);
            }, [db]);

            // Initial Gist Load & Auto-Pull Interval
            useEffect(() => {
                if (gistConfig.id && gistConfig.token) {
                    // Pequeno delay para garantir que o resto do sistema inicializou
                    const initialTimer = setTimeout(() => {
                        syncFromGist();
                    }, 500);

                    // Pull automático a cada 60 segundos para manter PC e Celular sincronizados
                    if (gistConfig.autoSync) {
                        const interval = setInterval(() => {
                            // Só baixa se não estivermos enviando algo no momento
                            // Usamos ref para evitar closure stale
                            if (syncStatusRef.current !== 'syncing' && syncStatusRef.current !== 'connecting') {
                                syncFromGist();
                            }
                        }, 60000);
                        return () => {
                            clearTimeout(initialTimer);
                            clearInterval(interval);
                        };
                    }
                    return () => clearTimeout(initialTimer);
                }
            }, [gistConfig.id, gistConfig.token, gistConfig.autoSync]);

            // Garantir que os filtros padrão existam e sejam únicos
            useEffect(() => {
                setDb(p => {
                    let changed = false;

                    // Limpar sujeitos obsoletos que deveriam ser sub-filtros
                    let newSubjects = p.subjects.filter(s => s.id !== 'Nefrologia' && s.id !== 'Endocrinologia' && s.name !== 'Nefrologia' && s.name !== 'Endocrinologia');
                    if (newSubjects.length !== p.subjects.length) changed = true;

                    DEFAULT_SUBJECTS.forEach(defS => {
                        if (!newSubjects.some(s => s.id === defS.id)) {
                            newSubjects.push(defS);
                            changed = true;
                        }
                    });

                    let newExams = [...p.exams];
                    DEFAULT_EXAMS.forEach(defE => {
                        if (!newExams.some(e => e.id.toLowerCase() === defE.id.toLowerCase())) {
                            newExams.push(defE);
                            changed = true;
                        }
                    });

                    let newFac = [...p.fac];
                    ['Nefrologia', 'Endocrinologia'].forEach(name => {
                        if (!newFac.some(f => f.id === name || f.name === name)) {
                            newFac.push({ id: name, name: name });
                            changed = true;
                        }
                    });

                    // Migração Silenciosa: Garantir que questões desses temas tenham as tags corretas e disciplina 'clinica_medica'
                    const fixedErrors = p.errors.map(e => {
                        const isNefro = (e.subject === 'Nefrologia') || (e.title && /nefro|rim|renal/i.test(e.title)) || (e.tags && e.tags.some(t => /nefro|rim|renal/i.test(t)));
                        const isEndo = (e.subject === 'Endocrinologia') || (e.title && /endo|diabetes|tireoide/i.test(e.title)) || (e.tags && e.tags.some(t => /endo|diabetes|tireoide/i.test(t)));

                        if (isNefro || isEndo) {
                            let updated = false;
                            let newTags = [...(e.tags || [])];
                            const tagToAdd = isNefro ? 'Nefrologia' : 'Endocrinologia';
                            if (!newTags.includes(tagToAdd)) { newTags.push(tagToAdd); updated = true; }

                            if (e.subject !== 'clinica_medica' || updated) {
                                changed = true;
                                return { ...e, subject: 'clinica_medica', tags: newTags };
                            }
                        }
                        return e;
                    });

                    if (changed) return { ...p, subjects: newSubjects, exams: newExams, fac: newFac, errors: fixedErrors };
                    return p;
                });
            }, []);

            // --- ESTADOS DE UI E NAVEGAÇÃO ---
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [loginInput, setLoginInput] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [lightbox, setLightbox] = useState(null);
            const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });

            // --- ESTADOS DO PLANNER ---
            const [activeWeekId, setActiveWeekId] = useState(null);
            const [isCreatingWeek, setIsCreatingWeek] = useState(false);
            const [newWeekTitle, setNewWeekTitle] = useState("");
            const [newWeekDate, setNewWeekDate] = useState("");

            // --- ESTADOS DOS CHECKLISTS ---
            const [checklistState, setChecklistState] = useState({ view: 'list', data: null });

            // --- ESTADOS DA INTELIGÊNCIA ARTIFICIAL ---
            const [aiConfig, setAiConfig] = useState({
                key: localStorage.getItem('gemini_api_key') || "",
                model: localStorage.getItem('gemini_model') || 'gemini-2.5-flash',
                persona: localStorage.getItem('gemini_persona') || 'amigavel'
            });

            // Configurações persistentes
            useEffect(() => {
                if (aiConfig.key) localStorage.setItem('gemini_api_key', aiConfig.key);
                localStorage.setItem('gemini_model', aiConfig.model);
                localStorage.setItem('gemini_persona', aiConfig.persona);
            }, [aiConfig]);

            const getPersonaInstruction = (persona, contextType = 'chat') => {
